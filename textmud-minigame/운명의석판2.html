<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <style>
        :root {
            --bg: #05070a;
            --gold: #ffcc00;
            --slot-h: 110px;
        }

        body { background: var(--bg); color: #d1d5db; font-family: 'serif'; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }

        .tablet { 
            width: 420px; background: #151719; border: 4px solid #2d3035; 
            padding: 25px; box-shadow: 0 40px 100px rgba(0,0,0,0.9);
        }

        .viewport { 
            height: var(--slot-h); overflow: hidden; position: relative; 
            background: #000; border: 2px solid #333; margin: 10px 0;
            box-shadow: inset 0 0 40px rgba(130,0,0,0.3);
        }

        .rune-container { position: absolute; top: 0; left: 0; width: 100%; transform: translateY(0); }

        /* 🚀 가독성 개선 애니메이션 로직 */
        .resonating { 
            /* 속도 곡선을 수정하여 감속 구간을 더 길게 가져갑니다 */
            animation: stone-stop 5.5s cubic-bezier(0.2, 0, 0.1, 1) forwards; 
        }

        @keyframes stone-stop {
            0% { transform: translateY(0); filter: blur(0px); }
            15% { filter: blur(2px); } /* 너무 심한 블러 제거 */
            80% { filter: blur(0px); } /* 멈추기 한참 전부터 글자가 보이게 설정 */
            85% { transform: translateY(var(--target)); }
            92% { transform: translateY(calc(var(--target) - 40px)); }
            96% { transform: translateY(calc(var(--target) + 12px)); }
            100% { transform: translateY(var(--target)); }
        }

        .rune-item {
            height: var(--slot-h); display: flex; flex-direction: column; justify-content: center; align-items: center;
            font-size: 1.8rem; font-weight: bold; 
            /* 기본 상태에서도 글자가 잘 보이도록 색상 상향 */
            color: #666; 
            transition: 0.5s;
            /* 글자 테두리를 주어 가독성 확보 */
            text-shadow: 0 0 5px rgba(0,0,0,1), 0 0 10px rgba(0,0,0,0.8);
        }

        /* 당첨 시 효과 강조 */
        .win-jackpot { color: var(--gold) !important; text-shadow: 0 0 20px #ffcc00, 0 0 40px #ff6600; animation: pulse 1.5s infinite; }
        .win-item { color: #fff !important; text-shadow: 0 0 15px rgba(255,255,255,0.8); }
        .win-fail { color: #400 !important; filter: grayscale(1); }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* 하단 컨트롤러 */
        .status-bar { display: flex; justify-content: space-between; font-size: 0.9rem; margin-bottom: 10px; color: #8b949e; }
        .bet-control { display: flex; align-items: center; justify-content: space-between; background: #0a0a0c; border: 1px solid #2d3035; padding: 10px; margin-top: 15px; }
        .control-btn { background: #1a1c1e; color: #8b949e; border: 1px solid #333; width: 40px; height: 40px; cursor: pointer; }
        .spin-btn { width: 100%; background: #1a1c1e; color: var(--gold); border: 1px solid var(--gold); padding: 16px; margin-top: 10px; cursor: pointer; font-weight: bold; }
        .spin-btn:hover:not(:disabled) { background: var(--gold); color: #000; }
        .spin-btn:disabled { opacity: 0.2; }
        #msg-text { height: 20px; margin-top: 12px; text-align: center; font-size: 0.85rem; font-weight: bold; opacity: 0; transition: 0.3s; }
    </style>
</head>
<body>

<div class="tablet">
    <div class="status-bar">
        <span>보유 금화</span>
        <span><span id="user-gold" style="color:var(--gold)">1000</span> G</span>
    </div>

    <div class="viewport">
        <div id="rune-container" class="rune-container"></div>
    </div>

    <div class="bet-control">
        <button class="control-btn" onclick="changeBet(-50)">-</button>
        <div style="text-align:center">
            <div style="font-size:0.6rem; opacity:0.5; margin-bottom:2px;">BETTED GOLD</div>
            <div style="font-weight:bold; color:var(--gold); font-size:1.2rem;"><span id="bet-amount">100</span> G</div>
        </div>
        <button class="control-btn" onclick="changeBet(50)">+</button>
    </div>

    <button id="spin-btn" class="spin-btn" onclick="spin()">금화 공헌하기</button>
    <div id="msg-text"></div>
</div>

<script>
    let gold = 1000;
    let bet = 100;
    const items = [
        { name: "👑 잭팟", type: "jackpot", multi: 10, effect: "win-jackpot" },
        { name: "💰 골드 x2", type: "gold", multi: 2, effect: "win-item" },
        { name: "💰 골드 x1", type: "gold", multi: 1, effect: "win-item" },
        { name: "🌿 치유 약초", type: "item", multi: 0, effect: "win-item" },
        { name: "💊 기력 환약", type: "item", multi: 0, effect: "win-item" },
        { name: "💀 꽝", type: "fail", multi: 0, effect: "win-fail" }
    ];

    const container = document.getElementById('rune-container');
    const slotH = 110;
    let fullPool = [];

    function init() {
        let html = "";
        for(let i=0; i<15; i++) {
            items.forEach(item => { html += `<div class="rune-item">${item.name}</div>`; });
        }
        container.innerHTML = html;
        fullPool = Array.from(container.querySelectorAll('.rune-item'));
    }

    function changeBet(val) { if(bet + val >= 50) { bet += val; document.getElementById('bet-amount').innerText = bet; } }

    function spin() {
        if (gold < bet) { showMsg("! 금화가 부족합니다", "#ff4444"); return; }
        const btn = document.getElementById('spin-btn');
        gold -= bet; updateUI();
        btn.disabled = true;
        fullPool.forEach(el => el.className = 'rune-item');

        const randIdx = Math.floor(Math.random() * items.length);
        const result = items[randIdx];
        const targetIdx = (items.length * 12) + randIdx;
        const offset = -(targetIdx * slotH);

        container.style.setProperty('--target', `${offset}px`);
        container.classList.remove('resonating');
        void container.offsetWidth;
        container.classList.add('resonating');

        setTimeout(() => {
            const winEl = fullPool[targetIdx];
            winEl.classList.add(result.effect);
            btn.disabled = false;
            if(result.multi > 0) { gold += bet * result.multi; showMsg(`+ ${bet * result.multi}G 획득`, "var(--gold)"); }
            else if (result.type === 'item') showMsg(`[${winEl.innerText}] 획득`, "#fff");
            else showMsg("석판이 침묵합니다", "#555");
            updateUI();
        }, 5500);
    }

    function showMsg(txt, color) {
        const msg = document.getElementById('msg-text');
        msg.innerText = txt; msg.style.color = color; msg.style.opacity = '1';
        setTimeout(() => { msg.style.opacity = '0'; }, 2500);
    }

    function updateUI() { document.getElementById('user-gold').innerText = gold; }
    init();
</script>
</body>
</html>
