<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>선상 주점 주사위 게임</title>
  <style>
    :root {
      --tavern-green: #0a2e1f;
      --wood: #3e2723;
      --gold: #f1c40f;
      --dice-size: 60px;
      --dice-bg: #ece0d1;
      --dice-dot: #2c3e50;
    }

    body {
      background: #050505;
      color: #ecf0f1;
      font-family: 'serif';
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      overflow: hidden;
    }

    .game-board {
      width: 480px;
      background: var(--tavern-green);
      border: 12px solid var(--wood);
      padding: 30px;
      box-shadow: 0 0 80px rgba(0, 0, 0, 1);
      border-radius: 4px;
    }

    .status-header {
      display: flex;
      justify-content: space-between;
      font-size: 0.9rem;
      border-bottom: 2px solid #1a4a35;
      padding-bottom: 10px;
      color: var(--gold);
      margin-bottom: 20px;
    }

    .log-area {
      height: 100px;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid #1a4a35;
      padding: 12px;
      font-size: 0.85rem;
      line-height: 1.6;
      overflow-y: auto;
      margin-bottom: 25px;
      color: #a5b1b1;
    }

    .dice-container {
      display: flex;
      justify-content: space-around;
      align-items: center;
      margin-bottom: 20px;
      gap: 10px;
    }

    .dice-set {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      flex: 1;
    }

    .dice-scene {
      width: var(--dice-size);
      height: var(--dice-size);
      perspective: 600px;
    }

    .dice {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      /* 초기 transition 설정 */
      transition: transform 1s cubic-bezier(0.2, 0.8, 0.2, 1.1);
    }

    .dice-face {
      position: absolute;
      width: var(--dice-size);
      height: var(--dice-size);
      background: var(--dice-bg);
      border: 2px solid #c8b9a6;
      border-radius: 8px;
      box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 1.8rem;
      font-weight: bold;
      color: var(--dice-dot);
      backface-visibility: hidden;
    }

    /* 주사위 면 배치 (정적 위치) */
    .f-1 { transform: rotateY(0deg) translateZ(30px); }
    .f-6 { transform: rotateY(180deg) translateZ(30px); }
    .f-2 { transform: rotateY(90deg) translateZ(30px); }
    .f-5 { transform: rotateY(-90deg) translateZ(30px); }
    .f-3 { transform: rotateX(90deg) translateZ(30px); }
    .f-4 { transform: rotateX(-90deg) translateZ(30px); }

    .btn {
      background: #2c3e50;
      border: 1px solid var(--wood);
      color: #fff;
      padding: 12px;
      cursor: pointer;
      font-weight: bold;
      font-family: inherit;
      transition: 0.2s;
    }
    .btn-main {
      background: #7f1d1d;
      color: var(--gold);
      border: 1px solid var(--gold);
    }
    .btn:active { transform: scale(0.95); }
    .btn:disabled { opacity: 0.3; cursor: not-allowed; }
    
    .bet-info {
      text-align: center;
      margin: 15px 0;
      color: var(--gold);
      font-size: 1.1rem;
    }
  </style>
</head>
<body>

  <div class="game-board">
    <div class="status-header">
      <span>[ 선상 주점 ]</span>
      <span>금화: <span id="user-gold">1000</span> G</span>
    </div>

    <div class="log-area" id="log-window">"자, 판돈을 올리고 주사위를 던지게나."</div>

    <div class="dice-container">
      <div class="dice-set">
        <div style="display:flex; gap:12px;">
          <div class="dice-scene"><div id="p1" class="dice"></div></div>
          <div class="dice-scene"><div id="p2" class="dice"></div></div>
        </div>
        <div id="p-hand" style="font-size:0.8rem; color:var(--gold); font-weight:bold; height:15px; margin-top:5px;"></div>
      </div>
      <div style="color: #1a4a35; font-weight: bold; font-size: 1.2rem;">VS</div>
      <div class="dice-set">
        <div style="display:flex; gap:12px;">
          <div class="dice-scene"><div id="m1" class="dice"></div></div>
          <div class="dice-scene"><div id="m2" class="dice"></div></div>
        </div>
        <div id="m-hand" style="font-size:0.8rem; color:var(--gold); font-weight:bold; height:15px; margin-top:5px;"></div>
      </div>
    </div>

    <div class="bet-info">BET: <span id="bet-display">100</span> G</div>

    <div style="display: grid; grid-template-columns: 1fr 2fr 1fr; gap: 10px;">
      <button class="btn" onclick="changeBet(-50)">-</button>
      <button class="btn btn-main" id="spin-btn" onclick="rollDice()">주사위를 던진다</button>
      <button class="btn" onclick="changeBet(50)">+</button>
    </div>
  </div>

  <script>
    let gold = 1000;
    let bet = 100;

    // 주사위 면 초기 설정
    function initDice() {
      ['p1', 'p2', 'm1', 'm2'].forEach(id => {
        const dice = document.getElementById(id);
        dice.innerHTML = `
          <div class="dice-face f-1">1</div>
          <div class="dice-face f-6">6</div>
          <div class="dice-face f-2">2</div>
          <div class="dice-face f-5">5</div>
          <div class="dice-face f-3">3</div>
          <div class="dice-face f-4">4</div>
        `;
      });
    }
    initDice();

    function addLog(msg, color = "#a5b1b1") {
      const log = document.getElementById('log-window');
      log.innerHTML += `<div style="color:${color}">${msg}</div>`;
      log.scrollTop = log.scrollHeight;
    }

    function changeBet(v) {
      if (bet + v >= 50 && bet + v <= gold) {
        bet += v;
        document.getElementById('bet-display').innerText = bet;
      }
    }

    const wait = (ms) => new Promise(res => setTimeout(res, ms));

    // 숫자에 따른 회전 좌표 값
    function getTargetRotation(value) {
      switch(value) {
        case 1: return { x: 0,   y: 0 };
        case 6: return { x: 0,   y: 180 };
        case 2: return { x: 0,   y: -90 };
        case 5: return { x: 0,   y: 90 };
        case 3: return { x: -90, y: 0 };
        case 4: return { x: 90,  y: 0 };
        default: return { x: 0,  y: 0 };
      }
    }

    async function rollDice() {
      if (gold < bet) { 
        addLog("주인: 판돈이 부족해 보이는데?", "#e74c3c"); 
        return; 
      }
      
      const btn = document.getElementById('spin-btn');
      btn.disabled = true;
      gold -= bet;
      document.getElementById('user-gold').innerText = gold;
      
      document.getElementById('p-hand').innerText = "";
      document.getElementById('m-hand').innerText = "";

      const ids = ['p1', 'm1', 'p2', 'm2'];
      const results = {
        p1: Math.floor(Math.random() * 6) + 1,
        p2: Math.floor(Math.random() * 6) + 1,
        m1: Math.floor(Math.random() * 6) + 1,
        m2: Math.floor(Math.random() * 6) + 1
      };

      // 1. 모든 주사위 각도를 순식간에 0으로 초기화 (Transition 제거)
      ids.forEach(id => {
        const dice = document.getElementById(id);
        dice.style.transition = 'none';
        dice.style.transform = 'rotateX(0deg) rotateY(0deg)';
      });

      // 브라우저가 초기화 상태를 인식하도록 잠깐의 유예 시간 부여
      await wait(50);

      // 2. 주사위 순차적으로 던지기
      for (const id of ids) {
        const dice = document.getElementById(id);
        const target = getTargetRotation(results[id]);
        
        // 다시 부드러운 애니메이션 적용
        dice.style.transition = 'transform 1s cubic-bezier(0.2, 0.8, 0.2, 1.1)';
        
        // 최소 2바퀴(720도)를 더해 역동적으로 회전
        const spinX = 720 + target.x;
        const spinY = 720 + target.y;
        
        dice.style.transform = `rotateX(${spinX}deg) rotateY(${spinY}deg)`;
        
        if (id === 'p1') addLog(`당신의 첫 주사위를 던졌네...`);
        if (id === 'm1') addLog(`주인의 첫 눈은 [${results.m1}]이군.`);
        
        await wait(700);
      }

      await wait(500);

      // 3. 승패 판정 로직
      const pSum = results.p1 + results.p2;
      const mSum = results.m1 + results.m2;
      const pDouble = results.p1 === results.p2;
      const mDouble = results.m1 === results.m2;

      document.getElementById('p-hand').innerText = pDouble ? "쌍룡(Double)!" : `합계 ${pSum}`;
      document.getElementById('m-hand').innerText = mDouble ? "쌍룡(Double)!" : `합계 ${mSum}`;

      let win = false;
      if (pDouble && !mDouble) win = true;
      else if (!pDouble && mDouble) win = false;
      else if (pSum > mSum) win = true;
      else if (pSum < mSum) win = false;
      else if (pDouble && mDouble) win = (pSum > mSum); // 둘다 더블이면 합계 큰 쪽

      if (pSum === mSum && pDouble === mDouble) {
        addLog("무승부군. 판돈은 돌려줌세.");
        gold += bet;
      } else if (win) {
        let multi = pDouble ? 3 : 2;
        addLog(`자네가 이겼네! ${bet * multi}G를 가져가게.`, "var(--gold)");
        gold += bet * multi;
      } else {
        addLog("주인: 운이 다했구먼. 이건 내가 가져가지.", "#e74c3c");
      }

      document.getElementById('user-gold').innerText = gold;
      btn.disabled = false;
    }
  </script>
</body>
</html>
