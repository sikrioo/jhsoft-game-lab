<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pachinko Slot Luxe</title>
<style>
  * { box-sizing: border-box; }
  :root{
    --ink:#1d1412;
    --paper:#f4ead8;
    --cream:#d9c6a3;
    --gold:#cda55a;
    --orange:#b87a52;
    --red:#9e4f44;
    --blue:#6a8da8;
    --mint:#6f9b86;
    --purple:#7e6d88;
    --shadow:rgba(29,20,18,.18);
  }
  body{
    margin:0;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:
      radial-gradient(circle at top, rgba(255,255,255,.65), transparent 24%),
      radial-gradient(circle at 16% 18%, rgba(74,183,255,.28), transparent 18%),
      radial-gradient(circle at 82% 14%, rgba(255,90,86,.22), transparent 18%),
      linear-gradient(180deg, #d7c3a0 0%, #a87958 100%);
    color:var(--ink);
    font-family:"Trebuchet MS","Malgun Gothic",sans-serif;
    overflow:hidden;
  }
  body::before{
    content:"";
    position:fixed;
    inset:0;
    pointer-events:none;
    opacity:.22;
    background:
      radial-gradient(circle, rgba(29,20,18,.12) 2px, transparent 2px) 0 0 / 24px 24px,
      repeating-conic-gradient(from 0deg, rgba(255,255,255,.14) 0 8deg, transparent 8deg 16deg);
  }
  .app{
    width:min(1120px, calc(100vw - 24px));
    min-height:min(860px, calc(100vh - 24px));
    display:block;
    border:5px solid var(--ink);
    border-radius:34px;
    overflow:hidden;
    background:var(--paper);
    box-shadow:0 18px 0 #4d2f25, 0 36px 90px rgba(0,0,0,.26);
  }
  .stage{
    position:relative;
    padding:24px;
    background:
      radial-gradient(circle at center, rgba(255,255,255,.24), transparent 28%),
      linear-gradient(180deg, #efe2cc 0%, #c7a782 46%, #936648 100%);
    overflow:hidden;
  }
  .stage::before{
    content:"";
    position:absolute;
    inset:18px;
    border:4px solid rgba(29,20,18,.92);
    border-radius:30px;
    pointer-events:none;
    box-shadow:inset 0 0 0 4px rgba(255,255,255,.24);
  }
  .burst{
    position:absolute;
    inset:8% 10%;
    pointer-events:none;
    opacity:.3;
    background:repeating-conic-gradient(from 0deg, rgba(255,255,255,.28) 0 8deg, transparent 8deg 17deg);
    border-radius:50%;
    filter:blur(1px);
  }
  .status-label{
    font-size:12px;
    font-weight:900;
    letter-spacing:.12em;
    text-transform:uppercase;
    color:#694c34;
  }
  #message{
    margin-top:8px;
    min-height:60px;
    font-size:24px;
    font-weight:900;
    line-height:1.15;
  }
  .machine-wrap{
    position:relative;
    z-index:1;
    display:grid;
    grid-template-columns:1fr 260px;
    gap:20px;
    align-items:start;
  }
  .machine{
    position:relative;
    padding:22px 22px 18px;
    border:5px solid var(--ink);
    border-radius:32px;
    background:
      linear-gradient(180deg, rgba(255,255,255,.4), transparent 100%),
      linear-gradient(180deg, #7d5747 0%, #9b7454 48%, #c9a06b 100%);
    box-shadow:0 14px 0 rgba(29,20,18,.18);
  }
  .machine::before{
    content:"";
    position:absolute;
    inset:14px;
    border:4px solid rgba(29,20,18,.82);
    border-radius:24px;
    pointer-events:none;
  }
  .machine-head{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:14px;
    margin-bottom:16px;
  }
  .jackpot{
    padding:10px 14px;
    border:4px solid var(--ink);
    border-radius:18px;
    background:#ecd8ac;
    font-size:20px;
    font-weight:900;
    box-shadow:0 6px 0 rgba(29,20,18,.14);
  }
  .lights{
    display:flex;
    gap:8px;
  }
  .light{
    width:18px;
    height:18px;
    border:3px solid var(--ink);
    border-radius:50%;
    background:#f1e4ca;
    box-shadow:0 0 0 4px rgba(255,255,255,.18);
    transition:transform .18s ease, background .18s ease, box-shadow .18s ease;
  }
  .light.active{
    transform:scale(1.12);
    background:#d2ac63;
    box-shadow:0 0 0 4px rgba(255,255,255,.2), 0 0 24px rgba(255,242,95,.66);
  }
  .screen{
    position:relative;
    padding:16px;
    border:5px solid var(--ink);
    border-radius:26px;
    background:
      linear-gradient(180deg, rgba(255,255,255,.14), transparent 100%),
      #2b1731;
    box-shadow:inset 0 0 0 4px rgba(255,255,255,.08);
  }
  .payline{
    position:absolute;
    inset:16px;
    pointer-events:none;
  }
  .payline svg{
    width:100%;
    height:100%;
    overflow:visible;
  }
  .payline path{
    fill:none;
    stroke:#d9b26f;
    stroke-width:10;
    stroke-linecap:round;
    stroke-linejoin:round;
    filter:drop-shadow(0 0 12px rgba(255,233,109,.55));
    opacity:0;
    transition:opacity .2s ease;
  }
  .payline path.active{ opacity:1; }
  .grid{
    position:relative;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:14px;
  }
  .cell{
    position:relative;
    aspect-ratio:1/1;
    border:4px solid var(--ink);
    border-radius:24px;
    overflow:hidden;
    background:#f8f0e2;
    box-shadow:0 8px 0 rgba(29,20,18,.14);
  }
  .cell.win{
    animation:tile-pop .55s ease;
  }
  .symbol{
    position:absolute;
    inset:8px;
    padding:10px;
    display:block;
    font-weight:900;
    color:var(--ink);
    transform:translateY(0) scale(1);
    transition:transform .14s ease;
    border:3px solid rgba(29,20,18,.18);
    border-radius:18px;
    background:
      linear-gradient(180deg, rgba(255,255,255,.92), rgba(244,236,224,.96));
    box-shadow:inset 0 2px 0 rgba(255,255,255,.85), inset 0 -8px 16px rgba(29,20,18,.05);
  }
  .spinning .symbol{
    animation:reel-bob .12s linear infinite alternate;
  }
  .symbol-corner{
    position:absolute;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:1px;
    line-height:1;
    font-weight:900;
  }
  .symbol-corner.top-left{ top:10px; left:10px; }
  .symbol-corner.bottom-right{ right:10px; bottom:10px; transform:rotate(180deg); }
  .corner-rank{
    font-size:18px;
    letter-spacing:.02em;
  }
  .corner-suit{
    font-size:16px;
  }
  .symbol-center{
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:6px;
    text-align:center;
  }
  .symbol-icon{
    font-size:58px;
    line-height:1;
    filter:drop-shadow(0 3px 0 rgba(29,20,18,.12));
  }
  .symbol-name{
    font-size:10px;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:rgba(29,20,18,.7);
  }
  .symbol.red-card .symbol-icon,
  .symbol.red-card .corner-rank,
  .symbol.red-card .corner-suit{ color:#8d3f45; }
  .symbol.black-card .symbol-icon,
  .symbol.black-card .corner-rank,
  .symbol.black-card .corner-suit{ color:#23313f; }
  .symbol.gold-card .symbol-icon,
  .symbol.gold-card .corner-rank,
  .symbol.gold-card .corner-suit{ color:#8c6736; }
  .symbol.joker-card .symbol-icon,
  .symbol.joker-card .corner-rank,
  .symbol.joker-card .corner-suit{ color:#5f4f73; }
  .symbol.joker-full{
    background:
      radial-gradient(circle at top, rgba(255,255,255,.65), transparent 32%),
      linear-gradient(180deg, #f3ead8 0%, #dac6a1 52%, #8a6f53 100%);
    box-shadow:
      inset 0 2px 0 rgba(255,255,255,.88),
      inset 0 -16px 24px rgba(29,20,18,.08),
      0 8px 20px rgba(95,79,115,.18);
  }
  .symbol.joker-full::before{
    content:"";
    position:absolute;
    inset:8px;
    border:2px solid rgba(95,79,115,.38);
    border-radius:14px;
    pointer-events:none;
  }
  .joker-banner{
    position:absolute;
    top:12px;
    left:50%;
    transform:translateX(-50%);
    padding:4px 10px;
    border:2px solid rgba(29,20,18,.18);
    border-radius:999px;
    background:rgba(255,255,255,.65);
    font-size:9px;
    letter-spacing:.22em;
    text-transform:uppercase;
    color:#5f4f73;
  }
  .joker-center{
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:8px;
    text-align:center;
  }
  .joker-glyph{
    font-size:74px;
    line-height:1;
    color:#5f4f73;
    filter:drop-shadow(0 4px 0 rgba(29,20,18,.12));
  }
  .joker-word{
    font-size:20px;
    letter-spacing:.22em;
    text-transform:uppercase;
    color:#4d3e61;
  }
  .joker-sub{
    font-size:9px;
    letter-spacing:.2em;
    text-transform:uppercase;
    color:rgba(29,20,18,.58);
  }
  .frame-side{
    display:flex;
    flex-direction:column;
    gap:14px;
  }
  .meta{
    padding:14px;
  }
  .meta h3{
    margin:0 0 10px;
    font-size:16px;
  }
  .stat{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    font-size:14px;
    font-weight:800;
  }
  .stat + .stat{ margin-top:8px; }
  .stat strong{
    font-size:18px;
  }
  .controls{
    padding:14px;
  }
  .bet-row{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:8px;
    margin-top:10px;
  }
  .bet-btn,.action-btn{
    appearance:none;
    border:4px solid var(--ink);
    cursor:pointer;
    font-weight:900;
    transition:transform .12s ease, box-shadow .12s ease, filter .12s ease;
    box-shadow:0 6px 0 rgba(29,20,18,.14);
  }
  .bet-btn:hover,.action-btn:hover{ transform:translateY(-2px); }
  .bet-btn:active,.action-btn:active{ transform:translateY(3px); box-shadow:0 2px 0 rgba(29,20,18,.12); }
  .bet-btn{
    min-height:56px;
    border-radius:16px;
    background:#efe4d1;
    color:var(--ink);
    font-size:15px;
    line-height:1;
  }
  .bet-btn.selected{
    background:#b47a58;
    color:#fffdf6;
  }
  .bet-btn small{
    display:block;
    margin-top:4px;
    font-size:10px;
    opacity:.82;
    letter-spacing:.08em;
    text-transform:uppercase;
  }
  .actions{
    display:grid;
    gap:10px;
    margin-top:14px;
  }
  .action-btn{
    min-height:64px;
    border-radius:20px;
    font-size:18px;
  }
  #spinBtn{ background:#8f4e44; color:#fff8ef; }
  #autoBtn{ background:#6e8797; color:#fff8ef; }
  #chargeBtn{ background:#8fa07c; color:#1d1412; }
  .history{
    padding:14px;
  }
  .history-list{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-top:10px;
  }
  .history-chip{
    min-width:52px;
    padding:8px 10px;
    border:3px solid var(--ink);
    border-radius:999px;
    background:#fff7d7;
    font-size:12px;
    font-weight:900;
    text-align:center;
  }
  .sparkles{
    position:absolute;
    inset:0;
    pointer-events:none;
    overflow:hidden;
  }
  .spark{
    position:absolute;
    width:16px;
    height:16px;
    border:3px solid var(--ink);
    background:#fff7b2;
    transform:rotate(45deg);
    border-radius:4px;
    opacity:0;
    animation:spark-fly .9s ease forwards;
  }
  @keyframes tile-pop{
    0%{ transform:scale(.92) rotate(-2deg); }
    45%{ transform:scale(1.06) rotate(1deg); }
    100%{ transform:scale(1); }
  }
  @keyframes reel-bob{
    from{ transform:translateY(-4px) scale(.98); }
    to{ transform:translateY(4px) scale(1.02); }
  }
  @keyframes spark-fly{
    0%{ opacity:0; transform:translate(0,0) rotate(45deg) scale(.4); }
    20%{ opacity:1; }
    100%{ opacity:0; transform:translate(var(--dx),var(--dy)) rotate(225deg) scale(1.3); }
  }
  @media (max-width:1100px){
    .app{ min-height:auto; }
    .machine-wrap{ grid-template-columns:1fr; }
  }
</style>
</head>
<body>
  <div class="app">
    <section class="stage">
      <div class="burst"></div>
      <div class="status panel"><div class="status-label">Status</div><div id="message">Press spin to begin the lounge session.</div></div><div class="machine-wrap">
        <div class="machine">
          <div class="machine-head">
            <div class="jackpot">SALON JACKPOT x25</div>
            <div class="lights" id="lights"></div>
          </div>
          <div class="screen" id="screen">
            <div class="payline">
              <svg viewBox="0 0 300 300" preserveAspectRatio="none">
                <path id="line0" d="M 20 50 L 150 50 L 280 50"></path>
                <path id="line1" d="M 20 150 L 150 150 L 280 150"></path>
                <path id="line2" d="M 20 250 L 150 250 L 280 250"></path>
                <path id="line3" d="M 20 50 L 150 150 L 280 250"></path>
                <path id="line4" d="M 20 250 L 150 150 L 280 50"></path>
                <path id="line5" d="M 20 50 L 150 150 L 280 50"></path>
                <path id="line6" d="M 20 250 L 150 150 L 280 250"></path>
                <path id="line7" d="M 20 150 L 150 50 L 280 150"></path>
              </svg>
            </div>
            <div class="grid" id="grid"></div>
          </div>
          <div class="sparkles" id="sparkles"></div>
        </div>

        <div class="frame-side">
          <div class="meta panel">
            <h3>Salon Table</h3>
            <div class="stat"><span>Balance</span><strong id="balance">1,000</strong></div>
            <div class="stat"><span>Bet</span><strong id="bet">20</strong></div>
            <div class="stat"><span>Last Win</span><strong id="lastWin">0</strong></div>
            <div class="stat"><span>Auto</span><strong id="autoState">OFF</strong></div>
          </div>

          <div class="controls panel">
            <div class="status-label">Bet Select</div>
            <div class="bet-row" id="betRow"></div>
            <div class="actions">
              <button class="action-btn" id="spinBtn" type="button">SPIN</button>
              <button class="action-btn" id="autoBtn" type="button">AUTO x10</button>
              <button class="action-btn" id="chargeBtn" type="button">+500 COINS</button>
            </div>
          </div>

          <div class="history panel">
            <div class="status-label">Recent</div>
            <div class="history-list" id="history"></div>
          </div>
        </div>
      </div>
    </section>
  </div>

<script>
(() => {
  const symbols = [
    { id: "joker", name: "Joker", icon: "🃏", rank: "JK", suit: "★", cardClass: "joker-card", payout: 25 },
    { id: "ace", name: "Ace of Spades", icon: "♠", rank: "A", suit: "♠", cardClass: "black-card", payout: 12 },
    { id: "king", name: "King", icon: "K", rank: "K", suit: "♣", cardClass: "gold-card", payout: 10 },
    { id: "queen", name: "Queen", icon: "Q", rank: "Q", suit: "♥", cardClass: "red-card", payout: 8 },
    { id: "jack", name: "Jack", icon: "J", rank: "J", suit: "♠", cardClass: "black-card", payout: 7 },
    { id: "diamond", name: "Diamond", icon: "♦", rank: "10", suit: "♦", cardClass: "red-card", payout: 6 },
    { id: "heart", name: "Heart", icon: "♥", rank: "9", suit: "♥", cardClass: "red-card", payout: 5 }
  ];

  const paylines = [
    [0,1,2],
    [3,4,5],
    [6,7,8],
    [0,4,8],
    [6,4,2],
    [0,4,2],
    [6,4,8],
    [3,1,5]
  ];

  const state = {
    balance: 1000,
    bet: 20,
    lastWin: 0,
    grid: [],
    spinning: false,
    autoLeft: 0,
    history: []
  };

  const gridEl = document.getElementById("grid");
  const balanceEl = document.getElementById("balance");
  const betEl = document.getElementById("bet");
  const lastWinEl = document.getElementById("lastWin");
  const autoStateEl = document.getElementById("autoState");
  const messageEl = document.getElementById("message");
  const historyEl = document.getElementById("history");
  const sparklesEl = document.getElementById("sparkles");
  const lightsEl = document.getElementById("lights");
  const betRowEl = document.getElementById("betRow");
  const spinBtn = document.getElementById("spinBtn");
  const autoBtn = document.getElementById("autoBtn");
  const chargeBtn = document.getElementById("chargeBtn");

  const cellEls = [];
  const lightEls = [];
  let lightTimer = null;

  function randomSymbol() {
    const weighted = [
      "joker","ace","ace","king","king","queen","queen","jack",
      "jack","diamond","diamond","heart","heart","heart","heart"
    ];
    const picked = weighted[Math.floor(Math.random() * weighted.length)];
    return symbols.find((item) => item.id === picked);
  }

  function renderSymbolCell(cellEl, symbol) {
    if (symbol.id === "joker") {
      cellEl.innerHTML = `
        <div class="symbol joker-card joker-full">
          <div class="joker-banner">Wild Card</div>
          <div class="joker-center">
            <div class="joker-glyph">${symbol.icon}</div>
            <div class="joker-word">Joker</div>
            <div class="joker-sub">Grand Signature</div>
          </div>
        </div>
      `;
      return;
    }
    cellEl.innerHTML = `
      <div class="symbol ${symbol.cardClass || "black-card"}">
        <div class="symbol-corner top-left">
          <div class="corner-rank">${symbol.rank || ""}</div>
          <div class="corner-suit">${symbol.suit || ""}</div>
        </div>
        <div class="symbol-center">
          <div class="symbol-icon">${symbol.icon}</div>
          <div class="symbol-name">${symbol.name}</div>
        </div>
        <div class="symbol-corner bottom-right">
          <div class="corner-rank">${symbol.rank || ""}</div>
          <div class="corner-suit">${symbol.suit || ""}</div>
        </div>
      </div>
    `;
  }

  function createMachine() {
    for (let i = 0; i < 9; i += 1) {
      const cell = document.createElement("div");
      cell.className = "cell";
      gridEl.appendChild(cell);
      cellEls.push(cell);
    }
    state.grid = Array.from({ length: 9 }, () => randomSymbol());
    state.grid.forEach((symbol, index) => renderSymbolCell(cellEls[index], symbol));
  }

  function createLights() {
    for (let i = 0; i < 10; i += 1) {
      const light = document.createElement("div");
      light.className = "light";
      lightsEl.appendChild(light);
      lightEls.push(light);
    }
  }

  function startLights() {
    let index = 0;
    if (lightTimer) clearInterval(lightTimer);
    lightTimer = setInterval(() => {
      lightEls.forEach((light, i) => light.classList.toggle("active", i === index || i === (index + 5) % lightEls.length));
      index = (index + 1) % lightEls.length;
    }, state.spinning ? 90 : 220);
  }

  

  

  function renderBets() {
    const bets = [10, 20, 50, 100];
    betRowEl.innerHTML = "";
    bets.forEach((value) => {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "bet-btn" + (state.bet === value ? " selected" : "");
      btn.innerHTML = `${value}<small>BET</small>`;
      btn.addEventListener("click", () => {
        if (state.spinning) return;
        state.bet = value;
        renderStats();
        renderBets();
      });
      betRowEl.appendChild(btn);
    });
  }

  function renderStats() {
    balanceEl.textContent = state.balance.toLocaleString();
    betEl.textContent = state.bet.toLocaleString();
    lastWinEl.textContent = state.lastWin.toLocaleString();
    autoStateEl.textContent = state.autoLeft > 0 ? `ON (${state.autoLeft})` : "OFF";
  }

  function setMessage(text, tone = "normal") {
    messageEl.textContent = text;
    messageEl.style.color = tone === "win" ? "#1f8d55" : tone === "alert" ? "#b93a3a" : "#1d1412";
  }

  function clearHighlights() {
    cellEls.forEach((cell) => cell.classList.remove("win", "spinning"));
    for (let i = 0; i < paylines.length; i += 1) {
      document.getElementById(`line${i}`).classList.remove("active");
    }
  }

  function renderHistory() {
    if (state.history.length === 0) {
      historyEl.innerHTML = `<div class="history-chip">READY</div>`;
      return;
    }
    historyEl.innerHTML = state.history.map((item) => `<div class="history-chip">${item}</div>`).join("");
  }

  function evaluateGrid() {
    const wins = [];
    let total = 0;

    paylines.forEach((line, lineIndex) => {
      const [a, b, c] = line.map((idx) => state.grid[idx]);
      if (a.id === b.id && b.id === c.id) {
        const reward = a.payout * state.bet;
        total += reward;
        wins.push({ lineIndex, line, symbol: a, reward });
      }
    });

    return { wins, total };
  }

  function highlightWins(wins) {
    wins.forEach((win) => {
      document.getElementById(`line${win.lineIndex}`).classList.add("active");
      win.line.forEach((index) => cellEls[index].classList.add("win"));
    });
  }

  function createSparkBurst() {
    sparklesEl.innerHTML = "";
    const count = 18;
    for (let i = 0; i < count; i += 1) {
      const spark = document.createElement("div");
      spark.className = "spark";
      spark.style.left = `${44 + Math.random() * 18}%`;
      spark.style.top = `${38 + Math.random() * 18}%`;
      spark.style.setProperty("--dx", `${-140 + Math.random() * 280}px`);
      spark.style.setProperty("--dy", `${-120 + Math.random() * 220}px`);
      spark.style.background = i % 3 === 0 ? "#fff07c" : i % 3 === 1 ? "#58d78d" : "#4ab7ff";
      sparklesEl.appendChild(spark);
    }
  }

  function finishSpin() {
    state.spinning = false;
    startLights();
    const result = evaluateGrid();
    state.lastWin = result.total;
    if (result.total > 0) {
      state.balance += result.total;
      highlightWins(result.wins);
      createSparkBurst();
      const summary = `${result.wins[0].symbol.icon} +${result.total}`;
      state.history.unshift(summary);
      state.history = state.history.slice(0, 10);
      setMessage(`${result.wins.length} lines hit! +${result.total.toLocaleString()} coins`, "win");
    } else {
      state.history.unshift("MISS");
      state.history = state.history.slice(0, 10);
      setMessage("Miss. Try another spin.", "alert");
    }
    renderStats();
    renderHistory();

    if (state.autoLeft > 0) {
      state.autoLeft -= 1;
      renderStats();
      if (state.balance >= state.bet) {
        setTimeout(spin, 700);
      } else {
        state.autoLeft = 0;
        renderStats();
        setMessage("Auto spin stopped due to low coins.", "alert");
      }
    }
  }

  function spin() {
    if (state.spinning) return;
    if (state.balance < state.bet) {
      setMessage("Not enough coins. Recharge and try again.", "alert");
      return;
    }

    clearHighlights();
    state.spinning = true;
    state.lastWin = 0;
    state.balance -= state.bet;
    renderStats();
    setMessage("Reels spinning...", "normal");
    startLights();

    const stopTimes = [700, 1100, 1500];
    const intervals = [];

    for (let col = 0; col < 3; col += 1) {
      for (let row = 0; row < 3; row += 1) {
        cellEls[row * 3 + col].classList.add("spinning");
      }

      const interval = setInterval(() => {
        for (let row = 0; row < 3; row += 1) {
          const index = row * 3 + col;
          const symbol = randomSymbol();
          state.grid[index] = symbol;
          renderSymbolCell(cellEls[index], symbol);
        }
      }, 90 + col * 20);
      intervals.push(interval);

      setTimeout(() => {
        clearInterval(interval);
        for (let row = 0; row < 3; row += 1) {
          const index = row * 3 + col;
          const symbol = randomSymbol();
          state.grid[index] = symbol;
          renderSymbolCell(cellEls[index], symbol);
          cellEls[index].classList.remove("spinning");
        }
        if (col === 2) {
          finishSpin();
        }
      }, stopTimes[col]);
    }
  }

  function toggleAuto() {
    if (state.spinning) return;
    if (state.autoLeft > 0) {
      state.autoLeft = 0;
      renderStats();
      setMessage("Auto spin stopped.");
      return;
    }
    state.autoLeft = 10;
    renderStats();
    setMessage("Auto spin started: 10 rounds.");
    spin();
  }

  function chargeCoins() {
    if (state.spinning) return;
    state.balance += 500;
    renderStats();
    setMessage("Added 500 coins.");
  }

  spinBtn.addEventListener("click", spin);
  autoBtn.addEventListener("click", toggleAuto);
  chargeBtn.addEventListener("click", chargeCoins);

  createMachine();
  createLights();
  renderBets();
  renderStats();
  renderHistory();
  startLights();
})();
</script>
</body>
</html>
