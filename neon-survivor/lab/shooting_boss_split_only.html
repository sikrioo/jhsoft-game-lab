<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Structured Shooting Boss Demo</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #050816;
      font-family: system-ui, sans-serif;
    }
    canvas {
      display: block;
      background: radial-gradient(circle at center, rgba(24,34,70,0.28), rgba(2,4,12,1));
    }
    #controlPanel {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 10;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      padding: 10px 12px;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(4,8,20,0.72);
      backdrop-filter: blur(8px);
      border-radius: 12px;
      color: #fff;
      font-size: 13px;
    }
    #controlPanel label {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    #controlPanel select, #controlPanel button {
      height: 32px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.08);
      color: #fff;
      padding: 0 10px;
    }
    #controlPanel button { cursor: pointer; }
  </style>
</head>
<body>
<canvas id="game"></canvas>
<div id="controlPanel">
  <label>Boss
    <select id="bossSelect"></select>
  </label>
  <label>Start Phase
    <select id="phaseSelect"></select>
  </label>
  <button id="applySelection">Apply</button>
  <button id="resetSelection">Reset</button>
</div>
<script>
(() => {
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");

  function resize() {
    canvas.width = innerWidth;
    canvas.height = innerHeight;
  }
  addEventListener("resize", resize);
  resize();

  const TAU = Math.PI * 2;
  const keys = new Set();
  addEventListener("keydown", (e) => keys.add(e.key.toLowerCase()));
  addEventListener("keyup", (e) => keys.delete(e.key.toLowerCase()));

  const bullets = [];
  const hazards = [];
  const projectiles = [];
  const effects = [];
  const texts = [];

  const Utils = {
    clamp(v, a, b) { return Math.max(a, Math.min(b, v)); },
    lerp(a, b, t) { return a + (b - a) * t; },
    rand(a, b) { return Math.random() * (b - a) + a; },
    dist(ax, ay, bx, by) { return Math.hypot(bx - ax, by - ay); },
    angleTo(ax, ay, bx, by) { return Math.atan2(by - ay, bx - ax); },
    normalize(x, y) {
      const len = Math.hypot(x, y) || 1;
      return { x: x / len, y: y / len };
    },
    angleDelta(a, b) {
      return Math.atan2(Math.sin(a - b), Math.cos(a - b));
    },
    linePointDistance(x1, y1, x2, y2, px, py) {
      const dx = x2 - x1;
      const dy = y2 - y1;
      const lenSq = dx * dx + dy * dy || 1;
      let t = ((px - x1) * dx + (py - y1) * dy) / lenSq;
      t = Utils.clamp(t, 0, 1);
      const cx = x1 + dx * t;
      const cy = y1 + dy * t;
      return Math.hypot(px - cx, py - cy);
    },
    circleLineHit(cx, cy, r, x1, y1, x2, y2, lineWidth) {
      return Utils.linePointDistance(x1, y1, x2, y2, cx, cy) <= r + lineWidth * 0.5;
    },
    pointInFan(px, py, ox, oy, facing, radius, halfAngle) {
      const dx = px - ox;
      const dy = py - oy;
      const d = Math.hypot(dx, dy);
      if (d > radius) return false;
      const a = Math.atan2(dy, dx);
      return Math.abs(Utils.angleDelta(a, facing)) <= halfAngle;
    }
  };

  function drawText(text, x, y, color = "#fff", size = 14, align = "left", alpha = 1) {
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = color;
    ctx.font = `bold ${size}px sans-serif`;
    ctx.textAlign = align;
    ctx.fillText(text, x, y);
    ctx.restore();
  }

  function drawGlowCircle(x, y, r, color, alpha = 1) {
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.shadowBlur = 20;
    ctx.shadowColor = color;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, TAU);
    ctx.fill();
    ctx.restore();
  }

  class FloatText {
    constructor(text, x, y, color = "#fff") {
      this.text = text;
      this.x = x;
      this.y = y;
      this.color = color;
      this.life = 0.8;
      this.maxLife = 0.8;
    }
    update(dt) {
      this.life -= dt;
      this.y -= 28 * dt;
      return this.life > 0;
    }
    draw() {
      drawText(this.text, this.x, this.y, this.color, 14, "center", this.life / this.maxLife);
    }
  }

  class Spark {
    constructor(x, y, color = "#ffd166") {
      this.x = x;
      this.y = y;
      this.vx = Utils.rand(-180, 180);
      this.vy = Utils.rand(-180, 180);
      this.life = Utils.rand(0.18, 0.42);
      this.maxLife = this.life;
      this.size = Utils.rand(2, 4);
      this.color = color;
    }
    update(dt) {
      this.life -= dt;
      this.x += this.vx * dt;
      this.y += this.vy * dt;
      this.vx *= 0.92;
      this.vy *= 0.92;
      return this.life > 0;
    }
    draw() {
      const t = this.life / this.maxLife;
      ctx.save();
      ctx.globalAlpha = t;
      ctx.shadowBlur = 12;
      ctx.shadowColor = this.color;
      ctx.fillStyle = this.color;
      ctx.fillRect(this.x, this.y, this.size, this.size);
      ctx.restore();
    }
  }

  class RingEffect {
    constructor(x, y, r = 20, color = "#7df9ff", life = 0.45) {
      this.x = x;
      this.y = y;
      this.r = r;
      this.life = life;
      this.maxLife = life;
      this.color = color;
    }
    update(dt) {
      this.life -= dt;
      this.r += 150 * dt;
      return this.life > 0;
    }
    draw() {
      const t = this.life / this.maxLife;
      ctx.save();
      ctx.globalAlpha = t * 0.9;
      ctx.strokeStyle = this.color;
      ctx.lineWidth = 3;
      ctx.shadowBlur = 20;
      ctx.shadowColor = this.color;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.r, 0, TAU);
      ctx.stroke();
      ctx.restore();
    }
  }

  class Bullet {
    constructor(x, y, vx, vy, r = 7, color = "#ff7aa2", life = 8, damage = 10) {
      this.x = x;
      this.y = y;
      this.vx = vx;
      this.vy = vy;
      this.r = r;
      this.color = color;
      this.life = life;
      this.damage = damage;
    }
    update(dt, player) {
      this.life -= dt;
      this.x += this.vx * dt;
      this.y += this.vy * dt;
      if (Utils.dist(this.x, this.y, player.x, player.y) < this.r + player.radius) {
        player.damage(this.damage);
        for (let i = 0; i < 8; i++) effects.push(new Spark(this.x, this.y, this.color));
        return false;
      }
      if (this.x < -50 || this.x > canvas.width + 50 || this.y < -50 || this.y > canvas.height + 50) return false;
      return this.life > 0;
    }
    draw() {
      drawGlowCircle(this.x, this.y, this.r, this.color, 0.9);
      ctx.save();
      ctx.strokeStyle = "#fff";
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.r + 2, 0, TAU);
      ctx.stroke();
      ctx.restore();
    }
  }

  class RotatingBullet extends Bullet {
    constructor(cx, cy, angle, orbitR, radialSpeed, spin, r = 6, color = "#9a7dff") {
      super(cx, cy, 0, 0, r, color, 4.0, 10);
      this.cx = cx;
      this.cy = cy;
      this.angle = angle;
      this.orbitR = orbitR;
      this.radialSpeed = radialSpeed;
      this.spin = spin;
    }
    update(dt, player) {
      this.life -= dt;
      this.angle += this.spin * dt;
      this.orbitR += this.radialSpeed * dt;
      this.x = this.cx + Math.cos(this.angle) * this.orbitR;
      this.y = this.cy + Math.sin(this.angle) * this.orbitR;
      if (Utils.dist(this.x, this.y, player.x, player.y) < this.r + player.radius) {
        player.damage(this.damage);
        return false;
      }
      return this.life > 0;
    }
  }

  class DelayedBlast {
    constructor(x, y, delay = 1.0, radius = 68, color = "#ff8fab", followPlayer = false, followDuration = 0.8) {
      this.x = x;
      this.y = y;
      this.delay = delay;
      this.maxDelay = delay;
      this.radius = radius;
      this.color = color;
      this.followPlayer = followPlayer;
      this.followDuration = followDuration;
      this.exploded = false;
      this.lifeAfter = 0.18;
    }
    update(dt, player) {
      if (!this.exploded) {
        this.delay -= dt;
        if (this.followPlayer && this.delay > this.maxDelay - this.followDuration) {
          this.x = Utils.lerp(this.x, player.x, 0.08);
          this.y = Utils.lerp(this.y, player.y, 0.08);
        }
        if (this.delay <= 0) {
          this.exploded = true;
          for (let i = 0; i < 18; i++) effects.push(new Spark(this.x, this.y, this.color));
          effects.push(new RingEffect(this.x, this.y, 18, this.color, 0.28));
          if (Utils.dist(this.x, this.y, player.x, player.y) < this.radius + player.radius) {
            player.damage(18);
          }
        }
        return true;
      }
      this.lifeAfter -= dt;
      return this.lifeAfter > 0;
    }
    draw() {
      if (!this.exploded) {
        const t = Math.max(0, this.delay / this.maxDelay);
        ctx.save();
        ctx.globalAlpha = 0.25 + (1 - t) * 0.45;
        ctx.strokeStyle = this.color;
        ctx.lineWidth = 3;
        ctx.setLineDash([10, 8]);
        ctx.shadowBlur = 16;
        ctx.shadowColor = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, TAU);
        ctx.stroke();
        ctx.restore();
        drawText((this.delay + 0.05).toFixed(1), this.x, this.y + 4, "#fff", 14, "center");
      } else {
        ctx.save();
        ctx.globalAlpha = this.lifeAfter / 0.18 * 0.35;
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, TAU);
        ctx.fill();
        ctx.restore();
      }
    }
  }

  class SafeLaneCurtain {
    constructor({ centerX, centerY, startAngle, laneWidth, color = "#ff6bb5", speed = 180, count = 42, radius = 6 }) {
      const step = TAU / count;
      for (let i = 0; i < count; i++) {
        const a = i * step;
        const diff = Utils.angleDelta(a, startAngle);
        if (Math.abs(diff) < laneWidth * 0.5) continue;
        bullets.push(new Bullet(centerX, centerY, Math.cos(a) * speed, Math.sin(a) * speed, radius, color, 6, 12));
      }
    }
    update() { return false; }
    draw() {}
  }

  class Player {
    constructor(x, y) {
      this.x = x;
      this.y = y;
      this.radius = 14;
      this.speed = 280;
      this.hp = 100;
      this.hitFlash = 0;
      this.dashTime = 0;
      this.dashCooldown = 0;
      this.facing = -Math.PI / 2;
    }
    update(dt) {
      let dx = 0, dy = 0;
      if (keys.has("w") || keys.has("arrowup")) dy -= 1;
      if (keys.has("s") || keys.has("arrowdown")) dy += 1;
      if (keys.has("a") || keys.has("arrowleft")) dx -= 1;
      if (keys.has("d") || keys.has("arrowright")) dx += 1;
      const dir = Utils.normalize(dx, dy);
      if (dx || dy) this.facing = Math.atan2(dir.y, dir.x);

      if ((keys.has("shift") || keys.has(" ")) && this.dashCooldown <= 0) {
        this.dashTime = 0.14;
        this.dashCooldown = 0.6;
        for (let i = 0; i < 10; i++) effects.push(new Spark(this.x, this.y, "#7df9ff"));
      }

      const dashMul = this.dashTime > 0 ? 2.8 : 1;
      this.x += dir.x * this.speed * dashMul * dt;
      this.y += dir.y * this.speed * dashMul * dt;
      this.x = Utils.clamp(this.x, 18, canvas.width - 18);
      this.y = Utils.clamp(this.y, 18, canvas.height - 18);
      this.dashTime = Math.max(0, this.dashTime - dt);
      this.dashCooldown = Math.max(0, this.dashCooldown - dt);
      this.hitFlash = Math.max(0, this.hitFlash - dt);
    }
    damage(amount) {
      if (this.dashTime > 0.02) return;
      this.hp = Math.max(0, this.hp - amount);
      this.hitFlash = 0.18;
      for (let i = 0; i < 8; i++) effects.push(new Spark(this.x, this.y, "#ff7a7a"));
      texts.push(new FloatText(`-${amount}`, this.x, this.y - 18, "#ff8fab"));
    }
    draw() {
      const c = this.hitFlash > 0 ? "#ff6b6b" : "#66f2ff";
      drawGlowCircle(this.x, this.y, this.radius, c, 1);
      const tipX = this.x + Math.cos(this.facing) * 22;
      const tipY = this.y + Math.sin(this.facing) * 22;
      ctx.save();
      ctx.strokeStyle = "#fff";
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.radius + 4, 0, TAU);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(this.x, this.y);
      ctx.lineTo(tipX, tipY);
      ctx.stroke();
      ctx.restore();
      if (this.dashTime > 0) {
        ctx.save();
        ctx.globalAlpha = 0.35;
        ctx.strokeStyle = "#7df9ff";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius + 10 + (0.14 - this.dashTime) * 100, 0, TAU);
        ctx.stroke();
        ctx.restore();
      }
    }
  }


  class AfterImage {
    constructor(x, y, radius, angle, color, life = 0.15) {
      this.x = x;
      this.y = y;
      this.radius = radius;
      this.angle = angle;
      this.color = color;
      this.life = life;
      this.maxLife = life;
    }
    update(dt) {
      this.life -= dt;
      return this.life > 0;
    }
    draw() {
      const t = this.life / this.maxLife;
      ctx.save();
      ctx.globalAlpha = t * 0.3;
      ctx.shadowBlur = 16;
      ctx.shadowColor = this.color;
      ctx.fillStyle = this.color;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.radius, 0, TAU);
      ctx.fill();
      ctx.strokeStyle = "#ffffff";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(this.x, this.y);
      ctx.lineTo(this.x + Math.cos(this.angle) * this.radius * 1.2, this.y + Math.sin(this.angle) * this.radius * 1.2);
      ctx.stroke();
      ctx.restore();
    }
  }

  class SlashEffect {
    constructor({ x, y, startAngle, endAngle, color = "#ffffff", life = 0.14, scale = 1 }) {
      this.x = x;
      this.y = y;
      this.startAngle = startAngle;
      this.endAngle = endAngle;
      this.color = color;
      this.life = life;
      this.maxLife = life;
      this.scale = scale;
      this.innerRadius = 20 * scale;
      this.outerRadius = 74 * scale;
    }
    update(dt) {
      this.life -= dt;
      return this.life > 0;
    }
    draw() {
      const t = this.life / this.maxLife;
      const p = 1 - t;
      const innerR = this.innerRadius + p * 10 * this.scale;
      const outerR = this.outerRadius + p * 18 * this.scale;
      const alpha = Math.pow(t, 0.6);
      ctx.save();
      ctx.translate(this.x, this.y);
      const layers = [
        ["#7df9ff", alpha * 0.22, innerR, outerR, this.startAngle, this.endAngle, 24],
        ["#9a7dff", alpha * 0.18, innerR + 4, outerR - 6, this.startAngle + 0.02, this.endAngle - 0.02, 20],
        [this.color, alpha * 0.9, innerR + 6, outerR - 12, this.startAngle + 0.04, this.endAngle - 0.04, 16]
      ];
      for (const [fill, a, inR, outR, sa, ea, blur] of layers) {
        ctx.save();
        ctx.globalAlpha = a;
        ctx.shadowBlur = blur;
        ctx.shadowColor = fill;
        ctx.fillStyle = fill;
        ctx.beginPath();
        ctx.arc(0, 0, outR, sa, ea, false);
        ctx.arc(0, 0, inR, ea, sa, true);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      }
      ctx.save();
      ctx.globalAlpha = alpha * 0.9;
      ctx.strokeStyle = "#ffffff";
      ctx.lineWidth = 2;
      ctx.shadowBlur = 12;
      ctx.shadowColor = "#ffffff";
      ctx.beginPath();
      ctx.arc(0, 0, (innerR + outerR) * 0.5, this.startAngle + 0.05, this.endAngle - 0.05, false);
      ctx.stroke();
      ctx.restore();
      ctx.restore();
    }
  }

  class PhaseShiftRing extends RingEffect {
    constructor(x, y, color) {
      super(x, y, 28, color, 0.8);
    }
    update(dt) {
      this.life -= dt;
      this.r += 110 * dt / 0.8;
      return this.life > 0;
    }
    draw() {
      const t = this.life / this.maxLife;
      const p = 1 - t;
      ctx.save();
      ctx.globalAlpha = t * 0.85;
      ctx.strokeStyle = this.color;
      ctx.lineWidth = 6 - p * 3;
      ctx.shadowBlur = 26;
      ctx.shadowColor = this.color;
      ctx.beginPath();
      ctx.arc(this.x, this.y, 28 + p * 110, 0, TAU);
      ctx.stroke();
      ctx.restore();
    }
  }

  class TelegraphLine {
    constructor(x1, y1, x2, y2, life = 0.35, color = "#9a7dff") {
      this.x1 = x1;
      this.y1 = y1;
      this.x2 = x2;
      this.y2 = y2;
      this.life = life;
      this.maxLife = life;
      this.color = color;
    }
    update(dt) {
      this.life -= dt;
      return this.life > 0;
    }
    draw() {
      const t = this.life / this.maxLife;
      ctx.save();
      ctx.globalAlpha = 0.18 + t * 0.6;
      ctx.strokeStyle = this.color;
      ctx.lineWidth = 2;
      ctx.setLineDash([8, 8]);
      ctx.shadowBlur = 16;
      ctx.shadowColor = this.color;
      ctx.beginPath();
      ctx.moveTo(this.x1, this.y1);
      ctx.lineTo(this.x2, this.y2);
      ctx.stroke();
      ctx.restore();
    }
  }

  class WaveProjectile {
    constructor(x, y, angle, opts = {}) {
      this.x = x;
      this.y = y;
      this.angle = angle;
      this.speed = opts.speed ?? 420;
      this.radius = opts.radius ?? 16;
      this.life = opts.life ?? 1.2;
      this.maxLife = this.life;
      this.damage = opts.damage ?? 14;
      this.color = opts.color ?? "#7df9ff";
      this.hit = false;
    }
    update(dt, player) {
      this.life -= dt;
      this.x += Math.cos(this.angle) * this.speed * dt;
      this.y += Math.sin(this.angle) * this.speed * dt;
      if (!this.hit && Utils.dist(this.x, this.y, player.x, player.y) <= this.radius + player.radius) {
        this.hit = true;
        player.damage(this.damage);
        for (let i = 0; i < 12; i++) effects.push(new Spark(player.x, player.y, this.color));
      }
      return this.life > 0 && this.x > -80 && this.x < canvas.width + 80 && this.y > -80 && this.y < canvas.height + 80;
    }
    draw() {
      const t = this.life / this.maxLife;
      ctx.save();
      ctx.translate(this.x, this.y);
      ctx.rotate(this.angle);
      ctx.globalAlpha = Math.max(0.28, t);
      ctx.shadowBlur = 24;
      ctx.shadowColor = this.color;
      ctx.fillStyle = this.color === "#ff6bd6" ? "rgba(255,107,214,0.35)" : "rgba(125,249,255,0.35)";
      ctx.beginPath();
      ctx.moveTo(30, 0);
      ctx.quadraticCurveTo(0, 16, -24, 0);
      ctx.quadraticCurveTo(0, -16, 30, 0);
      ctx.fill();
      ctx.strokeStyle = "#ffffff";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(26, 0);
      ctx.lineTo(-20, 0);
      ctx.stroke();
      ctx.restore();
    }
  }

  const PatternLibrary = {
    single(runtime) {
      const player = runtime.player;
      const angle = Utils.angleTo(runtime.x, runtime.y, player.x, player.y);
      bullets.push(new Bullet(runtime.x, runtime.y, Math.cos(angle) * 260, Math.sin(angle) * 260, 7, "#ff9e7a", 5, 10));
      runtime.stateText = "단일 탄";
    },

    radial(runtime, options = {}) {
      const count = options.count ?? 10;
      const speed = options.speed ?? 140;
      const color = options.color ?? "#9a7dff";
      for (let i = 0; i < count; i++) {
        const a = (i / count) * TAU;
        bullets.push(new Bullet(runtime.x, runtime.y, Math.cos(a) * speed, Math.sin(a) * speed, 7, color, 6, 10));
      }
      runtime.stateText = "원형 확산";
    },

    danger(runtime) {
      const player = runtime.player;
      hazards.push(new DelayedBlast(player.x, player.y, 1.0, 72, "#ff8fab", false));
      runtime.stateText = "위험지대";
    },

    trackingZone(runtime) {
      const player = runtime.player;
      hazards.push(new DelayedBlast(player.x, player.y, 1.1, 64, "#ffb347", true, 0.8));
      runtime.stateText = "추적 위험지대";
    },

    rotating(runtime) {
      const count = 14;
      const base = performance.now() / 1000;
      for (let i = 0; i < count; i++) {
        bullets.push(new RotatingBullet(runtime.x, runtime.y, base + (i / count) * TAU, 10, 65, 1.9, 6, "#9a7dff"));
      }
      runtime.stateText = "회전 탄막";
    },

    safeLane(runtime, options = {}) {
      const player = runtime.player;
      let angle = Utils.angleTo(runtime.x, runtime.y, player.x, player.y);
      if (options.randomize) angle += Utils.rand(-1.2, 1.2);
      hazards.push(new SafeLaneCurtain({
        centerX: runtime.x,
        centerY: runtime.y,
        startAngle: angle,
        laneWidth: options.randomize ? 0.52 : 0.68,
        color: options.randomize ? "#ff6bb5" : "#7df9ff",
        speed: options.randomize ? 220 : 190,
        count: options.randomize ? 56 : 46,
        radius: options.randomize ? 6 : 7
      }));
      runtime.stateText = options.randomize ? "랜덤 안전지대" : "안전지대 탄막";
    },

    doubleRing(runtime) {
      const outer = 18;
      const inner = 12;
      for (let i = 0; i < outer; i++) {
        const a = (i / outer) * TAU;
        bullets.push(new Bullet(runtime.x, runtime.y, Math.cos(a) * 120, Math.sin(a) * 120, 7, "#ffb347", 6, 10));
      }
      for (let i = 0; i < inner; i++) {
        const a = (i / inner) * TAU + Math.PI / inner;
        bullets.push(new Bullet(runtime.x, runtime.y, Math.cos(a) * 260, Math.sin(a) * 260, 6, "#ff6bb5", 4.8, 12));
      }
      runtime.stateText = "이중 탄막";
    },

    teleportBlast(runtime) {
      const player = runtime.player;
      const a = Utils.rand(0, TAU);
      const r = Utils.rand(110, 160);
      runtime.x = Utils.clamp(player.x + Math.cos(a) * r, 80, canvas.width - 80);
      runtime.y = Utils.clamp(player.y + Math.sin(a) * r, 80, canvas.height * 0.6);
      for (let i = 0; i < 14; i++) effects.push(new Spark(runtime.x, runtime.y, "#ff6bb5"));
      effects.push(new RingEffect(runtime.x, runtime.y, 14, "#ff6bb5", 0.24));
      hazards.push(new DelayedBlast(runtime.x, runtime.y, 0.45, 88, "#ff6bb5", false));
      runtime.stateText = "텔포 폭발";
    }
  };


  const BossRegistry = {
    split: {
      id: "split",
      label: "분열형",
      code: "GEMINI",
      mode: "split",
      radius: 38,
      maxHp: 420,
      phases: [
        { threshold: 1 },
        { threshold: 0.5 }
      ],
      colors(runtime) {
        if (runtime.phase === 1) return { body: "#ffd166", glow: "#ffb347" };
        return { body: "#7df9ff", glow: "#ff6bb5" };
      },
      panel(runtime) {
        if (runtime.phase === 1) {
          return [
            "분열형 Phase 1: 단일 코어로 화면 제어",
            "- 원형탄 / 추적 위험지대 / 안전지대 탄막",
            "- 중앙 고정에 가까운 안정적 탄막 패턴",
            "- 체력 50% 이하에서 둘로 분열",
            "- 분열 전의 학습 페이즈"
          ];
        }
        return [
          "분열형 Phase 2: 역할이 다른 2개체 협공",
          "- 청색 코어: 단일탄 / 확산탄 / 안전지대 탄막",
          "- 적색 코어: 측면 이동 후 돌진 폭발 압박",
          "- 두 개체 쿨다운을 어긋나게 배치",
          "- 한쪽 격파 시 남은 개체가 폭주",
          "- 분열 직후 짧은 무적으로 전개 안정화"
        ];
      }
    }
  };

  class SplitBossRuntime {
    constructor(type, player, startPhase = "auto") {
      this.player = player;
      this.definition = BossRegistry[type];
      this.type = type;
      this.phase = 1;
      this.maxHp = this.definition.maxHp;
      this.hp = this.maxHp;
      this.radius = this.definition.radius;
      this.x = canvas.width * 0.5;
      this.y = canvas.height * 0.22;
      this.aiTimer = 0;
      this.loopCursor = 0;
      this.stateText = "코어 제어";
      this.splitTransition = 0;
      this.splitInvuln = 0;
      this.children = [];
      this.applyStartPhase(startPhase);
    }

    applyStartPhase(startPhase = "auto") {
      if (startPhase === "2") {
        this.enterSplitPhase(true);
        this.stateText = "TEST START P2";
      }
    }

    forcePhase2() {
      if (this.phase === 1) {
        this.hp = this.maxHp * 0.5;
        this.enterSplitPhase(false);
      }
    }

    createChild(role, tx, ty) {
      const isBlue = role === "blue";
      return {
        role,
        label: isBlue ? "BLUE" : "RED",
        x: this.x,
        y: this.y,
        startX: this.x,
        startY: this.y,
        targetX: tx,
        targetY: ty,
        radius: 24,
        maxHp: this.maxHp * 0.25,
        hp: this.maxHp * 0.25,
        aiTimer: isBlue ? 0.4 : 0.85,
        loopCursor: 0,
        pulse: Utils.rand(0, 10),
        angle: 0,
        dashTime: 0,
        dashCooldown: 0,
        dashVX: 0,
        dashVY: 0,
        afterImageTimer: 0,
        dead: false,
        deathFxPlayed: false,
        enrage: false,
        enragePulse: 0
      };
    }

    enterSplitPhase(isTestStart = false) {
      this.phase = 2;
      this.splitTransition = isTestStart ? 0 : 0.95;
      this.splitInvuln = isTestStart ? 0.18 : 0.55;
      this.stateText = isTestStart ? "분열형 테스트 시작" : "SPLIT SHIFT";
      this.children = [
        this.createChild("blue", this.x - 132, this.y + 24),
        this.createChild("red", this.x + 132, this.y - 16)
      ];
      if (isTestStart) {
        for (const child of this.children) {
          child.x = child.targetX;
          child.y = child.targetY;
        }
      }
      for (let i = 0; i < 34; i++) effects.push(new Spark(this.x, this.y, i % 2 ? "#7df9ff" : "#ff6bb5"));
      effects.push(new PhaseShiftRing(this.x, this.y, "#7df9ff"));
      effects.push(new PhaseShiftRing(this.x, this.y, "#ff6bb5"));
      texts.push(new FloatText("SPLIT", this.x, this.y - 54, "#ffffff"));
      this.syncAggregateState();
    }

    damage(amount) {
      if (this.phase === 1) {
        this.hp = Math.max(0, this.hp - amount);
        return;
      }
      if (this.splitInvuln > 0) return;
      const alive = this.children.filter(child => child.hp > 0 && !child.dead);
      if (!alive.length) return;
      const target = alive.reduce((best, child) => child.hp < best.hp ? child : best, alive[0]);
      target.hp = Math.max(0, target.hp - amount);
      if (target.hp <= 0) this.handleChildDefeat(target);
      this.syncAggregateState();
    }

    handleChildDefeat(child) {
      if (child.dead) return;
      child.dead = true;
      child.hp = 0;
      child.dashTime = 0;
      for (let i = 0; i < 18; i++) effects.push(new Spark(child.x, child.y, child.role === "blue" ? "#7df9ff" : "#ff6bb5"));
      effects.push(new RingEffect(child.x, child.y, 16, child.role === "blue" ? "#7df9ff" : "#ff6bb5", 0.35));
      texts.push(new FloatText(child.role === "blue" ? "BLUE DOWN" : "RED DOWN", child.x, child.y - 22, "#ffffff"));
      const survivor = this.children.find(other => other !== child && other.hp > 0 && !other.dead);
      if (survivor) {
        survivor.enrage = true;
        survivor.enragePulse = 1.6;
        survivor.aiTimer = Math.min(survivor.aiTimer, 0.18);
        survivor.dashCooldown = Math.min(survivor.dashCooldown, 0.3);
        survivor.maxHp = Math.max(survivor.maxHp, survivor.hp);
        texts.push(new FloatText("ENRAGE", survivor.x, survivor.y - 26, survivor.role === "blue" ? "#7df9ff" : "#ff8fab"));
        for (let i = 0; i < 10; i++) effects.push(new Spark(survivor.x, survivor.y, survivor.role === "blue" ? "#7df9ff" : "#ff6bb5"));
        this.stateText = survivor.role === "blue" ? "청색 각성" : "적색 폭주";
      } else {
        this.stateText = "분열체 격파";
      }
    }

    syncAggregateState() {
      if (this.phase === 1) return;
      this.hp = this.children.reduce((sum, child) => sum + Math.max(0, child.hp), 0);
      if (!this.children.some(child => child.hp > 0 && !child.dead)) {
        this.children.length = 0;
        this.hp = 0;
        this.stateText = "분열체 격파";
      }
    }

    moveCore(dt) {
      const orbit = performance.now() / 1000 * 0.45;
      const tx = canvas.width * 0.5 + Math.cos(orbit) * 42;
      const ty = canvas.height * 0.22 + Math.sin(orbit * 1.7) * 16;
      this.x = Utils.lerp(this.x, tx, dt * 1.1);
      this.y = Utils.lerp(this.y, ty, dt * 1.1);
    }

    updatePhase1(dt) {
      this.moveCore(dt);
      this.aiTimer -= dt;
      if (this.hp <= this.maxHp * 0.5) {
        this.enterSplitPhase(false);
        return;
      }
      if (this.aiTimer > 0) return;
      const loop = [
        () => PatternLibrary.radial(this, { count: 12, speed: 145, color: "#ffd166" }),
        () => PatternLibrary.trackingZone(this),
        () => PatternLibrary.safeLane(this, { randomize: false }),
        () => PatternLibrary.single(this)
      ];
      this.aiTimer = 0.9 + Utils.rand(0.0, 0.18);
      loop[this.loopCursor % loop.length]();
      this.loopCursor++;
      if (this.stateText === "원형 확산") this.stateText = "코어 확산";
      if (this.stateText === "추적 위험지대") this.stateText = "코어 추적지대";
    }

    updateBlue(child, dt) {
      child.pulse += dt * (child.enrage ? 1.25 : 1);
      child.enragePulse = Math.max(0, child.enragePulse - dt);
      const tx = canvas.width * 0.34 + Math.cos(child.pulse * 1.8) * (child.enrage ? 112 : 90);
      const ty = canvas.height * 0.27 + Math.sin(child.pulse * 2.4) * (child.enrage ? 42 : 34);
      child.x = Utils.lerp(child.x, tx, dt * (child.enrage ? 2.0 : 1.6));
      child.y = Utils.lerp(child.y, ty, dt * (child.enrage ? 2.0 : 1.6));
      child.aiTimer -= dt;
      if (child.aiTimer > 0 || child.hp <= 0 || child.dead) return;
      const patterns = [
        () => {
          const a = Utils.angleTo(child.x, child.y, this.player.x, this.player.y);
          const speed = child.enrage ? 330 : 280;
          bullets.push(new Bullet(child.x, child.y, Math.cos(a) * speed, Math.sin(a) * speed, 7, "#7df9ff", 5, child.enrage ? 12 : 10));
          this.stateText = child.enrage ? "청색 각성 저격" : "청색 단일탄";
        },
        () => {
          const count = child.enrage ? 14 : 10;
          const speed = child.enrage ? 165 : 135;
          for (let i = 0; i < count; i++) {
            const a = i / count * TAU + child.pulse * 0.22;
            bullets.push(new Bullet(child.x, child.y, Math.cos(a) * speed, Math.sin(a) * speed, 6, "#7df9ff", 5, child.enrage ? 10 : 9));
          }
          this.stateText = child.enrage ? "청색 각성 확산" : "청색 확산탄";
        },
        () => {
          const laneAngle = Utils.angleTo(child.x, child.y, this.player.x, this.player.y);
          new SafeLaneCurtain({
            centerX: child.x,
            centerY: child.y,
            startAngle: laneAngle,
            laneWidth: child.enrage ? 0.44 : 0.58,
            color: "#7df9ff",
            speed: child.enrage ? 220 : 185,
            count: child.enrage ? 42 : 34,
            radius: 6
          });
          this.stateText = child.enrage ? "청색 각성 안전지대" : "청색 안전지대";
        }
      ];
      patterns[child.loopCursor % patterns.length]();
      child.loopCursor++;
      child.aiTimer = child.enrage ? 0.68 : 0.95;
    }

    updateRed(child, dt) {
      child.pulse += dt * (child.enrage ? 1.25 : 1);
      child.enragePulse = Math.max(0, child.enragePulse - dt);
      child.dashCooldown = Math.max(0, child.dashCooldown - dt);
      if (child.dashTime > 0) {
        child.dashTime -= dt;
        child.afterImageTimer -= dt;
        child.x += child.dashVX * dt;
        child.y += child.dashVY * dt;
        if (child.afterImageTimer <= 0) {
          child.afterImageTimer = child.enrage ? 0.018 : 0.028;
          effects.push(new AfterImage(child.x, child.y, child.radius, Math.atan2(child.dashVY, child.dashVX), "#ff6bb5", 0.1));
        }
        if (Utils.dist(child.x, child.y, this.player.x, this.player.y) < child.radius + this.player.radius + 8) {
          this.player.damage(child.enrage ? 20 : 16);
        }
        if (child.dashTime <= 0) {
          effects.push(new RingEffect(child.x, child.y, 16, "#ff6bb5", 0.24));
          hazards.push(new DelayedBlast(child.x, child.y, child.enrage ? 0.22 : 0.32, child.enrage ? 86 : 74, "#ff6bb5", false));
          this.stateText = child.enrage ? "적색 폭주 충돌" : "적색 돌진 폭발";
        }
        return;
      }

      const side = Math.sin(child.pulse * 1.4) > 0 ? 1 : -1;
      const desired = Utils.angleTo(child.x, child.y, this.player.x, this.player.y) + side * Math.PI * (child.enrage ? 0.36 : 0.45);
      const tx = this.player.x + Math.cos(desired) * (child.enrage ? 150 : 170);
      const ty = Utils.clamp(this.player.y + Math.sin(desired) * (child.enrage ? 80 : 95), 80, canvas.height * 0.7);
      child.x = Utils.lerp(child.x, tx, dt * (child.enrage ? 2.4 : 1.9));
      child.y = Utils.lerp(child.y, ty, dt * (child.enrage ? 2.4 : 1.9));

      child.aiTimer -= dt;
      if (child.aiTimer <= 0 && child.dashCooldown <= 0) {
        const a = Utils.angleTo(child.x, child.y, this.player.x, this.player.y);
        const dashSpeed = child.enrage ? 660 : 520;
        child.dashVX = Math.cos(a) * dashSpeed;
        child.dashVY = Math.sin(a) * dashSpeed;
        child.dashTime = child.enrage ? 0.24 : 0.2;
        child.dashCooldown = child.enrage ? 0.72 : 1.15;
        child.aiTimer = child.enrage ? 0.82 : 1.3;
        child.afterImageTimer = 0;
        for (let i = 0; i < 8; i++) effects.push(new Spark(child.x, child.y, "#ff6bb5"));
        effects.push(new TelegraphLine(child.x, child.y, child.x + Math.cos(a) * (child.enrage ? 240 : 180), child.y + Math.sin(a) * (child.enrage ? 240 : 180), child.enrage ? 0.16 : 0.22, "#ff6bb5"));
        this.stateText = child.enrage ? "적색 폭주 돌진" : "적색 돌진";
      } else if (child.aiTimer <= 0) {
        hazards.push(new DelayedBlast(this.player.x, this.player.y, child.enrage ? 0.5 : 0.7, child.enrage ? 64 : 56, "#ff8fab", true, child.enrage ? 0.52 : 0.45));
        child.aiTimer = child.enrage ? 0.6 : 0.8;
        this.stateText = child.enrage ? "적색 폭주 추적지대" : "적색 추적지대";
      }
    }

    updateTransition(dt) {
      if (this.splitTransition <= 0) return false;
      this.splitTransition = Math.max(0, this.splitTransition - dt);
      const total = 0.95;
      const t = 1 - this.splitTransition / total;
      const eased = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) * 0.5;
      for (const child of this.children) {
        child.x = Utils.lerp(child.startX, child.targetX, eased);
        child.y = Utils.lerp(child.startY, child.targetY, eased);
      }
      return true;
    }

    updatePhase2(dt) {
      this.splitInvuln = Math.max(0, this.splitInvuln - dt);
      if (this.updateTransition(dt)) return;
      for (const child of this.children) {
        if (child.hp <= 0 || child.dead) continue;
        if (child.role === "blue") this.updateBlue(child, dt);
        else this.updateRed(child, dt);
      }
      this.syncAggregateState();
      const alive = this.children.filter(child => child.hp > 0 && !child.dead);
      if (alive.length) {
        this.x = alive.reduce((sum, child) => sum + child.x, 0) / alive.length;
        this.y = alive.reduce((sum, child) => sum + child.y, 0) / alive.length;
      }
    }

    update(dt) {
      if (this.phase === 1) this.updatePhase1(dt);
      else this.updatePhase2(dt);
    }

    drawCore(x, y, radius, body, glow, code, alpha = 0.92) {
      drawGlowCircle(x, y, radius, glow, alpha);
      ctx.save();
      ctx.strokeStyle = body;
      ctx.lineWidth = 4;
      ctx.shadowBlur = 20;
      ctx.shadowColor = glow;
      ctx.beginPath();
      ctx.arc(x, y, radius + 4, 0, TAU);
      ctx.stroke();
      const c = radius * 0.62;
      ctx.beginPath();
      ctx.moveTo(x - c, y);
      ctx.lineTo(x + c, y);
      ctx.moveTo(x, y - c);
      ctx.lineTo(x, y + c);
      ctx.stroke();
      ctx.restore();
      drawText(code, x, y + 4, "#fff", 12, "center");
    }

    draw() {
      if (this.phase === 1) {
        this.drawCore(this.x, this.y, this.radius, "#ffd166", "#ffb347", this.definition.code);
        return;
      }
      if (this.splitTransition > 0) {
        const glowAlpha = 0.5 + Math.sin(performance.now() / 70) * 0.12;
        this.drawCore(this.x, this.y, 30, "#ffffff", "#ffd166", "S", glowAlpha);
      }
      for (const child of this.children) {
        if (child.hp <= 0 && child.dead) continue;
        const body = child.role === "blue" ? "#7df9ff" : "#ff8fab";
        const glow = child.role === "blue" ? "#7df9ff" : "#ff6bb5";
        const flicker = child.enragePulse > 0 ? 0.72 + Math.sin(performance.now() / 45) * 0.18 : 0.92;
        this.drawCore(child.x, child.y, child.radius + (child.enragePulse > 0 ? 2 : 0), body, glow, child.role === "blue" ? "B" : "R", flicker);
        const ratio = child.hp / child.maxHp;
        ctx.save();
        ctx.globalAlpha = 0.9;
        ctx.fillStyle = "rgba(255,255,255,0.1)";
        ctx.fillRect(child.x - 26, child.y - 42, 52, 6);
        ctx.fillStyle = glow;
        ctx.fillRect(child.x - 26, child.y - 42, 52 * ratio, 6);
        ctx.strokeStyle = "#fff";
        ctx.strokeRect(child.x - 26, child.y - 42, 52, 6);
        ctx.restore();
        if (child.enragePulse > 0) {
          ctx.save();
          ctx.globalAlpha = 0.35 + Math.sin(performance.now() / 60) * 0.12;
          ctx.strokeStyle = glow;
          ctx.lineWidth = 2.5;
          ctx.beginPath();
          ctx.arc(child.x, child.y, child.radius + 14 + Math.sin(performance.now() / 80) * 4, 0, TAU);
          ctx.stroke();
          ctx.restore();
        }
      }
      if (this.splitInvuln > 0) {
        drawText("분열 직후 잠깐 무적", this.x, this.y - 52, "#ffffff", 12, "center", 0.85);
      }
    }
  }



  const phaseSelect = document.getElementById("phaseSelect");
  const applySelectionBtn = document.getElementById("applySelection");
  const resetSelectionBtn = document.getElementById("resetSelection");
  const bossSelect = document.getElementById("bossSelect");

  let player;
  let boss;
  const selectedBossType = "split";
  let selectedStartPhase = "auto";

  function getPhaseOptions() {
    const options = [{ value: "auto", label: "Auto" }];
    for (let i = 1; i <= BossRegistry.split.phases.length; i++) {
      options.push({ value: String(i), label: `Phase ${i}` });
    }
    return options;
  }

  function syncPhaseSelect(selectedValue = "auto") {
    const options = getPhaseOptions();
    phaseSelect.innerHTML = options.map(option => `<option value="${option.value}">${option.label}</option>`).join("");
    phaseSelect.value = options.some(option => option.value === selectedValue) ? selectedValue : "auto";
  }

  function initializeBossUI() {
    bossSelect.innerHTML = `<option value="split">${BossRegistry.split.label} (${BossRegistry.split.code})</option>`;
    bossSelect.value = "split";
    bossSelect.disabled = true;
    syncPhaseSelect(selectedStartPhase);
  }

  function resetGame(startPhase = selectedStartPhase) {
    selectedStartPhase = startPhase;
    bullets.length = 0;
    hazards.length = 0;
    projectiles.length = 0;
    effects.length = 0;
    texts.length = 0;
    player = new Player(canvas.width * 0.5, canvas.height * 0.82);
    boss = new SplitBossRuntime("split", player, startPhase);
    syncPhaseSelect(selectedStartPhase);
  }

  applySelectionBtn.addEventListener("click", () => {
    resetGame(phaseSelect.value);
  });

  resetSelectionBtn.addEventListener("click", () => {
    phaseSelect.value = "auto";
    resetGame("auto");
  });

  addEventListener("keydown", (e) => {
    const k = e.key.toLowerCase();
    if (k === "p" && boss && typeof boss.forcePhase2 === "function") boss.forcePhase2();
    if (k === "r") resetGame(selectedStartPhase);
    if (k === "h" && boss) {
      if (typeof boss.damage === "function") boss.damage(boss.maxHp * 0.1);
      else boss.hp = Math.max(0, boss.hp - boss.maxHp * 0.1);
      texts.push(new FloatText("Boss HP -10%", boss.x, boss.y - 46, "#ffd166"));
    }
  });

  function updateList(arr, dt, extra) {
    for (let i = arr.length - 1; i >= 0; i--) {
      const alive = extra ? arr[i].update(dt, extra) : arr[i].update(dt);
      if (!alive) arr.splice(i, 1);
    }
  }

  function drawArena() {
    ctx.save();
    ctx.globalAlpha = 0.16;
    ctx.strokeStyle = boss && boss.phase === 2 ? "#3b2f5f" : "#2b3e72";
    ctx.lineWidth = 1;
    const grid = 40;
    for (let x = 0; x < canvas.width; x += grid) {
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x, canvas.height);
      ctx.stroke();
    }
    for (let y = 0; y < canvas.height; y += grid) {
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(canvas.width, y);
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawBar(x, y, w, h, ratio, fill) {
    ctx.save();
    ctx.fillStyle = "rgba(255,255,255,0.08)";
    ctx.fillRect(x, y, w, h);
    ctx.fillStyle = fill;
    ctx.fillRect(x, y, w * Utils.clamp(ratio, 0, 1), h);
    ctx.strokeStyle = "#fff";
    ctx.strokeRect(x, y, w, h);
    ctx.restore();
  }

  function drawPanel() {
    drawBar(20, 20, 240, 18, player.hp / 100, "#66f2ff");
    drawText("Player HP", 20, 14, "#fff", 14);

    const bossColors = boss.definition.colors(boss);
    drawBar(20, 50, 240, 18, boss.hp / boss.maxHp, bossColors.glow);
    drawText("Boss HP", 20, 44, "#fff", 14);

    drawText(`Boss Type: ${boss.definition.label}`, 20, 92, "#fff", 14);
    drawText(`Phase: ${boss.phase}`, 20, 114, "#fff", 14);
    drawText(`Current Pattern: ${boss.stateText}`, 20, 136, "#fff", 14);

    ctx.save();
    ctx.fillStyle = "rgba(4,8,20,0.62)";
    ctx.fillRect(canvas.width - 420, 18, 400, 258);
    ctx.strokeStyle = "rgba(255,255,255,0.18)";
    ctx.strokeRect(canvas.width - 420, 18, 400, 258);
    ctx.restore();

    drawText("분열형 보스 설명", canvas.width - 398, 44, "#fff", 16);
    const lines = boss.definition.panel(boss);
    for (let i = 0; i < lines.length; i++) {
      drawText(lines[i], canvas.width - 398, 76 + i * 28, "#dce7ff", 14);
    }

    drawText("구조: PatternLibrary + BossRegistry(split) + SplitBossRuntime", canvas.width - 398, 232, "#9ecbff", 13);
    drawText("다른 보스/선택 로직 제거, 분열형만 단독 유지", canvas.width - 398, 254, "#9ecbff", 13);

    drawText("이동: WASD / 방향키", 20, canvas.height - 74, "#fff", 14);
    drawText("대시: Shift 또는 Space", 20, canvas.height - 52, "#fff", 14);
    drawText("P: 2페이즈  H: 보스HP -10%  R: 리셋", 20, canvas.height - 30, "#fff", 14);
    drawText("우측 상단 패널에서 시작 페이즈 선택 가능", 20, canvas.height - 96, "#9ecbff", 13);
  }

  initializeBossUI();
  resetGame("auto");

  let lastTime = performance.now();
  function loop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.033);
    lastTime = now;

    player.update(dt);
    boss.update(dt);
    updateList(bullets, dt, player);
    updateList(hazards, dt, player);
    updateList(projectiles, dt, player);
    updateList(effects, dt);
    updateList(texts, dt);

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawArena();
    for (const h of hazards) h.draw();
    for (const b of bullets) b.draw();
    for (const p of projectiles) p.draw();
    for (const e of effects) e.draw();
    boss.draw();
    player.draw();
    for (const t of texts) t.draw();
    drawPanel();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
