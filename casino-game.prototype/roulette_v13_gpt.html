<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Roulette Cartoon</title>

*{margin:0;padding:0;box-sizing:border-box}
body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:
    radial-gradient(circle at top,rgba(255,244,205,.18) 0%,transparent 28%),
    radial-gradient(circle at 18% 24%,rgba(160,120,78,.16) 0,transparent 20%),
    radial-gradient(circle at 82% 16%,rgba(90,122,116,.14) 0,transparent 22%),
    linear-gradient(180deg,#173229 0%,#0c1d18 100%);
  font-family:"Trebuchet MS","Malgun Gothic",sans-serif;
  color:#f3e8d0;
  overflow:hidden;
}
#wrap{
  width:min(1380px,calc(100vw - 28px));
  height:min(860px,calc(100vh - 28px));
  display:grid;
  grid-template-columns:minmax(0,1fr) 360px;
  gap:0;
  border:5px solid #1c1612;
  border-radius:34px;
  overflow:hidden;
  background:#efe4cf;
  box-shadow:0 18px 0 #2e241d,0 34px 80px rgba(0,0,0,.34);
}
#cw{
  position:relative;
  overflow:hidden;
  background:
    radial-gradient(circle at center,rgba(255,255,255,.1) 0,transparent 42%),
    linear-gradient(180deg,#28463c 0%,#173027 52%,#0f221c 100%);
}
#cw::before{
  content:"";
  position:absolute;
  inset:-10%;
  background:
    radial-gradient(circle,rgba(239,228,207,.07) 2px,transparent 2px) 0 0/22px 22px,
    repeating-conic-gradient(from 0deg,rgba(255,255,255,.05) 0 8deg,transparent 8deg 17deg);
  opacity:.4;
  pointer-events:none;
}
#cw::after{
  content:"";
  position:absolute;
  inset:22px;
  border:4px solid rgba(236,224,199,.72);
  border-radius:30px;
  pointer-events:none;
  box-shadow:inset 0 0 0 4px rgba(255,255,255,.08);
}
#c{
  position:absolute;
  inset:22px;
  width:calc(100% - 44px);
  height:calc(100% - 44px);
  display:block;
  border-radius:26px;
}
#rb{
  position:absolute;
  top:24px;
  left:50%;
  transform:translateX(-50%) rotate(-1.2deg);
  min-width:220px;
  max-width:70%;
  background:
    linear-gradient(180deg,rgba(255,255,255,.24),transparent 100%),
    #f0e5d2;
  border:4px solid #1c1612;
  border-radius:22px;
  padding:14px 24px;
  font-size:28px;
  font-weight:900;
  text-align:center;

  white-space:nowrap;
  opacity:0;
  transition:opacity .28s,transform .28s;
  pointer-events:none;
  box-shadow:0 10px 0 rgba(28,22,18,.22);
}
#rb.show{opacity:1;transform:translateX(-50%) rotate(-1.2deg) translateY(0)}
#stage-note{

  font-weight:800;

  background:rgba(15,34,28,.72);

#panel{

.stat-row{

.button-row{display:flex;gap:10px}

#sb{background:#6b4335;color:#f8f0e4}

<script>
window.addEventListener('load', function(){
const NUMS=[0,32,15,19,4,21,2,25,17,34,6,27,13,36,11,30,8,23,10,5,24,16,33,1,20,14,31,9,22,18,29,7,28,12,35,3,26];
const REDS=new Set([1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36]);
const C1=[1,4,7,10,13,16,19,22,25,28,31,34];
const C2=[2,5,8,11,14,17,20,23,26,29,32,35];
const C3=[3,6,9,12,15,18,21,24,27,30,33,36];
const N=NUMS.length;
const SA=(Math.PI*2)/N;
const POCKET_ANGLE_OFFSET=0;

// ─── 핵심 각도 유틸 ───────────────────────────────────────────
// norm: 0 ~ 2π 로 정규화
function norm(a){a%=Math.PI*2;return a<0?a+Math.PI*2:a;}

// 포켓 i 의 "로컬(휠 기준) 중심 각도"
// 휠 텍스처는 i=0(NUMS[0]=0) 이 로컬 +X(각도 0) 에서 시작하므로:
//   mid = π/2 - SA/2 - i*SA  →  텍스처 그릴 때 쓴 공식과 동일
function pocketLocalAngle(i){
  return norm(Math.PI/2 - SA/2 - i*SA);
}

// 포켓 i 의 "월드 각도" = 로컬 각도 + 휠 회전(wAngle)
// Three.js Group.rotation.y = wAngle 이고,
// 공 bAngle 은 Three.js XZ 평면 기준 atan2(z,x) 와 동일한 방향
function pocketWorldAngle(i, wAng){
  return norm(-pocketLocalAngle(i) + wAng + POCKET_ANGLE_OFFSET);
}

// 현재 볼 월드 각도에서 가장 가까운 포켓 인덱스를 반환
function closestPocketIndex(ballWorldAngle, wAng){
  let best=-1, bestDiff=Infinity;
  for(let i=0;i<N;i++){
    const wa = pocketWorldAngle(i, wAng);
    let diff = Math.abs(norm(ballWorldAngle - wa));
    if(diff > Math.PI) diff = Math.PI*2 - diff;
    if(diff < bestDiff){ bestDiff=diff; best=i; }
  }
  return best;
}
// ─────────────────────────────────────────────────────────────

function makeWheelTex(){
  const cv=document.createElement('canvas');
  cv.width=cv.height=1024;
  const ctx=cv.getContext('2d');
  const cx=512,cy=512,r=498;
  const bgGrad=ctx.createRadialGradient(cx,cy,120,cx,cy,r);
  bgGrad.addColorStop(0,'#5f8677');
  bgGrad.addColorStop(0.62,'#335548');
  bgGrad.addColorStop(1,'#1a3129');
  ctx.fillStyle=bgGrad;
  ctx.fillRect(0,0,1024,1024);
  ctx.strokeStyle='rgba(26,20,18,0.9)';
  ctx.lineWidth=24;
  ctx.beginPath();
  ctx.arc(cx,cy,r-12,0,Math.PI*2);
  ctx.stroke();
  ctx.strokeStyle='rgba(255,240,180,0.96)';
  ctx.lineWidth=12;
  ctx.beginPath();
  ctx.arc(cx,cy,r-24,0,Math.PI*2);
  ctx.stroke();
  for(let i=0;i<N;i++){
    // 텍스처 그릴 때의 각도 계산 — pocketLocalAngle 과 동일한 로직
    const mid = Math.PI/2 - SA/2 - i*SA;
    const a=-(mid+SA/2);
    const a2=-(mid-SA/2);
    const n=NUMS[i];
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,r,a,a2);
    ctx.closePath();
    ctx.fillStyle=n===0?'#5b8d72':REDS.has(n)?'#9c5149':'#211d1a';
    ctx.fill();
    ctx.strokeStyle='rgba(26,20,18,0.72)';
    ctx.lineWidth=4;
    ctx.stroke();
    const tx=cx+(r-75)*Math.cos(mid),ty=cy-(r-75)*Math.sin(mid);
    ctx.save();
    ctx.translate(tx,ty);
    ctx.rotate(-mid+Math.PI/2);
    ctx.fillStyle='#f5ecdf';
    ctx.font='900 30px Trebuchet MS, sans-serif';
    ctx.strokeStyle='rgba(26,20,18,0.65)';
    ctx.lineWidth=6;
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.strokeText(n,0,0);
    ctx.fillText(n,0,0);
    ctx.restore();
  }
  ctx.strokeStyle='rgba(255,255,255,0.32)';
  ctx.lineWidth=12;
  ctx.beginPath();
  ctx.arc(cx,cy,180,0,Math.PI*2);
  ctx.stroke();
  const tx=new THREE.CanvasTexture(cv);
  tx.encoding=THREE.sRGBEncoding;
  return tx;
}

const top=new THREE.Mesh(
  new THREE.CylinderGeometry(3.5,3.5,0.01,96),
  new THREE.MeshToonMaterial({map:makeWheelTex(),gradientMap:toonGradient})
);
top.position.y=0.118;
wg.add(top);

const innerRim=new THREE.Mesh(
  new THREE.TorusGeometry(3.52,0.06,12,120),
  new THREE.MeshToonMaterial({color:0xc8ae82,gradientMap:toonGradient})
);
innerRim.rotation.x=Math.PI/2;
innerRim.position.y=0.12;
wg.add(innerRim);

const hubBase=new THREE.Mesh(
  new THREE.CylinderGeometry(0.48,0.72,0.55,32),
  new THREE.MeshToonMaterial({color:0xb08a56,gradientMap:toonGradient})
);
hubBase.position.y=0.25;
hubBase.castShadow=true;
wg.add(hubBase);

const hubTop=new THREE.Mesh(
  new THREE.SphereGeometry(0.28,24,24),
  new THREE.MeshToonMaterial({color:0xe2d1af,gradientMap:toonGradient})
);
hubTop.position.y=0.58;

const ballMesh=new THREE.Mesh(
  new THREE.SphereGeometry(0.14,24,24),

ballMesh.castShadow=true;

const ballShadow=new THREE.Mesh(

);
ballShadow.rotation.x=-Math.PI/2;
ballShadow.position.y=-0.43;

addOutline(outerRim,0x1a1412);
addOutline(track,0x1a1412);
addOutline(tbl,0x1a1412);
addOutline(disc,0x1a1412);

function createToonGradient(){
  const data=new Uint8Array([
    24,24,24,255,
    92,92,92,255,
    176,176,176,255,
    255,255,255,255
  ]);
  const texture=new THREE.DataTexture(data,4,1,THREE.RGBAFormat);
  texture.needsUpdate=true;
  texture.minFilter=THREE.NearestFilter;
  texture.magFilter=THREE.NearestFilter;
  return texture;
}
function makeFloorTex(){
  const cv=document.createElement('canvas');
  cv.width=cv.height=1024;
  const ctx=cv.getContext('2d');
  const grad=ctx.createRadialGradient(512,512,120,512,512,500);
  grad.addColorStop(0,'#efe4cf');
  grad.addColorStop(.45,'#b79a70');
  grad.addColorStop(1,'#5d473b');
  ctx.fillStyle=grad;
  ctx.fillRect(0,0,1024,1024);
  ctx.strokeStyle='rgba(28,22,18,.12)';
  ctx.lineWidth=12;
  for(let i=0;i<10;i++){
    ctx.beginPath();
    ctx.arc(512,512,120+i*35,0,Math.PI*2);
    ctx.stroke();
  }
  for(let i=0;i<40;i++){
    ctx.fillStyle=i%2?'rgba(255,255,255,.08)':'rgba(28,22,18,.06)';
    ctx.beginPath();
    ctx.arc(80+Math.random()*864,80+Math.random()*864,3+Math.random()*8,0,Math.PI*2);
    ctx.fill();
  }
  const tx=new THREE.CanvasTexture(cv);
  tx.encoding=THREE.sRGBEncoding;
  return tx;
}
function addOutline(mesh,color){
  const eg=new THREE.EdgesGeometry(mesh.geometry);
  const line=new THREE.LineSegments(eg,new THREE.LineBasicMaterial({color,transparent:true,opacity:.58}));
  line.position.copy(mesh.position);
  line.rotation.copy(mesh.rotation);
  line.scale.copy(mesh.scale);
  mesh.parent?mesh.parent.add(line):scene.add(line);
  mesh.userData.outline=line;
}

function updateBallMesh(){
  const h=0.12+(bRadius-2.85)*0.25;
  ballMesh.position.set(Math.cos(bAngle)*bRadius, Math.max(h,0.15), Math.sin(bAngle)*bRadius);
  ballShadow.position.x=ballMesh.position.x*0.98;
  ballShadow.position.z=ballMesh.position.z*0.98;
  const shadowScale=0.75+Math.min(0.55,(ballMesh.position.y-0.12)*1.2);
  ballShadow.scale.set(shadowScale,shadowScale,1);
  ballShadow.material.opacity=Math.max(0.08,0.22-(ballMesh.position.y-0.12)*0.18);
}

function doSpin(){
  if(spinning)return;
  const tb=Object.values(bets).reduce((a,v)=>a+v,0);
  if(tb===0){setMsg('베팅을 먼저 하세요!','#d64545');return;}
  spinning=true;
  document.getElementById('sb').disabled=true;
  document.getElementById('rb').classList.remove('show');
  setMsg('');
  wVel=0.015+Math.random()*0.005;
  bVel=-(0.12+Math.random()*0.04);
  bRadius=3.85;
  phase='spinning';
  settleTargetAngle=0;
  settlePocketIdx=-1;
  settleWheelFinalAngle=0;
}

function finish(){
  phase='resting';
  spinning=false;
  wVel=0;
  bVel=0;
  document.getElementById('sb').disabled=false;

  if(settlePocketIdx>=0){
    resultNum=NUMS[settlePocketIdx];
  }

  const betTotal=Object.values(bets).reduce((a,v)=>a+v,0);
  const payout=calcPayout(resultNum);
  balance+=payout;
  const net=payout-betTotal;
  const col=resultNum===0?'초록':REDS.has(resultNum)?'빨강':'검정';
  showBanner(resultNum+' ('+col+')');
  if(payout>0) setMsg('+₩'+net.toLocaleString()+' 획득!','#248a54');
  else setMsg('₩'+betTotal.toLocaleString()+' 잃었습니다.','#d64545');
  history.unshift(resultNum);
  if(history.length>18)history.pop();
  document.getElementById('hist').innerHTML=history.map(h=>{
    const c=h===0?'#49c979':REDS.has(h)?'#ff6b57':'#1b1717';
    return `<div class="hist-ball" style="background:${c}">${h}</div>`;
  }).join('');
  bets={};
  document.querySelectorAll('#ng button,#cg button,#og button').forEach(b=>{
    clearBetButton(b);
    const s=b.querySelector('span.bc');if(s)s.remove();
  });
  updUI();
  if(balance<=0){
    balance=10000;
    setTimeout(()=>setMsg('₩10,000 충전!','#1a1412'),300);
    updUI();
  }
}

function calcPayout(r){
  let w=0;
  const isR=REDS.has(r);
  Object.entries(bets).forEach(([k,a])=>{
    if(k==='n'+r)w+=a*36;
    else if(k==='red'&&isR)w+=a*2;
    else if(k==='blk'&&r>0&&!isR)w+=a*2;
    else if(k==='even'&&r>0&&r%2===0)w+=a*2;
    else if(k==='odd'&&r%2===1)w+=a*2;
    else if(k==='lo'&&r>=1&&r<=18)w+=a*2;
    else if(k==='hi'&&r>=19&&r<=36)w+=a*2;
    else if(k==='d1'&&r>=1&&r<=12)w+=a*3;
    else if(k==='d2'&&r>=13&&r<=24)w+=a*3;
    else if(k==='d3'&&r>=25&&r<=36)w+=a*3;
    else if(k==='col1'&&C1.includes(r))w+=a*3;
    else if(k==='col2'&&C2.includes(r))w+=a*3;
    else if(k==='col3'&&C3.includes(r))w+=a*3;
  });
  return w;
}

let isDrag=false,pm={x:0,y:0},theta=0,phi=0.85;
function setCam(){
  const r=16;
  camera.position.set(Math.sin(theta)*Math.cos(phi)*r,Math.sin(phi)*r,Math.cos(theta)*Math.cos(phi)*r);
  camera.lookAt(0,0,0);
}
setCam();
cw.addEventListener('mousedown',e=>{isDrag=true;pm={x:e.clientX,y:e.clientY};});
window.addEventListener('mouseup',()=>{isDrag=false;});
window.addEventListener('mousemove',e=>{
  if(!isDrag)return;
  theta-=(e.clientX-pm.x)*0.007;
  phi=Math.max(0.25,Math.min(1.45,phi-(e.clientY-pm.y)*0.007));
  pm={x:e.clientX,y:e.clientY};
  setCam();
});

function animate(){
  requestAnimationFrame(animate);

  if(phase==='spinning'){
    wAngle+=wVel;
    bAngle+=bVel;
    wVel*=0.9992;
    bVel*=0.992;
    if(Math.abs(bVel)<0.05) bRadius+=(3.15-bRadius)*0.02;

    if(Math.abs(bVel)<0.018){
      phase='settling';
      wVel=0;
      settleWheelFinalAngle=wAngle;
      const bwa=norm(bAngle);
      settlePocketIdx=closestPocketIndex(bwa, settleWheelFinalAngle);
      resultNum=NUMS[settlePocketIdx];
      settleTargetAngle=pocketWorldAngle(settlePocketIdx, settleWheelFinalAngle);
    }
    wg.rotation.y = wAngle;
    updateBallMesh();

  } else if(phase==='settling'){
    wAngle=settleWheelFinalAngle;
    wg.rotation.y=wAngle;

    const curBall=norm(bAngle);
    let delta=norm(settleTargetAngle-curBall);
    if(delta > Math.PI) delta -= Math.PI*2;

    const speed=Math.min(Math.abs(delta), Math.max(0.008, Math.abs(delta)*0.15+0.002));

    if(Math.abs(delta) < 0.003){
      bAngle=norm(settleTargetAngle);
      bVel=0;
      bRadius=2.85;
      updateBallMesh();
      finish();
      return;
    }

    bVel=Math.sign(delta)*speed;
    bAngle=norm(bAngle+bVel);
    bRadius+=(2.85-bRadius)*0.07;
    updateBallMesh();

  } else if(phase==='idleSpin'){
    wAngle+=0.002;
    wg.rotation.y=wAngle;
  }

  if(wg.userData.outline) wg.userData.outline.rotation.y=wg.rotation.y;
  outlineEffect.render(scene,camera);
}

doResize();
updUI();
updateBallMesh();
animate();
window.addEventListener('resize',doResize);
});
