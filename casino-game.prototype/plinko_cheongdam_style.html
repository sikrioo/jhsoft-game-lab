<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plinko Physics</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--ink:#2f2925;--ink-soft:#6f655d;--line:rgba(67,57,50,.18);--panel:#f7f3ee;--panel-strong:#f2ede6;--sand:#d6c2aa;--champagne:#c8b299;--taupe:#8d7a69;--coffee:#4f433a;--deep:#1f1b19;--accent:#b89a7f;--accent-soft:#d8c8ba;--success:#7f947f;--gold:#c4aa7d;--shadow:0 18px 48px rgba(28,22,18,.12)}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at top,rgba(255,255,255,.78),transparent 22%),linear-gradient(180deg,#efe9e2 0%,#e4ddd5 42%,#d7cec5 100%);font-family:"Inter","Pretendard","Noto Sans KR","Malgun Gothic",sans-serif;color:var(--ink);letter-spacing:-.01em}
body::before{content:"";position:fixed;inset:0;pointer-events:none;opacity:.35;background:linear-gradient(135deg,rgba(255,255,255,.32),transparent 38%),repeating-linear-gradient(90deg,rgba(255,255,255,.05) 0 1px,transparent 1px 42px)}
.app{width:min(1420px,calc(100vw - 32px));min-height:min(1080px,calc(100vh - 32px));border:1px solid rgba(67,57,50,.16);border-radius:36px;overflow:hidden;background:rgba(247,243,238,.9);box-shadow:var(--shadow),0 1px 0 rgba(255,255,255,.7) inset;backdrop-filter:blur(12px)}
.stage{position:relative;padding:28px;background:linear-gradient(180deg,rgba(255,255,255,.52),rgba(255,255,255,.18)),linear-gradient(180deg,#ece5de 0%,#ddd3c7 100%)}
.stage::before{content:"";position:absolute;inset:18px;border:1px solid rgba(67,57,50,.12);border-radius:30px;pointer-events:none;box-shadow:inset 0 1px 0 rgba(255,255,255,.45)}
.panel{position:relative;z-index:1;border:1px solid rgba(67,57,50,.12);border-radius:24px;background:linear-gradient(180deg,rgba(255,255,255,.78),rgba(255,255,255,.55)),var(--panel);box-shadow:0 10px 28px rgba(28,22,18,.06)}
.status{margin-bottom:18px;padding:18px 20px;background:linear-gradient(180deg,rgba(255,255,255,.86),rgba(255,255,255,.62)),#f8f4ef}
.status-label{font-size:11px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--taupe)}
#message{margin-top:10px;min-height:60px;font-size:23px;font-weight:600;line-height:1.25;color:var(--deep)}
.arena{position:relative;z-index:1;display:grid;grid-template-columns:minmax(0,1fr) 340px;gap:18px}
.table{position:relative;padding:18px;border:1px solid rgba(67,57,50,.14);border-radius:30px;background:linear-gradient(180deg,rgba(255,255,255,.18),transparent 100%),linear-gradient(180deg,#d8c9b8 0%,#ccb9a4 52%,#bea58f 100%);box-shadow:0 20px 36px rgba(28,22,18,.09)}
.table::before{content:"";position:absolute;inset:12px;border:1px solid rgba(255,255,255,.32);border-radius:24px;pointer-events:none}
.table-head{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:14px}.jackpot{padding:11px 16px;border:1px solid rgba(67,57,50,.12);border-radius:18px;background:rgba(250,247,242,.75);font-size:18px;font-weight:700;letter-spacing:.12em;color:var(--coffee);box-shadow:0 8px 20px rgba(28,22,18,.06)}
.board{position:relative;min-height:840px;border:1px solid rgba(67,57,50,.16);border-radius:26px;overflow:hidden;background:radial-gradient(circle at top,rgba(255,255,255,.14),transparent 32%),linear-gradient(180deg,#3a342f 0%,#221f1d 100%);transition:transform .2s ease,box-shadow .2s ease,filter .2s ease}.board.burst{animation:board-burst .5s ease;box-shadow:inset 0 0 0 1px rgba(255,255,255,.12),0 0 40px rgba(196,170,125,.26)}.board.tension{filter:saturate(1.03)}.board::before{content:"";position:absolute;inset:18px;border:1px solid rgba(255,255,255,.12);border-radius:22px;pointer-events:none;z-index:2}
.render-wrap{position:absolute;inset:0}.render-wrap canvas{display:block;width:100%;height:100%}
.drop-zone{position:absolute;left:50%;top:26px;transform:translateX(-50%);padding:11px 18px;border:1px solid rgba(255,255,255,.14);border-radius:999px;background:rgba(214,194,170,.92);color:#fffaf5;font-size:13px;font-weight:700;letter-spacing:.16em;box-shadow:0 10px 22px rgba(28,22,18,.14);z-index:3}
.result-pop{position:absolute;left:50%;top:46%;transform:translate(-50%,-50%) scale(.86);min-width:250px;text-align:center;padding:16px 20px;border:1px solid rgba(67,57,50,.12);border-radius:24px;background:rgba(248,244,239,.96);font-size:32px;font-weight:700;letter-spacing:.04em;color:var(--coffee);box-shadow:0 20px 36px rgba(28,22,18,.12);opacity:0;transition:opacity .22s ease,transform .22s ease;z-index:3}.result-pop.show{opacity:1;transform:translate(-50%,-50%) scale(1)}.result-pop.jackpot{background:#efe2cf;color:#6d5945}
.slot-strip{position:absolute;left:24px;right:24px;bottom:22px;display:grid;gap:8px;z-index:3}
.slot{min-height:64px;display:grid;place-items:center;border:1px solid rgba(67,57,50,.14);border-radius:18px;background:rgba(248,244,239,.9);font-size:14px;font-weight:700;color:var(--coffee);box-shadow:0 8px 18px rgba(28,22,18,.08);transition:transform .16s ease,background .16s ease,color .16s ease,box-shadow .16s ease,opacity .16s ease}.slot.hot{background:#cab39b;color:#fffaf6}.slot.mid{background:#e4d4c2}.slot.preview{transform:translateY(-3px) scale(1.02);box-shadow:0 12px 22px rgba(28,22,18,.12),0 0 0 1px rgba(216,200,186,.55)}.slot.dim{opacity:.42;transform:scale(.98)}.slot.active,.slot.winner{transform:translateY(-8px) scale(1.05);box-shadow:0 18px 28px rgba(28,22,18,.12),0 0 0 1px rgba(196,170,125,.38)}
.sparkles{position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:3}.spark{position:absolute;width:14px;height:14px;border:1px solid rgba(255,255,255,.45);border-radius:4px;transform:rotate(45deg);opacity:0;animation:spark-fly .9s ease forwards}
.side{display:grid;gap:12px}.box{padding:16px}.stat{display:flex;justify-content:space-between;gap:10px;font-size:13px;font-weight:600;color:var(--ink-soft)}.stat + .stat{margin-top:10px}.stat strong{font-size:18px;font-weight:700;color:var(--deep)}
.bet-grid,.risk-grid,.color-grid,.style-grid{display:grid;gap:8px;margin-top:10px}.bet-grid{grid-template-columns:repeat(4,1fr)}.risk-grid{grid-template-columns:repeat(3,1fr)}.color-grid{grid-template-columns:repeat(3,1fr)}.style-grid{grid-template-columns:repeat(2,1fr)}
.bet-btn,.risk-btn,.color-btn,.style-btn,.action-btn,.nav-link{appearance:none;border:1px solid rgba(67,57,50,.12);border-radius:18px;cursor:pointer;font-weight:700;box-shadow:0 8px 18px rgba(28,22,18,.06);transition:transform .14s ease,box-shadow .14s ease,background .14s ease,color .14s ease,border-color .14s ease;text-decoration:none;text-align:center}
.bet-btn:hover,.risk-btn:hover,.color-btn:hover,.style-btn:hover,.action-btn:hover,.nav-link:hover{transform:translateY(-2px);box-shadow:0 12px 24px rgba(28,22,18,.1)}.bet-btn:active,.risk-btn:active,.color-btn:active,.style-btn:active,.action-btn:active,.nav-link:active{transform:translateY(1px);box-shadow:0 6px 12px rgba(28,22,18,.08)}
.bet-btn,.risk-btn,.color-btn,.style-btn{min-height:56px;background:rgba(255,255,255,.66);font-size:14px;line-height:1;color:var(--coffee)}.bet-btn small,.risk-btn small,.color-btn small,.style-btn small{display:block;margin-top:4px;font-size:10px;letter-spacing:.12em;text-transform:uppercase;opacity:.62}.bet-btn.selected{background:#cbb39c;color:#fffaf5;border-color:rgba(111,101,93,.24)}.risk-btn.selected{background:#a99584;color:#fffaf5;border-color:rgba(111,101,93,.24)}.color-btn.selected,.style-btn.selected{color:#fffdf6}
.color-btn{min-height:72px;padding:8px 6px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px}
.swatch-dot{width:24px;height:24px;border:1px solid rgba(67,57,50,.22);border-radius:50%;box-shadow:inset 0 2px 0 rgba(255,255,255,.26)}
.swatch-label{font-size:12px;font-weight:700;line-height:1}
.swatch-mini{display:inline-block;width:14px;height:14px;margin-left:6px;border:1px solid rgba(67,57,50,.18);border-radius:50%;vertical-align:-2px}
.action-stack,.nav-stack{display:grid;gap:10px;margin-top:10px}.action-btn,.nav-link{min-height:58px;display:grid;place-items:center;font-size:15px;letter-spacing:.08em}#dropBtn{background:#8f8378;color:#fffaf5}#chargeBtn{background:#d9c8b6;color:var(--coffee)}.nav-link{background:rgba(255,255,255,.66);color:var(--coffee)}.action-btn:disabled{opacity:.55;cursor:not-allowed;transform:none}
.odds-list{display:grid;gap:8px;margin-top:10px}.odds-item{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border:1px solid rgba(67,57,50,.1);border-radius:16px;background:rgba(255,255,255,.64);font-size:13px;font-weight:700;color:var(--coffee)}
.history-list{margin-top:10px;display:flex;flex-wrap:wrap;gap:8px}.history-pill{min-width:58px;padding:8px 10px;border:1px solid rgba(67,57,50,.1);border-radius:999px;background:rgba(255,255,255,.68);text-align:center;font-size:12px;font-weight:700;color:var(--coffee)}
@keyframes spark-fly{0%{opacity:0;transform:translate(0,0) rotate(45deg) scale(.4)}20%{opacity:.9}100%{opacity:0;transform:translate(var(--dx),var(--dy)) rotate(225deg) scale(1.1)}}
@keyframes board-burst{0%,100%{transform:translate(0,0) scale(1)}18%{transform:translate(-3px,2px) scale(1.008)}36%{transform:translate(4px,-2px) scale(1.01)}54%{transform:translate(-3px,2px) scale(1.008)}72%{transform:translate(3px,-2px) scale(1.006)}}
@media (max-width:1180px){.arena{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app"><section class="stage"><div class="status panel"><div class="status-label">Status</div><div id="message">Refined board ready. A calmer luxury tone is now applied.</div></div><div class="arena"><div class="table"><div class="table-head"><div class="jackpot">PLINKO ATELIER</div></div><div class="board" id="board"><div class="render-wrap" id="renderWrap"></div><div class="drop-zone" id="dropZone">BALANCED</div><div class="result-pop" id="resultPop">READY</div><div class="slot-strip" id="slotStrip"></div><div class="sparkles" id="sparkles"></div></div></div><div class="side"><div class="panel box"><div class="status-label">Board Overview</div><div class="stat" style="margin-top:10px"><span>Balance</span><strong id="balance">1000</strong></div><div class="stat"><span>Bet</span><strong id="bet">25</strong></div><div class="stat"><span>Last Win</span><strong id="lastWin">0</strong></div><div class="stat"><span>Risk Shape</span><strong id="riskLabel">Medium</strong></div><div class="stat"><span>Ball Color</span><strong id="ballLabel">Sky</strong></div><div class="stat"><span>Ball Style</span><strong id="ballStyleLabel">Glossy Orb</strong></div></div><div class="panel box"><div class="status-label">Bet Selection</div><div class="bet-grid" id="betGrid"></div><div class="status-label" style="margin-top:14px">Risk Selection</div><div class="risk-grid" id="riskGrid"></div><div class="status-label" style="margin-top:14px">Ball Color</div><div class="color-grid" id="colorGrid"></div><div class="status-label" style="margin-top:14px">Ball Style</div><div class="style-grid" id="styleGrid"></div><div class="action-stack"><button class="action-btn" id="dropBtn" type="button">START DROP</button><button class="action-btn" id="chargeBtn" type="button">ADD 500 COINS</button></div><div class="nav-stack"><a class="nav-link" href="./index.html">CLASSIC VERSION</a></div></div><div class="panel box"><div class="status-label">Payout Table</div><div class="odds-list" id="payouts"></div></div><div class="panel box"><div class="status-label">Recent Rounds</div><div class="history-list" id="history"></div></div></div></div></section></div>
<script src="https://cdn.jsdelivr.net/npm/matter-js@0.20.0/build/matter.min.js"></script>
<script>
(() => {
const {Engine,Render,Runner,World,Bodies,Events}=Matter;
const ROWS=10;
const RISK_PRESETS={low:{label:"Low",color:"#58d88e",banner:"LOW PROFILE",payouts:[0.7,0.8,0.9,1,1.2,2.5,1.2,1,0.9,0.8,0.7],restitution:.34,air:.013},medium:{label:"Medium",color:"#4bb8ff",banner:"BALANCED",payouts:[0,0.2,0.5,1,1.8,6,1.8,1,0.5,0.2,0],restitution:.5,air:.009},high:{label:"High",color:"#ff8454",banner:"HIGH TENSION",payouts:[0,0.1,0.2,0.5,1,12,1,0.5,0.2,0.1,0],restitution:.68,air:.006}};
const BALL_COLORS={
sky:{label:"Sky",fill:"#8ea7b2",stroke:"#2f2925",button:"#8ea7b2"},
cherry:{label:"Cherry",fill:"#b88479",stroke:"#2f2925",button:"#b88479"},
mint:{label:"Mint",fill:"#96a898",stroke:"#2f2925",button:"#96a898"},
gold:{label:"Gold",fill:"#c6aa80",stroke:"#2f2925",button:"#c6aa80"},
violet:{label:"Violet",fill:"#978ca3",stroke:"#2f2925",button:"#978ca3"},
ink:{label:"Ink",fill:"#5f655f",stroke:"#2f2925",button:"#5f655f"}
};
const BALL_STYLES={orb:{label:"Glass Orb",button:"#aa9684",shape:"circle",radius:12,sides:0,stroke:"#ffffff"},hex:{label:"Architect Hex",button:"#74685e",shape:"polygon",radius:13,sides:6,stroke:"#f4e7d5"}};
const state={balance:1000,bet:25,risk:"medium",ballColor:"sky",ballStyle:"orb",lastWin:0,dropping:false,history:[]};
const balanceEl=document.getElementById("balance"); const betEl=document.getElementById("bet"); const lastWinEl=document.getElementById("lastWin"); const riskLabelEl=document.getElementById("riskLabel"); const ballLabelEl=document.getElementById("ballLabel"); const ballStyleLabelEl=document.getElementById("ballStyleLabel"); const messageEl=document.getElementById("message"); const resultPopEl=document.getElementById("resultPop"); const historyEl=document.getElementById("history"); const slotStripEl=document.getElementById("slotStrip"); const payoutsEl=document.getElementById("payouts"); const sparklesEl=document.getElementById("sparkles"); const betGridEl=document.getElementById("betGrid"); const riskGridEl=document.getElementById("riskGrid"); const colorGridEl=document.getElementById("colorGrid"); const styleGridEl=document.getElementById("styleGrid"); const dropBtn=document.getElementById("dropBtn"); const chargeBtn=document.getElementById("chargeBtn"); const dropZoneEl=document.getElementById("dropZone"); const boardEl=document.getElementById("board"); const renderWrapEl=document.getElementById("renderWrap");
const slots=[]; let audioCtx=null; let engine=null; let render=null; let runner=null; let resizeTimer=null; let activeBall=null; let slotWidth=0; let width=0; let height=0; let trailPoints=[]; let lastPegImpactAt=0;
const getPreset=()=>RISK_PRESETS[state.risk]; const getPayouts=()=>getPreset().payouts; const getBallColor=()=>BALL_COLORS[state.ballColor]; const getBallStyle=()=>BALL_STYLES[state.ballStyle];
function ensureAudio(){if(!audioCtx){const C=window.AudioContext||window.webkitAudioContext; if(C) audioCtx=new C()} if(audioCtx&&audioCtx.state==="suspended") audioCtx.resume()}
function beep({frequency=440,duration=.08,type="square",volume=.03,delay=0}={}){if(!audioCtx) return; const time=audioCtx.currentTime+delay; const osc=audioCtx.createOscillator(); const gain=audioCtx.createGain(); osc.type=type; osc.frequency.setValueAtTime(frequency,time); gain.gain.setValueAtTime(.0001,time); gain.gain.exponentialRampToValueAtTime(volume,time+.01); gain.gain.exponentialRampToValueAtTime(.0001,time+duration); osc.connect(gain).connect(audioCtx.destination); osc.start(time); osc.stop(time+duration+.03)}
function playWinSound(payout){(payout>=6?[420,620,840,1050]:[340,510,680]).forEach((tone,index)=>beep({frequency:tone,duration:.12,type:"triangle",volume:.035,delay:index*.06}))}
function playLoseSound(){beep({frequency:180,duration:.12,type:"sawtooth",volume:.025});beep({frequency:130,duration:.18,type:"sawtooth",volume:.02,delay:.08})}
function renderStats(){balanceEl.textContent=state.balance.toLocaleString(); betEl.textContent=state.bet.toLocaleString(); lastWinEl.textContent=state.lastWin.toLocaleString(); riskLabelEl.textContent=getPreset().label; ballLabelEl.innerHTML=`${getBallColor().label}<span class="swatch-mini" style="background:${getBallColor().button}"></span>`; ballStyleLabelEl.textContent=getBallStyle().label; dropZoneEl.textContent=getPreset().banner; dropZoneEl.style.background=getPreset().color; dropBtn.disabled=state.dropping}
function setMessage(text,tone="normal"){messageEl.textContent=text; messageEl.style.color=tone==="win"?"#1f8d55":tone==="alert"?"#b93a3a":"#1b1412"}
function showPop(text,tone="normal"){resultPopEl.textContent=text; resultPopEl.classList.add("show"); resultPopEl.classList.toggle("jackpot",tone==="jackpot"); resultPopEl.style.background=tone==="jackpot"?"#fff18e":tone==="win"?"#dbffe9":"#ffdada"; clearTimeout(showPop.timer); showPop.timer=setTimeout(()=>resultPopEl.classList.remove("show","jackpot"),1500)}
function renderHistory(){historyEl.innerHTML=state.history.length===0?'<div class="history-pill">READY</div>':state.history.map(item=>`<div class="history-pill">${item}</div>`).join("")}
function renderBetButtons(){betGridEl.innerHTML=""; [10,25,50,100].forEach(value=>{const button=document.createElement("button"); button.type="button"; button.className="bet-btn"+(state.bet===value?" selected":""); button.innerHTML=`${value}<small>BET</small>`; button.addEventListener("click",()=>{if(state.dropping) return; ensureAudio(); state.bet=value; renderBetButtons(); renderStats()}); betGridEl.appendChild(button)})}
function renderRiskButtons(){riskGridEl.innerHTML=""; Object.entries(RISK_PRESETS).forEach(([key,preset])=>{const button=document.createElement("button"); button.type="button"; button.className="risk-btn"+(state.risk===key?" selected":""); button.innerHTML=`${preset.label}<small>RISK</small>`; button.addEventListener("click",()=>{if(state.dropping) return; ensureAudio(); state.risk=key; renderRiskButtons(); renderPayouts(); renderSlots(); renderStats(); setupMatter(); setMessage(`${preset.label} risk selection applied. The board has been rebalanced in a quieter tone.`)}); riskGridEl.appendChild(button)})}
function renderColorButtons(){colorGridEl.innerHTML=""; Object.entries(BALL_COLORS).forEach(([key,ball])=>{const button=document.createElement("button"); button.type="button"; button.className="color-btn"+(state.ballColor===key?" selected":""); button.style.background=state.ballColor===key?ball.button:"#fff8e4"; button.style.color=state.ballColor===key?"#fffdf6":"#1b1412"; button.innerHTML=`<span class="swatch-dot" style="background:${ball.button}"></span><span class="swatch-label">${ball.label}</span><small>BALL</small>`; button.addEventListener("click",()=>{if(state.dropping) return; ensureAudio(); state.ballColor=key; renderColorButtons(); renderStats(); setMessage(`${ball.label}  tone selected.`)}); colorGridEl.appendChild(button)})}
function renderStyleButtons(){styleGridEl.innerHTML=""; Object.entries(BALL_STYLES).forEach(([key,style])=>{const button=document.createElement("button"); button.type="button"; button.className="style-btn"+(state.ballStyle===key?" selected":""); button.style.background=state.ballStyle===key?style.button:"#fff8e4"; button.style.color=state.ballStyle===key?"#fffdf6":"#1b1412"; button.innerHTML=`${style.label}<small>STYLE</small>`; button.addEventListener("click",()=>{if(state.dropping) return; ensureAudio(); state.ballStyle=key; renderStyleButtons(); renderStats(); setMessage(`${style.label} selected.`)}); styleGridEl.appendChild(button)})}
function renderPayouts(){payoutsEl.innerHTML=getPayouts().map((value,index)=>`<div class="odds-item"><span>Slot ${index+1}</span><span>x${value}</span></div>`).join("")}
function renderSlots(){slotStripEl.innerHTML=""; slotStripEl.style.gridTemplateColumns=`repeat(${getPayouts().length},1fr)`; slots.length=0; getPayouts().forEach(value=>{const el=document.createElement("div"); el.className="slot"+(value>=6?" hot":value>=1.8?" mid":""); el.textContent=`x${value}`; slotStripEl.appendChild(el); slots.push(el)})}
function clearSlotFocus(){slots.forEach(slot=>slot.classList.remove("active","winner","dim","preview"))}
function previewSlotAt(x){const index=Math.max(0,Math.min(getPayouts().length-1,Math.floor((x-24)/slotWidth))); slots.forEach((slot,i)=>slot.classList.toggle("preview",i===index)); return index}
function createImpactSparkAt(x,y,count=6){for(let i=0;i<count;i+=1){const spark=document.createElement("div"); spark.className="spark"; spark.style.left=`${x}px`; spark.style.top=`${y}px`; spark.style.background=i%3===0?"#fff159":i%3===1?"#58d88e":"#4bb8ff"; spark.style.setProperty("--dx",`${-36+Math.random()*72}px`); spark.style.setProperty("--dy",`${-34+Math.random()*54}px`); sparklesEl.appendChild(spark)}}
function resetTension(){trailPoints.length=0; boardEl.classList.remove("tension"); boardEl.style.boxShadow=""; clearSlotFocus()}
function drawBallTrail(){if(!render||!activeBall||trailPoints.length===0) return; const ctx=render.context; ctx.save(); trailPoints.forEach((point,index)=>{const alpha=(index+1)/trailPoints.length; ctx.beginPath(); ctx.fillStyle=`rgba(255,255,255,${alpha*0.12})`; ctx.arc(point.x,point.y,4+alpha*8,0,Math.PI*2); ctx.fill()}); const depth=Math.max(0,Math.min(1,activeBall.position.y/(height-120))); ctx.beginPath(); ctx.fillStyle=`rgba(255,241,89,${0.08+depth*0.12})`; ctx.arc(activeBall.position.x,height-72,44+depth*24,0,Math.PI*2); ctx.fill(); ctx.restore()}
function updateTensionVisuals(){if(!activeBall) return; const depth=Math.max(0,Math.min(1,activeBall.position.y/(height-120))); trailPoints.push({x:activeBall.position.x,y:activeBall.position.y}); if(trailPoints.length>16) trailPoints.shift(); previewSlotAt(activeBall.position.x); boardEl.classList.toggle("tension",depth>.25); boardEl.style.boxShadow=`inset 0 0 0 4px rgba(255,255,255,.14), 0 0 ${12+depth*34}px rgba(255,140,84,${0.08+depth*0.26})`}
function resolveFastEdgeLanding(){if(!state.dropping||!activeBall) return; const x=activeBall.position.x; const y=activeBall.position.y; const vx=Math.abs(activeBall.velocity.x||0); const vy=Math.abs(activeBall.velocity.y||0); const nearBottom=y>=height-82; const outOfBounds=x<18||x>width-18||y>height-10; const settlingOnEdge=nearBottom&&(x<24+slotWidth*0.55||x>width-24-slotWidth*0.55)&&(vx<1.35||vy<2.8); if(outOfBounds||settlingOnEdge){const fallback=Math.max(0,Math.min(getPayouts().length-1,Math.floor((x-24)/slotWidth))); finishDrop(fallback)}} 
function clearMatter(){if(render){Render.stop(render); render.canvas.remove(); render.textures={}} if(runner) Runner.stop(runner); engine=null; render=null; runner=null; activeBall=null; renderWrapEl.innerHTML=""}
function setupMatter(){clearMatter(); const rect=renderWrapEl.getBoundingClientRect(); width=rect.width; height=rect.height; const slotCount=getPayouts().length; slotWidth=(width-48)/slotCount; engine=Engine.create(); engine.gravity.y=.94; render=Render.create({element:renderWrapEl,engine,options:{width,height,wireframes:false,background:"transparent",pixelRatio:Math.min(window.devicePixelRatio||1,2)}}); const wallColor="#f6d26f"; const pegColors=["#ffe7a2","#ffc777"]; const hiddenWall={fillStyle:"transparent",strokeStyle:"transparent",lineWidth:0}; const walls=[Bodies.rectangle(width/2,height+28,width+80,60,{isStatic:true,render:hiddenWall}),Bodies.rectangle(-22,height/2,44,height,{isStatic:true,angle:.08,render:hiddenWall}),Bodies.rectangle(width+22,height/2,44,height,{isStatic:true,angle:-.08,render:hiddenWall})]; const pegs=[]; const usableWidth=width-120; const startY=132; const rowGap=60; const colGap=usableWidth/ROWS; for(let row=0;row<ROWS;row+=1){const count=row+1; const rowWidth=colGap*row; const startX=(width-rowWidth)/2; for(let col=0;col<count;col+=1){pegs.push(Bodies.circle(startX+col*colGap,startY+row*rowGap,8.5,{label:"peg",isStatic:true,restitution:.45,render:{fillStyle:pegColors[(row+col)%2],strokeStyle:"#1b1412",lineWidth:3}}))}} const dividers=[]; for(let i=0;i<=slotCount;i+=1){const x=24+i*slotWidth; dividers.push(Bodies.rectangle(x,height-56,8,108,{isStatic:true,render:{fillStyle:wallColor,strokeStyle:"#1b1412",lineWidth:3}}))} const sensors=[]; for(let i=0;i<slotCount;i+=1){const x=24+i*slotWidth+slotWidth/2; sensors.push(Bodies.rectangle(x,height-18,slotWidth-10,30,{isStatic:true,isSensor:true,label:`sensor-${i}`,render:{fillStyle:"transparent",strokeStyle:"transparent",lineWidth:0}}))} World.add(engine.world,[...walls,...pegs,...dividers,...sensors]); Events.on(engine,"afterUpdate",()=>{updateTensionVisuals(); resolveFastEdgeLanding()}); Events.on(render,"afterRender",()=>{drawBallTrail()}); Events.on(engine,"collisionStart",event=>{if(!activeBall) return; for(const pair of event.pairs){const labels=[pair.bodyA.label,pair.bodyB.label]; const sensorBody=labels[0].startsWith("sensor-")?pair.bodyA:labels[1].startsWith("sensor-")?pair.bodyB:null; const pegBody=labels[0]==="peg"?pair.bodyA:labels[1]==="peg"?pair.bodyB:null; const ballBody=pair.bodyA===activeBall?pair.bodyA:pair.bodyB===activeBall?pair.bodyB:null; if(sensorBody&&ballBody){finishDrop(Number(sensorBody.label.split("-")[1])); break} if(pegBody&&ballBody){const now=performance.now(); if(now-lastPegImpactAt>22){lastPegImpactAt=now; const support=pair.collision.supports && pair.collision.supports[0] ? pair.collision.supports[0] : ballBody.position; beep({frequency:520+Math.random()*150,duration:.03,type:"triangle",volume:.011}); createImpactSparkAt(support.x,support.y,4)}}}}); Render.run(render); runner=Runner.create(); Runner.run(runner,engine)}
function dropBall(){ensureAudio(); if(state.dropping) return; if(state.balance<state.bet){setMessage("Not enough coins. Recharge and try again.","alert"); playLoseSound(); return} if(!engine) setupMatter(); state.balance-=state.bet; state.lastWin=0; renderStats(); resetTension(); setMessage(`${getPreset().label} profile engaged. The board is now in motion.`); const preset=getPreset(); const ball=getBallColor(); const style=getBallStyle(); const renderConfig={fillStyle:ball.fill,strokeStyle:ball.stroke,lineWidth:4}; activeBall=style.shape==="polygon"?Bodies.polygon(width/2+(Math.random()-.5)*18,70,style.sides,style.radius,{label:"ball",restitution:preset.restitution,friction:.01,frictionAir:preset.air,density:.0025,render:renderConfig}):Bodies.circle(width/2+(Math.random()-.5)*18,70,style.radius,{label:"ball",restitution:preset.restitution,friction:.01,frictionAir:preset.air,density:.0025,render:renderConfig}); World.add(engine.world,activeBall); state.dropping=true; beep({frequency:230,duration:.08,type:"triangle",volume:.03}); beep({frequency:280,duration:.07,type:"triangle",volume:.024,delay:.05}); clearTimeout(dropBall.timeout); dropBall.timeout=setTimeout(()=>{if(state.dropping&&activeBall){const fallback=Math.max(0,Math.min(getPayouts().length-1,Math.floor((activeBall.position.x-24)/slotWidth))); finishDrop(fallback)}},12000)}
function finishDrop(index){if(!state.dropping) return; clearTimeout(dropBall.timeout); state.dropping=false; const payout=getPayouts()[index]; const reward=Math.round(state.bet*payout); const profit=reward-state.bet; state.balance+=reward; state.lastWin=profit; renderStats(); slots.forEach((slot,i)=>{slot.classList.toggle("winner",i===index); slot.classList.toggle("active",i===index); slot.classList.toggle("dim",i!==index)}); state.history.unshift(`x${payout}`); state.history=state.history.slice(0,10); renderHistory(); boardEl.classList.remove("tension"); boardEl.style.boxShadow=""; trailPoints.length=0; if(activeBall){World.remove(engine.world,activeBall); activeBall=null} if(reward>0){const bigWin=payout>=6; setMessage(`The ball settled on x${payout}. ${profit>=0?"+":""}${profit.toLocaleString()} net`,`win`); showPop(bigWin?`PRESTIGE x${payout}`:`x${payout}`,bigWin?"jackpot":"win"); boardEl.classList.remove("burst"); void boardEl.offsetWidth; boardEl.classList.add("burst"); setTimeout(()=>boardEl.classList.remove("burst"),700); createSparkBurst(index,bigWin?30:18); playWinSound(payout)} else {setMessage("Outer slot. The next round may land more gracefully.","alert"); showPop(`x${payout}`,"lose"); playLoseSound()}}
function createSparkBurst(index,count){sparklesEl.innerHTML=""; const slotRect=slots[index].getBoundingClientRect(); const boardRect=sparklesEl.getBoundingClientRect(); const cx=slotRect.left-boardRect.left+slotRect.width/2; const cy=slotRect.top-boardRect.top+slotRect.height/2; for(let i=0;i<count;i+=1){const spark=document.createElement("div"); spark.className="spark"; spark.style.left=`${cx}px`; spark.style.top=`${cy}px`; spark.style.background=i%3===0?"#fff159":i%3===1?"#58d88e":"#4bb8ff"; spark.style.setProperty("--dx",`${-160+Math.random()*320}px`); spark.style.setProperty("--dy",`${-140+Math.random()*220}px`); sparklesEl.appendChild(spark)}}
function handleResize(){clearTimeout(resizeTimer); resizeTimer=setTimeout(()=>{if(state.dropping) return; setupMatter()},140)}
chargeBtn.addEventListener("click",()=>{ensureAudio(); if(state.dropping) return; state.balance+=500; renderStats(); setMessage("500 coins added to the balance."); beep({frequency:300,duration:.07,type:"square",volume:.025})}); dropBtn.addEventListener("click",dropBall); window.addEventListener("resize",handleResize); window.addEventListener("pointerdown",ensureAudio,{once:true}); renderBetButtons(); renderRiskButtons(); renderColorButtons(); renderStyleButtons(); renderPayouts(); renderSlots(); renderStats(); renderHistory(); setupMatter();
})();
