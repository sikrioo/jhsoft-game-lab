<body>
<div id="wrap" style="display:grid;grid-template-columns:1fr 300px;height:650px;background:#0a1810;border-radius:12px;overflow:hidden;border:0.5px solid #2a5a3a;">
  <div id="cw" style="position:relative;background:#0a1810;">
    <canvas id="c" style="width:100%;height:100%;display:block;"></canvas>
    <div id="rb" style="position:absolute;top:14px;left:50%;transform:translateX(-50%);background:rgba(5,20,10,0.95);border:1px solid #c8a826;border-radius:8px;padding:8px 22px;font-size:20px;font-weight:500;color:#f0c040;white-space:nowrap;opacity:0;transition:opacity 0.4s;pointer-events:none;"></div>

  </div>
  <div id="panel" style="background:#091510;border-left:1px solid #1e4a2a;padding:14px;display:flex;flex-direction:column;gap:10px;overflow-y:auto;"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
window.addEventListener('load', function(){

// ── 상수 ──────────────────────────────────────────────────────────────────
const NUMS=[0,32,15,19,4,21,2,25,17,34,6,27,13,36,11,30,8,23,10,5,24,16,33,1,20,14,31,9,22,18,29,7,28,12,35,3,26];
const REDS=new Set([1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36]);
const C1=[1,4,7,10,13,16,19,22,25,28,31,34];
const C2=[2,5,8,11,14,17,20,23,26,29,32,35];
const C3=[3,6,9,12,15,18,21,24,27,30,33,36];
const N=NUMS.length;
const SA=(Math.PI*2)/N; // 포켓당 각도

// ── 핵심 각도 유틸 ────────────────────────────────────────────────────────
function norm(a){ a%=Math.PI*2; return a<0?a+Math.PI*2:a; }

/**
 * 포켓 i의 중심이 휠 로컬 좌표계에서 갖는 각도.
 * wg.rotation.y = wAngle 이므로 Three.js 에서 y축 회전은
 * 월드 XZ 평면에서 각도가 -wAngle만큼 오프셋됨.
 *
 * 텍스처 생성 코드에서 포켓 i의 중심은:
 *   textureAngle = PI/2 - SA/2 - i*SA   (캔버스 좌표계)
 * Three.js XZ 평면에서 mesh.rotation.y = 0 일 때
 * 텍스처 angle θ → position (cos θ, 0, -sin θ) ... 아니면
 * CanvasTexture UV 방향을 확인해야 함.
 *
 * 가장 안전한 방법: 텍스처 그릴 때와 동일한 공식으로
 * "휠 로컬 각도"를 정의하고 일관되게 씀.
 *
 * 휠 로컬 각도 정의:
 *   localAngle(i) = PI/2 - SA/2 - i*SA
 *
 * 월드 각도 = wAngle + localAngle(i)  (Three.js y-rotation 방향 때문에 부호 주의)
 * Three.js CylinderGeometry에 CanvasTexture를 입히면
 * angle 0이 +X 방향, angle 증가 → 반시계(+Z 방향으로).
 * wg.rotation.y += 양수 → 시계방향(XZ 평면에서 -방향)으로 보임.
 *
 * 따라서: 월드 XZ 평면에서 포켓 i 의 각도 =
 *   norm(-wAngle + localAngle(i))   [three.js y-rotation 방향 반전]
 *
 * 이 값으로 공 위치(ballWorldAngle)와 비교하면 됨.
 */
function localAngle(i){
  return norm(Math.PI/2 - SA/2 - i*SA);
}

/**
 * 월드 XZ 평면에서 포켓 i 중심의 각도.
 * ballAngle = atan2(ball.z, ball.x) 와 직접 비교 가능.
 */
function worldAngle(i, wAng){
  // wg.rotation.y = wAng → 로컬 벡터 (cosθ, 0, sinθ) 가
  // Three.js y축 회전으로 월드에서는 cos(θ+wAng), sin(θ+wAng)
  // 그런데 CanvasTexture는 UV 기준이므로 실제로는
  // localAngle이 텍스처의 각도이고 mesh 회전이 더해짐.
  // 실측 기반: localAngle(i) 에 wAng 를 더하되 방향 부호 확인 필요.
  // Three.js rotation.y 양수 → XZ에서 CCW → X에서 Z 방향.
  // CanvasTexture: angle 증가 → CCW (canvas는 CW지만 Y flip 때문에 Three.js에선 CCW).
  // → 월드각도 = localAngle(i) + wAng  (둘 다 CCW 기준이면 단순 합산)
  return norm(localAngle(i) + wAng);
}

/**
 * 월드 각도 ballWorldAngle 에 가장 가까운 포켓 인덱스 반환.
 * Three.js atan2(z, x) 로 구한 공 각도와 직접 비교.
 */
function closestPocketIndex(ballWorldAngle, wAng){
  let best=-1, bestDiff=Infinity;
  for(let i=0;i<N;i++){
    const wa = worldAngle(i, wAng);
    let diff = Math.abs(norm(ballWorldAngle - wa));
    if(diff > Math.PI) diff = Math.PI*2 - diff;
    if(diff < bestDiff){ bestDiff=diff; best=i; }
  }
  return best;
}

// ── 상태 ─────────────────────────────────────────────────────────────────
let balance=10000, bets={}, chip=25, spinning=false, history=[];
let wAngle=0, bAngle=0, bRadius=3.85, bVel=0, wVel=0;
let phase='idleSpin', resultNum=0;

// settling 전용
// 목표: 공(bAngle)을 목표 포켓의 월드각도로 부드럽게 이동
let settleTargetWorldAngle = 0; // 목표 포켓의 월드각도 (스냅샷, 휠 정지 후 고정)
let settleWheelFrozen = false;  // 휠 완전 정지 여부

// ── UI 초기화 ─────────────────────────────────────────────────────────────
document.getElementById('panel').innerHTML=`
<div style="font-size:10px;color:#5a9a6a;text-transform:uppercase;letter-spacing:1px;">잔액 / 베팅</div>
<div style="display:flex;justify-content:space-between;font-size:13px;color:#aaa;"><span>잔액</span><span id="bal" style="color:#f0c040;font-weight:500;">₩10,000</span></div>
<div style="display:flex;justify-content:space-between;font-size:13px;color:#aaa;"><span>총 베팅</span><span id="tbet" style="color:#f0c040;font-weight:500;">₩0</span></div>
<div style="font-size:10px;color:#5a9a6a;text-transform:uppercase;letter-spacing:1px;">칩 선택</div>

<div style="font-size:10px;color:#5a9a6a;text-transform:uppercase;letter-spacing:1px;">숫자 (0–36)</div>
<div id="ng" style="display:grid;grid-template-columns:repeat(13,1fr);gap:2px;"></div>
<div style="font-size:10px;color:#5a9a6a;text-transform:uppercase;letter-spacing:1px;">열 베팅</div>
<div id="cg" style="display:grid;grid-template-columns:repeat(3,1fr);gap:3px;"></div>
<div style="font-size:10px;color:#5a9a6a;text-transform:uppercase;letter-spacing:1px;">외부 베팅</div>
<div id="og" style="display:grid;grid-template-columns:repeat(3,1fr);gap:3px;"></div>
<div style="display:flex;gap:6px;">
  <button id="sb" style="flex:1;padding:10px;font-size:14px;font-weight:500;border-radius:8px;cursor:pointer;border:none;background:#c8a826;color:#0d1f13;">스핀</button>
  <button id="cb" style="padding:10px 12px;font-size:13px;font-weight:500;border-radius:8px;cursor:pointer;background:#1a3a22;color:#5a9a6a;border:1px solid #1e4a2a;">초기화</button>
</div>
<div id="msg" style="font-size:12px;min-height:14px;text-align:center;color:#f0c040;"></div>
<div style="font-size:10px;color:#5a9a6a;text-transform:uppercase;letter-spacing:1px;">최근 결과</div>
<div id="hist" style="display:flex;flex-wrap:wrap;gap:3px;"></div>
<div style="display:flex;justify-content:space-between;font-size:12px;color:#aaa;"><span>총 수익</span><span id="profit" style="color:#f0c040;font-weight:500;">₩0</span></div>
`;

const chipDefs=[{v:1,bg:'#2a5ab8'},{v:5,bg:'#a0291b'},{v:10,bg:'#1e7a40'},{v:25,bg:'#6e2490'},{v:100,bg:'#b05010'}];
const chipsEl=document.getElementById('chips');
chipDefs.forEach(({v,bg})=>{
  const d=document.createElement('div');
  d.style.cssText=`width:38px;height:38px;border-radius:50%;background:${bg};border:2px dashed rgba(255,255,255,0.3);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;cursor:pointer;color:#fff;user-select:none;flex-shrink:0;`;
  d.textContent=v;
  if(v===25) d.style.border='2px solid #f0c040';
  d.addEventListener('click',()=>{
    chip=v;
    chipsEl.querySelectorAll('div').forEach(x=>x.style.border='2px dashed rgba(255,255,255,0.3)');
    d.style.border='2px solid #f0c040';
  });
  chipsEl.appendChild(d);
});

function pb(btn){
  if(spinning)return;
  const cost=chip;
  if(balance<cost){setMsg('잔액 부족!');return;}
  const k=btn.dataset.bet;
  balance-=cost; bets[k]=(bets[k]||0)+cost;
  btn.style.background='#1a4040'; btn.style.borderColor='#3a9a6a';
  let sp=btn.querySelector('span.bc');
  if(!sp){sp=document.createElement('span');sp.className='bc';sp.style.cssText='position:absolute;top:1px;right:1px;font-size:8px;color:#f0c040;';btn.appendChild(sp);}
  sp.textContent=bets[k];
  updUI();
}

const ng=document.getElementById('ng');
const z0=document.createElement('button');
z0.textContent='0'; z0.dataset.bet='n0';
z0.style.cssText='grid-column:span 2;padding:4px 1px;font-size:10px;font-weight:500;border:1px solid #1e4a2a;background:#0d3a18;color:#5ddd8a;cursor:pointer;border-radius:2px;position:relative;width:100%;';
z0.addEventListener('click',function(){pb(this);}); ng.appendChild(z0);
for(let i=1;i<=36;i++){
  const b=document.createElement('button');
  b.textContent=i; b.dataset.bet='n'+i;
  b.style.cssText='padding:4px 1px;font-size:10px;font-weight:500;border:1px solid #1e4a2a;background:#0d2a18;color:'+(REDS.has(i)?'#ff8080':'#bbb')+';cursor:pointer;border-radius:2px;position:relative;width:100%;';
  b.addEventListener('click',function(){pb(this);}); ng.appendChild(b);
}

[['col1','1열','2:1'],['col2','2열','2:1'],['col3','3열','2:1']].forEach(([k,l,o])=>{
  const b=document.createElement('button'); b.dataset.bet=k;
  b.style.cssText='padding:6px 2px;font-size:11px;font-weight:500;border:1px solid #1e4a2a;background:#0d2a18;color:#bbb;cursor:pointer;border-radius:4px;position:relative;width:100%;';
  b.innerHTML=l+'<br><span style="font-size:9px;color:#5a9a6a;">'+o+'</span>';
  b.addEventListener('click',function(){pb(this);}); document.getElementById('cg').appendChild(b);
});

[['lo','1–18','1:1'],['hi','19–36','1:1'],['even','짝수','1:1'],['odd','홀수','1:1'],
 ['red','빨강','1:1'],['blk','검정','1:1'],
 ['d1','1–12','2:1'],['d2','13–24','2:1'],['d3','25–36','2:1']].forEach(([k,l,o])=>{
  const ex = k==='red'?'color:#ff9090;':k==='blk'?'color:#888;':'';
  const b=document.createElement('button'); b.dataset.bet=k;
  b.style.cssText='padding:6px 2px;font-size:11px;font-weight:500;border:1px solid #1e4a2a;background:#0d2a18;color:#bbb;cursor:pointer;border-radius:4px;position:relative;width:100%;'+ex;
  b.innerHTML=l+'<br><span style="font-size:9px;color:#5a9a6a;">'+o+'</span>';
  b.addEventListener('click',function(){pb(this);}); document.getElementById('og').appendChild(b);
});

document.getElementById('sb').addEventListener('click', doSpin);
document.getElementById('cb').addEventListener('click',()=>{
  if(spinning)return;
  Object.values(bets).forEach(v=>{balance+=v;}); bets={};
  document.querySelectorAll('#ng button,#cg button,#og button').forEach(b=>{
    b.style.background='#0d2a18'; b.style.borderColor='#1e4a2a';
    const s=b.querySelector('span.bc'); if(s)s.remove();
  });
  updUI(); setMsg('');
});

function updUI(){
  document.getElementById('bal').textContent='₩'+balance.toLocaleString();
  const tb=Object.values(bets).reduce((a,v)=>a+v,0);
  document.getElementById('tbet').textContent='₩'+tb.toLocaleString();
  const p=balance-10000, pe=document.getElementById('profit');
  pe.textContent=(p>=0?'+':'')+'₩'+p.toLocaleString();
  pe.style.color=p>=0?'#6ddd9d':'#ff6060';
}
function setMsg(m,c){const e=document.getElementById('msg');e.textContent=m;e.style.color=c||'#f0c040';}
function showBanner(t){
  const b=document.getElementById('rb'); b.textContent=t; b.style.opacity='1';
  setTimeout(()=>{b.style.opacity='0';},3000);
}

// ── Three.js 씬 ───────────────────────────────────────────────────────────
const cw=document.getElementById('cw');
const canvas=document.getElementById('c');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;

const scene=new THREE.Scene();
scene.background=new THREE.Color(0x0a1810);
scene.fog=new THREE.Fog(0x071109,10,24);
const camera=new THREE.PerspectiveCamera(42,1,0.1,100);
camera.position.set(0,10,7); camera.lookAt(0,0,0);

function doResize(){
  const w=cw.clientWidth||500, h=cw.clientHeight||500;
  renderer.setSize(w,h,false);
  camera.aspect=w/h; camera.updateProjectionMatrix();
}

scene.add(new THREE.AmbientLight(0xf6ead6,0.42));
const hemi=new THREE.HemisphereLight(0xd8f0da,0x140d08,0.55);
scene.add(hemi);
const dl=new THREE.DirectionalLight(0xfff1d6,1.25);
dl.position.set(4,12,5); dl.castShadow=true;
dl.shadow.mapSize.width=1024; dl.shadow.mapSize.height=1024;
dl.shadow.camera.near=1; dl.shadow.camera.far=30;
dl.shadow.camera.left=-8; dl.shadow.camera.right=8;
dl.shadow.camera.top=8; dl.shadow.camera.bottom=-8;
scene.add(dl);
const rimLight=new THREE.PointLight(0xc8a826,0.55,16);
rimLight.position.set(-3,3.2,-2.5);
scene.add(rimLight);

const floor=new THREE.Mesh(
  new THREE.CircleGeometry(7.4,80),
  new THREE.MeshStandardMaterial({color:0x08110b,roughness:0.98,metalness:0.02})
);
floor.rotation.x=-Math.PI/2; floor.position.y=-0.55; floor.receiveShadow=true; scene.add(floor);

const tbl=new THREE.Mesh(
  new THREE.CylinderGeometry(5.35,5.15,0.32,80),
  new THREE.MeshStandardMaterial({color:0x0f2a18,roughness:0.9,metalness:0.08})
);
tbl.position.y=-0.44; tbl.receiveShadow=true; scene.add(tbl);

const outerRim=new THREE.Mesh(
  new THREE.TorusGeometry(4.2,0.16,16,120),
  new THREE.MeshStandardMaterial({color:0x9b7630,roughness:0.38,metalness:0.72})
);
outerRim.rotation.x=Math.PI/2; outerRim.position.y=0.14; outerRim.castShadow=true; scene.add(outerRim);

const bowl=new THREE.Mesh(
  new THREE.CylinderGeometry(4.35,3.82,0.58,80,1,true),
  new THREE.MeshStandardMaterial({color:0x2a160c,roughness:0.72,metalness:0.1,side:THREE.DoubleSide})
);
bowl.position.y=-0.12; scene.add(bowl);

const track=new THREE.Mesh(
  new THREE.TorusGeometry(3.88,0.3,16,120),
  new THREE.MeshStandardMaterial({color:0x4a2a14,roughness:0.6,metalness:0.18})
);
track.rotation.x=Math.PI/2; scene.add(track);

const wg=new THREE.Group(); scene.add(wg);
const disc=new THREE.Mesh(
  new THREE.CylinderGeometry(3.5,3.5,0.24,96),
  new THREE.MeshStandardMaterial({color:0x22432a,roughness:0.78,metalness:0.12})
);
disc.castShadow=true; wg.add(disc);

function makeWheelTex(){
  const cv=document.createElement('canvas'); cv.width=cv.height=1024;
  const ctx=cv.getContext('2d');
  const cx=512,cy=512,r=498;
  const bgGrad=ctx.createRadialGradient(cx,cy,120,cx,cy,r);
  bgGrad.addColorStop(0,'#2c5938');
  bgGrad.addColorStop(0.68,'#1c3d26');
  bgGrad.addColorStop(1,'#102114');
  ctx.fillStyle=bgGrad; ctx.fillRect(0,0,1024,1024);
  ctx.strokeStyle='rgba(240,205,120,0.95)'; ctx.lineWidth=18;
  ctx.beginPath(); ctx.arc(cx,cy,r-10,0,Math.PI*2); ctx.stroke();
  for(let i=0;i<N;i++){
    // 텍스처 좌표계에서 포켓 i의 중심 각도
    const mid = Math.PI/2 - SA/2 - i*SA;
    const a = -(mid + SA/2);
    const a2= -(mid - SA/2);
    const n=NUMS[i];
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,r,a,a2); ctx.closePath();
    ctx.fillStyle=n===0?'#279a48':REDS.has(n)?'#b32020':'#121212'; ctx.fill();
    ctx.strokeStyle='rgba(245,220,150,0.82)'; ctx.lineWidth=3.2; ctx.stroke();
    const tx=cx+(r-75)*Math.cos(mid), ty=cy-(r-75)*Math.sin(mid);
    ctx.save(); ctx.translate(tx,ty); ctx.rotate(-mid+Math.PI/2);
    ctx.fillStyle='#fffdf5'; ctx.font='bold 28px Georgia,serif';
    ctx.strokeStyle='rgba(0,0,0,0.55)'; ctx.lineWidth=4;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.strokeText(n,0,0); ctx.fillText(n,0,0); ctx.restore();
  }
  ctx.strokeStyle='rgba(255,245,220,0.35)'; ctx.lineWidth=10;
  ctx.beginPath(); ctx.arc(cx,cy,180,0,Math.PI*2); ctx.stroke();
  return new THREE.CanvasTexture(cv);
}

const top=new THREE.Mesh(
  new THREE.CylinderGeometry(3.5,3.5,0.01,96),
  new THREE.MeshBasicMaterial({map:makeWheelTex()})
);
top.position.y=0.118; wg.add(top);

const innerRim=new THREE.Mesh(
  new THREE.TorusGeometry(3.52,0.06,12,120),
  new THREE.MeshStandardMaterial({color:0xd1a84a,roughness:0.3,metalness:0.78})
);
innerRim.rotation.x=Math.PI/2; innerRim.position.y=0.12; wg.add(innerRim);

const hubBase=new THREE.Mesh(
  new THREE.CylinderGeometry(0.48,0.72,0.55,32),
  new THREE.MeshStandardMaterial({color:0xa88338,roughness:0.34,metalness:0.8})
);
hubBase.position.y=0.25; hubBase.castShadow=true; wg.add(hubBase);

const hubTop=new THREE.Mesh(
  new THREE.SphereGeometry(0.28,24,24),
  new THREE.MeshStandardMaterial({color:0xd8b35d,roughness:0.22,metalness:0.86})
);
hubTop.position.y=0.58; hubTop.castShadow=true; wg.add(hubTop);

const ballMesh=new THREE.Mesh(
  new THREE.SphereGeometry(0.14,24,24),
  new THREE.MeshStandardMaterial({color:0xf5f5f2,roughness:0.18,metalness:0.42})
);
ballMesh.castShadow=true; scene.add(ballMesh);

const ballShadow=new THREE.Mesh(
  new THREE.CircleGeometry(0.2,24),
  new THREE.MeshBasicMaterial({color:0x000000,transparent:true,opacity:0.18})
);
ballShadow.rotation.x=-Math.PI/2; ballShadow.position.y=-0.43; scene.add(ballShadow);

function updateBallMesh(){
  const h=0.12+(bRadius-2.85)*0.25;
  ballMesh.position.set(Math.cos(bAngle)*bRadius, Math.max(h,0.15), Math.sin(bAngle)*bRadius);
  ballShadow.position.x=ballMesh.position.x*0.98;
  ballShadow.position.z=ballMesh.position.z*0.98;
  const shadowScale=0.75+Math.min(0.55,(ballMesh.position.y-0.12)*1.2);
  ballShadow.scale.set(shadowScale,shadowScale,1);
  ballShadow.material.opacity=Math.max(0.08,0.22-(ballMesh.position.y-0.12)*0.18);
}

// ── 스핀 진입 ─────────────────────────────────────────────────────────────
function doSpin(){
  if(spinning)return;
  const tb=Object.values(bets).reduce((a,v)=>a+v,0);
  if(tb===0){setMsg('베팅을 먼저 하세요!');return;}

  spinning=true;
  document.getElementById('sb').disabled=true;
  document.getElementById('rb').style.opacity='0';
  setMsg('');

  wVel = 0.015 + Math.random()*0.005;  // 휠: CCW 양수
  bVel = -(0.12 + Math.random()*0.04); // 공: CW 음수 (반대 방향)
  bRadius = 3.85;
  phase='spinning';
  settleWheelFrozen = false;
}

// ── 정산 ──────────────────────────────────────────────────────────────────
function finish(){
  phase='resting'; spinning=false; wVel=0; bVel=0;
  document.getElementById('sb').disabled=false;

  // 이 시점에서 공의 실제 월드 각도로 포켓 결정 (최종 확정)
  const ballWorldAngle = norm(Math.atan2(ballMesh.position.z, ballMesh.position.x));
  const finalPocketIdx = closestPocketIndex(ballWorldAngle, wAngle);
  resultNum = NUMS[finalPocketIdx];

  const betTotal=Object.values(bets).reduce((a,v)=>a+v,0);
  const payout=calcPayout(resultNum);
  balance+=payout;
  const net=payout-betTotal;
  const col=resultNum===0?'초록':REDS.has(resultNum)?'빨강':'검정';
  showBanner(resultNum+' ('+col+')');
  if(payout>0) setMsg('+₩'+net.toLocaleString()+' 획득!','#6ddd9d');
  else setMsg('₩'+betTotal.toLocaleString()+' 잃었습니다.','#ff6060');

  history.unshift(resultNum); if(history.length>18)history.pop();
  document.getElementById('hist').innerHTML=history.map(h=>{
    const c=h===0?'#1a6a30':REDS.has(h)?'#8a1515':'#222';
    return `<div style="width:22px;height:22px;border-radius:50%;background:${c};display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:500;color:#fff;border:1px solid rgba(255,255,255,0.15);">${h}</div>`;
  }).join('');

  bets={};
  document.querySelectorAll('#ng button,#cg button,#og button').forEach(b=>{
    b.style.background='#0d2a18'; b.style.borderColor='#1e4a2a';
    const s=b.querySelector('span.bc'); if(s)s.remove();
  });
  updUI();
  if(balance<=0){balance=10000;setTimeout(()=>setMsg('₩10,000 충전!','#f0c040'),300);updUI();}
}

function calcPayout(r){
  let w=0; const isR=REDS.has(r);
  Object.entries(bets).forEach(([k,a])=>{
    if(k==='n'+r)w+=a*36;
    else if(k==='red'&&isR)w+=a*2;
    else if(k==='blk'&&r>0&&!isR)w+=a*2;
    else if(k==='even'&&r>0&&r%2===0)w+=a*2;
    else if(k==='odd'&&r%2===1)w+=a*2;
    else if(k==='lo'&&r>=1&&r<=18)w+=a*2;
    else if(k==='hi'&&r>=19&&r<=36)w+=a*2;
    else if(k==='d1'&&r>=1&&r<=12)w+=a*3;
    else if(k==='d2'&&r>=13&&r<=24)w+=a*3;
    else if(k==='d3'&&r>=25&&r<=36)w+=a*3;
    else if(k==='col1'&&C1.includes(r))w+=a*3;
    else if(k==='col2'&&C2.includes(r))w+=a*3;
    else if(k==='col3'&&C3.includes(r))w+=a*3;
  });
  return w;
}

// ── 카메라 드래그 ──────────────────────────────────────────────────────────
let isDrag=false, pm={x:0,y:0}, theta=0, phi=0.85;
function setCam(){
  const r=16;
  camera.position.set(Math.sin(theta)*Math.cos(phi)*r,Math.sin(phi)*r,Math.cos(theta)*Math.cos(phi)*r);
  camera.lookAt(0,0,0);
}
setCam();
cw.addEventListener('mousedown',e=>{isDrag=true;pm={x:e.clientX,y:e.clientY};});
window.addEventListener('mouseup',()=>{isDrag=false;});
window.addEventListener('mousemove',e=>{
  if(!isDrag)return;
  theta-=(e.clientX-pm.x)*0.007;
  phi=Math.max(0.25,Math.min(1.45,phi-(e.clientY-pm.y)*0.007));
  pm={x:e.clientX,y:e.clientY}; setCam();
});

// ── 메인 루프 ─────────────────────────────────────────────────────────────
let settleFrames=0;

function animate(){
  requestAnimationFrame(animate);

  if(phase==='spinning'){
    wAngle += wVel;
    bAngle += bVel;

    wVel *= 0.9992;
    bVel *= 0.992;

    // 공이 안쪽으로 내려오기 시작
    if(Math.abs(bVel) < 0.05){
      bRadius += (3.15 - bRadius) * 0.02;
    }

    // settling 진입: 공 속도가 충분히 줄었을 때
    if(Math.abs(bVel) < 0.018){
      phase='settling';
      settleFrames=0;
      settleWheelFrozen=false;

      // 이 순간 공의 월드 각도로 목표 포켓 결정
      const ballWorldAngle = norm(Math.atan2(
        Math.sin(bAngle)*bRadius,   // z
        Math.cos(bAngle)*bRadius    // x
      ));
      // 사실 ballWorldAngle = norm(bAngle)
      const bwa = norm(bAngle);
      const pocketIdx = closestPocketIndex(bwa, wAngle);
      resultNum = NUMS[pocketIdx]; // 미리 결과 결정 (확정)

      // 목표 월드 각도 = 이 포켓의 현재 월드 각도
      // 휠이 거의 정지했으므로 wAngle 변화가 미미함
      settleTargetWorldAngle = worldAngle(pocketIdx, wAngle);
    }

    wg.rotation.y = wAngle;
    updateBallMesh();
  }
  else if(phase==='settling'){
    settleFrames++;

    // 휠 감속
    wVel *= 0.975;
    if(Math.abs(wVel) < 0.0001) { wVel=0; settleWheelFrozen=true; }
    wAngle += wVel;
    wg.rotation.y = wAngle;

    // 목표 포켓 월드 각도: 휠이 움직이므로 매 프레임 갱신
    // (결정된 포켓 인덱스는 고정, 월드 각도만 휠 회전 따라 갱신)
    // 포켓 인덱스를 저장해두지 않았으므로 closestPocketIndex로 재계산하지 않고
    // resultNum 에서 NUMS 배열을 역방향 탐색으로 인덱스 복원
    const pocketIdx = NUMS.indexOf(resultNum);
    const targetWA = worldAngle(pocketIdx, wAngle);

    // 공의 현재 월드 각도
    const curBallAngle = norm(bAngle);

    // 목표까지의 최단 경로 (부호 있음)
    let delta = norm(targetWA - curBallAngle);
    if(delta > Math.PI) delta -= Math.PI*2; // -π ~ +π

    // 공은 원래 bVel 음수(CW) 방향으로 왔음.
    // 멈출 때 짧은 방향으로 이동 (방향 전환 최소화)
    // 단, delta가 작으면 그냥 보정
    const speed = Math.min(Math.abs(delta), Math.max(0.008, Math.abs(delta)*0.15 + 0.002));

    if(Math.abs(delta) < 0.003){
      // 도달 완료
      bAngle = norm(targetWA);
      bVel = 0;
      bRadius = 2.85;
      updateBallMesh();
      finish();
      return;
    }

    bVel = Math.sign(delta) * speed;
    bAngle = norm(bAngle + bVel);
    bRadius += (2.85 - bRadius) * 0.07;
    updateBallMesh();
  }
  else if(phase==='idleSpin'){
    wAngle += 0.002;
    wg.rotation.y = wAngle;
  }

  renderer.render(scene, camera);
}

doResize();
updUI();
animate();
window.addEventListener('resize', doResize);
});
</script>
