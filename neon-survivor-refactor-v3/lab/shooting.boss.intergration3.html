<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Structured Shooting Boss Demo</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #050816;
      font-family: system-ui, sans-serif;
    }
    canvas {
      display: block;
      background: radial-gradient(circle at center, rgba(24,34,70,0.28), rgba(2,4,12,1));
    }
    #controlPanel {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 10;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      padding: 10px 12px;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(4,8,20,0.72);
      backdrop-filter: blur(8px);
      border-radius: 12px;
      color: #fff;
      font-size: 13px;
    }
    #controlPanel label {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    #controlPanel select, #controlPanel button {
      height: 32px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.08);
      color: #fff;
      padding: 0 10px;
    }
    #controlPanel button { cursor: pointer; }
  </style>
</head>
<body>
<canvas id="game"></canvas>
<div id="controlPanel">
  <label>Boss
    <select id="bossSelect"></select>
  </label>
  <label>Start Phase
    <select id="phaseSelect"></select>
  </label>
  <button id="applySelection">Apply</button>
  <button id="resetSelection">Reset</button>
</div>
<script>
(() => {
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");

  function resize() {
    canvas.width = innerWidth;
    canvas.height = innerHeight;
  }
  addEventListener("resize", resize);
  resize();

  const TAU = Math.PI * 2;
  const keys = new Set();
  addEventListener("keydown", (e) => keys.add(e.key.toLowerCase()));
  addEventListener("keyup", (e) => keys.delete(e.key.toLowerCase()));

  const bullets = [];
  const hazards = [];
  const projectiles = [];
  const playerBullets = [];
  const effects = [];
  const texts = [];

  const Utils = {
    clamp(v, a, b) { return Math.max(a, Math.min(b, v)); },
    lerp(a, b, t) { return a + (b - a) * t; },
    rand(a, b) { return Math.random() * (b - a) + a; },
    dist(ax, ay, bx, by) { return Math.hypot(bx - ax, by - ay); },
    angleTo(ax, ay, bx, by) { return Math.atan2(by - ay, bx - ax); },
    normalize(x, y) {
      const len = Math.hypot(x, y) || 1;
      return { x: x / len, y: y / len };
    },
    angleDelta(a, b) {
      return Math.atan2(Math.sin(a - b), Math.cos(a - b));
    },
    linePointDistance(x1, y1, x2, y2, px, py) {
      const dx = x2 - x1;
      const dy = y2 - y1;
      const lenSq = dx * dx + dy * dy || 1;
      let t = ((px - x1) * dx + (py - y1) * dy) / lenSq;
      t = Utils.clamp(t, 0, 1);
      const cx = x1 + dx * t;
      const cy = y1 + dy * t;
      return Math.hypot(px - cx, py - cy);
    },
    circleLineHit(cx, cy, r, x1, y1, x2, y2, lineWidth) {
      return Utils.linePointDistance(x1, y1, x2, y2, cx, cy) <= r + lineWidth * 0.5;
    },
    pointInFan(px, py, ox, oy, facing, radius, halfAngle) {
      const dx = px - ox;
      const dy = py - oy;
      const d = Math.hypot(dx, dy);
      if (d > radius) return false;
      const a = Math.atan2(dy, dx);
      return Math.abs(Utils.angleDelta(a, facing)) <= halfAngle;
    }
  };

  function drawText(text, x, y, color = "#fff", size = 14, align = "left", alpha = 1) {
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = color;
    ctx.font = `bold ${size}px sans-serif`;
    ctx.textAlign = align;
    ctx.fillText(text, x, y);
    ctx.restore();
  }

  function drawGlowCircle(x, y, r, color, alpha = 1) {
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.shadowBlur = 20;
    ctx.shadowColor = color;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, TAU);
    ctx.fill();
    ctx.restore();
  }

  class FloatText {
    constructor(text, x, y, color = "#fff") {
      this.text = text;
      this.x = x;
      this.y = y;
      this.color = color;
      this.life = 0.8;
      this.maxLife = 0.8;
    }
    update(dt) {
      this.life -= dt;
      this.y -= 28 * dt;
      return this.life > 0;
    }
    draw() {
      drawText(this.text, this.x, this.y, this.color, 14, "center", this.life / this.maxLife);
    }
  }

  class Spark {
    constructor(x, y, color = "#ffd166") {
      this.x = x;
      this.y = y;
      this.vx = Utils.rand(-180, 180);
      this.vy = Utils.rand(-180, 180);
      this.life = Utils.rand(0.18, 0.42);
      this.maxLife = this.life;
      this.size = Utils.rand(2, 4);
      this.color = color;
    }
    update(dt) {
      this.life -= dt;
      this.x += this.vx * dt;
      this.y += this.vy * dt;
      this.vx *= 0.92;
      this.vy *= 0.92;
      return this.life > 0;
    }
    draw() {
      const t = this.life / this.maxLife;
      ctx.save();
      ctx.globalAlpha = t;
      ctx.shadowBlur = 12;
      ctx.shadowColor = this.color;
      ctx.fillStyle = this.color;
      ctx.fillRect(this.x, this.y, this.size, this.size);
      ctx.restore();
    }
  }

  class RingEffect {
    constructor(x, y, r = 20, color = "#7df9ff", life = 0.45) {
      this.x = x;
      this.y = y;
      this.r = r;
      this.life = life;
      this.maxLife = life;
      this.color = color;
    }
    update(dt) {
      this.life -= dt;
      this.r += 150 * dt;
      return this.life > 0;
    }
    draw() {
      const t = this.life / this.maxLife;
      ctx.save();
      ctx.globalAlpha = t * 0.9;
      ctx.strokeStyle = this.color;
      ctx.lineWidth = 3;
      ctx.shadowBlur = 20;
      ctx.shadowColor = this.color;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.r, 0, TAU);
      ctx.stroke();
      ctx.restore();
    }
  }

  class Bullet {
    constructor(x, y, vx, vy, r = 7, color = "#ff7aa2", life = 8, damage = 10) {
      this.x = x;
      this.y = y;
      this.vx = vx;
      this.vy = vy;
      this.r = r;
      this.color = color;
      this.life = life;
      this.damage = damage;
    }
    update(dt, player) {
      this.life -= dt;
      this.x += this.vx * dt;
      this.y += this.vy * dt;
      if (Utils.dist(this.x, this.y, player.x, player.y) < this.r + player.radius) {
        player.damage(this.damage);
        for (let i = 0; i < 8; i++) effects.push(new Spark(this.x, this.y, this.color));
        return false;
      }
      if (this.x < -50 || this.x > canvas.width + 50 || this.y < -50 || this.y > canvas.height + 50) return false;
      return this.life > 0;
    }
    draw() {
      drawGlowCircle(this.x, this.y, this.r, this.color, 0.9);
      ctx.save();
      ctx.strokeStyle = "#fff";
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.r + 2, 0, TAU);
      ctx.stroke();
      ctx.restore();
    }
  }

  class RotatingBullet extends Bullet {
    constructor(cx, cy, angle, orbitR, radialSpeed, spin, r = 6, color = "#9a7dff") {
      super(cx, cy, 0, 0, r, color, 4.0, 10);
      this.cx = cx;
      this.cy = cy;
      this.angle = angle;
      this.orbitR = orbitR;
      this.radialSpeed = radialSpeed;
      this.spin = spin;
    }
    update(dt, player) {
      this.life -= dt;
      this.angle += this.spin * dt;
      this.orbitR += this.radialSpeed * dt;
      this.x = this.cx + Math.cos(this.angle) * this.orbitR;
      this.y = this.cy + Math.sin(this.angle) * this.orbitR;
      if (Utils.dist(this.x, this.y, player.x, player.y) < this.r + player.radius) {
        player.damage(this.damage);
        return false;
      }
      return this.life > 0;
    }
  }

  class DelayedBlast {
    constructor(x, y, delay = 1.0, radius = 68, color = "#ff8fab", followPlayer = false, followDuration = 0.8) {
      this.x = x;
      this.y = y;
      this.delay = delay;
      this.maxDelay = delay;
      this.radius = radius;
      this.color = color;
      this.followPlayer = followPlayer;
      this.followDuration = followDuration;
      this.exploded = false;
      this.lifeAfter = 0.18;
    }
    update(dt, player) {
      if (!this.exploded) {
        this.delay -= dt;
        if (this.followPlayer && this.delay > this.maxDelay - this.followDuration) {
          this.x = Utils.lerp(this.x, player.x, 0.08);
          this.y = Utils.lerp(this.y, player.y, 0.08);
        }
        if (this.delay <= 0) {
          this.exploded = true;
          for (let i = 0; i < 18; i++) effects.push(new Spark(this.x, this.y, this.color));
          effects.push(new RingEffect(this.x, this.y, 18, this.color, 0.28));
          if (Utils.dist(this.x, this.y, player.x, player.y) < this.radius + player.radius) {
            player.damage(18);
          }
        }
        return true;
      }
      this.lifeAfter -= dt;
      return this.lifeAfter > 0;
    }
    draw() {
      if (!this.exploded) {
        const t = Math.max(0, this.delay / this.maxDelay);
        ctx.save();
        ctx.globalAlpha = 0.25 + (1 - t) * 0.45;
        ctx.strokeStyle = this.color;
        ctx.lineWidth = 3;
        ctx.setLineDash([10, 8]);
        ctx.shadowBlur = 16;
        ctx.shadowColor = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, TAU);
        ctx.stroke();
        ctx.restore();
        drawText((this.delay + 0.05).toFixed(1), this.x, this.y + 4, "#fff", 14, "center");
      } else {
        ctx.save();
        ctx.globalAlpha = this.lifeAfter / 0.18 * 0.35;
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, TAU);
        ctx.fill();
        ctx.restore();
      }
    }
  }

  class SafeLaneCurtain {
    constructor({ centerX, centerY, startAngle, laneWidth, color = "#ff6bb5", speed = 180, count = 42, radius = 6 }) {
      const step = TAU / count;
      for (let i = 0; i < count; i++) {
        const a = i * step;
        const diff = Utils.angleDelta(a, startAngle);
        if (Math.abs(diff) < laneWidth * 0.5) continue;
        bullets.push(new Bullet(centerX, centerY, Math.cos(a) * speed, Math.sin(a) * speed, radius, color, 6, 12));
      }
    }
    update() { return false; }
    draw() {}
  }

  class PlayerBullet {
    constructor(x, y, angle, speed = 560, damage = 12, color = "#9efcff") {
      this.x = x;
      this.y = y;
      this.vx = Math.cos(angle) * speed;
      this.vy = Math.sin(angle) * speed;
      this.angle = angle;
      this.radius = 4;
      this.damage = damage;
      this.life = 1.6;
      this.color = color;
    }
    update(dt) {
      this.life -= dt;
      this.x += this.vx * dt;
      this.y += this.vy * dt;
      if (this.x < -40 || this.x > canvas.width + 40 || this.y < -40 || this.y > canvas.height + 40) return false;
      return this.life > 0;
    }
    draw() {
      ctx.save();
      ctx.translate(this.x, this.y);
      ctx.rotate(this.angle);
      ctx.shadowBlur = 12;
      ctx.shadowColor = this.color;
      ctx.fillStyle = this.color;
      ctx.fillRect(-2, -7, 4, 14);
      ctx.restore();
    }
  }

  class Player {
    constructor(x, y) {
      this.x = x;
      this.y = y;
      this.radius = 14;
      this.speed = 280;
      this.hp = 100;
      this.hitFlash = 0;
      this.dashTime = 0;
      this.dashCooldown = 0;
      this.facing = -Math.PI / 2;
      this.fireCooldown = 0;
      this.fireRate = 0.12;
    }
    update(dt) {
      let dx = 0, dy = 0;
      if (keys.has("w") || keys.has("arrowup")) dy -= 1;
      if (keys.has("s") || keys.has("arrowdown")) dy += 1;
      if (keys.has("a") || keys.has("arrowleft")) dx -= 1;
      if (keys.has("d") || keys.has("arrowright")) dx += 1;
      const dir = Utils.normalize(dx, dy);
      if (dx || dy) this.facing = Math.atan2(dir.y, dir.x);

      if ((keys.has("shift") || keys.has(" ")) && this.dashCooldown <= 0) {
        this.dashTime = 0.14;
        this.dashCooldown = 0.6;
        for (let i = 0; i < 10; i++) effects.push(new Spark(this.x, this.y, "#7df9ff"));
      }

      const dashMul = this.dashTime > 0 ? 2.8 : 1;
      this.x += dir.x * this.speed * dashMul * dt;
      this.y += dir.y * this.speed * dashMul * dt;
      this.x = Utils.clamp(this.x, 18, canvas.width - 18);
      this.y = Utils.clamp(this.y, 18, canvas.height - 18);
      this.dashTime = Math.max(0, this.dashTime - dt);
      this.dashCooldown = Math.max(0, this.dashCooldown - dt);
      this.hitFlash = Math.max(0, this.hitFlash - dt);
      this.fireCooldown = Math.max(0, this.fireCooldown - dt);

      const firing = keys.has("j") || keys.has("z") || keys.has("enter");
      if (firing && this.fireCooldown <= 0) this.fire();
    }
    fire() {
      this.fireCooldown = this.fireRate;
      const angle = this.facing;
      const side = { x: -Math.sin(angle), y: Math.cos(angle) };
      const muzzleX = this.x + Math.cos(angle) * 18;
      const muzzleY = this.y + Math.sin(angle) * 18;
      playerBullets.push(new PlayerBullet(muzzleX + side.x * 5, muzzleY + side.y * 5, angle));
      playerBullets.push(new PlayerBullet(muzzleX - side.x * 5, muzzleY - side.y * 5, angle));
      for (let i = 0; i < 2; i++) effects.push(new Spark(muzzleX, muzzleY, "#9efcff"));
    }

    damage(amount) {
      if (this.dashTime > 0.02) return;
      this.hp = Math.max(0, this.hp - amount);
      this.hitFlash = 0.18;
      for (let i = 0; i < 8; i++) effects.push(new Spark(this.x, this.y, "#ff7a7a"));
      texts.push(new FloatText(`-${amount}`, this.x, this.y - 18, "#ff8fab"));
    }
    draw() {
      const c = this.hitFlash > 0 ? "#ff6b6b" : "#66f2ff";
      drawGlowCircle(this.x, this.y, this.radius, c, 1);
      const tipX = this.x + Math.cos(this.facing) * 22;
      const tipY = this.y + Math.sin(this.facing) * 22;
      ctx.save();
      ctx.strokeStyle = "#fff";
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.radius + 4, 0, TAU);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(this.x, this.y);
      ctx.lineTo(tipX, tipY);
      ctx.stroke();
      ctx.restore();
      if (this.dashTime > 0) {
        ctx.save();
        ctx.globalAlpha = 0.35;
        ctx.strokeStyle = "#7df9ff";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius + 10 + (0.14 - this.dashTime) * 100, 0, TAU);
        ctx.stroke();
        ctx.restore();
      }
    }
  }


  class AfterImage {
    constructor(x, y, radius, angle, color, life = 0.15) {
      this.x = x;
      this.y = y;
      this.radius = radius;
      this.angle = angle;
      this.color = color;
      this.life = life;
      this.maxLife = life;
    }
    update(dt) {
      this.life -= dt;
      return this.life > 0;
    }
    draw() {
      const t = this.life / this.maxLife;
      ctx.save();
      ctx.globalAlpha = t * 0.3;
      ctx.shadowBlur = 16;
      ctx.shadowColor = this.color;
      ctx.fillStyle = this.color;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.radius, 0, TAU);
      ctx.fill();
      ctx.strokeStyle = "#ffffff";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(this.x, this.y);
      ctx.lineTo(this.x + Math.cos(this.angle) * this.radius * 1.2, this.y + Math.sin(this.angle) * this.radius * 1.2);
      ctx.stroke();
      ctx.restore();
    }
  }

  class SlashEffect {
    constructor({ x, y, startAngle, endAngle, color = "#ffffff", life = 0.14, scale = 1 }) {
      this.x = x;
      this.y = y;
      this.startAngle = startAngle;
      this.endAngle = endAngle;
      this.color = color;
      this.life = life;
      this.maxLife = life;
      this.scale = scale;
      this.innerRadius = 20 * scale;
      this.outerRadius = 74 * scale;
    }
    update(dt) {
      this.life -= dt;
      return this.life > 0;
    }
    draw() {
      const t = this.life / this.maxLife;
      const p = 1 - t;
      const innerR = this.innerRadius + p * 10 * this.scale;
      const outerR = this.outerRadius + p * 18 * this.scale;
      const alpha = Math.pow(t, 0.6);
      ctx.save();
      ctx.translate(this.x, this.y);
      const layers = [
        ["#7df9ff", alpha * 0.22, innerR, outerR, this.startAngle, this.endAngle, 24],
        ["#9a7dff", alpha * 0.18, innerR + 4, outerR - 6, this.startAngle + 0.02, this.endAngle - 0.02, 20],
        [this.color, alpha * 0.9, innerR + 6, outerR - 12, this.startAngle + 0.04, this.endAngle - 0.04, 16]
      ];
      for (const [fill, a, inR, outR, sa, ea, blur] of layers) {
        ctx.save();
        ctx.globalAlpha = a;
        ctx.shadowBlur = blur;
        ctx.shadowColor = fill;
        ctx.fillStyle = fill;
        ctx.beginPath();
        ctx.arc(0, 0, outR, sa, ea, false);
        ctx.arc(0, 0, inR, ea, sa, true);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      }
      ctx.save();
      ctx.globalAlpha = alpha * 0.9;
      ctx.strokeStyle = "#ffffff";
      ctx.lineWidth = 2;
      ctx.shadowBlur = 12;
      ctx.shadowColor = "#ffffff";
      ctx.beginPath();
      ctx.arc(0, 0, (innerR + outerR) * 0.5, this.startAngle + 0.05, this.endAngle - 0.05, false);
      ctx.stroke();
      ctx.restore();
      ctx.restore();
    }
  }

  class PhaseShiftRing extends RingEffect {
    constructor(x, y, color) {
      super(x, y, 28, color, 0.8);
    }
    update(dt) {
      this.life -= dt;
      this.r += 110 * dt / 0.8;
      return this.life > 0;
    }
    draw() {
      const t = this.life / this.maxLife;
      const p = 1 - t;
      ctx.save();
      ctx.globalAlpha = t * 0.85;
      ctx.strokeStyle = this.color;
      ctx.lineWidth = 6 - p * 3;
      ctx.shadowBlur = 26;
      ctx.shadowColor = this.color;
      ctx.beginPath();
      ctx.arc(this.x, this.y, 28 + p * 110, 0, TAU);
      ctx.stroke();
      ctx.restore();
    }
  }

  class TelegraphLine {
    constructor(x1, y1, x2, y2, life = 0.35, color = "#9a7dff") {
      this.x1 = x1;
      this.y1 = y1;
      this.x2 = x2;
      this.y2 = y2;
      this.life = life;
      this.maxLife = life;
      this.color = color;
    }
    update(dt) {
      this.life -= dt;
      return this.life > 0;
    }
    draw() {
      const t = this.life / this.maxLife;
      ctx.save();
      ctx.globalAlpha = 0.18 + t * 0.6;
      ctx.strokeStyle = this.color;
      ctx.lineWidth = 2;
      ctx.setLineDash([8, 8]);
      ctx.shadowBlur = 16;
      ctx.shadowColor = this.color;
      ctx.beginPath();
      ctx.moveTo(this.x1, this.y1);
      ctx.lineTo(this.x2, this.y2);
      ctx.stroke();
      ctx.restore();
    }
  }

  class WaveProjectile {
    constructor(x, y, angle, opts = {}) {
      this.x = x;
      this.y = y;
      this.angle = angle;
      this.speed = opts.speed ?? 420;
      this.radius = opts.radius ?? 16;
      this.life = opts.life ?? 1.2;
      this.maxLife = this.life;
      this.damage = opts.damage ?? 14;
      this.color = opts.color ?? "#7df9ff";
      this.hit = false;
    }
    update(dt, player) {
      this.life -= dt;
      this.x += Math.cos(this.angle) * this.speed * dt;
      this.y += Math.sin(this.angle) * this.speed * dt;
      if (!this.hit && Utils.dist(this.x, this.y, player.x, player.y) <= this.radius + player.radius) {
        this.hit = true;
        player.damage(this.damage);
        for (let i = 0; i < 12; i++) effects.push(new Spark(player.x, player.y, this.color));
      }
      return this.life > 0 && this.x > -80 && this.x < canvas.width + 80 && this.y > -80 && this.y < canvas.height + 80;
    }
    draw() {
      const t = this.life / this.maxLife;
      ctx.save();
      ctx.translate(this.x, this.y);
      ctx.rotate(this.angle);
      ctx.globalAlpha = Math.max(0.28, t);
      ctx.shadowBlur = 24;
      ctx.shadowColor = this.color;
      ctx.fillStyle = this.color === "#ff6bd6" ? "rgba(255,107,214,0.35)" : "rgba(125,249,255,0.35)";
      ctx.beginPath();
      ctx.moveTo(30, 0);
      ctx.quadraticCurveTo(0, 16, -24, 0);
      ctx.quadraticCurveTo(0, -16, 30, 0);
      ctx.fill();
      ctx.strokeStyle = "#ffffff";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(26, 0);
      ctx.lineTo(-20, 0);
      ctx.stroke();
      ctx.restore();
    }
  }

  class SummonMinion {
    constructor(boss, type = "shooter", x = boss.x, y = boss.y) {
      this.boss = boss;
      this.type = type;
      this.x = x;
      this.y = y;
      this.vx = 0;
      this.vy = 0;
      this.angle = 0;
      this.alive = true;
      this.fireTimer = Utils.rand(0.2, 0.8);
      this.lifeTimer = 0;
      if (type === "shooter") {
        this.radius = 14;
        this.hp = 34;
        this.color = "#ffb347";
      } else if (type === "chaser") {
        this.radius = 13;
        this.hp = 28;
        this.color = "#7df9ff";
      } else {
        this.radius = 12;
        this.hp = 22;
        this.color = "#ff6b8a";
      }
      this.maxHp = this.hp;
    }

    damage(amount) {
      this.hp = Math.max(0, this.hp - amount);
      texts.push(new FloatText(`-${amount}`, this.x, this.y - 14, "#ffd166"));
      for (let i = 0; i < 6; i++) effects.push(new Spark(this.x, this.y, this.color));
      if (this.hp <= 0) {
        this.alive = false;
        effects.push(new RingEffect(this.x, this.y, 12, this.color, 0.22));
      }
    }

    update(dt, player) {
      this.lifeTimer += dt;
      const ang = Utils.angleTo(this.x, this.y, player.x, player.y);
      this.angle = ang;
      if (this.type === "shooter") {
        const desiredX = this.boss.x + Math.cos(this.lifeTimer * 1.2 + (this.x % 7)) * 90;
        const desiredY = this.boss.y + 90 + Math.sin(this.lifeTimer * 1.6 + (this.y % 5)) * 30;
        this.x = Utils.lerp(this.x, desiredX, dt * 1.4);
        this.y = Utils.lerp(this.y, desiredY, dt * 1.4);
        this.fireTimer -= dt;
        if (this.fireTimer <= 0) {
          this.fireTimer = 1.0 + Utils.rand(0, 0.35);
          bullets.push(new Bullet(this.x, this.y, Math.cos(ang) * 220, Math.sin(ang) * 220, 5, this.color, 4.5, 8));
        }
      } else if (this.type === "chaser") {
        const speed = 135;
        this.vx = Math.cos(ang) * speed;
        this.vy = Math.sin(ang) * speed;
        this.x += this.vx * dt;
        this.y += this.vy * dt;
      } else if (this.type === "bomber") {
        const speed = 180;
        this.vx = Math.cos(ang) * speed;
        this.vy = Math.sin(ang) * speed;
        this.x += this.vx * dt;
        this.y += this.vy * dt;
        if (Utils.dist(this.x, this.y, player.x, player.y) < this.radius + player.radius + 14) {
          hazards.push(new DelayedBlast(this.x, this.y, 0.15, 44, this.color, false));
          this.alive = false;
        }
      }

      if (Utils.dist(this.x, this.y, player.x, player.y) < this.radius + player.radius) {
        player.damage(this.type === "bomber" ? 14 : 10);
        if (this.type === "bomber") {
          hazards.push(new DelayedBlast(this.x, this.y, 0.1, 40, this.color, false));
          this.alive = false;
        } else {
          this.alive = false;
        }
      }

      this.x = Utils.clamp(this.x, 18, canvas.width - 18);
      this.y = Utils.clamp(this.y, 18, canvas.height - 18);
      return this.alive;
    }

    draw() {
      drawGlowCircle(this.x, this.y, this.radius, this.color, 0.9);
      ctx.save();
      ctx.strokeStyle = "#fff";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.radius + 3, 0, TAU);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(this.x, this.y);
      ctx.lineTo(this.x + Math.cos(this.angle) * this.radius, this.y + Math.sin(this.angle) * this.radius);
      ctx.stroke();
      ctx.restore();
      drawBar(this.x - this.radius, this.y - this.radius - 10, this.radius * 2, 4, this.hp / this.maxHp, this.color);
    }
  }

  function resolveValue(value, runtime) {
    return typeof value === "function" ? value(runtime) : value;
  }

  function getBossTuning(runtime) {
    return BossTunings[runtime.type]?.phases?.[runtime.phase] || {};
  }

  function distanceToPlayer(runtime) {
    return Utils.dist(runtime.x, runtime.y, runtime.player.x, runtime.player.y);
  }

  function countActiveThreats() {
    return bullets.length + hazards.length + projectiles.length;
  }

  function chooseWeighted(items) {
    if (!items.length) return null;
    const total = items.reduce((sum, item) => sum + (item.weight ?? 1), 0);
    if (total <= 0) return items[0] ?? null;
    let roll = Math.random() * total;
    for (const item of items) {
      roll -= item.weight ?? 1;
      if (roll <= 0) return item;
    }
    return items[items.length - 1] ?? null;
  }

  function chooseBossAction(runtime, phaseData) {
    const actions = phaseData.actions || [];
    if (!actions.length && phaseData.patternOrder?.length) {
      const pattern = phaseData.patternOrder[runtime.loopCursor % phaseData.patternOrder.length];
      runtime.loopCursor++;
      return pattern;
    }

    runtime.actionHistory ??= {};
    const now = performance.now() / 1000;
    const candidates = actions.filter((action) => {
      const okCondition = action.condition ? action.condition(runtime) : true;
      const lastUsedAt = runtime.actionHistory[action.name] ?? -Infinity;
      const minInterval = action.minInterval ?? 0;
      return okCondition && now - lastUsedAt >= minInterval;
    });

    const selected = chooseWeighted(candidates.length ? candidates : actions);
    if (!selected) return null;
    runtime.actionHistory[selected.name] = now;
    return selected;
  }

  class BaseBossRuntime {
    constructor(type, player, startPhase = "auto") {
      this.player = player;
      this.setDefinition(type, startPhase);
    }

    setDefinition(type, startPhase = "auto") {
      const definition = BossRegistry[type];
      if (!definition) throw new Error(`Unknown boss type: ${type}`);
      this.definition = definition;
      this.type = definition.id;
      this.x = canvas.width * 0.5;
      this.y = canvas.height * 0.24;
      this.radius = definition.radius;
      this.maxHp = definition.maxHp;
      this.hp = this.maxHp;
      this.phase = 1;
      this.stateText = "IDLE";
      this.minions = [];
      this.invulnerable = false;
      this.currentPhaseData = this.getPhaseData();
      this.applyStartPhase(startPhase);
    }

    get tuning() {
      return getBossTuning(this);
    }

    getPhaseData() {
      let selected = this.definition.phases[0];
      const ratio = this.hp / this.maxHp;
      for (const phase of this.definition.phases) {
        if (ratio <= phase.threshold) selected = phase;
      }
      return selected;
    }

    applyStartPhase(startPhase = "auto") {
      if (startPhase === "auto") return;
      const phaseIndex = Math.max(1, Math.min(Number(startPhase) || 1, this.definition.phases.length));
      const phaseData = this.definition.phases[phaseIndex - 1];
      this.phase = phaseIndex;
      this.currentPhaseData = phaseData;
      this.hp = this.maxHp * phaseData.threshold;
      this.onStartPhaseApplied?.(phaseIndex, phaseData);
      this.stateText = `TEST START P${phaseIndex}`;
    }

    syncPhase() {
      const previousPhase = this.phase;
      const nextPhaseData = this.getPhaseData();
      const nextPhase = this.definition.phases.indexOf(nextPhaseData) + 1;
      if (nextPhase !== previousPhase) {
        this.phase = nextPhase;
        this.currentPhaseData = nextPhaseData;
        this.onPhaseChanged?.(previousPhase, nextPhase, nextPhaseData);
      } else {
        this.currentPhaseData = nextPhaseData;
      }
    }

    forcePhase2() {
      if (this.definition.phases.length < 2 || this.phase !== 1) return;
      this.hp = this.maxHp * this.definition.phases[1].threshold;
      this.syncPhase();
    }

    update(dt) {
      this.syncPhase();
      this.updateBoss(dt);
      this.updateMinions(dt);
      this.syncInvulnerability();
    }

    syncInvulnerability() {
      this.invulnerable = this.minions.length > 0;
    }

    isInvulnerable() {
      return !!this.invulnerable;
    }

    damage(amount) {
      if (this.isInvulnerable()) {
        texts.push(new FloatText("IMMUNE", this.x, this.y - this.radius - 12, "#a2a8ff"));
        effects.push(new RingEffect(this.x, this.y, this.radius + 4, "#a2a8ff", 0.16));
        return false;
      }
      this.hp = Math.max(0, this.hp - amount);
      texts.push(new FloatText(`-${amount}`, this.x, this.y - this.radius - 12, "#ffd166"));
      for (let i = 0; i < 8; i++) effects.push(new Spark(this.x, this.y, "#ffd166"));
      return true;
    }

    updateMinions(dt) {
      for (let i = this.minions.length - 1; i >= 0; i--) {
        if (!this.minions[i].update(dt, this.player)) this.minions.splice(i, 1);
      }
    }

    drawMinions() {
      for (const minion of this.minions) minion.draw();
    }

    updateBoss(dt) {}

    drawBaseBody({ drawX = this.x, drawY = this.y, body, glow, code }) {
      drawGlowCircle(drawX, drawY, this.radius, glow, 0.92);
      ctx.save();
      ctx.strokeStyle = body;
      ctx.lineWidth = 4;
      ctx.shadowBlur = 22;
      ctx.shadowColor = glow;
      ctx.beginPath();
      ctx.arc(drawX, drawY, this.radius + 4, 0, TAU);
      ctx.stroke();
      const c = this.radius * 0.65;
      ctx.beginPath();
      ctx.moveTo(drawX - c, drawY);
      ctx.lineTo(drawX + c, drawY);
      ctx.moveTo(drawX, drawY - c);
      ctx.lineTo(drawX, drawY + c);
      ctx.stroke();
      ctx.restore();
      drawText(code ?? this.definition.code, drawX, drawY + 5, "#fff", 13, "center");
      if (this.isInvulnerable()) {
        ctx.save();
        ctx.globalAlpha = 0.35;
        ctx.strokeStyle = this.type === "summoner" && this.phase === 2 ? "#ff6bd6" : "#a2a8ff";
        ctx.lineWidth = 4;
        ctx.setLineDash([8, 6]);
        ctx.beginPath();
        ctx.arc(drawX, drawY, this.radius + 14, 0, TAU);
        ctx.stroke();
        ctx.restore();
      }
    }
  }

  class PatternBossRuntime extends BaseBossRuntime {
    constructor(type, player, startPhase = "auto") {
      super(type, player, startPhase);
      this.phaseTransition = 0;
      this.aiTimer = 0;
      this.loopCursor = 0;
      this.actionHistory = {};
    }

    onStartPhaseApplied() {
      this.phaseTransition = 0;
      this.aiTimer = 0;
      this.loopCursor = 0;
      this.actionHistory = {};
    }

    onPhaseChanged(prevPhase, nextPhase) {
      this.loopCursor = 0;
      this.actionHistory = {};
      this.definition.onPhaseEnter?.(this, nextPhase, prevPhase);
    }

    updateBoss(dt) {
      this.definition.movement?.(this, dt);
      this.aiTimer -= dt;

      if (this.phaseTransition > 0) {
        this.phaseTransition -= dt;
        this.definition.duringPhaseTransition?.(this, dt);
        return;
      }

      if (this.aiTimer > 0) return;

      const phaseData = this.currentPhaseData;
      this.aiTimer = resolveValue(phaseData.cooldown, this);
      const action = chooseBossAction(this, phaseData);
      if (!action) return;
      const fn = PatternLibrary[action.name];
      if (fn) fn(this, action.options || {});
    }

    draw() {
      const colors = this.definition.colors(this);
      this.drawBaseBody({ body: colors.body, glow: colors.glow, code: this.definition.code });
      if (this.phaseTransition > 0) {
        ctx.save();
        ctx.globalAlpha = 0.3 + Math.sin(performance.now() / 100) * 0.2;
        ctx.strokeStyle = "#fff";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius + 16, 0, TAU);
        ctx.stroke();
        ctx.restore();
      }
    }
  }

  class SummonerBossRuntime extends PatternBossRuntime {
    constructor(type, player, startPhase = "auto") {
      super(type, player, startPhase);
      this.orbitTime = 0;
      this.invulnerable = false;
    }

    spawnMinionWave() {
      const summonTuning = this.tuning.summon || { maxMinions: 3, waveSize: 2 };
      const available = Math.max(0, summonTuning.maxMinions - this.minions.length);
      const waveSize = Math.min(summonTuning.waveSize, available);
      if (waveSize <= 0) return;
      const patterns = this.phase === 1 ? ["shooter", "chaser"] : ["shooter", "chaser", "bomber"];
      for (let i = 0; i < waveSize; i++) {
        const a = (i / Math.max(1, waveSize)) * TAU + this.orbitTime;
        const spawnX = this.x + Math.cos(a) * 46;
        const spawnY = this.y + Math.sin(a) * 24;
        const type = patterns[(this.minions.length + i) % patterns.length];
        this.minions.push(new SummonMinion(this, type, spawnX, spawnY));
        effects.push(new RingEffect(spawnX, spawnY, 10, this.phase === 1 ? "#a2a8ff" : "#ff6bd6", 0.24));
        for (let j = 0; j < 8; j++) effects.push(new Spark(spawnX, spawnY, this.phase === 1 ? "#a2a8ff" : "#ff6bd6"));
      }
    }

    syncInvulnerability() {
      this.invulnerable = this.minions.length > 0;
    }

    updateBoss(dt) {
      this.orbitTime += dt * 0.8;
      const tx = canvas.width * 0.5 + Math.cos(this.orbitTime) * (this.phase === 1 ? 80 : 120);
      const ty = canvas.height * 0.2 + Math.sin(this.orbitTime * 2) * (this.phase === 1 ? 24 : 34);
      this.x = Utils.lerp(this.x, tx, dt * 1.1);
      this.y = Utils.lerp(this.y, ty, dt * 1.1);
      super.updateBoss(dt);
    }
  }

  class StateMachineBossRuntime extends BaseBossRuntime {
    constructor(type, player, startPhase = "auto") {
      super(type, player, startPhase);
      this.state = "APPROACH";
      this.stateTime = 0;
      this.stateDuration = 0.6;
    }

    setState(next) {
      this.state = next;
      this.stateTime = 0;
      this.stateText = next;
    }

    updateBoss(dt) {
      this.stateTime += dt;
      this.updateStateMachine(dt);
    }

    updateStateMachine(dt) {}
  }

  class KnightBossRuntime extends StateMachineBossRuntime {
    constructor(type, player, startPhase = "auto") {
      super(type, player, startPhase);
      this.x = canvas.width * 0.5;
      this.y = canvas.height * 0.25;
      this.state = "APPROACH";
      this.stateTime = 0;
      this.stateDuration = 0.6;
      this.angle = 0;
      this.lockedAngle = 0;
      this.strafeDir = 1;
      this.chargeJitter = 0;
      this.hitApplied = false;
      this.attackSpawned = false;
      this.afterImageTimer = 0;
      this.attackPattern = "FORWARD_SLASH";
      this.attackStartX = this.x;
      this.attackStartY = this.y;
      this.attackEndX = this.x;
      this.attackEndY = this.y;
      this.comboStep = 0;
    }

    onStartPhaseApplied(phaseIndex) {
      if (phaseIndex === 2) {
        this.state = "BERSERK";
        this.stateTime = 0;
        this.stateDuration = this.tuning.berserkDuration || 1.0;
        this.stateText = "TEST START P2";
      }
    }

    onPhaseChanged(prevPhase, nextPhase) {
      if (nextPhase === 2) {
        this.state = "BERSERK";
        this.stateTime = 0;
        this.stateDuration = this.tuning.berserkDuration || 1.0;
        this.chargeJitter = 0;
        this.comboStep = 0;
        this.stateText = "BERSERK";
        effects.push(new PhaseShiftRing(this.x, this.y, this.tuning.glow));
        for (let i = 0; i < 26; i++) effects.push(new Spark(this.x, this.y, this.tuning.glow));
      }
    }

    pickPattern() {
      const d = distanceToPlayer(this);
      const rules = KnightPatternRules[this.phase] || [];
      const candidates = rules.filter((rule) => rule.condition ? rule.condition(this, d) : true);
      const selected = chooseWeighted(candidates);
      return selected?.name || "FORWARD_SLASH";
    }

    getAttackVector(pattern, facing) {
      const forward = { x: Math.cos(facing), y: Math.sin(facing) };
      const left = { x: -forward.y, y: forward.x };
      const right = { x: forward.y, y: -forward.x };
      switch (pattern) {
        case "LEFT_STEP_SLASH": return { x: left.x * 130 + forward.x * 34, y: left.y * 130 + forward.y * 34, duration: this.phase === 1 ? 0.18 : 0.15 };
        case "RIGHT_STEP_SLASH": return { x: right.x * 130 + forward.x * 34, y: right.y * 130 + forward.y * 34, duration: this.phase === 1 ? 0.18 : 0.15 };
        case "BACK_STEP_SLASH": return { x: -forward.x * 100, y: -forward.y * 100, duration: 0.2 };
        case "FORWARD_SLASH": return { x: forward.x * (this.phase === 1 ? 165 : 190), y: forward.y * (this.phase === 1 ? 165 : 190), duration: this.phase === 1 ? 0.16 : 0.13 };
        case "CROSS_RUSH": {
          const side = this.comboStep % 2 === 0 ? left : right;
          return { x: forward.x * 120 + side.x * 110, y: forward.y * 120 + side.y * 110, duration: 0.12 };
        }
        default: return { x: 0, y: 0, duration: this.phase === 1 ? 0.22 : 0.18 };
      }
    }

    setState(next) {
      super.setState(next);
      const d = this.tuning.durations || {};
      const player = this.player;
      if (next === "APPROACH") {
        this.stateDuration = Utils.rand(d.approachMin, d.approachMax);
      } else if (next === "STRAFE") {
        this.stateDuration = Utils.rand(d.strafeMin, d.strafeMax);
        this.strafeDir = Math.random() < 0.5 ? -1 : 1;
      } else if (next === "CHARGE") {
        this.lockedAngle = Utils.angleTo(this.x, this.y, player.x, player.y);
        this.attackPattern = this.pickPattern();
        if (this.attackPattern === "WAVE_SLASH") this.stateDuration = d.chargeWave;
        else if (this.attackPattern === "BURST_WAVE") this.stateDuration = d.chargeWave;
        else if (this.attackPattern === "CROSS_RUSH") this.stateDuration = d.chargeCrossRush;
        else this.stateDuration = d.chargeDefault;
        this.chargeJitter = 0;
        const len = (this.attackPattern === "WAVE_SLASH" || this.attackPattern === "BURST_WAVE") ? 220 : 180;
        effects.push(new TelegraphLine(this.x, this.y, this.x + Math.cos(this.lockedAngle) * len, this.y + Math.sin(this.lockedAngle) * len, this.stateDuration, this.tuning.telegraphColor));
      } else if (next === "ATTACK") {
        this.hitApplied = false;
        this.attackSpawned = false;
        this.afterImageTimer = 0;
        this.attackStartX = this.x;
        this.attackStartY = this.y;
        const v = this.getAttackVector(this.attackPattern, this.lockedAngle);
        this.attackEndX = this.x + v.x;
        this.attackEndY = this.y + v.y;
        this.stateDuration = v.duration;
      } else if (next === "RECOVERY") {
        if (this.phase === 2 && this.attackPattern === "CROSS_RUSH" && this.comboStep < 1) {
          this.comboStep += 1;
          this.setState("CHARGE");
          return;
        }
        this.comboStep = 0;
        if (this.attackPattern === "WAVE_SLASH") this.stateDuration = d.recoveryWave;
        else if (this.attackPattern === "BURST_WAVE") this.stateDuration = d.recoveryBurst;
        else this.stateDuration = d.recoveryDefault;
      } else if (next === "BERSERK") {
        this.stateDuration = this.tuning.berserkDuration || 1.0;
      }
    }

    spawnAttackEffect() {
      const cx = this.x + Math.cos(this.lockedAngle) * 18;
      const cy = this.y + Math.sin(this.lockedAngle) * 18;
      const accent = this.phase === 1 ? "#7df9ff" : this.tuning.glow;
      let startAngle = this.lockedAngle - Math.PI * 0.75;
      let endAngle = this.lockedAngle + Math.PI * 0.15;
      if (this.attackPattern === "LEFT_STEP_SLASH") {
        startAngle = this.lockedAngle - Math.PI * 1.05;
        endAngle = this.lockedAngle - Math.PI * 0.12;
      } else if (this.attackPattern === "RIGHT_STEP_SLASH") {
        startAngle = this.lockedAngle + Math.PI * 0.12;
        endAngle = this.lockedAngle + Math.PI * 1.05;
      } else if (this.attackPattern === "BACK_STEP_SLASH") {
        startAngle = this.lockedAngle - Math.PI * 0.65;
        endAngle = this.lockedAngle + Math.PI * 0.30;
      } else if (this.attackPattern === "WAVE_SLASH" || this.attackPattern === "BURST_WAVE") {
        startAngle = this.lockedAngle - Math.PI * 0.6;
        endAngle = this.lockedAngle + Math.PI * 0.22;
      } else if (this.attackPattern === "CROSS_RUSH") {
        startAngle = this.lockedAngle - Math.PI * 0.9;
        endAngle = this.lockedAngle + Math.PI * 0.9;
      }
      effects.push(new SlashEffect({ x: cx, y: cy, startAngle, endAngle, color: "#ffffff", life: 0.14, scale: this.attackPattern === "CROSS_RUSH" ? 1.15 : 1 }));
      effects.push(new SlashEffect({ x: cx - Math.cos(this.lockedAngle) * 8, y: cy - Math.sin(this.lockedAngle) * 8, startAngle: startAngle + 0.06, endAngle: endAngle - 0.06, color: accent, life: 0.10, scale: 0.8 }));
    }

    updateStateMachine(dt) {
      this.angle = Utils.angleTo(this.x, this.y, this.player.x, this.player.y);
      if (this.state === "APPROACH") this.updateApproach(dt);
      else if (this.state === "STRAFE") this.updateStrafe(dt);
      else if (this.state === "CHARGE") this.updateCharge(dt);
      else if (this.state === "ATTACK") this.updateAttack(dt);
      else if (this.state === "RECOVERY") this.updateRecovery(dt);
      else if (this.state === "BERSERK") this.updateBerserk(dt);
      this.x = Utils.clamp(this.x, 24, canvas.width - 24);
      this.y = Utils.clamp(this.y, 24, canvas.height - 24);
    }

    updateApproach(dt) {
      const d = distanceToPlayer(this);
      const angle = Utils.angleTo(this.x, this.y, this.player.x, this.player.y);
      const forward = { x: Math.cos(angle), y: Math.sin(angle) };
      if (d > this.tuning.desiredRange) {
        this.x += forward.x * this.tuning.moveSpeed * dt;
        this.y += forward.y * this.tuning.moveSpeed * dt;
      } else if (d < this.tuning.desiredRange - 25) {
        this.x -= forward.x * this.tuning.moveSpeed * 0.45 * dt;
        this.y -= forward.y * this.tuning.moveSpeed * 0.45 * dt;
      }
      if (d <= this.tuning.attackRange && this.stateTime > 0.24) {
        this.setState(Math.random() < this.tuning.strafeBias ? "STRAFE" : "CHARGE");
        return;
      }
      if (this.stateTime >= this.stateDuration) this.setState("STRAFE");
    }

    updateStrafe(dt) {
      const toPlayer = Utils.angleTo(this.x, this.y, this.player.x, this.player.y);
      const d = distanceToPlayer(this);
      const forward = { x: Math.cos(toPlayer), y: Math.sin(toPlayer) };
      const side = { x: -forward.y * this.strafeDir, y: forward.x * this.strafeDir };
      let vx = side.x * this.tuning.moveSpeed * (this.phase === 1 ? 0.95 : 1.15);
      let vy = side.y * this.tuning.moveSpeed * (this.phase === 1 ? 0.95 : 1.15);
      if (d > this.tuning.desiredRange + 20) { vx += forward.x * this.tuning.moveSpeed * 0.6; vy += forward.y * this.tuning.moveSpeed * 0.6; }
      else if (d < this.tuning.desiredRange - 30) { vx -= forward.x * this.tuning.moveSpeed * 0.45; vy -= forward.y * this.tuning.moveSpeed * 0.45; }
      this.x += vx * dt;
      this.y += vy * dt;
      if (this.phase === 2 && this.stateTime > this.stateDuration * 0.35 && Math.random() < 0.018) this.strafeDir *= -1;
      if (d <= this.tuning.attackRange && this.stateTime >= this.stateDuration * (this.phase === 1 ? 0.45 : 0.28)) { this.setState("CHARGE"); return; }
      if (this.stateTime >= this.stateDuration) this.setState("APPROACH");
    }

    updateCharge(dt) {
      this.chargeJitter = Math.sin(this.stateTime * this.tuning.chargeJitterFrequency) * this.tuning.chargeJitterAmplitude;
      if (this.attackPattern !== "WAVE_SLASH" && this.attackPattern !== "BURST_WAVE") {
        const drift = Utils.angleTo(this.x, this.y, this.player.x, this.player.y);
        this.lockedAngle = Utils.lerp(this.lockedAngle, drift, this.phase === 1 ? 0.09 : 0.18);
      }
      if (this.stateTime >= this.stateDuration) this.setState("ATTACK");
    }

    updateBerserk(dt) {
      this.chargeJitter = Math.sin(this.stateTime * 120) * 4.0;
      if (this.stateTime >= this.stateDuration * 0.55 && this.stateTime - dt < this.stateDuration * 0.55) {
        for (let i = 0; i < 3; i++) {
          const a = this.angle + (i - 1) * 0.24;
          projectiles.push(new WaveProjectile(this.x + Math.cos(a) * 42, this.y + Math.sin(a) * 42, a, { speed: 360, color: this.tuning.glow, damage: 10, radius: 14, life: 1.1 }));
        }
      }
      if (this.stateTime >= this.stateDuration) this.setState("CHARGE");
    }

    updateAttack(dt) {
      const t = Utils.clamp(this.stateTime / this.stateDuration, 0, 1);
      const prevX = this.x;
      const prevY = this.y;
      if (this.attackPattern !== "WAVE_SLASH" && this.attackPattern !== "BURST_WAVE") {
        this.x = Utils.lerp(this.attackStartX, this.attackEndX, t);
        this.y = Utils.lerp(this.attackStartY, this.attackEndY, t);
        this.afterImageTimer -= dt;
        if (this.afterImageTimer <= 0) {
          this.afterImageTimer = this.tuning.afterImageInterval;
          effects.push(new AfterImage(this.x, this.y, this.radius, this.lockedAngle, this.phase === 1 ? "#7df9ff" : this.tuning.glow));
        }
      }
      if (!this.attackSpawned && t >= (this.phase === 1 ? 0.22 : 0.16)) {
        this.attackSpawned = true;
        this.spawnAttackEffect();
        if (this.attackPattern === "WAVE_SLASH") {
          const wave = this.tuning.wave;
          const sx = this.x + Math.cos(this.lockedAngle) * 54;
          const sy = this.y + Math.sin(this.lockedAngle) * 54;
          projectiles.push(new WaveProjectile(sx, sy, this.lockedAngle, wave));
        } else if (this.attackPattern === "BURST_WAVE") {
          const burst = this.tuning.burstWave;
          for (let i = -1; i <= 1; i++) {
            const a = this.lockedAngle + i * 0.24;
            const sx = this.x + Math.cos(a) * 54;
            const sy = this.y + Math.sin(a) * 54;
            projectiles.push(new WaveProjectile(sx, sy, a, burst));
          }
        }
      }
      if (!this.hitApplied) {
        let hit = false;
        if (this.attackPattern === "WAVE_SLASH" || this.attackPattern === "BURST_WAVE") {
          hit = Utils.pointInFan(this.player.x, this.player.y, this.x, this.y, this.lockedAngle, 72 + this.player.radius, Math.PI * 0.35);
        } else if (this.attackPattern === "BACK_STEP_SLASH") {
          hit = Utils.pointInFan(this.player.x, this.player.y, this.x, this.y, this.lockedAngle, 96 + this.player.radius, Math.PI * 0.55);
        } else if (this.attackPattern === "CROSS_RUSH") {
          hit = Utils.circleLineHit(this.player.x, this.player.y, this.player.radius, prevX, prevY, this.x, this.y, this.radius * 2.1);
          hit = hit || Utils.pointInFan(this.player.x, this.player.y, this.x, this.y, this.lockedAngle, 102 + this.player.radius, Math.PI * 0.62);
        } else {
          hit = Utils.circleLineHit(this.player.x, this.player.y, this.player.radius, prevX, prevY, this.x, this.y, this.radius * 1.7);
          hit = hit || Utils.pointInFan(this.player.x, this.player.y, this.x, this.y, this.lockedAngle, 84 + this.player.radius, Math.PI * 0.45);
        }
        if (hit) {
          this.hitApplied = true;
          this.player.damage(this.tuning.attackDamage + (this.attackPattern === "CROSS_RUSH" ? 2 : 0));
          for (let i = 0; i < 12; i++) effects.push(new Spark(this.player.x, this.player.y, this.phase === 1 ? "#ffd166" : this.tuning.glow));
        }
      }
      if (t >= 1) this.setState("RECOVERY");
    }

    updateRecovery(dt) {
      const d = distanceToPlayer(this);
      const ang = Utils.angleTo(this.x, this.y, this.player.x, this.player.y);
      if (d < (this.phase === 1 ? 105 : 130)) {
        this.x -= Math.cos(ang) * this.tuning.moveSpeed * (this.phase === 1 ? 0.55 : 0.4) * dt;
        this.y -= Math.sin(ang) * this.tuning.moveSpeed * (this.phase === 1 ? 0.55 : 0.4) * dt;
      }
      if (this.stateTime >= this.stateDuration) this.setState(d < this.tuning.attackRange ? "STRAFE" : "APPROACH");
    }

    drawBlade(drawX, drawY, facing) {
      let bladeLen = this.state === "CHARGE" ? 28 + Math.sin(this.stateTime * 30) * 6 : 46;
      if (this.phase === 2) bladeLen += 6;
      let bladeAngle = facing + 0.65;
      if (this.attackPattern === "LEFT_STEP_SLASH") bladeAngle = facing - 1.0;
      else if (this.attackPattern === "RIGHT_STEP_SLASH") bladeAngle = facing + 1.0;
      else if (this.attackPattern === "BACK_STEP_SLASH") bladeAngle = facing + Math.sin(this.stateTime * 24) * 0.85;
      else if (this.attackPattern === "FORWARD_SLASH") bladeAngle = facing - 0.25 + Math.sin(this.stateTime * 18) * 0.22;
      else if (this.attackPattern === "WAVE_SLASH" || this.attackPattern === "BURST_WAVE") bladeAngle = facing - 0.95 + Math.min(1, this.stateTime / Math.max(0.001, this.stateDuration)) * 1.2;
      else if (this.attackPattern === "CROSS_RUSH") bladeAngle = facing + Math.sin(this.stateTime * 28) * 1.3;
      const bladeX1 = drawX + Math.cos(bladeAngle) * 10;
      const bladeY1 = drawY + Math.sin(bladeAngle) * 10;
      const bladeX2 = bladeX1 + Math.cos(bladeAngle) * bladeLen;
      const bladeY2 = bladeY1 + Math.sin(bladeAngle) * bladeLen;
      const glowColor = this.phase === 1 ? "#7df9ff" : this.tuning.glow;
      ctx.save();
      ctx.shadowBlur = 22;
      ctx.shadowColor = glowColor;
      ctx.strokeStyle = this.phase === 1 ? "rgba(125,249,255,0.45)" : "rgba(255,107,214,0.45)";
      ctx.lineWidth = 10;
      ctx.beginPath();
      ctx.moveTo(bladeX1, bladeY1);
      ctx.lineTo(bladeX2, bladeY2);
      ctx.stroke();
      ctx.strokeStyle = glowColor;
      ctx.lineWidth = 6;
      ctx.beginPath();
      ctx.moveTo(bladeX1, bladeY1);
      ctx.lineTo(bladeX2, bladeY2);
      ctx.stroke();
      ctx.strokeStyle = "#ffffff";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(bladeX1, bladeY1);
      ctx.lineTo(bladeX2, bladeY2);
      ctx.stroke();
      ctx.beginPath();
      ctx.fillStyle = "#ffffff";
      ctx.arc(bladeX2, bladeY2, 3, 0, TAU);
      ctx.fill();
      ctx.restore();
    }

    draw() {
      const drawX = (this.state === "CHARGE" || this.state === "BERSERK") ? this.x + this.chargeJitter : this.x;
      const drawY = this.y;
      let bodyColor = this.tuning.bodyColor;
      let glow = this.tuning.glow;
      if (this.state === "CHARGE") {
        bodyColor = this.phase === 1 ? "#00f0ff" : "#ff8be4";
        glow = this.phase === 1 ? "#00f0ff" : "#ff6bd6";
      } else if (this.state === "ATTACK") {
        bodyColor = "#ffffff";
        glow = this.phase === 1 ? "#7df9ff" : "#ff9be8";
      } else if (this.state === "RECOVERY") {
        bodyColor = this.phase === 1 ? "#6c6f88" : "#8b5b7b";
        glow = this.phase === 1 ? "#8f96c9" : "#c97bb0";
      } else if (this.state === "BERSERK") {
        bodyColor = "#ffffff";
        glow = this.tuning.glow;
      }
      drawGlowCircle(drawX, drawY, this.radius, glow, 0.95);
      ctx.save();
      ctx.strokeStyle = bodyColor;
      ctx.lineWidth = 3;
      ctx.shadowBlur = 15;
      ctx.shadowColor = glow;
      ctx.beginPath();
      ctx.arc(drawX, drawY, this.radius + 3, 0, TAU);
      ctx.stroke();
      ctx.restore();
      const facing = (this.state === "CHARGE" || this.state === "ATTACK" || this.state === "BERSERK") ? this.lockedAngle : this.angle;
      ctx.save();
      ctx.strokeStyle = "#ffffff";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(drawX, drawY);
      ctx.lineTo(drawX + Math.cos(facing) * this.radius * 1.3, drawY + Math.sin(facing) * this.radius * 1.3);
      ctx.stroke();
      ctx.restore();
      if (this.state === "CHARGE" || this.state === "ATTACK" || this.state === "BERSERK") this.drawBlade(drawX, drawY, facing);
      drawText(this.definition.code, drawX, drawY + 5, "#fff", 12, "center");
    }
  }

  const BossRuntimeClasses = {
    pattern: PatternBossRuntime,
    summoner: SummonerBossRuntime,
    knight: KnightBossRuntime
  };

  function createBoss(type, player, startPhase) {
    const definition = BossRegistry[type];
    const runtimeKey = definition.runtimeClass || "pattern";
    const RuntimeClass = BossRuntimeClasses[runtimeKey] || PatternBossRuntime;
    return new RuntimeClass(type, player, startPhase);
  }

  const bossSelect = document.getElementById("bossSelect");
  const phaseSelect = document.getElementById("phaseSelect");
  const applySelectionBtn = document.getElementById("applySelection");
  const resetSelectionBtn = document.getElementById("resetSelection");

  let player;
  let boss;
  let selectedBossType = "basic";
  let selectedStartPhase = "auto";

  function getPhaseOptions(type) {
    const definition = BossRegistry[type];
    const options = [{ value: "auto", label: "Auto" }];
    for (let i = 1; i <= definition.phases.length; i++) {
      options.push({ value: String(i), label: `Phase ${i}` });
    }
    return options;
  }

  function syncPhaseSelect(type, selectedValue = "auto") {
    const options = getPhaseOptions(type);
    phaseSelect.innerHTML = options.map(option => `<option value="${option.value}">${option.label}</option>`).join("");
    phaseSelect.value = options.some(option => option.value === selectedValue) ? selectedValue : "auto";
  }

  function populateBossSelect() {
    const entries = Object.values(BossRegistry);
    bossSelect.innerHTML = entries.map(entry => `<option value="${entry.id}">${entry.label} (${entry.code})</option>`).join("");
    bossSelect.value = selectedBossType;
    syncPhaseSelect(selectedBossType, selectedStartPhase);
  }

  function resetGame(type = selectedBossType, startPhase = selectedStartPhase) {
    selectedBossType = type;
    selectedStartPhase = startPhase;
    bullets.length = 0;
    hazards.length = 0;
    projectiles.length = 0;
    playerBullets.length = 0;
    effects.length = 0;
    texts.length = 0;
    player = new Player(canvas.width * 0.5, canvas.height * 0.82);
    boss = createBoss(type, player, startPhase);
    bossSelect.value = selectedBossType;
    syncPhaseSelect(selectedBossType, selectedStartPhase);
  }

  bossSelect.addEventListener("change", () => {
    selectedBossType = bossSelect.value;
    syncPhaseSelect(selectedBossType, phaseSelect.value);
  });

  applySelectionBtn.addEventListener("click", () => {
    resetGame(bossSelect.value, phaseSelect.value);
  });

  resetSelectionBtn.addEventListener("click", () => {
    resetGame(selectedBossType, selectedStartPhase);
  });

  addEventListener("keydown", (e) => {
    const k = e.key.toLowerCase();
    if (k === "1") resetGame("basic");
    if (k === "2") resetGame("advanced");
    if (k === "3") resetGame("knight");
    if (k === "4") resetGame("summoner");
    if (k === "p" && boss && typeof boss.forcePhase2 === "function") boss.forcePhase2();
    if (k === "r") resetGame(selectedBossType);
    if (k === "h" && boss) {
      boss.hp = Math.max(0, boss.hp - boss.maxHp * 0.1);
      texts.push(new FloatText("Boss HP -10%", boss.x, boss.y - 46, "#ffd166"));
    }
  });

  function updateList(arr, dt, extra) {
    for (let i = arr.length - 1; i >= 0; i--) {
      const alive = extra ? arr[i].update(dt, extra) : arr[i].update(dt);
      if (!alive) arr.splice(i, 1);
    }
  }

  function drawArena() {
    ctx.save();
    ctx.globalAlpha = 0.16;
    ctx.strokeStyle = boss && boss.type === "knight" && boss.phase === 2 ? "#4d2347" : boss && boss.type === "summoner" ? "#3a2d72" : "#2b3e72";
    ctx.lineWidth = 1;
    const grid = 40;
    for (let x = 0; x < canvas.width; x += grid) {
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x, canvas.height);
      ctx.stroke();
    }
    for (let y = 0; y < canvas.height; y += grid) {
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(canvas.width, y);
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawBar(x, y, w, h, ratio, fill) {
    ctx.save();
    ctx.fillStyle = "rgba(255,255,255,0.08)";
    ctx.fillRect(x, y, w, h);
    ctx.fillStyle = fill;
    ctx.fillRect(x, y, w * Utils.clamp(ratio, 0, 1), h);
    ctx.strokeStyle = "#fff";
    ctx.strokeRect(x, y, w, h);
    ctx.restore();
  }

  function drawPanel() {
    drawBar(20, 20, 240, 18, player.hp / 100, "#66f2ff");
    drawText("Player HP", 20, 14, "#fff", 14);

    const bossColors = boss.definition.colors(boss);
    drawBar(20, 50, 240, 18, boss.hp / boss.maxHp, bossColors.glow);
    drawText("Boss HP", 20, 44, "#fff", 14);

    drawText(`Boss Type: ${boss.definition.label}`, 20, 92, "#fff", 14);
    drawText(`Phase: ${boss.phase}`, 20, 114, "#fff", 14);
    drawText(`Current Pattern: ${boss.stateText}`, 20, 136, "#fff", 14);
    drawText(`Minions: ${boss.minions?.length || 0}`, 20, 158, boss.isInvulnerable?.() ? "#a2a8ff" : "#dce7ff", 14);

    ctx.save();
    ctx.fillStyle = "rgba(4,8,20,0.62)";
    ctx.fillRect(canvas.width - 420, 18, 400, 258);
    ctx.strokeStyle = "rgba(255,255,255,0.18)";
    ctx.strokeRect(canvas.width - 420, 18, 400, 258);
    ctx.restore();

    drawText("패턴 / AI 설명", canvas.width - 398, 44, "#fff", 16);
    const lines = boss.definition.panel(boss);
    for (let i = 0; i < lines.length; i++) {
      drawText(lines[i], canvas.width - 398, 76 + i * 28, "#dce7ff", 14);
    }

    drawText("구조: PatternLibrary + BossTunings + Base/Pattern/StateMachine Runtime", canvas.width - 398, 232, "#9ecbff", 13);
    drawText("조건형 AI + 데이터 기반 보스 튜닝 테스트", canvas.width - 398, 254, "#9ecbff", 13);

    drawText("우측 상단 패널에서 보스 / 시작 페이즈 선택 가능", 20, canvas.height - 118, "#9ecbff", 13);
    drawText("이동: WASD / 방향키", 20, canvas.height - 96, "#fff", 14);
    drawText("대시: Shift 또는 Space", 20, canvas.height - 74, "#fff", 14);
    drawText("발사: J / Z / Enter", 20, canvas.height - 52, "#fff", 14);
    drawText("1: 기본형  2: 강화형  3: 기사형  4: 소환사형  P: 2페이즈  H: 보스HP -10%  R: 리셋", 20, canvas.height - 30, "#fff", 14);
  }

  function handlePlayerBulletCollisions() {
    for (let i = playerBullets.length - 1; i >= 0; i--) {
      const shot = playerBullets[i];
      let hit = false;
      for (let j = boss.minions.length - 1; j >= 0; j--) {
        const minion = boss.minions[j];
        if (Utils.dist(shot.x, shot.y, minion.x, minion.y) <= shot.radius + minion.radius) {
          minion.damage(shot.damage);
          playerBullets.splice(i, 1);
          hit = true;
          break;
        }
      }
      if (hit) continue;
      if (Utils.dist(shot.x, shot.y, boss.x, boss.y) <= shot.radius + boss.radius) {
        boss.damage(shot.damage);
        playerBullets.splice(i, 1);
      }
    }
  }

  populateBossSelect();
  resetGame("basic", "auto");

  let lastTime = performance.now();
  function loop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.033);
    lastTime = now;

    player.update(dt);
    boss.update(dt);
    updateList(bullets, dt, player);
    updateList(hazards, dt, player);
    updateList(projectiles, dt, player);
    updateList(playerBullets, dt);
    handlePlayerBulletCollisions();
    updateList(effects, dt);
    updateList(texts, dt);

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawArena();
    for (const h of hazards) h.draw();
    for (const b of bullets) b.draw();
    for (const p of projectiles) p.draw();
    for (const pb of playerBullets) pb.draw();
    for (const e of effects) e.draw();
    boss.drawMinions();
    boss.draw();
    player.draw();
    for (const t of texts) t.draw();
    drawPanel();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
