<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>NEON SURVIVOR</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <div id="wrap"></div>

  <div class="hud">
    <div class="row">
      <div class="pill"><b>Score</b><span id="score">0</span></div>
      <div class="pill"><b>Wave</b><span id="wave">1</span></div>
      <div class="pill"><b>Lv</b><span id="level">1</span></div>
      <div class="pill"><b>XP</b><span id="xp">0 / 10</span></div>
      <div class="pill"><b>HP</b><span id="hp">100</span></div>
      <div class="pill"><b>ATK</b><span id="atk">1</span></div>
      <div class="pill"><b>DEF</b><span id="def">0</span></div>
      <div class="pill"><b>Fire Rate</b><span id="fireRate">18</span></div>
      <div class="pill"><b>Pierce</b><span id="pierce">0</span></div>
      <div class="pill"><b>Combo</b><span id="combo">x1</span></div>
      <div class="pill hint">WASD/←→↑↓ 이동 · 마우스 조준 · 클릭/Space 발사 · Shift 대시</div>
    </div>
  </div>

  <div class="centerOverlay" id="overlayRoot">
    <div class="card" id="startCard">
      <h1>NEON SURVIVOR</h1>
      <p>우주 배경 위에서 적을 처치하고 경험치를 모아 성장하세요.</p>
      <p class="hint">레벨업 시 스킬 선택 창이 열립니다.</p>
      <div class="btnRow">
        <button class="btn" id="btnStart">Start</button>
        <button class="btn secondary" id="btnPractice">Practice</button>
      </div>
    </div>

    <div class="card" id="upgradeCard" style="display:none;">
      <h1>Level Up</h1>
      <p>스킬을 하나 선택하세요.</p>
      <div class="upgradeGrid" id="upgradeGrid"></div>
      <p class="hint">선택 즉시 적용되고 게임이 이어집니다.</p>
    </div>

    <div class="card" id="gameOverCard" style="display:none;">
      <h1>Game Over</h1>
      <p>최종 점수: <b id="finalScore">0</b></p>
      <div class="btnRow">
        <button class="btn" id="btnRetry">Retry</button>
        <button class="btn secondary" id="btnBack">Back</button>
      </div>
    </div>
  </div>

  <div class="warningOverlay" id="warningOverlay">
    <div class="warningText">WARNING</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/pixi.js@7.4.2/dist/pixi.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pixi-filters@5.2.1/dist/pixi-filters.js"></script>

  <script src="./js/data/game-balance.js"></script>
  <script src="./js/data/enemy-tiers.js"></script>
  <script src="./js/data/upgrades.js"></script>

  <script src="./js/core/utils.js"></script>
  <script src="./js/core/state.js"></script>

  <script src="./js/render/background.js"></script>
  <script src="./js/render/effects.js"></script>

  <script src="./js/systems/ui.js"></script>
  <script src="./js/systems/skill.js"></script>
  <script src="./js/systems/wave.js"></script>
  <script src="./js/systems/enemy.js"></script>
  <script src="./js/systems/combat.js"></script>

  <script src="./js/entities/player.js"></script>

  <script src="./js/core/boot.js"></script>
</body>
</html>
