<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cloverpit Slot Prototype v0.7</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./cloverpit_slot_v0.7/styles/main.css">
</head>
<body>
  <main id="wrap">
    <canvas id="fx"></canvas>

    <div class="hdr">
      <div class="logo">☘ CLOVER<b>PIT</b></div>
      <div class="sub">SPIN TO SURVIVE - DO NOT LOSE</div>
      <div class="build">Prototype v0.7 - Chain Evaluation Build</div>
    </div>

    <div class="game-layout">
      <aside class="side-stack">
        <div class="item-panel" id="itempanel"></div>

        <div class="chain-panel collapsed" id="chainpanel">
          <button class="chain-toggle" id="bchaintoggle" type="button" aria-expanded="false">
            <span class="chain-title-wrap">
              <span>CHAIN LOG</span>
              <span class="chain-sub">open when you want the breakdown</span>
            </span>
            <span class="chain-toggle-state" id="chaintogglestate">OPEN</span>
          </button>
          <div class="chain-log" id="chainlog"></div>
        </div>

        <div class="symbol-panel">
          <div class="chain-head">
            <span>SYMBOL TABLE</span>
            <span class="chain-sub">live multipliers / weights</span>
          </div>
          <div class="symrow" id="symrow"></div>
          <div class="weight-notes" id="weightnotes"></div>
        </div>
      </aside>

      <section class="main-stack">
        <div class="stats">
          <div class="sc"><div class="scl">COIN</div><div class="scv" id="vc">120</div></div>
          <div class="sc"><div class="scl">TICKET</div><div class="scv" id="vt">5</div></div>
          <div class="sc"><div class="scl">DEADLINE</div><div class="scv r" id="vd">75</div></div>
          <div class="sc"><div class="scl">PAID</div><div class="scv g" id="vp">0</div></div>
        </div>

        <div class="dlrow">
          <span>PAYMENT</span>
          <div class="dlbar"><div class="dlf" id="dlf" style="width:0%"></div></div>
          <span id="dlpct">0%</span>
        </div>

        <div class="play-row">
          <div class="play-core">
            <div class="machine-wrap">
              <div class="pl-labels" id="paylinelabels"></div>
              <div class="rm" id="rm">
                <div class="pl-lines" id="paylinelines"></div>
                <div class="reels" id="reels"></div>
              </div>
              <button class="lever" id="blever" aria-label="Pull slot lever">
                <span class="lever-arm">
                  <span class="lever-knob"></span>
                </span>
              </button>
            </div>

            <div class="cbar" id="cbar">
              <div class="cb-label">COMBO</div>
              <div class="cb-val" id="cb-val">0</div>
              <div class="cb-mult" id="cb-mult"></div>
              <div class="cb-track"><div class="cb-fill" id="cb-fill" style="width:0%"></div></div>
              <div class="cb-txt" id="cb-txt">NO BONUS</div>
            </div>

            <div class="res-panel" id="resultpanel"></div>

            <div class="btns">
              <button class="bspin" id="bspin">SPIN - 5 COINS</button>
              <button class="bs" id="bdeposit">DEPOSIT</button>
              <button class="bs" id="bnext">NEXT >></button>
            </div>
          </div>
        </div>
      </section>
    </div>
  </main>

  <script type="module" src="./cloverpit_slot_v0.7/js/main.js"></script>
</body>
</html>
