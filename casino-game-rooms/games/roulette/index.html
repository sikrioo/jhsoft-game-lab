<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/effects/OutlineEffect.js"></script>
<script>
window.addEventListener('load', function(){
const NUMS=[0,32,15,19,4,21,2,25,17,34,6,27,13,36,11,30,8,23,10,5,24,16,33,1,20,14,31,9,22,18,29,7,28,12,35,3,26];
const REDS=new Set([1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36]);
const C1=[1,4,7,10,13,16,19,22,25,28,31,34];
const C2=[2,5,8,11,14,17,20,23,26,29,32,35];
const C3=[3,6,9,12,15,18,21,24,27,30,33,36];
const N=NUMS.length;
const SA=(Math.PI*2)/N;
const DEBUG=false;
const POCKET_ANGLE_OFFSET = 0;

// ─── 핵심 각도 유틸 ───────────────────────────────────────────
// norm: 0 ~ 2π 로 정규화
function norm(a){a%=Math.PI*2;return a<0?a+Math.PI*2:a;}

// 포켓 i 의 "로컬(휠 기준) 중심 각도"
// 휠 텍스처는 i=0(NUMS[0]=0) 이 로컬 +X(각도 0) 에서 시작하므로:
//   mid = π/2 - SA/2 - i*SA  →  텍스처 그릴 때 쓴 공식과 동일
function pocketLocalAngle(i){
  return norm(Math.PI/2 - SA/2 - i*SA);
}

// 포켓 i 의 "월드 각도" = 로컬 각도 + 휠 회전(wAngle)
// Three.js Group.rotation.y = wAngle 이고,
// 공 bAngle 은 Three.js XZ 평면 기준 atan2(z,x) 와 동일한 방향
function pocketWorldAngle(i, wAng){
  return norm(-pocketLocalAngle(i) + wAng + POCKET_ANGLE_OFFSET);
}
function pocketWorldAngleAlt(i,wAng){
  return norm(pocketLocalAngle(i) + wAng);
}

// 현재 볼 월드 각도에서 가장 가까운 포켓 인덱스를 반환
function closestPocketIndex(ballWorldAngle, wAng){
  let best=-1, bestDiff=Infinity;
  for(let i=0;i<N;i++){
    const wa = pocketWorldAngle(i, wAng);
    let diff = Math.abs(norm(ballWorldAngle - wa));
    if(diff > Math.PI) diff = Math.PI*2 - diff;
    if(diff < bestDiff){ bestDiff=diff; best=i; }
  }
  return best;
}
function closestPocketIndexAlt(ballWorldAngle,wAng){
  let best=-1, bestDiff=Infinity;
  for(let i=0;i<N;i++){
    const wa=pocketWorldAngleAlt(i,wAng);
    let diff=Math.abs(norm(ballWorldAngle-wa));
    if(diff>Math.PI) diff=Math.PI*2-diff;
    if(diff<bestDiff){bestDiff=diff;best=i;}
  }
  return best;
}
function deg(a){return (norm(a)*180/Math.PI).toFixed(2);}
// ─────────────────────────────────────────────────────────────

let balance=10000, bets={}, chip=25, spinning=false, history=[];
let wAngle=0, bAngle=0, bRadius=3.85, bVel=0, wVel=0;
let phase='idleSpin', resultNum=0;
let settleTargetAngle = 0;
let settlePocketIdx = -1;
let settleWheelFinalAngle = 0;
const debugEl=document.getElementById('debug');
const pocketMarkers=[];
let triggeredPocketIdx=-1;
let triggeredPocketNum='-';
let lastTriggerLogKey='';

function updateDebug(){
  if(!DEBUG || !debugEl)return;
  const ballWA=norm(bAngle);
  const plusIdx=closestPocketIndex(ballWA,wAngle);
  const minusIdx=closestPocketIndexAlt(ballWA,wAngle);
  const markerIdx=closestPocketIndexByMarker(ballWA);
  const plusNum=NUMS[plusIdx];
  const minusNum=NUMS[minusIdx];
  const markerNum=NUMS[markerIdx];
  const settleNum=settlePocketIdx>=0?NUMS[settlePocketIdx]:'-';
  debugEl.textContent=
`phase        ${phase}
ball angle   ${deg(ballWA)} deg
wheel angle  ${deg(wAngle)} deg
ball radius  ${bRadius.toFixed(3)}
ball vel     ${bVel.toFixed(4)}
wheel vel    ${wVel.toFixed(4)}

+formula     idx ${String(plusIdx).padStart(2,' ')} / num ${plusNum}
-formula     idx ${String(minusIdx).padStart(2,' ')} / num ${minusNum}
marker       idx ${String(markerIdx).padStart(2,' ')} / num ${markerNum}
trigger      idx ${triggeredPocketIdx>=0?String(triggeredPocketIdx).padStart(2,' '):'-'} / num ${triggeredPocketNum}
settle idx   ${settlePocketIdx>=0?String(settlePocketIdx).padStart(2,' '):'-'}
settle num   ${settleNum}
target angle ${settlePocketIdx>=0?deg(settleTargetAngle)+' deg':'-'}`;
}

document.getElementById('panel').innerHTML=`
<div class="panel-card title-card">
  <span class="eyebrow">Roulette Atelier</span>
  <h1>Velvet Noire</h1>
  <p>Place chips on numbers or sections, then watch where the ball comes to rest.</p>
</div>
<div class="panel-card">
  <div class="section-label">Salon Ledger</div>
  <div class="stat-row"><span>Chip Stack</span><strong id="bal">10,000 chips</strong></div>
  <div class="stat-row" style="margin-top:8px"><span>Total Bet</span><strong id="tbet">0 chips</strong></div>
  <div class="stat-row" style="margin-top:8px"><span>Session Net</span><strong id="profit">0 chips</strong></div>
</div>
<div class="panel-card">
  <div class="section-label">Chips</div>
  <div id="chips" style="margin-top:10px"></div>
</div>
<div class="panel-card">
  <div class="section-label">Inside Bets</div>
  <div id="ng" style="margin-top:10px"></div>
</div>
<div class="panel-card">
  <div class="section-label">Columns</div>
  <div id="cg" style="margin-top:10px"></div>
</div>
<div class="panel-card">
  <div class="section-label">Outside Bets</div>

</div>

</div>

  <div id="hist" style="margin-top:10px"></div>
</div>
`;

const chipDefs=[
  {v:1,bg:'#4f6c73'},
  {v:5,bg:'#8a5b52'},
  {v:10,bg:'#6d7f62'},
  {v:25,bg:'#2c2623'},
  {v:100,bg:'#b79867'}
];
const chipsEl=document.getElementById('chips');
chipDefs.forEach(({v,bg})=>{
  const d=document.createElement('button');
  d.type='button';
  d.className='chip-btn'+(v===25?' selected':'');
  d.style.background=bg;
  d.textContent=v;
  d.addEventListener('click',()=>{
    chip=v;
    chipsEl.querySelectorAll('.chip-btn').forEach(x=>x.classList.remove('selected'));
    d.classList.add('selected');
  });
  chipsEl.appendChild(d);
});

function markBetButton(btn){
  btn.style.filter='saturate(1.15) brightness(1.02)';
  btn.style.transform='translateY(-1px)';
}
function clearBetButton(btn){
  btn.style.filter='';
  btn.style.transform='';
}
function pb(btn){
  if(spinning)return;
  const cost=chip;
  if(balance<cost){setMsg('Not enough chips.','#d64545');return;}
  const k=btn.dataset.bet;
  balance-=cost;
  bets[k]=(bets[k]||0)+cost;
  markBetButton(btn);
  let sp=btn.querySelector('span.bc');
  if(!sp){
    sp=document.createElement('span');
    sp.className='bc bet-chip';
    btn.appendChild(sp);
  }
  sp.textContent=bets[k];
  updUI();
}

const ng=document.getElementById('ng');
const z0=document.createElement('button');
z0.type='button';
z0.textContent='0';
z0.dataset.bet='n0';
z0.className='grid-btn zero';
z0.style.gridColumn='span 2';
z0.addEventListener('click',function(){pb(this);});
ng.appendChild(z0);
for(let i=1;i<=36;i++){
  const b=document.createElement('button');
  b.type='button';
  b.textContent=i;
  b.dataset.bet='n'+i;
  b.className='grid-btn '+(REDS.has(i)?'red':'black');
  b.addEventListener('click',function(){pb(this);});
  ng.appendChild(b);
}

[['col1','Column 1','2:1'],['col2','Column 2','2:1'],['col3','Column 3','2:1']].forEach(([k,l,o])=>{

[['lo','1–18','1:1'],['hi','19–36','1:1'],['even','Even','1:1'],['odd','Odd','1:1'],
 ['red','Red','1:1'],['blk','Black','1:1'],
 ['d1','1–12','2:1'],['d2','13–24','2:1'],['d3','25–36','2:1']].forEach(([k,l,o])=>{
  const b=document.createElement('button');
  b.type='button';
  b.dataset.bet=k;

  if(k==='blk'){b.style.background='#221d1d';b.style.color='#fffdf4';}
  b.innerHTML=l+'<br><span style="font-size:10px">'+o+'</span>';
  b.addEventListener('click',function(){pb(this);});

});

document.getElementById('sb').addEventListener('click',doSpin);
document.getElementById('cb').addEventListener('click',()=>{
  if(spinning)return;
  Object.values(bets).forEach(v=>{balance+=v;});
  bets={};
  document.querySelectorAll('#ng button,#cg button,#og button').forEach(b=>{
    clearBetButton(b);
    const s=b.querySelector('span.bc');if(s)s.remove();
  });
  updUI();
  setMsg('');
});

function updUI(){
  document.getElementById('bal').textContent=balance.toLocaleString()+' chips';
  const tb=Object.values(bets).reduce((a,v)=>a+v,0);
  document.getElementById('tbet').textContent=tb.toLocaleString()+' chips';
  const p=balance-10000;
  const pe=document.getElementById('profit');
  pe.textContent=(p>=0?'+':'-')+Math.abs(p).toLocaleString()+' chips';
  pe.style.color=p>=0?'#248a54':'#d64545';
}
function setMsg(m,c){
  const e=document.getElementById('msg');
  e.textContent=m;
  e.style.color=c||'#5a4337';
}
function showBanner(t){
  const b=document.getElementById('rb');
  b.textContent=t;
  b.classList.add('show');
  setTimeout(()=>b.classList.remove('show'),3000);

function makeWheelTex(){
  const cv=document.createElement('canvas');
  cv.width=cv.height=1024;
  const ctx=cv.getContext('2d');
  const cx=512,cy=512,r=498;
  const bgGrad=ctx.createRadialGradient(cx,cy,120,cx,cy,r);
  bgGrad.addColorStop(0,'#7ef0a3');
  bgGrad.addColorStop(0.62,'#2e9e55');
  bgGrad.addColorStop(1,'#1a5f35');
  ctx.fillStyle=bgGrad;
  ctx.fillRect(0,0,1024,1024);
  ctx.strokeStyle='rgba(26,20,18,0.9)';
  ctx.lineWidth=24;
  ctx.beginPath();
  ctx.arc(cx,cy,r-12,0,Math.PI*2);
  ctx.stroke();
  ctx.strokeStyle='rgba(255,240,180,0.96)';
  ctx.lineWidth=12;
  ctx.beginPath();
  ctx.arc(cx,cy,r-24,0,Math.PI*2);
  ctx.stroke();
  for(let i=0;i<N;i++){
    // 텍스처 그릴 때의 각도 계산 — pocketLocalAngle 과 동일한 로직
    const mid = Math.PI/2 - SA/2 - i*SA;
    const a=-(mid+SA/2);
    const a2=-(mid-SA/2);
    const n=NUMS[i];
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,r,a,a2);
    ctx.closePath();
    ctx.fillStyle=n===0?'#4cd16f':REDS.has(n)?'#ff6b57':'#1d1717';
    ctx.fill();
    ctx.strokeStyle='rgba(26,20,18,0.72)';
    ctx.lineWidth=4;
    ctx.stroke();
    const tx=cx+(r-75)*Math.cos(mid),ty=cy-(r-75)*Math.sin(mid);
    ctx.save();
    ctx.translate(tx,ty);
    ctx.rotate(-mid+Math.PI/2);
    ctx.fillStyle='#fffdf6';
    ctx.font='900 30px Trebuchet MS, sans-serif';
    ctx.strokeStyle='rgba(26,20,18,0.65)';
    ctx.lineWidth=6;
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.strokeText(n,0,0);
    ctx.fillText(n,0,0);
    ctx.restore();
  }
  ctx.strokeStyle='rgba(255,255,255,0.32)';
  ctx.lineWidth=12;
  ctx.beginPath();
  ctx.arc(cx,cy,180,0,Math.PI*2);
  ctx.stroke();
  const tx=new THREE.CanvasTexture(cv);
  tx.encoding=THREE.sRGBEncoding;
  return tx;
}

function worldAngleFromMarker(marker){
  const worldPos=new THREE.Vector3();
  marker.getWorldPosition(worldPos);
  return norm(Math.atan2(worldPos.z,worldPos.x));
}

function closestPocketIndexByMarker(ballWorldAngle){
  let best=-1,bestDiff=Infinity;
  for(const marker of pocketMarkers){
    const wa=worldAngleFromMarker(marker);
    let diff=Math.abs(norm(ballWorldAngle-wa));
    if(diff>Math.PI) diff=Math.PI*2-diff;
    if(diff<bestDiff){
      bestDiff=diff;
      best=marker.userData.pocketIndex;
    }
  }
  return best;
}

function closestPocketIndexByLocalTrigger(){
  const localBall=wg.worldToLocal(ballMesh.position.clone());
  const localRadius=Math.hypot(localBall.x,localBall.z);
  if(localRadius<2.72 || localRadius>3.42) return -1;

  const localAngle=norm(Math.atan2(localBall.z,localBall.x));
  let best=-1;
  let bestDiff=Infinity;

  for(let i=0;i<N;i++){
    const centerA=norm(-pocketLocalAngle(i));
    let diff=Math.abs(norm(localAngle-centerA));
    if(diff>Math.PI) diff=Math.PI*2-diff;
    if(diff<bestDiff){
      bestDiff=diff;
      best=i;
    }
  }

  if(bestDiff>SA*0.6) return -1;
  return best;
}

}

function doSpin(){
  if(spinning)return;
  const tb=Object.values(bets).reduce((a,v)=>a+v,0);
  if(tb===0){setMsg('Place chips before spinning.','#d64545');return;}
  spinning=true;
  document.getElementById('sb').disabled=true;
  document.getElementById('rb').classList.remove('show');
  setMsg('');
  wVel=0.015+Math.random()*0.005;
  bVel=-(0.12+Math.random()*0.04);
  bRadius=3.85;
  phase='spinning';
  settleTargetAngle=0;
  settlePocketIdx=-1;
  settleWheelFinalAngle=0;
  triggeredPocketIdx=-1;
  triggeredPocketNum='-';
  lastTriggerLogKey='';
  if(DEBUG) console.log('[spin:start]',{wAngle,bAngle});
}

function finish(){
  phase='resting';
  spinning=false;
  wVel=0;
  bVel=0;
  document.getElementById('sb').disabled=false;

  if(settlePocketIdx>=0){
    resultNum=NUMS[settlePocketIdx];
  }else if(triggeredPocketIdx>=0){
    resultNum=NUMS[triggeredPocketIdx];
  }
  if(DEBUG) console.log('[spin:finish]',{
    resultNum,
    settlePocketIdx,
    ballAngleDeg:deg(bAngle),
    wheelAngleDeg:deg(wAngle),
    plusIdx:closestPocketIndex(norm(bAngle),wAngle),
    minusIdx:closestPocketIndexAlt(norm(bAngle),wAngle),
    markerIdx:closestPocketIndexByMarker(norm(bAngle))
  });

  const betTotal=Object.values(bets).reduce((a,v)=>a+v,0);
  const payout=calcPayout(resultNum);
  balance+=payout;
  const net=payout-betTotal;
  const col=resultNum===0?'Green':REDS.has(resultNum)?'Red':'Black';
  showBanner(resultNum+' ('+col+')');
  if(payout>0) setMsg('+'+net.toLocaleString()+' chips won','#248a54');
  else setMsg(betTotal.toLocaleString()+' chips lost','#d64545');
  history.unshift(resultNum);
  if(history.length>18)history.pop();
  document.getElementById('hist').innerHTML=history.map(h=>{
    const c=h===0?'#49c979':REDS.has(h)?'#ff6b57':'#1b1717';
    return `<div class="hist-ball" style="background:${c}">${h}</div>`;
  }).join('');
  bets={};
  document.querySelectorAll('#ng button,#cg button,#og button').forEach(b=>{
    clearBetButton(b);
    const s=b.querySelector('span.bc');if(s)s.remove();
  });
  updUI();
  if(balance<=0){
    balance=10000;
    setTimeout(()=>setMsg('10,000 chips restored','#1a1412'),300);
    updUI();
  }
}

function calcPayout(r){
  let w=0;
  const isR=REDS.has(r);
  Object.entries(bets).forEach(([k,a])=>{
    if(k==='n'+r)w+=a*36;
    else if(k==='red'&&isR)w+=a*2;
    else if(k==='blk'&&r>0&&!isR)w+=a*2;
    else if(k==='even'&&r>0&&r%2===0)w+=a*2;
    else if(k==='odd'&&r%2===1)w+=a*2;
    else if(k==='lo'&&r>=1&&r<=18)w+=a*2;
    else if(k==='hi'&&r>=19&&r<=36)w+=a*2;
    else if(k==='d1'&&r>=1&&r<=12)w+=a*3;
    else if(k==='d2'&&r>=13&&r<=24)w+=a*3;
    else if(k==='d3'&&r>=25&&r<=36)w+=a*3;
    else if(k==='col1'&&C1.includes(r))w+=a*3;
    else if(k==='col2'&&C2.includes(r))w+=a*3;
    else if(k==='col3'&&C3.includes(r))w+=a*3;
  });
  return w;
}

  if(!isDrag)return;
  theta-=(e.clientX-pm.x)*0.007;
  phi=Math.max(0.25,Math.min(1.45,phi-(e.clientY-pm.y)*0.007));
  pm={x:e.clientX,y:e.clientY};
  setCam();
});

function animate(){
  requestAnimationFrame(animate);
  const pulse=0.5+0.5*Math.sin(performance.now()*0.0018);
  orbHaloOuter.material.opacity=0.022+pulse*0.012;
  orbHaloInner.material.opacity=0.03+pulse*0.012;
  orbHaloOuter.scale.setScalar(1+0.008*pulse);
  orbHaloInner.scale.setScalar(1+0.005*pulse);
  orbAuraLight.intensity=0.055+pulse*0.025;

  if(phase==='spinning'){
    wAngle+=wVel;
    bAngle+=bVel;
    wVel*=0.9992;
    bVel*=0.992;
    if(Math.abs(bVel)<0.05) bRadius+=(3.15-bRadius)*0.02;

    if(Math.abs(bVel)<0.018){
      phase='settling';
      wVel=0;
      settleWheelFinalAngle=wAngle;
      const bwa=norm(bAngle);
      const plusIdx=closestPocketIndex(bwa, settleWheelFinalAngle);
      const minusIdx=closestPocketIndexAlt(bwa, settleWheelFinalAngle);
      const markerIdx=closestPocketIndexByMarker(bwa);
      const triggerIdx=triggeredPocketIdx>=0?triggeredPocketIdx:closestPocketIndexByLocalTrigger();
      settlePocketIdx=triggerIdx>=0?triggerIdx:markerIdx;
      resultNum=NUMS[settlePocketIdx];
      settleTargetAngle=worldAngleFromMarker(pocketMarkers[settlePocketIdx]);
      if(DEBUG) console.log('[spin:settle]',{
        ballAngleDeg:deg(bwa),
        wheelAngleDeg:deg(settleWheelFinalAngle),
        plusIdx,
        plusNum:NUMS[plusIdx],
        minusIdx,
        minusNum:NUMS[minusIdx],
        markerIdx,
        markerNum:NUMS[markerIdx],
        triggerIdx,
        triggerNum:triggerIdx>=0?NUMS[triggerIdx]:null,
        targetAngleDeg:deg(settleTargetAngle)
      });
    }
    wg.rotation.y = wAngle;
    updateBallMesh();

  } else if(phase==='settling'){
    wAngle=settleWheelFinalAngle;
    wg.rotation.y=wAngle;

    const curBall=norm(bAngle);
    let delta=norm(settleTargetAngle-curBall);
    if(delta > Math.PI) delta -= Math.PI*2;
    const preferredDir = bVel!==0 ? Math.sign(bVel) : -1;

    // If the remaining correction is very small but reverses direction,
    // snap instead of showing an awkward tiny rollback at the end.
    if(Math.sign(delta)!==preferredDir && Math.abs(delta)<0.055){
      bAngle=norm(settleTargetAngle);
      bVel=0;
      bRadius=2.85;
      updateBallMesh();
      finish();
      return;
    }

    const speed=Math.min(Math.abs(delta), Math.max(0.008, Math.abs(delta)*0.15+0.002));

    if(Math.abs(delta) < 0.003){
      bAngle=norm(settleTargetAngle);
      bVel=0;
      bRadius=2.85;
      updateBallMesh();
      finish();
      return;
    }

    bVel=Math.sign(delta)*speed;
    bAngle=norm(bAngle+bVel);
    bRadius+=(2.85-bRadius)*0.07;
    updateBallMesh();

  } else if(phase==='idleSpin'){
    wAngle+=0.002;
    wg.rotation.y=wAngle;
  }

  if(wg.userData.outline) wg.userData.outline.rotation.y=wg.rotation.y;
  updateTriggeredPocket();
  if(DEBUG) updateDebug();
  outlineEffect.render(scene,camera);
}

doResize();
updUI();
updateBallMesh();
if(DEBUG) updateDebug();
animate();
window.addEventListener('resize',doResize);
});
</script>
