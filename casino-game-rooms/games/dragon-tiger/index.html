<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dragon Tiger</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:
    radial-gradient(circle at top,rgba(255,255,255,.74),transparent 24%),
    radial-gradient(circle at 18% 18%,rgba(75,184,255,.22),transparent 18%),
    radial-gradient(circle at 82% 14%,rgba(255,111,88,.18),transparent 18%),
    linear-gradient(180deg,#ffd95f 0%,#ff9c60 100%);
  font-family:"Trebuchet MS","Malgun Gothic",sans-serif;
  color:#1b1412;
}
body::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  opacity:.18;
  background:
    radial-gradient(circle,rgba(27,20,18,.12) 2px,transparent 2px) 0 0/24px 24px,
    repeating-conic-gradient(from 0deg,rgba(255,255,255,.14) 0 8deg,transparent 8deg 16deg);
}
.app{
  width:min(1380px,calc(100vw - 24px));
  min-height:min(900px,calc(100vh - 24px));
  border:5px solid #1b1412;
  border-radius:34px;
  overflow:hidden;
  background:#fff3d0;
  box-shadow:0 18px 0 #4d2f25,0 34px 86px rgba(0,0,0,.25);
}
.stage{
  position:relative;
  padding:24px;
  background:
    radial-gradient(circle at center,rgba(255,255,255,.22),transparent 28%),
    linear-gradient(180deg,#fff0b9 0%,#ffca83 48%,#ff9f6c 100%);
}
.stage::before{
  content:"";
  position:absolute;
  inset:18px;
  border:4px solid rgba(27,20,18,.92);
  border-radius:30px;
  pointer-events:none;
  box-shadow:inset 0 0 0 4px rgba(255,255,255,.24);
}
.stage::after{
  content:"";
  position:absolute;
  inset:8% 10%;
  border-radius:50%;
  opacity:.28;
  pointer-events:none;
  background:repeating-conic-gradient(from 0deg,rgba(255,255,255,.28) 0 8deg,transparent 8deg 17deg);
}
.panel{
  position:relative;
  z-index:1;
  border:4px solid #1b1412;
  border-radius:24px;
  background:#fffaf0;
  box-shadow:0 8px 0 rgba(27,20,18,.14);
}
.status{
  margin-bottom:18px;
  padding:16px 18px;
  background:linear-gradient(180deg,rgba(255,255,255,.65),transparent 100%),#fffdf3;
}
.status-label{
  font-size:12px;
  font-weight:900;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:#6f5138;
}
#message{
  margin-top:8px;
  min-height:60px;
  font-size:24px;
  font-weight:900;
  line-height:1.15;
}
.arena{
  position:relative;
  z-index:1;
  display:grid;
  grid-template-columns:minmax(0,1fr) 300px;
  gap:18px;
}
.table{
  position:relative;
  padding:18px;
  border:5px solid #1b1412;
  border-radius:30px;
  background:linear-gradient(180deg,rgba(255,255,255,.28),transparent 100%),linear-gradient(180deg,#ff6f58 0%,#ffa056 52%,#ffd44f 100%);
  box-shadow:0 12px 0 rgba(27,20,18,.16);
}
.table::before{
  content:"";
  position:absolute;
  inset:12px;
  border:4px solid rgba(27,20,18,.82);
  border-radius:24px;
  pointer-events:none;
}
.table-head{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  margin-bottom:14px;
}
.jackpot{
  padding:10px 14px;
  border:4px solid #1b1412;
  border-radius:18px;
  background:#fff4b0;
  font-size:20px;
  font-weight:900;
  box-shadow:0 6px 0 rgba(27,20,18,.14);
}
.lights{display:flex;gap:8px}
.light{
  width:18px;height:18px;border:3px solid #1b1412;border-radius:50%;
  background:#fff7d9;box-shadow:0 0 0 4px rgba(255,255,255,.18);
  transition:transform .18s ease,background .18s ease,box-shadow .18s ease;
}
.light.active{
  transform:scale(1.12);
  background:#fff159;
  box-shadow:0 0 0 4px rgba(255,255,255,.16),0 0 24px rgba(255,241,89,.65);
}
.battlefield{
  position:relative;
  min-height:640px;
  border:5px solid #1b1412;
  border-radius:26px;
  overflow:hidden;
  background:
    radial-gradient(circle at center,rgba(255,255,255,.09),transparent 34%),
    linear-gradient(180deg,#2d1831 0%,#1c1324 100%);
}
.battlefield::before{
  content:"";
  position:absolute;
  inset:18px;
  border:3px dashed rgba(255,255,255,.18);
  border-radius:22px;
  pointer-events:none;
}
.vs-ring{
  position:absolute;
  left:50%;
  top:50%;
  width:160px;
  height:160px;
  transform:translate(-50%,-50%);
  border:5px solid rgba(255,255,255,.22);
  border-radius:50%;
  box-shadow:0 0 0 8px rgba(255,255,255,.06);
}
.vs-badge{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%) rotate(-4deg);
  width:100px;
  height:100px;
  display:grid;
  place-items:center;
  border:4px solid #1b1412;
  border-radius:24px;
  background:#fff5c2;
  font-size:28px;
  font-weight:900;
  box-shadow:0 10px 0 rgba(27,20,18,.14);
}
.lane{
  position:absolute;
  top:50%;
  width:42%;
  transform:translateY(-50%);
  display:grid;
  justify-items:center;
  gap:14px;
}
.lane.dragon{left:4%}
.lane.tiger{right:4%}
.lane-title{
  padding:8px 14px;
  border:4px solid #1b1412;
  border-radius:999px;
  background:#fffaf0;
  font-size:18px;
  font-weight:900;
  box-shadow:0 6px 0 rgba(27,20,18,.12);
}
.lane.dragon .lane-title{background:#ffd2c8}
.lane.tiger .lane-title{background:#cfe9ff}
.card{
  width:220px;
  height:310px;
  position:relative;
  border:5px solid #1b1412;
  border-radius:28px;
  background:#fffdf6;
  box-shadow:0 12px 0 rgba(27,20,18,.14);
  transform-style:preserve-3d;
  transition:transform .55s ease;
}
.card.flipping{transform:rotateY(180deg)}
.face{
  position:absolute;
  inset:0;
  backface-visibility:hidden;
  border-radius:22px;
  overflow:hidden;
}
.face.front{
  padding:18px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  background:
    linear-gradient(180deg,rgba(255,255,255,.25),transparent 100%),
    #fffdf6;
}
.face.back{
  transform:rotateY(180deg);
  background:
    repeating-conic-gradient(from 0deg,rgba(255,255,255,.18) 0 10deg,transparent 10deg 18deg),
    linear-gradient(180deg,#ff7c63 0%,#ffb254 100%);
}
.face.back::before{
  content:"JH";
  position:absolute;
  inset:0;
  display:grid;
  place-items:center;
  font-size:56px;
  font-weight:900;
  color:#fff8ea;
  text-shadow:0 4px 0 rgba(27,20,18,.18);
}
.card-corner{
  display:grid;
  gap:2px;
  font-weight:900;
  font-size:20px;
  line-height:1;
}
.card-corner.bottom{
  justify-self:end;
  align-self:end;
  transform:rotate(180deg);
}
.card-center{
  display:grid;
  place-items:center;
  gap:10px;
}
.card-rank{
  font-size:84px;
  font-weight:900;
  line-height:1;
}
.card-suit{
  font-size:50px;
  line-height:1;
}
.card.red{color:#d34444}
.card.black{color:#1b1412}
.winner-chip{
  min-height:34px;
  padding:8px 14px;
  border:4px solid #1b1412;
  border-radius:999px;
  background:#fff8e6;
  font-size:14px;
  font-weight:900;
  box-shadow:0 6px 0 rgba(27,20,18,.12);
}
.panel-stack{display:grid;gap:12px}
.box{padding:14px}
.stat{
  display:flex;
  justify-content:space-between;
  gap:10px;
  font-size:14px;
  font-weight:800;
}
.stat + .stat{margin-top:8px}
.stat strong{font-size:18px}
.bet-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
  margin-top:10px;
}
.bet-btn,.pick-btn,.action-btn{
  appearance:none;
  border:4px solid #1b1412;
  border-radius:18px;
  cursor:pointer;
  font-weight:900;
  box-shadow:0 6px 0 rgba(27,20,18,.14);
  transition:transform .12s ease,box-shadow .12s ease;
}
.bet-btn:hover,.pick-btn:hover,.action-btn:hover{transform:translateY(-2px)}
.bet-btn:active,.pick-btn:active,.action-btn:active{transform:translateY(3px);box-shadow:0 2px 0 rgba(27,20,18,.12)}
.bet-btn{
  min-height:56px;
  background:#fff8e4;
  font-size:15px;
  line-height:1;
}
.bet-btn small{
  display:block;
  margin-top:4px;
  font-size:10px;
  letter-spacing:.08em;
  text-transform:uppercase;
  opacity:.82;
}
.bet-btn.selected{background:#ff8454;color:#fffdf6}
.pick-grid{
  display:grid;
  gap:10px;
  margin-top:10px;
}
.pick-btn{
  min-height:58px;
  font-size:17px;
}
#dragonBtn{background:#ff6857;color:#fffdf6}
#tigerBtn{background:#4bb8ff;color:#fffdf6}
#tieBtn{background:#ffd453;color:#1b1412}
.action-btn{
  width:100%;
  min-height:58px;
  margin-top:10px;
  background:#58d88e;
  color:#14301d;
  font-size:17px;
}
.history-list{
  margin-top:10px;
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}
.history-pill{
  min-width:58px;
  padding:8px 10px;
  border:3px solid #1b1412;
  border-radius:999px;
  background:#fff7d8;
  text-align:center;
  font-size:12px;
  font-weight:900;
}
.odds-list{
  display:grid;
  gap:8px;
  margin-top:10px;
}
.odds-item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 12px;
  border:3px solid #1b1412;
  border-radius:16px;
  background:#fff7de;
  font-size:14px;
  font-weight:900;
}
@media (max-width:1180px){
  .arena{grid-template-columns:1fr}
  .lane{position:relative;top:auto;left:auto;right:auto;transform:none;width:100%}
  .battlefield{display:grid;gap:16px;padding:18px}
  .vs-ring,.vs-badge{position:relative;left:auto;top:auto;transform:none;margin:0 auto}
}
</style>
</head>
<body>
<div class="app">
  <section class="stage">
    <div class="status panel">
      <div class="status-label">Status</div>
      <div id="message">Choose your bet and pick Dragon, Tiger, or Tie.</div>
    </div>

    <div class="arena">
      <div class="table">
        <div class="table-head">
          <div class="jackpot">TIE x8</div>
          <div class="lights" id="lights"></div>
        </div>

        <div class="battlefield">
          <div class="vs-ring"></div>
          <div class="vs-badge" id="resultBadge">VS</div>

          <div class="lane dragon">
            <div class="lane-title">DRAGON</div>
            <div class="card red" id="dragonCard">
              <div class="face front" id="dragonFront"></div>
              <div class="face back"></div>
            </div>
            <div class="winner-chip" id="dragonStatus">Waiting</div>
          </div>

          <div class="lane tiger">
            <div class="lane-title">TIGER</div>
            <div class="card black" id="tigerCard">
              <div class="face front" id="tigerFront"></div>
              <div class="face back"></div>
            </div>
            <div class="winner-chip" id="tigerStatus">Waiting</div>
          </div>
        </div>
      </div>

      <div class="panel-stack">
        <div class="panel box">
          <div class="status-label">Table</div>
          <div class="stat" style="margin-top:10px"><span>Balance</span><strong id="balance">1000</strong></div>
          <div class="stat"><span>Bet</span><strong id="bet">25</strong></div>
          <div class="stat"><span>Last Win</span><strong id="lastWin">0</strong></div>
          <div class="stat"><span>Selected</span><strong id="selectedBet">None</strong></div>
        </div>

        <div class="panel box">
          <div class="status-label">Bet Select</div>
          <div class="bet-grid" id="betGrid"></div>
          <div class="pick-grid">
            <button class="pick-btn" id="dragonBtn" type="button">BET DRAGON</button>
            <button class="pick-btn" id="tigerBtn" type="button">BET TIGER</button>
            <button class="pick-btn" id="tieBtn" type="button">BET TIE</button>
            <button class="action-btn" id="chargeBtn" type="button">+500 COINS</button>
          </div>
        </div>

        <div class="panel box">
          <div class="status-label">Payouts</div>
          <div class="odds-list">
            <div class="odds-item"><span>Dragon</span><span>x2</span></div>
            <div class="odds-item"><span>Tiger</span><span>x2</span></div>
            <div class="odds-item"><span>Tie</span><span>x8</span></div>
          </div>
        </div>

        <div class="panel box">
          <div class="status-label">Recent</div>
          <div class="history-list" id="history"></div>
        </div>
      </div>
    </div>
  </section>
</div>

<script>
(() => {
  const suits = [
    { icon: "♠", color: "black" },
    { icon: "♥", color: "red" },
    { icon: "♦", color: "red" },
    { icon: "♣", color: "black" }
  ];
  const ranks = [
    { value: 1, label: "A" }, { value: 2, label: "2" }, { value: 3, label: "3" },
    { value: 4, label: "4" }, { value: 5, label: "5" }, { value: 6, label: "6" },
    { value: 7, label: "7" }, { value: 8, label: "8" }, { value: 9, label: "9" },
    { value: 10, label: "10" }, { value: 11, label: "J" }, { value: 12, label: "Q" }, { value: 13, label: "K" }
  ];

  const state = {
    balance: 1000,
    bet: 25,
    lastWin: 0,
    selected: null,
    dealing: false,
    history: []
  };

  const balanceEl = document.getElementById("balance");
  const betEl = document.getElementById("bet");
  const lastWinEl = document.getElementById("lastWin");
  const selectedBetEl = document.getElementById("selectedBet");
  const messageEl = document.getElementById("message");
  const historyEl = document.getElementById("history");
  const resultBadgeEl = document.getElementById("resultBadge");
  const dragonStatusEl = document.getElementById("dragonStatus");
  const tigerStatusEl = document.getElementById("tigerStatus");
  const dragonFrontEl = document.getElementById("dragonFront");
  const tigerFrontEl = document.getElementById("tigerFront");
  const dragonCardEl = document.getElementById("dragonCard");
  const tigerCardEl = document.getElementById("tigerCard");
  const betGridEl = document.getElementById("betGrid");
  const chargeBtn = document.getElementById("chargeBtn");
  const lightsEl = document.getElementById("lights");

  const lightEls = [];
  let lightTimer = null;

  function createLights() {
    for (let i = 0; i < 8; i += 1) {
      const light = document.createElement("div");
      light.className = "light";
      lightsEl.appendChild(light);
      lightEls.push(light);
    }
  }

  function startLights(speed = 220) {
    if (lightTimer) clearInterval(lightTimer);
    let index = 0;
    lightTimer = setInterval(() => {
      lightEls.forEach((light, i) => light.classList.toggle("active", i === index || i === (index + 4) % lightEls.length));
      index = (index + 1) % lightEls.length;
    }, speed);
  }

  function pulseWinLights() {
    if (lightTimer) clearInterval(lightTimer);
    lightEls.forEach((light, i) => {
      light.classList.add("active");
      light.style.background = i % 2 ? "#58d88e" : "#fff159";
    });
    setTimeout(() => {
      lightEls.forEach((light) => {
        light.classList.remove("active");
        light.style.background = "#fff7d9";
      });
      startLights();
    }, 800);
  }

  function randomCard() {
    const suit = suits[Math.floor(Math.random() * suits.length)];
    const rank = ranks[Math.floor(Math.random() * ranks.length)];
    return { ...rank, suit: suit.icon, color: suit.color };
  }

  function renderCard(target, card) {
    target.innerHTML = `
      <div class="card-corner">${card.label}<span>${card.suit}</span></div>
      <div class="card-center">
        <div class="card-rank">${card.label}</div>
        <div class="card-suit">${card.suit}</div>
      </div>
      <div class="card-corner bottom">${card.label}<span>${card.suit}</span></div>
    `;
  }

  function setCardFace(cardEl, frontEl, card) {
    renderCard(frontEl, card);
    cardEl.classList.toggle("red", card.color === "red");
    cardEl.classList.toggle("black", card.color !== "red");
  }

  function renderStats() {
    balanceEl.textContent = state.balance.toLocaleString();
    betEl.textContent = state.bet.toLocaleString();
    lastWinEl.textContent = state.lastWin.toLocaleString();
    selectedBetEl.textContent = state.selected ? state.selected.toUpperCase() : "None";
  }

  function setMessage(text, tone = "normal") {
    messageEl.textContent = text;
    messageEl.style.color = tone === "win" ? "#1f8d55" : tone === "alert" ? "#b93a3a" : "#1b1412";
  }

  function renderHistory() {
    if (state.history.length === 0) {
      historyEl.innerHTML = `<div class="history-pill">READY</div>`;
      return;
    }
    historyEl.innerHTML = state.history.map((item) => `<div class="history-pill">${item}</div>`).join("");
  }

  function renderBetButtons() {
    [10, 25, 50, 100].forEach((value) => {
      const button = document.createElement("button");
      button.type = "button";
      button.className = "bet-btn" + (state.bet === value ? " selected" : "");
      button.innerHTML = `${value}<small>BET</small>`;
      button.addEventListener("click", () => {
        if (state.dealing) return;
        state.bet = value;
        betGridEl.querySelectorAll(".bet-btn").forEach((item) => item.classList.remove("selected"));
        button.classList.add("selected");
        renderStats();
      });
      betGridEl.appendChild(button);
    });
  }

  function resetBoardText() {
    dragonStatusEl.textContent = "Waiting";
    tigerStatusEl.textContent = "Waiting";
    resultBadgeEl.textContent = "VS";
  }

  function settleResult(result, dragonCard, tigerCard) {
    let winner = "tie";
    if (dragonCard.value > tigerCard.value) winner = "dragon";
    if (dragonCard.value < tigerCard.value) winner = "tiger";

    let payout = 0;
    if (state.selected === winner) {
      payout = winner === "tie" ? state.bet * 8 : state.bet * 2;
      state.balance += payout;
      state.lastWin = payout - state.bet;
      setMessage(`${winner.toUpperCase()} wins. +${payout.toLocaleString()} coins`, "win");
      pulseWinLights();
    } else {
      state.lastWin = 0;
      setMessage(`${winner.toUpperCase()} wins. Bet missed.`, "alert");
    }

    dragonStatusEl.textContent = dragonCard.value > tigerCard.value ? "Winner" : dragonCard.value === tigerCard.value ? "Tie" : "Lost";
    tigerStatusEl.textContent = tigerCard.value < dragonCard.value ? "Winner" : dragonCard.value === tigerCard.value ? "Tie" : "Lost";
    resultBadgeEl.textContent = winner.toUpperCase();
    state.history.unshift(`${winner.toUpperCase()} ${dragonCard.label}-${tigerCard.label}`);
    state.history = state.history.slice(0, 10);
    renderStats();
    renderHistory();
    state.dealing = false;
  }

  function deal(choice) {
    if (state.dealing) return;
    if (state.balance < state.bet) {
      setMessage("Not enough coins. Recharge and try again.", "alert");
      return;
    }
    state.selected = choice;
    state.balance -= state.bet;
    state.lastWin = 0;
    state.dealing = true;
    renderStats();
    setMessage(`Betting on ${choice.toUpperCase()}... dealing cards.`);
    resetBoardText();
    startLights(90);

    dragonCardEl.classList.remove("flipping");
    tigerCardEl.classList.remove("flipping");
    void dragonCardEl.offsetWidth;
    void tigerCardEl.offsetWidth;
    dragonCardEl.classList.add("flipping");
    tigerCardEl.classList.add("flipping");

    const dragonCard = randomCard();
    const tigerCard = randomCard();

    setTimeout(() => {
      setCardFace(dragonCardEl, dragonFrontEl, dragonCard);
      setCardFace(tigerCardEl, tigerFrontEl, tigerCard);
    }, 220);

    setTimeout(() => {
      dragonCardEl.classList.remove("flipping");
      tigerCardEl.classList.remove("flipping");
      settleResult(choice, dragonCard, tigerCard);
    }, 720);
  }

  document.getElementById("dragonBtn").addEventListener("click", () => deal("dragon"));
  document.getElementById("tigerBtn").addEventListener("click", () => deal("tiger"));
  document.getElementById("tieBtn").addEventListener("click", () => deal("tie"));
  chargeBtn.addEventListener("click", () => {
    if (state.dealing) return;
    state.balance += 500;
    renderStats();
    setMessage("Added 500 coins.");
  });

  renderBetButtons();
  createLights();
  renderStats();
  renderHistory();
  resetBoardText();
  setCardFace(dragonCardEl, dragonFrontEl, randomCard());
  setCardFace(tigerCardEl, tigerFrontEl, randomCard());
  startLights();
})();
</script>
</body>
</html>
