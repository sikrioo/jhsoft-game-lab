
<div id="dice-app" style="position:relative;width:100%;height:600px;overflow:hidden;border-radius:var(--border-radius-lg);border:0.5px solid var(--color-border-tertiary);">
  <canvas id="c" style="width:100%;height:100%;display:block;"></canvas>
  <div style="position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;">
    <div id="result-display" style="position:absolute;top:20px;left:50%;transform:translateX(-50%);white-space:nowrap;font-size:18px;font-weight:500;color:var(--color-text-primary);background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);padding:8px 24px;border-radius:var(--border-radius-lg);opacity:0;transition:opacity 0.4s;"><span id="result-text"></span></div>
    <div style="position:absolute;bottom:24px;left:50%;transform:translateX(-50%);display:flex;gap:12px;pointer-events:all;">
      <button id="roll-btn" style="padding:12px 32px;font-size:15px;font-weight:500;border-radius:var(--border-radius-lg);cursor:pointer;background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);color:var(--color-text-primary);">주사위 굴리기</button>
      <button id="reset-btn" style="padding:12px 20px;font-size:15px;font-weight:500;border-radius:var(--border-radius-lg);cursor:pointer;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);color:var(--color-text-secondary);">리셋</button>
    </div>
    <div style="position:absolute;bottom:72px;left:50%;transform:translateX(-50%);font-size:12px;color:var(--color-text-secondary);">드래그로 시점 조정</div>
    <div id="history" style="position:absolute;top:20px;right:20px;font-size:13px;color:var(--color-text-secondary);text-align:right;line-height:1.8;"></div>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
<script>
(function(){
const container = document.getElementById('dice-app');
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true, alpha:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.setSize(container.clientWidth, container.clientHeight);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, container.clientWidth/container.clientHeight, 0.1, 100);

scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const dir = new THREE.DirectionalLight(0xffffff, 1.0);
dir.position.set(5,12,8); dir.castShadow=true;
dir.shadow.camera.left=-8; dir.shadow.camera.right=8;
dir.shadow.camera.top=8; dir.shadow.camera.bottom=-8;
dir.shadow.mapSize.width=dir.shadow.mapSize.height=2048;
scene.add(dir);
scene.add(Object.assign(new THREE.PointLight(0xffeedd,0.4,30), {position:{x:-5,y:5,z:-5}}));

const floor = new THREE.Mesh(new THREE.PlaneGeometry(30,30), new THREE.MeshLambertMaterial({color:0xf0ede8}));
floor.rotation.x=-Math.PI/2; floor.position.y=-0.01; floor.receiveShadow=true;
scene.add(floor);
const grid = new THREE.GridHelper(20,20,0xcccccc,0xcccccc);
grid.position.y=0.001; grid.material.opacity=0.3; grid.material.transparent=true;
scene.add(grid);

// Physics world - 핵심 파라미터 조정
const world = new CANNON.World();
world.gravity.set(0,-30,0); // 중력 강화
world.broadphase = new CANNON.NaiveBroadphase();
world.solver.iterations = 40; // 솔버 반복 증가로 정확도 향상
world.solver.tolerance = 0.0001;

const gMat = new CANNON.Material('g');
const dMat = new CANNON.Material('d');
world.addContactMaterial(new CANNON.ContactMaterial(gMat, dMat, {
  friction: 0.8,       // 마찰 강화 - 모서리서 미끄러짐 방지
  restitution: 0.2,    // 반발력 낮춤 - 덜 통통 튀게
  contactEquationStiffness: 1e8,
  contactEquationRelaxation: 3,
  frictionEquationStiffness: 1e8,
}));

const gBody = new CANNON.Body({mass:0, material:gMat});
gBody.addShape(new CANNON.Plane());
gBody.quaternion.setFromAxisAngle(new CANNON.Vec3(1,0,0),-Math.PI/2);
world.addBody(gBody);

[[0,5,-8],[0,5,8],[-8,5,0],[8,5,0]].forEach((p,i)=>{
  const b = new CANNON.Body({mass:0,material:gMat});
  b.addShape(new CANNON.Plane());
  b.position.set(...p);
  b.quaternion.set(...[[0,0,0,1],[0,1,0,0],[0,0.707,0,0.707],[0,-0.707,0,0.707]][i]);
  world.addBody(b);
});

function makeTex(n) {
  const cv=document.createElement('canvas'); cv.width=cv.height=256;
  const ctx=cv.getContext('2d');
  ctx.fillStyle='#ffffff'; ctx.beginPath(); ctx.roundRect(8,8,240,240,24); ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,0.08)'; ctx.lineWidth=2; ctx.stroke();
  ctx.fillStyle='#cc2222';
  ({1:[[128,128]],2:[[80,80],[176,176]],3:[[80,80],[128,128],[176,176]],
    4:[[80,80],[176,80],[80,176],[176,176]],5:[[80,80],[176,80],[128,128],[80,176],[176,176]],
    6:[[80,75],[176,75],[80,128],[176,128],[80,181],[176,181]]})[n]
  .forEach(([x,y])=>{ctx.beginPath();ctx.arc(x,y,22,0,Math.PI*2);ctx.fill();});
  return new THREE.CanvasTexture(cv);
}

// +X=2,-X=5,+Y=1,-Y=6,+Z=3,-Z=4
const faceOrder=[2,5,1,6,3,4];
const faceMats=faceOrder.map(n=>new THREE.MeshLambertMaterial({map:makeTex(n)}));
const localAxes=[
  new THREE.Vector3(1,0,0), new THREE.Vector3(-1,0,0),
  new THREE.Vector3(0,1,0), new THREE.Vector3(0,-1,0),
  new THREE.Vector3(0,0,1), new THREE.Vector3(0,0,-1),
];

let mesh=null, body=null, rolling=false, settled=false, settleTimer=0;
let rollHistory=[], nudgeTimer=0, nudgeCount=0;

function createDice(){
  if(mesh){scene.remove(mesh); world.remove(body);}
  mesh=new THREE.Mesh(new THREE.BoxGeometry(2,2,2), faceMats);
  mesh.castShadow=mesh.receiveShadow=true;
  scene.add(mesh);

  body=new CANNON.Body({
    mass:1, material:dMat,
    linearDamping:0.2,   // 감쇠 증가
    angularDamping:0.3,  // 각속도 감쇠 증가 - 회전 빨리 줄어들도록
  });
  body.addShape(new CANNON.Box(new CANNON.Vec3(1,1,1)));
  body.position.set(0,5,0);
  world.addBody(body);
  rolling=false; settled=false; settleTimer=0; nudgeTimer=0; nudgeCount=0;
  document.getElementById('result-display').style.opacity='0';
}
createDice();

function rollDice(){
  if(rolling) return;
  rolling=true; settled=false; settleTimer=0; nudgeTimer=0; nudgeCount=0;
  document.getElementById('result-display').style.opacity='0';
  body.position.set((Math.random()-.5)*3, 7+Math.random()*2, (Math.random()-.5)*3);
  body.velocity.set((Math.random()-.5)*6, -3+Math.random()*1, (Math.random()-.5)*6);
  // 굴리는 힘을 면 방향으로 편향 - 모서리로 서있기 어렵도록 초기 회전 조정
  const rx=(Math.round(Math.random()*3)-1.5)*10+(Math.random()-.5)*5;
  const ry=(Math.random()-.5)*20;
  const rz=(Math.round(Math.random()*3)-1.5)*10+(Math.random()-.5)*5;
  body.angularVelocity.set(rx,ry,rz);
  body.wakeUp();
}

function getTopFace(){
  const q=mesh.quaternion, up=new THREE.Vector3(0,1,0);
  let best=-1, bestDot=-Infinity;
  localAxes.forEach((a,i)=>{
    const d=a.clone().applyQuaternion(q).dot(up);
    if(d>bestDot){bestDot=d;best=i;}
  });
  return {face:faceOrder[best], confidence:bestDot};
}

// 주사위가 면으로 착지했는지 확인 - confidence가 낮으면 모서리/꼭짓점에 선 것
function isFaceUp(){
  const {confidence}=getTopFace();
  return confidence > 0.85; // cos(약32도) - 면 중심에서 32도 이내면 면으로 인정
}

function nudgeDice(){
  // 랜덤 방향으로 작은 충격을 줘서 모서리에서 떨어뜨림
  const fx=(Math.random()-.5)*3;
  const fz=(Math.random()-.5)*3;
  body.applyImpulse(new CANNON.Vec3(fx,1,fz), new CANNON.Vec3(0,0,0));
  body.angularVelocity.set((Math.random()-.5)*8,(Math.random()-.5)*8,(Math.random()-.5)*8);
  body.wakeUp();
  settleTimer=0;
}

const labels=['','⚀','⚁','⚂','⚃','⚄','⚅'];
function showResult(face){
  document.getElementById('result-text').textContent=`결과: ${face} ${labels[face]}`;
  document.getElementById('result-display').style.opacity='1';
  rollHistory.unshift(face);
  if(rollHistory.length>8) rollHistory.pop();
  document.getElementById('history').innerHTML=
    '<div style="margin-bottom:4px;font-size:11px;color:var(--color-text-tertiary);">최근 기록</div>'+
    rollHistory.map(n=>`<div style="font-size:13px;">${n} ${labels[n]}</div>`).join('');
}

let orbitTheta=0, orbitPhi=0.5, isDrag=false, pm={x:0,y:0};
container.addEventListener('mousedown',e=>{isDrag=true;pm={x:e.clientX,y:e.clientY};});
window.addEventListener('mouseup',()=>{isDrag=false;});
window.addEventListener('mousemove',e=>{if(!isDrag)return;orbitTheta-=(e.clientX-pm.x)*0.008;orbitPhi=Math.max(0.1,Math.min(1.4,orbitPhi-(e.clientY-pm.y)*0.008));pm={x:e.clientX,y:e.clientY};});
container.addEventListener('touchstart',e=>{isDrag=true;pm={x:e.touches[0].clientX,y:e.touches[0].clientY};},{passive:true});
window.addEventListener('touchend',()=>{isDrag=false;});
window.addEventListener('touchmove',e=>{if(!isDrag)return;orbitTheta-=(e.touches[0].clientX-pm.x)*0.008;orbitPhi=Math.max(0.1,Math.min(1.4,orbitPhi-(e.touches[0].clientY-pm.y)*0.008));pm={x:e.touches[0].clientX,y:e.touches[0].clientY};},{passive:true});

document.getElementById('roll-btn').onclick=rollDice;
document.getElementById('reset-btn').onclick=()=>{createDice();rollHistory=[];document.getElementById('history').innerHTML='';};

const fixedStep=1/120; // 물리 스텝 세분화 - 충돌 정확도 향상
let last=performance.now();

function animate(now){
  requestAnimationFrame(animate);
  const dt=Math.min((now-last)/1000,0.05); last=now;

  if(rolling && body){
    world.step(fixedStep, dt, 6); // substep 증가
    const p=body.position, q=body.quaternion;
    mesh.position.set(p.x, Math.max(p.y,1), p.z);
    mesh.quaternion.set(q.x,q.y,q.z,q.w);

    const speed=body.velocity.length()+body.angularVelocity.length();

    if(speed < 0.5 && p.y < 2.0){
      settleTimer+=dt;
      nudgeTimer+=dt;

      // 0.8초마다 면으로 안착했는지 체크, 아니면 nudge
      if(nudgeTimer > 0.8){
        nudgeTimer=0;
        if(!isFaceUp() && nudgeCount < 5){
          nudgeCount++;
          nudgeDice();
          return;
        }
      }

      if(settleTimer > 1.2 && !settled){
        if(isFaceUp()){
          settled=true; rolling=false;
          showResult(getTopFace().face);
        } else if(nudgeCount >= 5){
          // nudge를 다 써도 안되면 강제로 가장 가까운 면으로 스냅
          settled=true; rolling=false;
          showResult(getTopFace().face);
        }
      }
    } else {
      settleTimer=0; nudgeTimer=0;
    }
  } else if(mesh){
    mesh.rotation.y+=0.005;
  }

  const r=18;
  camera.position.set(Math.sin(orbitTheta)*Math.cos(orbitPhi)*r, Math.sin(orbitPhi)*r, Math.cos(orbitTheta)*Math.cos(orbitPhi)*r);
  camera.lookAt(0,1,0);
  renderer.render(scene,camera);
}
animate(performance.now());

window.addEventListener('resize',()=>{
  const w=container.clientWidth,h=container.clientHeight;
  camera.aspect=w/h; camera.updateProjectionMatrix(); renderer.setSize(w,h);
});
})();
</script>
