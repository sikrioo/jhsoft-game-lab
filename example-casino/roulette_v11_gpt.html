function makeWheelTex(){
  const cv=document.createElement('canvas'); cv.width=cv.height=1024;
  const ctx=cv.getContext('2d');
  const cx=512,cy=512,r=498;
  const bgGrad=ctx.createRadialGradient(cx,cy,120,cx,cy,r);
  bgGrad.addColorStop(0,'#2c5938');
  bgGrad.addColorStop(0.68,'#1c3d26');
  bgGrad.addColorStop(1,'#102114');
  ctx.fillStyle=bgGrad; ctx.fillRect(0,0,1024,1024);
  ctx.strokeStyle='rgba(240,205,120,0.95)';
  ctx.lineWidth=18;
  ctx.beginPath();
  ctx.arc(cx,cy,r-10,0,Math.PI*2);
  ctx.stroke();
  for(let i=0;i<N;i++){
    const mid = pocketCenterAngle(i);
    const a = -(mid + SA/2);
    const a2 = -(mid - SA/2);
    const n=NUMS[i];
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,r,a,a2); ctx.closePath();
    ctx.fillStyle=n===0?'#279a48':REDS.has(n)?'#b32020':'#121212'; ctx.fill();
    ctx.strokeStyle='rgba(245,220,150,0.82)'; ctx.lineWidth=3.2; ctx.stroke();
    const tx=cx+(r-75)*Math.cos(mid), ty=cy-(r-75)*Math.sin(mid);
    ctx.save(); ctx.translate(tx,ty); ctx.rotate(-mid+Math.PI/2);
    ctx.fillStyle='#fffdf5'; ctx.font='bold 28px Georgia, serif';
    ctx.strokeStyle='rgba(0,0,0,0.55)';
    ctx.lineWidth=4;
    ctx.shadowColor='rgba(0,0,0,0.25)';
    ctx.shadowBlur=3;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.strokeText(n,0,0);
    ctx.fillText(n,0,0); ctx.restore();
  }
  ctx.strokeStyle='rgba(255,245,220,0.35)';
  ctx.lineWidth=10;
  ctx.beginPath();
  ctx.arc(cx,cy,180,0,Math.PI*2);
  ctx.stroke();
  return new THREE.CanvasTexture(cv);
}

function updatePocketMarkers(){
  const markerRadius = 3.18;
  const currentRel = normalizeAngle(bAngle - wAngle);
  const currentIndex = angleToPocketIndex(currentRel);
  const currentIndexB = angleToPocketIndexB(currentRel);
  const currentIndexC = angleToPocketIndexC(currentRel);
  const currentAngle = pocketCenterAngle(currentIndex);
  const currentAngleB = pocketCenterAngleB(currentIndexB);
  const currentAngleC = pocketCenterAngleC(currentIndexC);

  targetMarker.position.x = Math.cos(targetPocketAngle) * markerRadius;
  targetMarker.position.z = Math.sin(targetPocketAngle) * markerRadius;

  currentMarker.position.x = Math.cos(currentAngle) * markerRadius;
  currentMarker.position.z = Math.sin(currentAngle) * markerRadius;

  currentMarkerB.position.x = Math.cos(currentAngleB) * markerRadius;
  currentMarkerB.position.z = Math.sin(currentAngleB) * markerRadius;

  currentMarkerC.position.x = Math.cos(currentAngleC) * markerRadius;
  currentMarkerC.position.z = Math.sin(currentAngleC) * markerRadius;
}

function doSpin(){
  if(spinning)return;
  const tb=Object.values(bets).reduce((a,v)=>a+v,0);
  if(tb===0){setMsg('베팅을 먼저 하세요!');return;}

  spinning=true;
  document.getElementById('sb').disabled=true;
  document.getElementById('rb').style.opacity='0';
  setMsg('');

  resultNum=0;
  targetPocketAngle = 0;

  wVel = 0.015 + Math.random()*0.005;
  bVel = -(0.12 + Math.random()*0.04);
  bRadius = 3.85;
  phase='spinning';
  debugLastRemain = Infinity;
  debugLastCurrentNum = null;
  debugAlertedStuck = false;
  debugAlertedMismatch = false;
  debugSettleTrace = [];
  debugLog('spin-start');
}

function finish(){
  dumpSettleTrace('finish-before');
  debugLog('finish-before');
  phase='resting'; spinning=false;
  wVel = 0;
  bVel = 0;
  document.getElementById('sb').disabled=false;
  const betTotal=Object.values(bets).reduce((a,v)=>a+v,0);
  const payout=calcPayout(resultNum);
  balance+=payout;
  const net=payout-betTotal;
  const col=resultNum===0?'초록':REDS.has(resultNum)?'빨강':'검정';
  showBanner(resultNum+' ('+col+')');
  if(payout>0)setMsg('+₩'+net.toLocaleString()+' 획득!','#6ddd9d');
  else setMsg('₩'+betTotal.toLocaleString()+' 잃었습니다.','#ff6060');

  history.unshift(resultNum); if(history.length>18)history.pop();
  document.getElementById('hist').innerHTML=history.map(h=>{
    const c=h===0?'#1a6a30':REDS.has(h)?'#8a1515':'#222';
    return `<div style="width:22px;height:22px;border-radius:50%;background:${c};display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:500;color:#fff;border:1px solid rgba(255,255,255,0.15);">${h}</div>`;
  }).join('');

  bets={};
  document.querySelectorAll('#ng button,#cg button,#og button').forEach(b=>{
    b.style.background='#0d2a18'; b.style.borderColor='#1e4a2a';
    const s=b.querySelector('span.bc'); if(s)s.remove();
  });
  updUI();
  if(balance<=0){balance=10000;setTimeout(()=>setMsg('₩10,000 충전!','#f0c040'),300);updUI();}
  debugLog('finish-after');
}

function calcPayout(r){
  let w=0; const isR=REDS.has(r);
  Object.entries(bets).forEach(([k,a])=>{
    if(k==='n'+r)w+=a*36;
    else if(k==='red'&&isR)w+=a*2;
    else if(k==='blk'&&r>0&&!isR)w+=a*2;
    else if(k==='even'&&r>0&&r%2===0)w+=a*2;
    else if(k==='odd'&&r%2===1)w+=a*2;
    else if(k==='lo'&&r>=1&&r<=18)w+=a*2;
    else if(k==='hi'&&r>=19&&r<=36)w+=a*2;
    else if(k==='d1'&&r>=1&&r<=12)w+=a*3;
    else if(k==='d2'&&r>=13&&r<=24)w+=a*3;
    else if(k==='d3'&&r>=25&&r<=36)w+=a*3;
    else if(k==='col1'&&C1.includes(r))w+=a*3;
    else if(k==='col2'&&C2.includes(r))w+=a*3;
    else if(k==='col3'&&C3.includes(r))w+=a*3;
  });
  return w;
}

function setCam(){
  const r=16;
  camera.position.set(Math.sin(theta)*Math.cos(phi)*r, Math.sin(phi)*r, Math.cos(theta)*Math.cos(phi)*r);
  camera.lookAt(0,0,0);
}
setCam();
cw.addEventListener('mousedown',e=>{isDrag=true; pm={x:e.clientX,y:e.clientY};});
window.addEventListener('mouseup',()=>{isDrag=false;});
window.addEventListener('mousemove',e=>{
  if(!isDrag)return;
  theta-=(e.clientX-pm.x)*0.007;
  phi=Math.max(0.25,Math.min(1.45,phi-(e.clientY-pm.y)*0.007));
  pm={x:e.clientX,y:e.clientY}; setCam();
});

function forwardAngleDiff(target, current){
  let diff = (target - current) % (Math.PI * 2);
  if(diff < 0) diff += Math.PI * 2;
  return diff;
}

function normalizeAngle(angle){
  const twoPi = Math.PI * 2;
  angle %= twoPi;
  if(angle < 0) angle += twoPi;
  return angle;
}

function backwardAngleDiff(target, current){
  return normalizeAngle(current - target);
}

function alignAngleBackward(target, current){
  while(target > current) target -= Math.PI * 2;
  while(current - target >= Math.PI * 2) target += Math.PI * 2;
  return target;
}

function shortestSignedAngleDelta(target, current){
  let delta = normalizeAngle(target - current);
  if(delta > Math.PI) delta -= Math.PI * 2;
  return delta;
}

function angleToPocketIndex(relAngle){
  const normalized = normalizeAngle((Math.PI / 2) - (SA / 2) - relAngle);
  return Math.round(normalized / SA) % N;
}

function angleToPocketIndexB(relAngle){
  const normalized = normalizeAngle(relAngle + Math.PI / 2 - SA / 2);
  return Math.round(normalized / SA) % N;
}

function angleToPocketIndexC(relAngle){
  const normalized = normalizeAngle(relAngle);
  return Math.round(normalized / SA) % N;
}

function pocketCenterAngle(index){
  return normalizeAngle((Math.PI / 2) - (SA / 2) - (index * SA));
}

function pocketCenterAngleB(index){
  return normalizeAngle((index * SA) - (Math.PI / 2) + (SA / 2));
}

function pocketCenterAngleC(index){
  return normalizeAngle(index * SA);
}

function getSettlingPocketIndex(relAngle){
  return angleToPocketIndex(relAngle);
}

function fmtAngle(rad){
  return (normalizeAngle(rad) * 180 / Math.PI).toFixed(1);
}

function getDebugSnapshot(remain=0){
  const relAngle = normalizeAngle(bAngle - wAngle);
  const currentPocketIndex = angleToPocketIndex(relAngle);
  const currentPocketIndexB = angleToPocketIndexB(relAngle);
  const currentPocketIndexC = angleToPocketIndexC(relAngle);
  const targetPocketIndex = angleToPocketIndex(targetPocketAngle);
  const currentMarkerAngle = pocketCenterAngle(currentPocketIndex);
  const currentMarkerAngleB = pocketCenterAngleB(currentPocketIndexB);
  const currentMarkerAngleC = pocketCenterAngleC(currentPocketIndexC);
  const currentMarkerWorldAngle = normalizeAngle(wAngle + currentMarkerAngle);
  const currentMarkerWorldAngleB = normalizeAngle(wAngle + currentMarkerAngleB);
  const currentMarkerWorldAngleC = normalizeAngle(wAngle + currentMarkerAngleC);
  const targetMarkerWorldAngle = normalizeAngle(wAngle + targetPocketAngle);
  const ballAngle = normalizeAngle(Math.atan2(ballMesh.position.z, ballMesh.position.x));
  return {
    phase,
    resultNum,
    targetNum: NUMS[targetPocketIndex],
    currentNum: NUMS[currentPocketIndex],
    currentNumB: NUMS[currentPocketIndexB],
    currentNumC: NUMS[currentPocketIndexC],
    wAngle: fmtAngle(wAngle),
    bAngle: fmtAngle(bAngle),
    relAngle: fmtAngle(relAngle),
    targetRel: fmtAngle(targetPocketAngle),
    targetAbs: fmtAngle(wAngle + settleTargetRel),
    ballAngle: fmtAngle(ballAngle),
    currentMarkerAngle: fmtAngle(currentMarkerAngle),
    currentMarkerAngleB: fmtAngle(currentMarkerAngleB),
    currentMarkerAngleC: fmtAngle(currentMarkerAngleC),
    targetMarkerAngle: fmtAngle(targetPocketAngle),
    currentMarkerWorldAngle: fmtAngle(currentMarkerWorldAngle),
    currentMarkerWorldAngleB: fmtAngle(currentMarkerWorldAngleB),
    currentMarkerWorldAngleC: fmtAngle(currentMarkerWorldAngleC),
    targetMarkerWorldAngle: fmtAngle(targetMarkerWorldAngle),
    ballToCurrent: fmtAngle(normalizeAngle(ballAngle - currentMarkerAngle)),
    ballToCurrentB: fmtAngle(normalizeAngle(ballAngle - currentMarkerAngleB)),
    ballToCurrentC: fmtAngle(normalizeAngle(ballAngle - currentMarkerAngleC)),
    ballToTarget: fmtAngle(normalizeAngle(ballAngle - targetPocketAngle)),
    ballToCurrentWorld: fmtAngle(normalizeAngle(ballAngle - currentMarkerWorldAngle)),
    ballToCurrentWorldB: fmtAngle(normalizeAngle(ballAngle - currentMarkerWorldAngleB)),
    ballToCurrentWorldC: fmtAngle(normalizeAngle(ballAngle - currentMarkerWorldAngleC)),
    ballToTargetWorld: fmtAngle(normalizeAngle(ballAngle - targetMarkerWorldAngle)),
    remain: remain.toFixed(4),
    wVel: wVel.toFixed(4),
    bVel: bVel.toFixed(4),
    radius: bRadius.toFixed(3),
    settleFrame: settleFrames
  };
}

function debugLog(tag, remain=0){
  const s = getDebugSnapshot(remain);
  console.log(
    `[roulette-debug] ${tag} ` +
    `phase=${s.phase} result=${s.resultNum} target=${s.targetNum} current=${s.currentNum} ` +
    `remain=${s.remain} frame=${s.settleFrame} ` +
    `w=${s.wAngle} b=${s.bAngle} rel=${s.relAngle} ` +
    `ball=${s.ballAngle} currMark=${s.currentMarkerAngle} tgtMark=${s.targetMarkerAngle} ` +
    `currWorld=${s.currentMarkerWorldAngle}/${s.currentMarkerWorldAngleB}/${s.currentMarkerWorldAngleC} tgtWorld=${s.targetMarkerWorldAngle} ` +
    `ballToCurr=${s.ballToCurrent} ballToTgt=${s.ballToTarget} ` +
    `ballToCurrWorld=${s.ballToCurrentWorld}/${s.ballToCurrentWorldB}/${s.ballToCurrentWorldC} ballToTgtWorld=${s.ballToTargetWorld}`
  );
}

function pushSettleTrace(extra=''){
  const s = getDebugSnapshot(debugLastRemain === Infinity ? 0 : debugLastRemain);
  const line =
    `f=${s.settleFrame} ` +
    `res=${s.resultNum}/${s.targetNum}/${s.currentNum}/${s.currentNumB}/${s.currentNumC} ` +
    `w=${s.wAngle} b=${s.bAngle} rel=${s.relAngle} ` +
    `tRel=${s.targetRel} tAbs=${s.targetAbs} ` +
    `ball=${s.ballAngle} cW=${s.currentMarkerWorldAngle}/${s.currentMarkerWorldAngleB}/${s.currentMarkerWorldAngleC} tW=${s.targetMarkerWorldAngle} ` +
    `dCW=${s.ballToCurrentWorld}/${s.ballToCurrentWorldB}/${s.ballToCurrentWorldC} dTW=${s.ballToTargetWorld} ` +
    `rem=${s.remain} wv=${s.wVel} bv=${s.bVel} ${extra}`.trim();
  debugSettleTrace.push(line);
  if(debugSettleTrace.length > 24) debugSettleTrace.shift();
}

function dumpSettleTrace(tag){
  if(!debugSettleTrace.length) return;
  console.log(`[roulette-debug] ${tag}-trace-start`);
  debugSettleTrace.forEach(line=>console.log(`[roulette-debug] ${line}`));
  console.log(`[roulette-debug] ${tag}-trace-end`);
}

function updateDebug(remain=0){
  const s = getDebugSnapshot(remain);
  debugEl.textContent =
`phase        ${s.phase}
result       ${s.resultNum}
target num   ${s.targetNum}
current num  ${s.currentNum}
current B    ${s.currentNumB}
current C    ${s.currentNumC}
wAngle       ${s.wAngle}
bAngle       ${s.bAngle}
relAngle     ${s.relAngle}
targetRel    ${s.targetRel}
targetAbs    ${s.targetAbs}
ballAngle    ${s.ballAngle}
currentMark  ${s.currentMarkerAngle}
currentMkB   ${s.currentMarkerAngleB}
currentMkC   ${s.currentMarkerAngleC}
targetMark   ${s.targetMarkerAngle}
currWorld    ${s.currentMarkerWorldAngle}
currWorldB   ${s.currentMarkerWorldAngleB}
currWorldC   ${s.currentMarkerWorldAngleC}
tgtWorld     ${s.targetMarkerWorldAngle}
ball->curr   ${s.ballToCurrent}
ball->curB   ${s.ballToCurrentB}
ball->curC   ${s.ballToCurrentC}
ball->tgt    ${s.ballToTarget}
ball->cW     ${s.ballToCurrentWorld}
ball->cWB    ${s.ballToCurrentWorldB}
ball->cWC    ${s.ballToCurrentWorldC}
ball->tW     ${s.ballToTargetWorld}
remain       ${s.remain}
wVel         ${s.wVel}
bVel         ${s.bVel}
radius       ${s.radius}
settleFrame  ${s.settleFrame}`;
}

function animate(){
  requestAnimationFrame(animate);
  let debugRemain = 0;

  if(phase==='spinning'){
    wAngle += wVel;
    bAngle += bVel;

    wVel *= 0.999;
    bVel *= 0.992;

    if(Math.abs(bVel) < 0.05){
      bRadius += (3.15 - bRadius) * 0.02;
    }

    if(Math.abs(bVel) < 0.015){
      phase = 'settling';
      settleFrames = 0;
      const relAngle = bAngle - wAngle;
      const settlePocketIndex = getSettlingPocketIndex(relAngle);
      resultNum = NUMS[settlePocketIndex];
      targetPocketAngle = pocketCenterAngle(settlePocketIndex);
      settleTargetRel = relAngle + shortestSignedAngleDelta(targetPocketAngle, normalizeAngle(relAngle));
      const remainToTarget = settleTargetRel - relAngle;
      bVel = Math.sign(remainToTarget || 1) * Math.max(0.012, Math.min(0.04, Math.abs(remainToTarget) * 0.08));
      debugLastRemain = Infinity;
      debugLastCurrentNum = null;
      debugAlertedStuck = false;
      debugAlertedMismatch = false;
      debugSettleTrace = [];
      debugLog('settling-enter');
    }

    wg.rotation.y = wAngle;
    updateBall();
  }
  else if(phase==='settling'){
    settleFrames++;

    const settleT = Math.min(1, settleFrames / 48);
    const wheelBrake = 0.972 - settleT * 0.03;
    wVel *= wheelBrake;
    if(Math.abs(wVel) < 0.00008) wVel = 0;
    wAngle += wVel;
    wg.rotation.y = wAngle;

    const relAngle = bAngle - wAngle;
    const remain = settleTargetRel - relAngle;
    debugRemain = Math.abs(remain);
    const currentNum = NUMS[angleToPocketIndex(normalizeAngle(relAngle))];
    const targetNum = NUMS[angleToPocketIndex(targetPocketAngle)];

    if(!debugAlertedStuck && settleFrames > 90 && Math.abs(remain) > 0.03){
      debugAlertedStuck = true;
      dumpSettleTrace('settling-stuck');
      debugLog('settling-stuck', Math.abs(remain));
    }

    if(!debugAlertedMismatch && settleFrames > 30 && currentNum !== targetNum){
      debugAlertedMismatch = true;
      dumpSettleTrace('settling-mismatch');
      debugLog('settling-mismatch', Math.abs(remain));
    }

    debugLastRemain = Math.abs(remain);
    debugLastCurrentNum = currentNum;
    if(settleFrames >= 1) pushSettleTrace();

    if(Math.abs(remain) <= 0.002){
      pushSettleTrace('hit-threshold');
      bAngle = wAngle + settleTargetRel;
      bVel = 0;
      bRadius = 2.85;
      updateBall();
      finish();
    } else {
      const remainAbs = Math.abs(remain);
      const remainRatio = Math.min(1, remainAbs / 0.5);
      const desiredStep = Math.max(
        Math.abs(wVel) + 0.0012,
        Math.min(0.12, remainAbs * (0.16 + remainRatio * 0.18) + 0.001)
      );
      const step = Math.min(remainAbs, desiredStep);

      if(step >= remainAbs - 0.0005){
        pushSettleTrace('soft-finish');
        bAngle = wAngle + settleTargetRel;
        bVel = 0;
        bRadius = 2.85;
        updateBall();
        finish();
      } else {
        bVel = Math.sign(remain) * step;
        bAngle = wAngle + (relAngle + Math.sign(remain) * step);
        bRadius += (2.85 - bRadius) * (0.08 + (1 - remainRatio) * 0.10);

        if(settleFrames > 180 && remainAbs < 0.02){
          pushSettleTrace('late-finish');
          bAngle = wAngle + settleTargetRel;
          bVel = 0;
          bRadius = 2.85;
          updateBall();
          finish();
        } else {
          updateBall();
        }
      }
    }
  }
  else if(phase==='idleSpin'){
    wAngle += 0.002;
    wg.rotation.y = wAngle;
  }

  updatePocketMarkers();
  updateDebug(debugRemain);
  renderer.render(scene, camera);
}

doResize();
updUI();
animate();
window.addEventListener('resize', doResize);
});
