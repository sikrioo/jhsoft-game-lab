<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SLITHER.EXE</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
:root{--accent:#00ffc8;--accent2:#ff3c5a;--accent3:#ffd060;--ui:rgba(4,8,15,0.86);--border:rgba(0,255,200,0.18);}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#030609;font-family:'Share Tech Mono',monospace;color:var(--accent);overflow:hidden;height:100vh;width:100vw;cursor:none;}
canvas{display:block;}
#pixi-canvas{position:fixed;inset:0;z-index:1;}
#mmc{display:block;position:relative;z-index:2;}

/* cursor */
#cur{position:fixed;width:16px;height:16px;border:2px solid var(--accent);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:transform .1s,box-shadow .12s;}
#cur::after{content:'';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
#cur::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:4px;height:4px;background:var(--accent);border-radius:50%;}
#cur.b{border-color:#fff;box-shadow:0 0 14px var(--accent),0 0 30px var(--accent);transform:translate(-50%,-50%) scale(1.6);}
#cur.s{border-color:var(--accent3);box-shadow:0 0 14px var(--accent3),0 0 28px var(--accent3);transform:translate(-50%,-50%) scale(1.4);}

/* overlays */
#vig{position:fixed;inset:0;background:radial-gradient(ellipse at center,transparent 50%,rgba(0,0,0,.78)100%);pointer-events:none;z-index:50;}
#flash{position:fixed;inset:0;opacity:0;pointer-events:none;z-index:55;transition:opacity .04s;}
#flash.on{opacity:1;}
#mblur{position:fixed;inset:0;opacity:0;pointer-events:none;z-index:52;transition:opacity .15s;background:linear-gradient(90deg,rgba(0,255,200,.05)0%,transparent 32%,transparent 68%,rgba(0,255,200,.05)100%);}
#mblur.on{opacity:1;}
#sbuff{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:60;font-family:'Orbitron',sans-serif;font-size:clamp(26px,5vw,50px);font-weight:900;letter-spacing:8px;color:var(--accent3);text-shadow:0 0 30px var(--accent3),0 0 60px rgba(255,208,96,.4);opacity:0;transition:opacity .18s;}
#sbuff.on{opacity:1;}

/* HUD */
#hud{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-start;padding:16px 24px;pointer-events:none;z-index:100;}
.hc{background:var(--ui);border:1px solid var(--border);padding:10px 18px 12px;backdrop-filter:blur(16px);position:relative;overflow:hidden;min-width:108px;}
.hc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);}
.hl{font-size:8px;letter-spacing:4px;opacity:.4;text-transform:uppercase;margin-bottom:2px;}
.hv{font-family:'Orbitron',sans-serif;font-size:24px;font-weight:900;color:#fff;line-height:1;text-shadow:0 0 18px var(--accent);}
#bc{min-width:168px;}
#blr{display:flex;justify-content:space-between;margin-bottom:6px;}
#bpct{font-size:11px;color:var(--accent);}
#btrk{width:100%;height:5px;background:rgba(0,255,200,.07);border:1px solid rgba(0,255,200,.13);}
#bfil{height:100%;background:linear-gradient(90deg,#00ffc8,#00e5ff);box-shadow:0 0 10px var(--accent);transition:width .08s linear;position:relative;}
#bfil::after{content:'';position:absolute;right:0;top:-3px;width:2px;height:11px;background:#fff;box-shadow:0 0 5px var(--accent);}
#bfil.low{background:linear-gradient(90deg,#ff3c5a,#ff7060);box-shadow:0 0 10px #ff3c5a;}
#bfil.low::after{background:#ff3c5a;}
#sbtrk{width:100%;height:3px;background:rgba(255,208,96,.08);margin-top:5px;display:none;}
#sbfil{height:100%;background:linear-gradient(90deg,var(--accent3),#ffb020);box-shadow:0 0 8px var(--accent3);transition:width .1s linear;}

/* Leaderboard */
#lb{position:fixed;top:78px;right:24px;background:var(--ui);border:1px solid var(--border);backdrop-filter:blur(16px);padding:13px 17px;z-index:100;pointer-events:none;min-width:172px;}
#lb::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent3),transparent);}
.lt{font-size:8px;letter-spacing:4px;opacity:.4;margin-bottom:9px;text-transform:uppercase;}
.lr{display:flex;justify-content:space-between;align-items:center;font-size:10px;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.04);gap:10px;}
.lr:last-child{border-bottom:none;}
.lrk{opacity:.3;width:18px;font-size:9px;}
.lrn{flex:1;}
.lrs{color:var(--accent3);font-family:'Orbitron',sans-serif;font-size:9px;}
.lr.me .lrn{color:#fff;font-weight:bold;}
.lr.me .lrs{color:var(--accent);}

/* Minimap */
#mm{position:fixed;bottom:24px;right:24px;z-index:100;border:1px solid var(--border);background:rgba(4,8,15,.9);backdrop-filter:blur(12px);padding:8px;pointer-events:none;}
#mm::before{content:'MINI MAP';display:block;font-size:8px;letter-spacing:4px;opacity:.4;margin:0 0 6px 2px;}

/* Kill feed */
#kf{position:fixed;top:78px;left:50%;transform:translateX(-50%);z-index:100;pointer-events:none;display:flex;flex-direction:column;align-items:center;gap:4px;}
.ki{font-size:9px;letter-spacing:2px;padding:4px 13px;background:rgba(255,60,90,.1);border:1px solid rgba(255,60,90,.22);color:#ff9090;animation:ki .25s ease,ko .4s 2.4s ease forwards;}
.ki.pk{background:rgba(0,255,200,.07);border-color:rgba(0,255,200,.22);color:var(--accent);}
.ki.sk{background:rgba(255,208,96,.07);border-color:rgba(255,208,96,.22);color:var(--accent3);}
@keyframes ki{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
@keyframes ko{to{opacity:0;transform:translateY(-6px)}}

/* Screens */
.scr{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;background:rgba(4,8,15,.97);backdrop-filter:blur(20px);}
.scr.h{display:none;}
.lw{position:relative;margin-bottom:6px;}
.lg{font-family:'Orbitron',sans-serif;font-size:clamp(50px,8.5vw,96px);font-weight:900;letter-spacing:12px;color:transparent;background:linear-gradient(135deg,#00ffc8,#00b3ff,#00ffc8);background-size:200%;-webkit-background-clip:text;background-clip:text;animation:sh 3s linear infinite;position:relative;z-index:1;}
.lgw{position:absolute;inset:0;font-family:'Orbitron',sans-serif;font-size:clamp(50px,8.5vw,96px);font-weight:900;letter-spacing:12px;color:var(--accent);filter:blur(22px);opacity:.35;z-index:0;}
@keyframes sh{0%{background-position:0%}100%{background-position:200%}}
.ls{font-size:9px;letter-spacing:8px;opacity:.3;margin-bottom:44px;text-align:center;}
.cg{display:grid;grid-template-columns:auto 1fr;gap:8px 20px;margin-bottom:36px;font-size:10px;opacity:.55;}
.ck{color:var(--accent);opacity:1;font-weight:bold;text-align:right;}
.btn{font-family:'Orbitron',sans-serif;font-size:12px;font-weight:900;letter-spacing:5px;color:#030609;background:linear-gradient(90deg,var(--accent),#00d4ff);border:none;padding:15px 52px;cursor:pointer;transition:all .2s;text-transform:uppercase;clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);}
.btn:hover{box-shadow:0 0 38px rgba(0,255,200,.5),0 0 70px rgba(0,255,200,.2);transform:translateY(-2px) scale(1.02);}
.skinBox{margin:0 0 26px;width:min(700px,88vw);}
.skinTitle{font-size:8px;letter-spacing:5px;opacity:.38;text-align:center;margin-bottom:10px;text-transform:uppercase;}
.skinGrid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;max-height:280px;overflow-y:auto;}
.skinCard{border:1px solid rgba(0,255,200,.16);background:rgba(0,255,200,.03);padding:10px 8px;cursor:pointer;transition:.16s;position:relative;}
.skinCard:hover,.skinCard.on{border-color:rgba(0,255,200,.7);box-shadow:0 0 18px rgba(0,255,200,.13);transform:translateY(-1px);}
.skinCard.on::after{content:'✓';position:absolute;right:7px;top:5px;font-size:9px;color:var(--accent);}
.skinPreview{height:28px;margin-bottom:7px;position:relative;}
.skinPreview::after{content:'';position:absolute;left:12px;top:50%;transform:translateY(-50%);width:50px;height:13px;border-radius:99px;background:var(--sp,var(--accent));box-shadow:0 0 10px var(--sc,var(--accent));}
.skinName{font-family:'Orbitron',sans-serif;font-size:9px;color:#fff;letter-spacing:2px;text-align:center;}
.skinDesc{font-size:7px;opacity:.35;text-align:center;margin-top:3px;line-height:1.3;}
@media(max-width:640px){.skinGrid{grid-template-columns:repeat(2,1fr);}}
.sr{display:flex;gap:44px;margin-bottom:44px;}
.sb{text-align:center;}
.sv{font-family:'Orbitron',sans-serif;font-size:36px;font-weight:900;color:#fff;text-shadow:0 0 22px var(--accent);line-height:1;}
.sv.r{color:var(--accent2);text-shadow:0 0 22px var(--accent2);}
.sl{font-size:8px;letter-spacing:4px;opacity:.3;margin-top:4px;}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.055) 2px,rgba(0,0,0,.055) 4px);pointer-events:none;z-index:9998;}
</style>
</head>
<body>
<div id="cur"></div>
<div id="vig"></div>
<div id="flash"></div>
<div id="mblur"></div>
<div id="sbuff">⚡ SPEED BOOST</div>
<div id="hud">
  <div class="hc"><div class="hl">Length</div><div class="hv" id="hLen">0</div></div>
  <div class="hc" id="bc">
    <div id="blr"><div class="hl">Boost</div><div id="bpct">100%</div></div>
    <div id="btrk"><div id="bfil" style="width:100%"></div></div>
    <div id="sbtrk"><div id="sbfil" style="width:100%"></div></div>
  </div>
  <div class="hc"><div class="hl">Score</div><div class="hv" id="hScr">0</div></div>
</div>
<div id="lb"><div class="lt">Leaderboard</div><div id="lbr"></div></div>
<div id="mm"><canvas id="mmc" width="148" height="148"></canvas></div>
<div id="kf"></div>

<!-- Start -->
<div id="ss" class="scr">
  <div class="lw"><div class="lgw">SLITHER</div><div class="lg">SLITHER</div></div>
  <div class="ls">— SINGLE PLAYER —</div>
  <div class="cg">
    <span class="ck">MOUSE</span><span>방향 조종</span>
    <span class="ck">CLICK / SPACE</span><span>부스트 (꼬리 소모)</span>
    <span class="ck">Q</span><span>부스트 토글</span>
    <span class="ck" style="color:var(--accent3)">⭐ 별 먹이</span><span>3초 속도 버프</span>
  </div>
  <div class="skinBox">
    <div class="skinTitle">Select Skin</div>
    <div class="skinGrid" id="skinGrid"></div>
  </div>
  <button class="btn" id="startBtn">PLAY</button>
</div>

<!-- Death -->
<div id="ds" class="scr h">
  <div class="lw">
    <div class="lgw" style="color:#ff3c5a">DEAD</div>
    <div class="lg" style="background:linear-gradient(135deg,#ff3c5a,#ff8060,#ff3c5a);background-size:200%;-webkit-background-clip:text;background-clip:text">DEAD</div>
  </div>
  <div class="ls" style="margin-bottom:26px">지렁이가 사망했습니다</div>
  <div class="sr">
    <div class="sb"><div class="sv r" id="dLen">0</div><div class="sl">FINAL LENGTH</div></div>
    <div class="sb"><div class="sv" id="dScr">0</div><div class="sl">SCORE</div></div>
    <div class="sb"><div class="sv" id="dKil">0</div><div class="sl">KILLS</div></div>
  </div>
  <button class="btn" id="retryBtn">RETRY</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/pixi.js@7.4.2/dist/pixi.min.js"></script>
<script>
'use strict';
// ═══════════════════════════════
// CONFIG
// ═══════════════════════════════
const CFG = {
  WR:2200, FOOD_N:500, STAR_N:14, BOT_N:14,
  SR:9,                    // segment radius
  SEG_GAP:6,               // gap between segments (visual spacing)
  SPD:2.8, BST_SPD:5.8, SBUFF_SPD:5.0, SBUFF_DUR:180,
  BST_DRAIN_F:5, BST_E_DRAIN:1.8, BST_E_REGEN:0.28, MIN_LEN:8,
  CAM_ZOOM_NORM:1.0, CAM_ZOOM_BST:0.80,
  CAM_LERP:0.085, CAM_ZOOM_LERP:0.055,
  FOOD_COLS:[0x00ffc8,0x00d4ff,0xff3c5a,0xffd060,0xa78bfa,0xfb923c,0x4ade80,0xf472b6,0x60a5fa],
  BOT_NAMES:['COBRA','VIPER','MAMBA','PYTHON','ADDER','KRAIT','HYDRA','NEXUS','ZEAL','ORCA','RACER','BOID','LANCER','TYRANT'],
};

// ═══════════════════════════════
// SKINS
// ═══════════════════════════════
const SKINS=[
  {id:'neon',   name:'NEON',   hue:160,hex:0x00ffc8,css:'#00ffc8',desc:'기본형 균형형',   sp:'#00ffc8'},
  {id:'comet',  name:'COMET',  hue:210,hex:0x60a5fa,css:'#60a5fa',desc:'차가운 청색',    sp:'#60a5fa'},
  {id:'viper',  name:'VIPER',  hue:338,hex:0xff3c8a,css:'#ff3c8a',desc:'독사 핑크',      sp:'#ff3c8a'},
  {id:'titan',  name:'TITAN',  hue:45, hex:0xffd060,css:'#ffd060',desc:'황금 장갑형',    sp:'#ffd060'},
  {id:'rage',   name:'RAGE',   hue:0,  hex:0xff3c5a,css:'#ff3c5a',desc:'분노의 붉은빛',  sp:'#ff3c5a'},
  {id:'jade',   name:'JADE',   hue:138,hex:0x4ade80,css:'#4ade80',desc:'에메랄드 그린',  sp:'#4ade80'},
  {id:'void',   name:'VOID',   hue:265,hex:0xa78bfa,css:'#a78bfa',desc:'심연의 보라',    sp:'#a78bfa'},
  {id:'sunset', name:'SUNSET', hue:22, hex:0xfb923c,css:'#fb923c',desc:'노을빛 주황',    sp:'#fb923c'},
  {id:'ghost',  name:'GHOST',  hue:190,hex:0xccfbf1,css:'#ccfbf1',desc:'반투명 유령형',  sp:'linear-gradient(90deg,rgba(204,251,241,.5),rgba(204,251,241,.9))'},
  {id:'rainbow',name:'RAINBOW',hue:0,  hex:0xff3c5a,css:'#ff3c5a',desc:'무지개 패턴',    sp:'linear-gradient(90deg,#ff3c5a,#ffd060,#4ade80,#00d4ff,#a78bfa)'},
  {id:'zebra',  name:'ZEBRA',  hue:220,hex:0xdbeafe,css:'#dbeafe',desc:'줄무늬 타입',    sp:'repeating-linear-gradient(90deg,#e5e7eb 0 8px,#1a1a2e 8px 14px)'},
  {id:'lava',   name:'LAVA',   hue:15, hex:0xff6030,css:'#ff6030',desc:'용암 균열 패턴', sp:'linear-gradient(90deg,#ff6030,#ff3c5a,#ffd060)'},
];
let selectedSkin=SKINS[0];

// ═══════════════════════════════
// UTILS
// ═══════════════════════════════
const rnd  = (a,b)=>a+Math.random()*(b-a);
const rndI = (a,b)=>(a+Math.random()*(b-a))|0;
const dist = (ax,ay,bx,by)=>Math.hypot(ax-bx,ay-by);
function lerp(a,b,t){return a+(b-a)*t;}
function lerpA(a,b,t){let d=b-a;while(d>Math.PI)d-=Math.PI*2;while(d<-Math.PI)d+=Math.PI*2;return a+d*t;}
function hslHex(h,s=80,l=55){
  h=((h%360)+360)%360;s/=100;l/=100;
  const c=(1-Math.abs(2*l-1))*s,x=c*(1-Math.abs((h/60)%2-1)),m=l-c/2;
  let r=0,g=0,b=0;
  if(h<60){r=c;g=x;}else if(h<120){r=x;g=c;}else if(h<180){g=c;b=x;}
  else if(h<240){g=x;b=c;}else if(h<300){r=x;b=c;}else{r=c;b=x;}
  return((Math.round((r+m)*255)<<16)|(Math.round((g+m)*255)<<8)|Math.round((b+m)*255));
}

// ═══════════════════════════════
// SPATIAL GRID
// ═══════════════════════════════
class Grid{
  constructor(c){this.c=c;this.m=new Map();}
  k(x,y){return`${(x/this.c)|0},${(y/this.c)|0}`;}
  add(x,y,d){const k=this.k(x,y);if(!this.m.has(k))this.m.set(k,[]);this.m.get(k).push(d);}
  near(x,y,r){
    const rc=Math.ceil(r/this.c),cx=(x/this.c)|0,cy=(y/this.c)|0,res=[];
    for(let dx=-rc;dx<=rc;dx++)for(let dy=-rc;dy<=rc;dy++){
      const b=this.m.get(`${cx+dx},${cy+dy}`);if(b)for(const d of b)res.push(d);
    }return res;
  }
  clear(){this.m.clear();}
}
const GF=new Grid(80),GS=new Grid(40);

// ═══════════════════════════════
// PIXI SETUP
// ═══════════════════════════════
let W=innerWidth,H=innerHeight;
const app=new PIXI.Application({
  width:W,height:H,backgroundColor:0x030609,
  antialias:false,autoDensity:true,
  resolution:Math.min(devicePixelRatio||1,2),
  powerPreference:'high-performance',
});
app.view.id='pixi-canvas';
document.body.appendChild(app.view);
addEventListener('resize',()=>{W=innerWidth;H=innerHeight;app.renderer.resize(W,H);applyCamera();});

const world=new PIXI.Container();
app.stage.addChild(world);
const layerBG    =new PIXI.Graphics();
const layerFood  =new PIXI.Container();
const layerBodies=new PIXI.Container(); // snake body ropes
const layerHeads =new PIXI.Graphics();  // all heads+eyes in one Graphics, cleared per frame
const layerFX    =new PIXI.Container();
const layerNames =new PIXI.Container();
world.addChild(layerBG,layerFood,layerBodies,layerFX,layerHeads,layerNames);

// ═══════════════════════════════
// TEXTURE CACHE
// ═══════════════════════════════
const TEX=new Map();
function getCircleTex(col,r,glowAlpha=0){
  const key=`c:${col}:${r}:${glowAlpha}`;
  if(TEX.has(key))return TEX.get(key);
  const pad=glowAlpha>0?14:4,cr=r+pad;
  const g=new PIXI.Graphics();
  if(glowAlpha>0){g.beginFill(col,glowAlpha*0.7);g.drawCircle(cr,cr,r+8);g.endFill();}
  g.beginFill(col,0.95);g.drawCircle(cr,cr,r);g.endFill();
  g.beginFill(0xffffff,0.45);g.drawCircle(cr,cr,r*.42);g.endFill();
  const t=app.renderer.generateTexture(g,{resolution:1});g.destroy();TEX.set(key,t);return t;
}
function getStarTex(){
  if(TEX.has('star'))return TEX.get('star');
  const r=12,pad=22,cr=r+pad;
  const g=new PIXI.Graphics();
  g.beginFill(0xffd060,0.20);g.drawCircle(cr,cr,r+11);g.endFill();
  g.beginFill(0xffd060,0.96);
  const pts=[];
  for(let i=0;i<10;i++){const a=(i/10)*Math.PI*2-Math.PI/2,rr=i%2===0?r:r*.44;pts.push(cr+Math.cos(a)*rr,cr+Math.sin(a)*rr);}
  g.drawPolygon(pts);g.endFill();
  g.beginFill(0xffffff,0.65);g.drawCircle(cr,cr,r*.36);g.endFill();
  const t=app.renderer.generateTexture(g,{resolution:1});g.destroy();TEX.set('star',t);return t;
}

// Body segment texture: white circle, tinted at runtime
function getSegTex(r){
  const key=`seg:${r}`;if(TEX.has(key))return TEX.get(key);
  const pad=4,cr=r+pad;
  const g=new PIXI.Graphics();
  g.beginFill(0xffffff,1);g.drawCircle(cr,cr,r);g.endFill();
  // top-left shine baked in
  g.beginFill(0xffffff,0.28);g.drawCircle(cr-r*.24,cr-r*.24,r*.38);g.endFill();
  const t=app.renderer.generateTexture(g,{resolution:1});g.destroy();TEX.set(key,t);return t;
}

// ═══════════════════════════════
// FOOD
// ═══════════════════════════════
class Food{
  constructor(x,y,type='normal'){
    if(x===undefined){
      const a=Math.random()*Math.PI*2,d=Math.random()*CFG.WR*.95;
      this.x=Math.cos(a)*d;this.y=Math.sin(a)*d;
    }else{this.x=x;this.y=y;}
    this.type=type;
    this.ph=rnd(0,Math.PI*2);this.ps=rnd(.03,.07);
    if(type==='star'){
      this.r=12;this.val=5;this.color=0xffd060;
      this.sp=new PIXI.Sprite(getStarTex());
    }else{
      this.r=rnd(3.5,7);this.val=1;
      this.color=CFG.FOOD_COLS[rndI(0,CFG.FOOD_COLS.length)];
      this.sp=new PIXI.Sprite(getCircleTex(this.color,Math.ceil(this.r),0.18));
    }
    this.sp.anchor.set(0.5);this.sp.position.set(this.x,this.y);
    layerFood.addChild(this.sp);
  }
  tick(){
    this.ph+=this.ps;
    const p=1+.2*Math.sin(this.ph);
    this.sp.scale.set(p);
    if(this.type==='star')this.sp.rotation+=.025;
  }
  remove(){this.sp.destroy();}
}
let foods=[],stars=[];
function spawnFood(x,y){foods.push(new Food(x,y,'normal'));}
function spawnStar(){const a=Math.random()*Math.PI*2,d=rnd(100,CFG.WR*.9);stars.push(new Food(Math.cos(a)*d,Math.sin(a)*d,'star'));}
function refill(){while(foods.length<CFG.FOOD_N)spawnFood();while(stars.length<CFG.STAR_N)spawnStar();}
function removeFood(list,i){list[i].remove();list.splice(i,1);}

// ═══════════════════════════════
// SNAKE BODY: Sprite-array approach
// Each segment = one Sprite, position updated every frame.
// No Graphics.clear() → no per-frame path rebuild cost.
// ═══════════════════════════════
const SEG_R=CFG.SR;

class SnakeBody{
  constructor(snake){
    this.snake=snake;
    this.sprites=[];   // index 0 = tail end, last = neck (just before head)
    this.container=new PIXI.Container();
    layerBodies.addChild(this.container);
    // Name text for bots
    this.nameText=null;
    if(!snake.isPlayer){
      this.nameText=new PIXI.Text(snake.name,{
        fontFamily:'Share Tech Mono',fontSize:10,fill:0xffffff,
        dropShadow:true,dropShadowColor:0x000000,dropShadowBlur:4,dropShadowDistance:0,
      });
      this.nameText.anchor.set(0.5,1);
      layerNames.addChild(this.nameText);
    }
  }

  // Ensure sprite pool matches segment count
  _sync(count){
    const tex=getSegTex(SEG_R);
    while(this.sprites.length<count){
      const sp=new PIXI.Sprite(tex);
      sp.anchor.set(0.5);
      this.container.addChild(sp);
      this.sprites.push(sp);
    }
    // Hide extras
    for(let i=count;i<this.sprites.length;i++) this.sprites[i].visible=false;
  }

  update(){
    const snake=this.snake;
    const segs=snake.segs;
    const total=segs.length;
    // We draw segments 1..end (head drawn separately by layerHeads Graphics)
    const bodyCount=total-1;
    this._sync(bodyCount);

    const buffed=snake.speedBuff>0;
    const hue=buffed?45:snake.skin.hue;
    const boosting=snake.boosting;

    for(let i=0;i<bodyCount;i++){
      // i=0 → tail (segs[total-1]), i=bodyCount-1 → neck (segs[1])
      const segIdx=total-1-i;       // maps sprite index to segs index (tail first)
      const seg=segs[segIdx];
      const sp=this.sprites[i];
      sp.visible=true;
      sp.position.set(seg.x,seg.y);

      // t=0 at tail, t=1 at neck
      const t=i/Math.max(1,bodyCount-1);

      // Size: slightly larger near head
      const size=(0.68+0.32*t);
      sp.scale.set(size);

      // Color gradient: darker at tail, brighter near head
      const L=snake.isPlayer?(42+t*20):(32+t*18);
      sp.tint=hslHex(hue,snake.isPlayer?82:68,L);

      // Alpha: tail is more transparent
      sp.alpha=0.60+t*0.30;
    }

    // Name tag
    if(this.nameText){
      const h=segs[0];
      this.nameText.position.set(h.x,h.y-SEG_R*2.8);
      this.nameText.alpha=buffed?.85:.48;
    }

    // Boost aura: drawn per-snake but in layerHeads (Graphics cleared each frame)
    // Handled by drawHeads() to avoid extra Graphics objects
  }

  destroy(){
    this.container.destroy({children:true});
    if(this.nameText)this.nameText.destroy();
  }
}

// ═══════════════════════════════
// DRAW ALL HEADS (one Graphics, cleared each frame — only heads+eyes+aura, not bodies)
// This is fast: no long bezier paths, just small circles + ellipses
// ═══════════════════════════════
function drawHeads(snakeList){
  const g=layerHeads;
  g.clear();
  for(const snake of snakeList){
    if(snake.dead||snake.segs.length<1)continue;
    const segs=snake.segs;
    const buffed=snake.speedBuff>0;
    const hue=buffed?45:snake.skin.hue;
    const hx=segs[0].x,hy=segs[0].y;
    const r=SEG_R;

    // ── Boost / speed aura (front 8 segments) ──
    if(snake.boosting||buffed){
      const auraCol=buffed?0xffd060:0x00ffc8;
      for(let i=0;i<Math.min(8,segs.length-1);i++){
        const a=(1-i/8)*(snake.boosting?.13:.09);
        g.lineStyle(r*3.6*(1-i*.09),auraCol,a);
        g.moveTo(segs[i].x,segs[i].y);g.lineTo(segs[i+1].x,segs[i+1].y);
      }
      g.lineStyle(0);
    }

    // ── Head shadow ──
    g.beginFill(hslHex(hue,70,10),0.55);
    g.drawEllipse(hx+1.5,hy+1.5,r*1.7,r*1.2);
    g.endFill();

    // ── Head fill ──
    const headCol=hslHex(hue,88,snake.isPlayer?63:52);
    g.beginFill(headCol,1);
    g.drawEllipse(hx,hy,r*1.7,r*1.2);
    g.endFill();

    // ── Shine ──
    g.beginFill(0xffffff,snake.isPlayer?.27:.16);
    g.drawCircle(hx-r*.26,hy-r*.28,r*.5);
    g.endFill();

    // ── Eyes ──
    const pp=snake.angle+Math.PI/2,ef=r*.44,eo=r*.54;
    for(let s=-1;s<=1;s+=2){
      const ex=hx+Math.cos(snake.angle)*ef+Math.cos(pp)*eo*s;
      const ey=hy+Math.sin(snake.angle)*ef+Math.sin(pp)*eo*s;
      g.beginFill(0xffffff,1);g.drawCircle(ex,ey,r*.32);g.endFill();
      g.beginFill(0x080810,1);g.drawCircle(ex+Math.cos(snake.angle)*r*.13,ey+Math.sin(snake.angle)*r*.13,r*.16);g.endFill();
      g.beginFill(0xffffff,.92);g.drawCircle(ex+Math.cos(snake.angle)*r*.04-r*.08,ey+Math.sin(snake.angle)*r*.04-r*.09,r*.075);g.endFill();
    }

    // ── Face expression ──
    const mood=snake.skin.mood;
    if(mood==='smile'||mood==='angry'){
      const fx=hx+Math.cos(snake.angle)*r*.9,fy=hy+Math.sin(snake.angle)*r*.9;
      const pp2=snake.angle+Math.PI/2;
      g.lineStyle(2,0x04080f,0.82);
      if(mood==='smile'){
        g.arc(fx+Math.cos(snake.angle)*r*.08,fy+Math.sin(snake.angle)*r*.08,r*.42,snake.angle+0.28*Math.PI,snake.angle+0.72*Math.PI);
      }else{
        g.moveTo(fx+Math.cos(pp2)*-r*.4,fy+Math.sin(pp2)*-r*.4);
        g.lineTo(fx+Math.cos(pp2)*r*.4,fy+Math.sin(pp2)*r*.4);
      }
      g.lineStyle(0);
    }
  }
}

// ═══════════════════════════════
// PARTICLES
// ═══════════════════════════════
const PARTS=[],FRAGS=[];
class Particle{
  constructor(x,y,color,vx,vy,life,r){
    this.x=x;this.y=y;this.vx=vx;this.vy=vy;this.life=this.ml=life;
    const sp=new PIXI.Sprite(getCircleTex(color,Math.max(2,r|0),0.12));
    sp.anchor.set(0.5);sp.tint=color;
    layerFX.addChild(sp);this.sp=sp;
  }
  tick(){
    this.x+=this.vx;this.y+=this.vy;this.vx*=.92;this.vy*=.92;
    const t=--this.life/this.ml;
    this.sp.position.set(this.x,this.y);this.sp.scale.set(Math.max(.05,t));this.sp.alpha=t*t;
    return this.life>0;
  }
  destroy(){this.sp.destroy();}
}
class DeathFrag{
  constructor(x,y,hue){
    const a=Math.random()*Math.PI*2,s=rnd(2,7);
    this.x=x;this.y=y;this.vx=Math.cos(a)*s;this.vy=Math.sin(a)*s;
    this.life=this.ml=rndI(50,90);this.hue=hue;this.foodDropped=false;
    const col=hslHex(hue,85,58);
    const sp=new PIXI.Sprite(getSegTex(rndI(4,10)));
    sp.anchor.set(0.5);sp.tint=col;
    layerFX.addChild(sp);this.sp=sp;
  }
  tick(){
    this.x+=this.vx;this.y+=this.vy;this.vx*=.955;this.vy*=.955;
    const t=--this.life/this.ml;
    if(!this.foodDropped&&t<.45){this.foodDropped=true;if(Math.random()<.7)spawnFood(this.x+rnd(-5,5),this.y+rnd(-5,5));}
    this.sp.position.set(this.x,this.y);this.sp.scale.set(Math.max(.05,t*1.1));this.sp.alpha=Math.min(1,t*1.4);
    return this.life>0;
  }
  destroy(){this.sp.destroy();}
}
function burst(x,y,col,n=14,spd=4,life=38,r=4){
  for(let i=0;i<n;i++){const a=(i/n)*Math.PI*2+rnd(0,.5),s=spd*(.5+Math.random());PARTS.push(new Particle(x,y,col,Math.cos(a)*s,Math.sin(a)*s,life,r));}
}
function spark(x,y,angle,col){
  const a=angle+Math.PI+rnd(-.75,.75),s=rnd(2,5);PARTS.push(new Particle(x,y,col,Math.cos(a)*s,Math.sin(a)*s,rndI(10,22),rnd(1.5,3)));
}
function starBurst(x,y){for(let i=0;i<30;i++){const a=(i/30)*Math.PI*2+rnd(0,.3),s=rnd(2,6);PARTS.push(new Particle(x,y,0xffd060,Math.cos(a)*s,Math.sin(a)*s,rndI(30,60),rnd(2,5)));}}
function tickFX(){
  for(let i=PARTS.length-1;i>=0;i--){if(!PARTS[i].tick()){PARTS[i].destroy();PARTS.splice(i,1);}}
  for(let i=FRAGS.length-1;i>=0;i--){if(!FRAGS[i].tick()){FRAGS[i].destroy();FRAGS.splice(i,1);}}
}

// ═══════════════════════════════
// SNAKE
// ═══════════════════════════════
function enrichSkin(skin){
  const s={...skin};
  if(s.id==='rainbow'){s.pattern='rainbow';s.mood='smile';}
  else if(s.id==='zebra'){s.pattern='zebra';}
  else if(s.id==='lava'){s.pattern='lava';s.mood='angry';}
  else if(s.id==='ghost'){s.pattern='ghost';s.mood='smile';}
  else if(s.id==='viper'){s.mood='angry';}
  else if(s.id==='jade'){s.mood='smile';}
  else if(s.id==='rage'){s.mood='angry';}
  return s;
}
class Snake{
  constructor(x,y,len,skin,name='',isPlayer=false){
    this.name=name;this.skin=enrichSkin(skin);this.isPlayer=isPlayer;
    this.dead=false;this.speedBuff=0;this.boosting=false;
    this.angle=rnd(0,Math.PI*2);this.segs=[];
    const gap=CFG.SR*2+CFG.SEG_GAP;
    for(let i=0;i<len;i++)this.segs.push({x:x-Math.cos(this.angle)*gap*i,y:y-Math.sin(this.angle)*gap*i});
    this.body=new SnakeBody(this);
  }
  get head(){return this.segs[0];}
  get len(){return this.segs.length;}
  get effSpeed(){return this.boosting?CFG.BST_SPD:this.speedBuff>0?CFG.SBUFF_SPD:CFG.SPD;}
  steer(ta,rate){this.angle=lerpA(this.angle,ta,rate);}
  move(){
    this.segs.unshift({x:this.head.x+Math.cos(this.angle)*this.effSpeed,y:this.head.y+Math.sin(this.angle)*this.effSpeed});
    this.segs.pop();
    if(this.speedBuff>0)this.speedBuff--;
  }
  grow(n=1){const t=this.segs[this.segs.length-1];for(let i=0;i<n;i++)this.segs.push({...t});}
  shrink(n=1){
    for(let i=0;i<n&&this.segs.length>CFG.MIN_LEN;i++){
      const t=this.segs.pop();spawnFood(t.x+rnd(-5,5),t.y+rnd(-5,5));
    }
  }
  destroy(){this.body.destroy();}
}

// ═══════════════════════════════
// BOT
// ═══════════════════════════════
class Bot extends Snake{
  constructor(){
    const a=Math.random()*Math.PI*2,d=rnd(200,CFG.WR*.75);
    const skin=SKINS[rndI(0,SKINS.length)];
    super(Math.cos(a)*d,Math.sin(a)*d,rndI(18,52),skin,CFG.BOT_NAMES[rndI(0,CFG.BOT_NAMES.length)],false);
    this.ta=this.angle;this.thinkT=0;this.pers=Math.random();
  }
  think(){
    if(--this.thinkT>0)return;this.thinkT=rndI(12,28);
    const{x,y}=this.head;
    if(Math.hypot(x,y)>CFG.WR-220){this.ta=Math.atan2(-y,-x);this.boosting=this.len>CFG.MIN_LEN+10&&Math.random()<.5;return;}
    if(stars.length&&Math.random()<.28){let best=null,bd=1e9;for(const s of stars){const d=dist(x,y,s.x,s.y);if(d<bd){bd=d;best=s;}}if(best&&bd<380){this.ta=Math.atan2(best.y-y,best.x-x);return;}}
    if(player&&!player.dead&&this.pers>.58){const dp=dist(x,y,player.head.x,player.head.y);if(dp<380){this.ta=Math.atan2(player.head.y-y,player.head.x-x);this.boosting=dp<180&&this.len>CFG.MIN_LEN+5;return;}}
    const near=GF.near(x,y,300);let best=null,bd=1e9;
    for(const f of near){const d=dist(x,y,f.x,f.y);if(d<bd){bd=d;best=f;}}
    if(best)this.ta=Math.atan2(best.y-y,best.x-x);else this.ta+=rnd(-.6,.6);
    this.boosting=this.len>CFG.MIN_LEN+8&&Math.random()<.08;
  }
  update(){if(this.dead)return;this.think();this.steer(this.ta,.07+this.pers*.04);if(this.boosting)this.shrink(1);this.move();}
}

function drawBG(){
  if(!bgDirty)return;bgDirty=false;
  layerBG.clear();
  // Dot grid (world space)
  const gs=100,margin=gs*2;

  layerBG.beginFill(0x00ffc8,.055);
  for(let x=x0;x<=x1;x+=gs)for(let y=y0;y<=y1;y+=gs)layerBG.drawCircle(x,y,1.4);

  layerBG.lineStyle(52/cam.zoom,0xff3c5a,0.05);layerBG.drawCircle(0,0,CFG.WR+26);

// ═══════════════════════════════
// MINIMAP (2D Canvas)
// ═══════════════════════════════
const mmc=document.getElementById('mmc'),mmx=mmc.getContext('2d');
function drawMM(){
  const mw=mmc.width,mh=mmc.height;
  mmx.clearRect(0,0,mw,mh);
  mmx.fillStyle='rgba(4,8,15,.94)';mmx.fillRect(0,0,mw,mh);
  mmx.save();mmx.beginPath();mmx.arc(mw/2,mh/2,mw/2-1,0,Math.PI*2);mmx.clip();
  const sc=mw/(CFG.WR*2),tx=v=>mw/2+v*sc,ty=v=>mh/2+v*sc;
  mmx.strokeStyle='rgba(0,255,200,.06)';mmx.lineWidth=1;
  for(let i=1;i<4;i++){mmx.beginPath();mmx.arc(mw/2,mh/2,(mw/2)*(i/4),0,Math.PI*2);mmx.stroke();}
  mmx.fillStyle='rgba(0,255,200,.18)';
  for(let i=0;i<foods.length;i+=3)mmx.fillRect(tx(foods[i].x)-.5,ty(foods[i].y)-.5,1,1);
  for(const s of stars){
    mmx.beginPath();mmx.arc(tx(s.x),ty(s.y),3,0,Math.PI*2);
    mmx.fillStyle='#ffd060';mmx.shadowColor='#ffd060';mmx.shadowBlur=6;mmx.fill();mmx.shadowBlur=0;
  }
  for(const b of bots){
    if(b.dead)continue;
    mmx.beginPath();mmx.arc(tx(b.head.x),ty(b.head.y),2.8,0,Math.PI*2);
    mmx.fillStyle=`hsl(${b.skin.hue},70%,55%)`;mmx.fill();
  }
  if(player){
    mmx.beginPath();mmx.arc(tx(player.head.x),ty(player.head.y),player.dead?3.5:5,0,Math.PI*2);
    mmx.fillStyle=player.dead?'#ff3c5a':'#fff';mmx.shadowColor=player.dead?'#ff3c5a':'#00ffc8';mmx.shadowBlur=9;mmx.fill();mmx.shadowBlur=0;
    const vw=(W/cam.zoom)*sc,vh=(H/cam.zoom)*sc;
    mmx.strokeStyle='rgba(255,255,255,.44)';mmx.lineWidth=1;
    mmx.strokeRect(tx(cam.x)-vw/2,ty(cam.y)-vh/2,vw,vh);
  }
  mmx.restore();
  mmx.beginPath();mmx.arc(mw/2,mh/2,mw/2-1,0,Math.PI*2);
  mmx.strokeStyle='rgba(0,255,200,.28)';mmx.lineWidth=1;mmx.stroke();
}

function die(snake,killer){
  if(snake.dead)return;
  snake.dead=true;snake.boosting=false;
  for(let i=0;i<snake.segs.length;i+=2)
    FRAGS.push(new DeathFrag(snake.segs[i].x,snake.segs[i].y,snake.skin.hue));
  burst(snake.head.x,snake.head.y,hslHex(snake.skin.hue,100,62),24,5.5,50,5.5);
  if(snake===player){
    state='dying';deathTimer=95;
    doFlash('rgba(255,60,90,0.22)');setMBlur(false);
    addKF(killer?.name||'WALL','YOU','normal');
  }else{
    const pk=killer===player;if(pk)kills++;
    addKF(pk?'YOU':(killer?.name||'WALL'),snake.name,pk?'pk':'normal');
    setTimeout(()=>{const i=bots.indexOf(snake);if(i!==-1){snake.destroy();bots[i]=new Bot();}},4000);
  }
}

// ═══════════════════════════════
function eatFoods(){
  if(!player||player.dead)return;
  const px=player.head.x,py=player.head.y,pr=CFG.SR;
  for(let i=foods.length-1;i>=0;i--){
    const f=foods[i];
    if(dist(px,py,f.x,f.y)<pr+f.r){player.grow(f.val);score+=f.val;if(Math.random()<.32)burst(f.x,f.y,f.color,5,2,16,2.5);removeFood(foods,i);}
  }
  for(let i=stars.length-1;i>=0;i--){
    const s=stars[i];
    if(dist(px,py,s.x,s.y)<pr+s.r+2){
      player.grow(s.val);score+=s.val;player.speedBuff=CFG.SBUFF_DUR;
      starBurst(s.x,s.y);doFlash('rgba(255,208,96,0.16)');showSpeedBuff();
      addKF('YOU','⭐ SPEED BOOST','sk');removeFood(stars,i);
    }
  }
}
function checkCollisions(){
  const all=[player,...bots];
  for(const s of all){
    if(s.dead)continue;
    const near=GS.near(s.head.x,s.head.y,CFG.SR*5);
    for(const{seg,own}of near){if(own===s)continue;if(dist(s.head.x,s.head.y,seg.x,seg.y)<CFG.SR*2){die(s,own);break;}}
  }
  for(const bot of bots){
    if(bot.dead)continue;
    for(let i=stars.length-1;i>=0;i--){
      if(dist(bot.head.x,bot.head.y,stars[i].x,stars[i].y)<CFG.SR+stars[i].r+2){
        bot.grow(stars[i].val);bot.speedBuff=CFG.SBUFF_DUR;removeFood(stars,i);break;
      }
    }
  }
}

// ═══════════════════════════════
// INIT
// ═══════════════════════════════
function init(){
  if(player)player.destroy();
  for(const b of bots)b.destroy();
  for(const f of foods)f.remove();
  for(const s of stars)s.remove();
  for(const p of PARTS)p.destroy();for(const f of FRAGS)f.destroy();
  PARTS.length=0;FRAGS.length=0;foods=[];stars=[];bots=[];
  score=0;kills=0;boostE=100;boostHeld=boostToggle=false;
  boostDT=0;prevBoost=false;deathTimer=0;
  targetZoom=CFG.CAM_ZOOM_NORM;
  player=new Snake(0,0,22,selectedSkin,'YOU',true);
  cam.x=0;cam.y=0;cam.zoom=1;
  for(let i=0;i<CFG.BOT_N;i++)bots.push(new Bot());
  refill();
  applyCamera();markBGDirty();
  document.getElementById('sbtrk').style.display='none';
}

// ═══════════════════════════════
// MAIN LOOP
// ═══════════════════════════════
app.ticker.add(()=>{
  if(state!=='playing'&&state!=='dying')return;

  // Grids
  GF.clear();GS.clear();
  for(const f of foods)GF.add(f.x,f.y,f);
  for(const s of stars)GF.add(s.x,s.y,s);
  const all=[player,...bots];
  for(const s of all)if(!s.dead)for(const seg of s.segs)GS.add(seg.x,seg.y,{seg,own:s});

  // Player
  if(state==='playing'&&player&&!player.dead){
    const ta=Math.atan2((mouseY-H/2)/cam.zoom+cam.y-player.head.y,(mouseX-W/2)/cam.zoom+cam.x-player.head.x);
    player.steer(ta,.1);
    const wantBoost=(boostHeld||boostToggle)&&boostE>0&&player.len>CFG.MIN_LEN&&player.speedBuff===0;
    player.boosting=wantBoost;
    if(wantBoost&&!prevBoost)doFlash();
    setMBlur(wantBoost||(player.speedBuff>0));
    prevBoost=wantBoost;
    if(wantBoost){boostDT++;if(boostDT>=CFG.BST_DRAIN_F){player.shrink(1);boostE=Math.max(0,boostE-CFG.BST_E_DRAIN);boostDT=0;}}
    else boostE=Math.min(100,boostE+CFG.BST_E_REGEN);
    player.move();eatFoods();
    if(Math.hypot(player.head.x,player.head.y)>CFG.WR)die(player,{name:'WALL'});
    // Camera
    targetZoom=(wantBoost||player.speedBuff>0)?CFG.CAM_ZOOM_BST:CFG.CAM_ZOOM_NORM;
    const prevX=cam.x,prevY=cam.y,prevZ=cam.zoom;
    cam.x=lerp(cam.x,player.head.x,CFG.CAM_LERP);
    cam.y=lerp(cam.y,player.head.y,CFG.CAM_LERP);
    cam.zoom=lerp(cam.zoom,targetZoom,CFG.CAM_ZOOM_LERP);
    if(Math.abs(cam.x-prevX)>.5||Math.abs(cam.y-prevY)>.5||Math.abs(cam.zoom-prevZ)>.005)markBGDirty();
    // Trail spark
    if((wantBoost||player.speedBuff>0)&&Math.random()<.6){
      const si=Math.min(3,player.segs.length-1);
      spark(player.segs[si].x,player.segs[si].y,player.angle,player.speedBuff>0?0xffd060:hslHex(player.skin.hue,100,78));
    }
    applyCamera();
  }

  // Bots
  for(const b of bots){b.update();if(!b.dead&&Math.hypot(b.head.x,b.head.y)>CFG.WR)die(b,{name:'WALL'});}

  // Food / collisions
  for(const f of foods)f.tick();for(const s of stars)s.tick();
  refill();if(state==='playing')checkCollisions();

  // Draw
  drawBG();
  for(const s of all)if(!s.dead)s.body.update();
  drawHeads(all);
  tickFX();

  // HUD
  updateHUD();
  lbTimer+=app.ticker.deltaMS;if(lbTimer>500){updateLB();lbTimer=0;}
  drawMM();

  // Dying
  if(state==='dying'){
    deathTimer--;
    cam.zoom=lerp(cam.zoom,0.88,.032);applyCamera();
    if(deathTimer<=0){
      state='dead';
      document.getElementById('dLen').textContent=player?.len||0;
      document.getElementById('dScr').textContent=score;
      document.getElementById('dKil').textContent=kills;
      document.getElementById('ds').classList.remove('h');
    }
  }
});

// ═══════════════════════════════
// INPUT
// ═══════════════════════════════
addEventListener('mousemove',e=>{
  mouseX=e.clientX;mouseY=e.clientY;
  const c=document.getElementById('cur');c.style.left=e.clientX+'px';c.style.top=e.clientY+'px';
});
addEventListener('mousedown',e=>{if(e.button===0)boostHeld=true;});
addEventListener('mouseup',  e=>{if(e.button===0)boostHeld=false;});
addEventListener('keydown',e=>{if(e.code==='Space'){boostHeld=true;e.preventDefault();}if(e.code==='KeyQ')boostToggle=!boostToggle;});
addEventListener('keyup',  e=>{if(e.code==='Space')boostHeld=false;});

// ═══════════════════════════════
// SKIN SELECTOR
// ═══════════════════════════════
function renderSkins(){
  const grid=document.getElementById('skinGrid');
  grid.innerHTML=SKINS.map(s=>`
    <div class="skinCard${s.id===selectedSkin.id?' on':''}" data-id="${s.id}" style="--sc:${s.css};--sp:${s.sp}">
      <div class="skinPreview"></div>
      <div class="skinName">${s.name}</div>
      <div class="skinDesc">${s.desc}</div>
    </div>`).join('');
  grid.querySelectorAll('.skinCard').forEach(c=>c.addEventListener('click',()=>{
    selectedSkin=SKINS.find(s=>s.id===c.dataset.id)||SKINS[0];renderSkins();
  }));
}
renderSkins();

// ═══════════════════════════════
// BUTTONS
// ═══════════════════════════════
document.getElementById('startBtn').addEventListener('click',()=>{
  document.getElementById('ss').classList.add('h');init();state='playing';
});
document.getElementById('retryBtn').addEventListener('click',()=>{
  document.getElementById('ds').classList.add('h');init();state='playing';
});
</script>
