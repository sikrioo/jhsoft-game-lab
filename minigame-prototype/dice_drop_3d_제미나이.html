<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zenith of Dice: 3D Tower</title>
  <style>
    body { margin: 0; overflow: hidden; background: #0a0a0b; font-family: 'Inter', -apple-system, sans-serif; }
    #ui { position: absolute; inset: 0; pointer-events: none; color: #fff; padding: 40px; display: flex; flex-direction: column; justify-content:间-between; }
    .top-bar { display: flex; justify-content: space-between; align-items: flex-start; }
    .score-label { font-size: 12px; letter-spacing: 0.3em; color: #b5a993; text-transform: uppercase; }
    .score-value { font-size: 48px; font-weight: 200; }
    .next-box { text-align: right; }
    .next-value { font-size: 60px; color: #d4bc8e; line-height: 1; }
    #height-indicator { position: absolute; right: 40px; top: 50%; transform: translateY(-50%); text-align: right; }
    .height-val { font-size: 80px; font-weight: 100; opacity: 0.3; }
    .msg { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); font-size: 13px; letter-spacing: 0.2em; color: #b5a993; text-transform: uppercase; }
  </style>
</head>
<body>

<div id="ui">
  <div class="top-bar">
    <div>
      <div class="score-label">Current Score</div>
      <div class="score-value" id="score">0</div>
    </div>
    <div class="next-box">
      <div class="score-label">Next Dice</div>
      <div class="next-value" id="next-val">-</div>
    </div>
  </div>
  <div id="height-indicator">
    <div class="score-label">Altitude</div>
    <div class="height-val"><span id="altitude">0.0</span>m</div>
  </div>
  <div class="msg">Tap to Release Gravity</div>
</div>

<script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "cannon": "https://unpkg.com/cannon-es@0.20.0/dist/cannon-es.js"
    }
  }
</script>

<script type="module">
import * as THREE from 'three';
import * as CANNON from 'cannon';

let world, scene, camera, renderer;
let score = 0, maxHeight = 0, nextValue = 6;
const diceList = [];
let isGameOver = false;

const COLORS = {
  gold: 0xd4bc8e,
  silver: 0xe5e7eb,
  base: 0x1f1f23,
  bg: 0x0a0a0b
};

function init() {
  // 물리 엔진 설정
  world = new CANNON.World();
  world.gravity.set(0, -12, 0); // 조금 더 묵직한 중력
  world.allowSleep = true;

  // 그래픽 엔진 설정
  scene = new THREE.Scene();
  scene.background = new THREE.Color(COLORS.bg);
  scene.fog = new THREE.Fog(COLORS.bg, 15, 45);

  camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.set(10, 10, 15);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  document.body.appendChild(renderer.domElement);

  // 조명 설계
  const ambient = new THREE.AmbientLight(0xffffff, 0.3);
  scene.add(ambient);

  const keyLight = new THREE.DirectionalLight(0xffffff, 1.2);
  keyLight.position.set(5, 20, 10);
  keyLight.castShadow = true;
  keyLight.shadow.mapSize.set(1024, 1024);
  scene.add(keyLight);

  createPlatform();
  updateNextDice();
  animate();
}

function createPlatform() {
  const size = 5;
  const body = new CANNON.Body({ mass: 0 });
  body.addShape(new CANNON.Box(new CANNON.Vec3(size/2, 0.5, size/2)));
  world.addBody(body);

  const mesh = new THREE.Mesh(
    new THREE.BoxGeometry(size, 1, size),
    new THREE.MeshStandardMaterial({ color: COLORS.base, roughness: 0.9 })
  );
  mesh.receiveShadow = true;
  scene.add(mesh);
}

function updateNextDice() {
  nextValue = Math.floor(Math.random() * 6) + 1;
  document.getElementById('next-val').innerText = nextValue;
}

function spawnDice() {
  if (isGameOver) return;

  const value = nextValue;
  const size = 0.8 + (value * 0.1); // 숫자가 클수록 물리적으로 더 큼
  const mass = value; // 숫자가 클수록 더 무거움

  const body = new CANNON.Body({
    mass: mass,
    shape: new CANNON.Box(new CANNON.Vec3(size/2, size/2, size/2)),
    position: new CANNON.Vec3((Math.random()-0.5)*1.5, maxHeight + 10, (Math.random()-0.5)*1.5)
  });
  body.angularVelocity.set(Math.random()*4, Math.random()*4, Math.random()*4);
  world.addBody(body);

  // 텍스트 캔버스 제작
  const canvas = document.createElement('canvas');
  canvas.width = 128; canvas.height = 128;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = value === 6 ? '#d4bc8e' : '#ffffff'; 
  ctx.fillRect(0,0,128,128);
  ctx.fillStyle = '#000'; ctx.font = 'bold 90px serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(value, 64, 64);

  const texture = new THREE.CanvasTexture(canvas);
  const mesh = new THREE.Mesh(
    new THREE.BoxGeometry(size, size, size),
    new THREE.MeshStandardMaterial({ map: texture, metalness: 0.3, roughness: 0.4 })
  );
  mesh.castShadow = true;
  scene.add(mesh);

  diceList.push({ body, mesh, value });
  score += value * 10;
  document.getElementById('score').innerText = score;
  updateNextDice();
}

function animate() {
  requestAnimationFrame(animate);
  world.fixedStep();

  let topY = 0;

  diceList.forEach((dice, idx) => {
    dice.mesh.position.copy(dice.body.position);
    dice.mesh.quaternion.copy(dice.body.quaternion);

    // 높이 측정
    if (dice.body.position.y > topY) topY = dice.body.position.y;

    // 게임 오버 체크 (플랫폼 아래로 한참 떨어지면)
    if (dice.body.position.y < -5) {
        dice.mesh.material.opacity = 0.5;
        // 실제 게임 오버 로직을 여기에 넣을 수 있습니다.
    }
  });

  maxHeight = THREE.MathUtils.lerp(maxHeight, topY, 0.1);
  document.getElementById('altitude').innerText = maxHeight.toFixed(1);

  // 부드러운 카메라 팔로잉
  camera.position.y = THREE.MathUtils.lerp(camera.position.y, maxHeight + 8, 0.05);
  camera.lookAt(0, maxHeight, 0);

  renderer.render(scene, camera);
}

window.addEventListener('mousedown', spawnDice);
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

init();
</script>
</body>
</html>
