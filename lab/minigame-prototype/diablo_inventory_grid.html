
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }

  :root {
    --gold: #c9a84c;
    --gold-bright: #f0c866;
    --gold-dim: #7a622e;
    --bg-deep: #0a0805;
    --bg-panel: #110e09;
    --bg-grid: #0e0b07;
    --border-gold: #5a4020;
    --border-bright: #8a6030;
    --cell-bg: #0d0a06;
    --cell-hover: #1a1508;
    --text-gold: #c9a84c;
    --text-dim: #6a5530;
    --red: #8b1a1a;
    --red-bright: #c0392b;
    --blue-gem: #1a3a6b;
    --blue-bright: #2980b9;
    --green-gem: #1a4a1a;
    --green-bright: #27ae60;
    --purple-gem: #3a1a5a;
    --purple-bright: #8e44ad;
    --orange-gem: #5a2a0a;
    --orange-bright: #e67e22;
  }

  body { background: var(--bg-deep); font-family: 'Cinzel', serif; }

  .container {
    min-height: 600px;
    background: var(--bg-deep);
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .title-bar {
    width: 100%;
    max-width: 820px;
    text-align: center;
    padding: 10px;
    border-bottom: 1px solid var(--border-gold);
    position: relative;
  }

  .title-bar::before, .title-bar::after {
    content: '⬥';
    color: var(--gold-dim);
    font-size: 10px;
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
  }
  .title-bar::before { left: 0; }
  .title-bar::after { right: 0; }

  .title-bar h1 {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--gold);
    letter-spacing: 4px;
    text-transform: uppercase;
  }

  .main-layout {
    display: flex;
    gap: 16px;
    align-items: flex-start;
    width: 100%;
    max-width: 820px;
  }

  .panel {
    background: var(--bg-panel);
    border: 1px solid var(--border-gold);
    position: relative;
  }

  .panel::before {
    content: '';
    position: absolute;
    inset: 2px;
    border: 1px solid var(--border-bright);
    pointer-events: none;
    opacity: 0.3;
  }

  .panel-header {
    padding: 8px 14px;
    border-bottom: 1px solid var(--border-gold);
    font-size: 10px;
    font-weight: 600;
    color: var(--gold);
    letter-spacing: 3px;
    text-transform: uppercase;
    text-align: center;
    background: linear-gradient(180deg, #1a1208 0%, transparent 100%);
  }

  .grid-panel { flex: 1; }

  .grid-wrapper {
    padding: 12px;
    position: relative;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(10, 40px);
    grid-template-rows: repeat(10, 40px);
    gap: 1px;
    background: #1a1205;
    border: 1px solid #2a1c0a;
    position: relative;
  }

  .cell {
    width: 40px;
    height: 40px;
    background: var(--cell-bg);
    border: 1px solid #1a1408;
    position: relative;
    cursor: default;
    transition: background 0.1s;
  }

  .cell.highlight-valid { background: rgba(30, 60, 20, 0.6); border-color: #2a5a1a; }
  .cell.highlight-invalid { background: rgba(80, 15, 15, 0.6); border-color: #5a1a1a; }

  .item {
    position: absolute;
    cursor: grab;
    z-index: 10;
    border: 1px solid;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 2px;
    transition: filter 0.1s, opacity 0.1s;
    box-shadow: inset 0 0 12px rgba(0,0,0,0.6), 0 0 6px rgba(0,0,0,0.8);
  }

  .item:hover { filter: brightness(1.2); z-index: 20; }
  .item.dragging { opacity: 0.3; cursor: grabbing; }

  .item-icon { font-size: 20px; line-height: 1; filter: drop-shadow(0 1px 2px rgba(0,0,0,0.8)); }
  .item-name { font-size: 7px; letter-spacing: 0.5px; text-align: center; font-family: 'Cinzel', serif; opacity: 0.9; }

  .item.rarity-normal { border-color: #3a3020; background: linear-gradient(135deg, #16110a 0%, #0e0b06 100%); color: #aaa; }
  .item.rarity-magic { border-color: #1a2a5a; background: linear-gradient(135deg, #0e122a 0%, #08090f 100%); color: #6688cc; }
  .item.rarity-rare { border-color: #5a5000; background: linear-gradient(135deg, #1a1800 0%, #0e0c00 100%); color: #ccaa00; }
  .item.rarity-unique { border-color: #5a2a00; background: linear-gradient(135deg, #1a0e00 0%, #0e0800 100%); color: #cc6600; }
  .item.rarity-set { border-color: #005a10; background: linear-gradient(135deg, #001a08 0%, #000e04 100%); color: #00aa44; }

  .sidebar { width: 200px; display: flex; flex-direction: column; gap: 12px; }

  .tooltip-panel { flex: 1; }

  .tooltip-inner { padding: 12px; min-height: 180px; font-family: 'Crimson Pro', serif; font-size: 13px; line-height: 1.6; }

  .tooltip-name { font-family: 'Cinzel', serif; font-size: 12px; font-weight: 600; margin-bottom: 8px; text-align: center; }
  .tooltip-type { font-size: 11px; color: #888; text-align: center; margin-bottom: 10px; font-style: italic; letter-spacing: 1px; }
  .tooltip-divider { border: none; border-top: 1px solid var(--border-gold); margin: 8px 0; opacity: 0.5; }
  .tooltip-stat { font-size: 12px; padding: 2px 0; }
  .tooltip-stat span { color: var(--gold); }
  .tooltip-desc { font-size: 11px; font-style: italic; color: #7a6a40; margin-top: 8px; line-height: 1.5; }
  .tooltip-empty { color: #3a2e1a; font-size: 11px; text-align: center; padding-top: 40px; font-style: italic; letter-spacing: 1px; }

  .color-normal { color: #aaa !important; }
  .color-magic { color: #6688cc !important; }
  .color-rare { color: #ccaa00 !important; }
  .color-unique { color: #cc6600 !important; }
  .color-set { color: #00aa44 !important; }

  .items-pool-panel { width: 200px; }

  .items-pool {
    padding: 10px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    min-height: 80px;
  }

  .pool-item {
    width: 44px;
    height: 44px;
    border: 1px solid;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 1px;
    cursor: grab;
    font-size: 18px;
    transition: filter 0.1s;
    box-shadow: inset 0 0 10px rgba(0,0,0,0.6);
  }
  .pool-item:hover { filter: brightness(1.25); }
  .pool-item.rarity-normal { border-color: #3a3020; background: #16110a; color: #aaa; }
  .pool-item.rarity-magic { border-color: #1a2a5a; background: #0e122a; color: #6688cc; }
  .pool-item.rarity-rare { border-color: #5a5000; background: #1a1800; color: #ccaa00; }
  .pool-item.rarity-unique { border-color: #5a2a00; background: #1a0e00; color: #cc6600; }
  .pool-item.rarity-set { border-color: #005a10; background: #001a08; color: #00aa44; }
  .pool-item.dragging { opacity: 0.3; }
  .pool-item-name { font-size: 6px; font-family: 'Cinzel', serif; text-align: center; line-height: 1.2; }

  .drag-ghost {
    position: fixed;
    pointer-events: none;
    z-index: 9999;
    opacity: 0.85;
    transform: translate(-50%, -50%);
    border: 1px solid;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 2px;
    font-size: 20px;
    box-shadow: 0 0 20px rgba(0,0,0,0.9), inset 0 0 12px rgba(0,0,0,0.5);
  }
  .drag-ghost.rarity-normal { border-color: #3a3020; background: #16110a; color: #aaa; }
  .drag-ghost.rarity-magic { border-color: #1a2a5a; background: #0e122a; color: #6688cc; }
  .drag-ghost.rarity-rare { border-color: #5a5000; background: #1a1800; color: #ccaa00; }
  .drag-ghost.rarity-unique { border-color: #5a2a00; background: #1a0e00; color: #cc6600; }
  .drag-ghost.rarity-set { border-color: #005a10; background: #001a08; color: #00aa44; }

  .status-bar {
    width: 100%;
    max-width: 820px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 12px;
    border-top: 1px solid var(--border-gold);
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 2px;
    font-family: 'Cinzel', serif;
  }
</style>

<div class="container">
  <div class="title-bar"><h1>Stash of the Damned</h1></div>

  <div class="main-layout">
    <div class="panel grid-panel">
      <div class="panel-header">창고 — Tab I</div>
      <div class="grid-wrapper">
        <div class="grid" id="grid"></div>
      </div>
    </div>

    <div class="sidebar">
      <div class="panel tooltip-panel">
        <div class="panel-header">Item Info</div>
        <div class="tooltip-inner" id="tooltip">
          <div class="tooltip-empty">아이템 위에 마우스를<br>올려보세요</div>
        </div>
      </div>
    </div>
  </div>

  <div class="main-layout" style="margin-top: -4px;">
    <div class="panel items-pool-panel" style="width: 100%; max-width: 820px;">
      <div class="panel-header">Pickup Items — 아이템을 창고로 드래그하세요</div>
      <div class="items-pool" id="items-pool"></div>
    </div>
  </div>

  <div class="status-bar">
    <span id="status-left">Gold: 142,830</span>
    <span id="status-mid">사용 공간: <span id="used-cells">0</span> / 100</span>
    <span id="status-right">Level 87 Sorceress</span>
  </div>
</div>

<div class="drag-ghost" id="drag-ghost" style="display:none;"></div>

<script>
const COLS = 10, ROWS = 10;
const CELL = 41;

const ITEMS_DEF = [
  { id:'sword', icon:'⚔️', name:'Doombringer', type:'Unique Sword', w:1, h:3, rarity:'unique', stats:['Damage: 96–118','Strength: +15','Life Steal: 6%'], desc:'"Blade of a thousand fallen souls"' },
  { id:'helm', icon:'⛑️', name:'Griffon\'s Eye', type:'Set Diadem', w:2, h:2, rarity:'set', stats:['All Res: +25','Skills: +2','Lightning: +25%'], desc:'"The eye that sees through shadow"' },
  { id:'ring1', icon:'💍', name:'Stone of Jordan', type:'Unique Ring', w:1, h:1, rarity:'unique', stats:['Mana: +25','Skills: +1','Mana Reg: +25'], desc:'"Taken from the finger of Akara"' },
  { id:'potion1', icon:'🧪', name:'Full Rejuv', type:'Consumable', w:1, h:1, rarity:'normal', stats:['Restores all Life','Restores all Mana'], desc:'' },
  { id:'bow', icon:'🏹', name:'Windforce', type:'Unique Hydra Bow', w:2, h:3, rarity:'unique', stats:['Damage: 185–255','Knockback: Yes','Mana per Kill: +5'], desc:'"The hurricane incarnate"' },
  { id:'shield', icon:'🛡️', name:'Stormshield', type:'Unique Monarch', w:2, h:2, rarity:'unique', stats:['Block: 55–65%','Damage Reduce: 35%','Strength: +30'], desc:'"Tempest bound in iron"' },
  { id:'amulet', icon:'📿', name:'Mara\'s Kaleidoscope', type:'Unique Amulet', w:1, h:1, rarity:'unique', stats:['All Res: +20–30','Skills: +2','Strength: +5'], desc:'"Shimmering light of the East"' },
  { id:'rune', icon:'🔮', name:'Zod Rune', type:'Rune', w:1, h:1, rarity:'rare', stats:['Indestructible (Weapon)','Indestructible (Armor)'], desc:'"Ancient beyond reckoning"' },
  { id:'gem', icon:'💎', name:'Perfect Amethyst', type:'Gem', w:1, h:1, rarity:'magic', stats:['Weapon: +150 AR','Armor: +20 Str'], desc:'' },
  { id:'belt', icon:'🪢', name:'Thundergod\'s Vigor', type:'Unique War Belt', w:2, h:1, rarity:'unique', stats:['Str: +20','Lit Absorb: 20','Belt Slots: 4'], desc:'"Born of the storm divine"' },
  { id:'boots', icon:'👢', name:'Waterwalk', type:'Unique Battle Boots', w:2, h:2, rarity:'unique', stats:['FRW: +40%','Life: +65','Fire Res: +45%'], desc:'"Walk on the face of the deep"' },
  { id:'scroll', icon:'📜', name:'ID Scroll', type:'Scroll', w:1, h:1, rarity:'normal', stats:['Identifies item'], desc:'' },
];

let gridState = Array.from({length:ROWS}, () => Array(COLS).fill(null));
let placedItems = {};

let drag = null;

function buildGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.r = r; cell.dataset.c = c;
      grid.appendChild(cell);
    }
}

function placeItemOnGrid(def, startR, startC, instanceId) {
  for (let r = startR; r < startR + def.h; r++)
    for (let c = startC; c < startC + def.w; c++)
      gridState[r][c] = instanceId;

  const grid = document.getElementById('grid');
  const el = document.createElement('div');
  el.className = `item rarity-${def.rarity}`;
  el.id = `item-${instanceId}`;
  el.style.left = (startC * CELL + 1) + 'px';
  el.style.top = (startR * CELL + 1) + 'px';
  el.style.width = (def.w * CELL - 2) + 'px';
  el.style.height = (def.h * CELL - 2) + 'px';
  el.innerHTML = `<span class="item-icon">${def.icon}</span><span class="item-name">${def.name.split(' ')[0]}</span>`;
  el.dataset.defId = def.id;
  el.dataset.instanceId = instanceId;
  el.dataset.startR = startR;
  el.dataset.startC = startC;

  el.addEventListener('mouseenter', () => showTooltip(def));
  el.addEventListener('mouseleave', clearTooltip);
  el.addEventListener('mousedown', (e) => startGridItemDrag(e, el, def, instanceId, startR, startC));
  grid.appendChild(el);
  placedItems[instanceId] = { def, r: startR, c: startC };
  updateStatus();
}

function canPlace(def, r, c, excludeId=null) {
  for (let dr = 0; dr < def.h; dr++)
    for (let dc = 0; dc < def.w; dc++) {
      const nr = r+dr, nc = c+dc;
      if (nr >= ROWS || nc >= COLS) return false;
      const cell = gridState[nr][nc];
      if (cell !== null && cell !== excludeId) return false;
    }
  return true;
}

function clearFromGrid(instanceId, def, r, c) {
  for (let dr = 0; dr < def.h; dr++)
    for (let dc = 0; dc < def.w; dc++)
      if (gridState[r+dr] && gridState[r+dr][c+dc] === instanceId)
        gridState[r+dr][c+dc] = null;
  const el = document.getElementById(`item-${instanceId}`);
  if (el) el.remove();
  delete placedItems[instanceId];
  updateStatus();
}

let ghostEl = null;

function startGridItemDrag(e, el, def, instanceId, startR, startC) {
  e.preventDefault();
  drag = { type:'grid', def, instanceId, startR, startC, el,
    offsetX: e.clientX - el.getBoundingClientRect().left,
    offsetY: e.clientY - el.getBoundingClientRect().top };
  el.classList.add('dragging');
  createGhost(def, e.clientX, e.clientY);
  clearFromGrid(instanceId, def, startR, startC);
  document.addEventListener('mousemove', onMouseMove);
  document.addEventListener('mouseup', onMouseUp);
}

function startPoolItemDrag(e, def, poolEl) {
  e.preventDefault();
  const instanceId = Date.now() + Math.random();
  drag = { type:'pool', def, instanceId, poolEl };
  poolEl.classList.add('dragging');
  createGhost(def, e.clientX, e.clientY);
  document.addEventListener('mousemove', onMouseMove);
  document.addEventListener('mouseup', onMouseUp);
}

function createGhost(def, x, y) {
  ghostEl = document.getElementById('drag-ghost');
  ghostEl.className = `drag-ghost rarity-${def.rarity}`;
  ghostEl.style.width = (def.w * CELL - 2) + 'px';
  ghostEl.style.height = (def.h * CELL - 2) + 'px';
  ghostEl.innerHTML = `<span style="font-size:${Math.min(20, 20/Math.max(def.w,def.h)*2)}px">${def.icon}</span>`;
  ghostEl.style.left = x + 'px';
  ghostEl.style.top = y + 'px';
  ghostEl.style.display = 'flex';
}

function getGridCell(x, y) {
  const grid = document.getElementById('grid');
  const rect = grid.getBoundingClientRect();
  const c = Math.floor((x - rect.left) / CELL);
  const r = Math.floor((y - rect.top) / CELL);
  return { r, c, inGrid: x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom };
}

function clearHighlights() {
  document.querySelectorAll('.cell.highlight-valid, .cell.highlight-invalid').forEach(el => {
    el.classList.remove('highlight-valid','highlight-invalid');
  });
}

function highlightCells(def, r, c, valid) {
  for (let dr = 0; dr < def.h; dr++)
    for (let dc = 0; dc < def.w; dc++) {
      const nr = r+dr, nc = c+dc;
      if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) {
        const cells = document.querySelectorAll('.cell');
        const idx = nr * COLS + nc;
        if (cells[idx]) cells[idx].classList.add(valid ? 'highlight-valid' : 'highlight-invalid');
      }
    }
}

function onMouseMove(e) {
  if (!drag) return;
  ghostEl.style.left = e.clientX + 'px';
  ghostEl.style.top = e.clientY + 'px';

  clearHighlights();
  const { r, c, inGrid } = getGridCell(e.clientX, e.clientY);
  if (inGrid) {
    const adjustR = r - Math.floor(drag.def.h/2);
    const adjustC = c - Math.floor(drag.def.w/2);
    const v = canPlace(drag.def, adjustR, adjustC, drag.type==='grid' ? drag.instanceId : null);
    highlightCells(drag.def, adjustR, adjustC, v);
  }
}

function onMouseUp(e) {
  if (!drag) return;
  clearHighlights();
  ghostEl.style.display = 'none';

  const { r, c, inGrid } = getGridCell(e.clientX, e.clientY);
  const adjustR = r - Math.floor(drag.def.h/2);
  const adjustC = c - Math.floor(drag.def.w/2);

  if (inGrid && canPlace(drag.def, adjustR, adjustC, drag.type==='grid' ? drag.instanceId : null)) {
    placeItemOnGrid(drag.def, adjustR, adjustC, drag.instanceId);
    if (drag.type === 'pool' && drag.poolEl) drag.poolEl.remove();
  } else {
    if (drag.type === 'grid') {
      placeItemOnGrid(drag.def, drag.startR, drag.startC, drag.instanceId);
    }
    if (drag.el) drag.el.classList.remove('dragging');
    if (drag.poolEl) drag.poolEl.classList.remove('dragging');
  }

  drag = null;
  document.removeEventListener('mousemove', onMouseMove);
  document.removeEventListener('mouseup', onMouseUp);
}

function showTooltip(def) {
  const tp = document.getElementById('tooltip');
  const colorClass = `color-${def.rarity}`;
  tp.innerHTML = `
    <div class="tooltip-name ${colorClass}">${def.name}</div>
    <div class="tooltip-type">${def.type}</div>
    <hr class="tooltip-divider">
    ${def.stats.map(s => `<div class="tooltip-stat">▶ <span>${s}</span></div>`).join('')}
    ${def.desc ? `<hr class="tooltip-divider"><div class="tooltip-desc">${def.desc}</div>` : ''}
  `;
}

function clearTooltip() {
  document.getElementById('tooltip').innerHTML = '<div class="tooltip-empty">아이템 위에 마우스를<br>올려보세요</div>';
}

function updateStatus() {
  let used = 0;
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) if (gridState[r][c]) used++;
  document.getElementById('used-cells').textContent = used;
}

function buildPool() {
  const pool = document.getElementById('items-pool');
  const shuffled = [...ITEMS_DEF].sort(() => Math.random()-0.5).slice(0,9);
  shuffled.forEach(def => {
    const el = document.createElement('div');
    el.className = `pool-item rarity-${def.rarity}`;
    el.innerHTML = `<span>${def.icon}</span><span class="pool-item-name">${def.name.split(' ')[0]}</span>`;
    el.addEventListener('mouseenter', () => showTooltip(def));
    el.addEventListener('mouseleave', clearTooltip);
    el.addEventListener('mousedown', (e) => startPoolItemDrag(e, def, el));
    pool.appendChild(el);
  });
}

function autoPlaceInitial() {
  const toPlace = [
    { def: ITEMS_DEF[0], r:0, c:0 },
    { def: ITEMS_DEF[1], r:0, c:2 },
    { def: ITEMS_DEF[2], r:0, c:5 },
    { def: ITEMS_DEF[3], r:0, c:7 },
    { def: ITEMS_DEF[6], r:0, c:9 },
    { def: ITEMS_DEF[7], r:2, c:5 },
    { def: ITEMS_DEF[8], r:2, c:7 },
  ];
  toPlace.forEach(({def,r,c}) => {
    const id = Date.now() + Math.random();
    placeItemOnGrid(def, r, c, id);
  });
}

buildGrid();
autoPlaceInitial();
buildPool();
</script>
