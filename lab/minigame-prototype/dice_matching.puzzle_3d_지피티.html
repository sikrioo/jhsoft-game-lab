<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Dice Physics Puzzle</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0f172a;
      font-family: Arial, sans-serif;
      color: white;
    }

    #hud {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 10;
      background: rgba(15, 23, 42, 0.78);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 12px 14px;
      line-height: 1.5;
      backdrop-filter: blur(4px);
    }

    #title {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 6px;
    }

    #desc {
      font-size: 13px;
      color: #cbd5e1;
      white-space: pre-line;
    }

    #message {
      margin-top: 8px;
      color: #fde68a;
      font-weight: bold;
      min-height: 20px;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div id="title">3D Dice Gravity Puzzle</div>
    <div id="desc">클릭하면 주사위들이 다시 튀고 굴러갑니다.
실제 3D 물리 엔진이 적용되어 있습니다.</div>
    <div id="message">초기화 완료</div>
  </div>

  <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/cannon@0.6.2/build/cannon.min.js"></script>

  <script>
    const COLS = 3;
    const ROWS = 9;
    const DIE_SIZE = 1.05;
    const COLUMN_GAP = 1.5;
    const STACK_GAP = 1.12;

    const messageEl = document.getElementById('message');

    function showMessage(text) {
      messageEl.textContent = text;
    }

    const RARITIES = [
      { name: 'Common', color: 0x9ca3af, chance: 50 },
      { name: 'Uncommon', color: 0x22c55e, chance: 25 },
      { name: 'Rare', color: 0x3b82f6, chance: 15 },
      { name: 'Epic', color: 0xa855f7, chance: 7 },
      { name: 'Legendary', color: 0xf59e0b, chance: 3 }
    ];

    function weightedRandomRarity() {
      const rand = Math.random() * 100;
      let acc = 0;
      for (const rarity of RARITIES) {
        acc += rarity.chance;
        if (rand <= acc) return rarity;
      }
      return RARITIES[0];
    }

    function randomDieValue() {
      return Math.floor(Math.random() * 6) + 1;
    }

    function createFaceTexture(value) {
      const size = 256;
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');

      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, size, size);

      ctx.strokeStyle = '#111111';
      ctx.lineWidth = 10;
      ctx.strokeRect(6, 6, size - 12, size - 12);

      const pipRadius = 18;
      const offset = 62;
      const center = size / 2;

      const positions = {
        center: [center, center],
        tl: [center - offset, center - offset],
        tr: [center + offset, center - offset],
        bl: [center - offset, center + offset],
        br: [center + offset, center + offset],
        ml: [center - offset, center],
        mr: [center + offset, center]
      };

      const pipMap = {
        1: ['center'],
        2: ['tl', 'br'],
        3: ['tl', 'center', 'br'],
        4: ['tl', 'tr', 'bl', 'br'],
        5: ['tl', 'tr', 'center', 'bl', 'br'],
        6: ['tl', 'tr', 'ml', 'mr', 'bl', 'br']
      };

      ctx.fillStyle = '#111111';

      for (const key of pipMap[value]) {
        const [x, y] = positions[key];
        ctx.beginPath();
        ctx.arc(x, y, pipRadius, 0, Math.PI * 2);
        ctx.fill();
      }

      const texture = new THREE.CanvasTexture(canvas);
      texture.needsUpdate = true;
      return texture;
    }

    function createDiceMaterials(value, rarityColor) {
      const baseMaterials = [];
      for (let i = 1; i <= 6; i++) {
        const texture = createFaceTexture(i);
        baseMaterials.push(
          new THREE.MeshStandardMaterial({
            map: texture,
            roughness: 0.45,
            metalness: 0.08
          })
        );
      }
      return baseMaterials;
    }

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0f172a);
    scene.fog = new THREE.Fog(0x0f172a, 18, 38);

    const camera = new THREE.PerspectiveCamera(
      55,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 9.5, 15.5);
    camera.lookAt(0, 3, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.75);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.25);
    dirLight.position.set(7, 15, 8);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.width = 2048;
    dirLight.shadow.mapSize.height = 2048;
    dirLight.shadow.camera.left = -15;
    dirLight.shadow.camera.right = 15;
    dirLight.shadow.camera.top = 15;
    dirLight.shadow.camera.bottom = -15;
    scene.add(dirLight);

    const pointLight = new THREE.PointLight(0x93c5fd, 0.65, 30);
    pointLight.position.set(0, 8, 6);
    scene.add(pointLight);

    const world = new CANNON.World();
    world.gravity.set(0, -18, 0);
    world.broadphase = new CANNON.NaiveBroadphase();
    world.solver.iterations = 16;
    world.defaultContactMaterial.friction = 0.35;
    world.defaultContactMaterial.restitution = 0.18;

    const floorBody = new CANNON.Body({
      mass: 0,
      material: new CANNON.Material('floor')
    });
    floorBody.addShape(new CANNON.Plane());
    floorBody.quaternion.setFromEuler(-Math.PI / 2, 0, 0);
    world.addBody(floorBody);

    const floorMesh = new THREE.Mesh(
      new THREE.PlaneGeometry(30, 30),
      new THREE.MeshStandardMaterial({
        color: 0x111827,
        roughness: 0.95,
        metalness: 0.02
      })
    );
    floorMesh.rotation.x = -Math.PI / 2;
    floorMesh.receiveShadow = true;
    scene.add(floorMesh);

    const boardGroup = new THREE.Group();
    scene.add(boardGroup);

    const shaftHeight = ROWS * STACK_GAP + 1.2;
    const shaftWidth = DIE_SIZE + 0.35;
    const shaftDepth = DIE_SIZE + 0.35;

    function createBoardDecoration() {
      const base = new THREE.Mesh(
        new THREE.BoxGeometry(8, 0.5, 4),
        new THREE.MeshStandardMaterial({
          color: 0x1e293b,
          roughness: 0.85,
          metalness: 0.1
        })
      );
      base.position.set(0, -0.26, 0);
      base.receiveShadow = true;
      boardGroup.add(base);

      for (let c = 0; c < COLS; c++) {
        const x = (c - 1) * COLUMN_GAP * 1.7;

        const shaft = new THREE.Mesh(
          new THREE.BoxGeometry(shaftWidth, shaftHeight, shaftDepth),
          new THREE.MeshStandardMaterial({
            color: 0x334155,
            transparent: true,
            opacity: 0.18,
            roughness: 0.35,
            metalness: 0.2
          })
        );
        shaft.position.set(x, shaftHeight / 2 - 0.02, 0);
        boardGroup.add(shaft);

        const edge = new THREE.LineSegments(
          new THREE.EdgesGeometry(new THREE.BoxGeometry(shaftWidth, shaftHeight, shaftDepth)),
          new THREE.LineBasicMaterial({ color: 0x94a3b8, transparent: true, opacity: 0.45 })
        );
        edge.position.copy(shaft.position);
        boardGroup.add(edge);
      }
    }

    createBoardDecoration();

    function createColumnWall(x, y, z, width, height, depth) {
      const body = new CANNON.Body({ mass: 0 });
      body.addShape(new CANNON.Box(new CANNON.Vec3(width / 2, height / 2, depth / 2)));
      body.position.set(x, y, z);
      world.addBody(body);
      return body;
    }

    for (let c = 0; c < COLS; c++) {
      const cx = (c - 1) * COLUMN_GAP * 1.7;
      const h = shaftHeight / 2;

      createColumnWall(cx - shaftWidth / 2, h, 0, 0.08, shaftHeight, shaftDepth);
      createColumnWall(cx + shaftWidth / 2, h, 0, 0.08, shaftHeight, shaftDepth);
      createColumnWall(cx, h, -shaftDepth / 2, shaftWidth, shaftHeight, 0.08);
      createColumnWall(cx, h, shaftDepth / 2, shaftWidth, shaftHeight, 0.08);
    }

    const diceList = [];

    function createDie(x, y, z) {
      const value = randomDieValue();
      const rarity = weightedRandomRarity();

      const geometry = new THREE.BoxGeometry(DIE_SIZE, DIE_SIZE, DIE_SIZE);
      const materials = createDiceMaterials(value, rarity.color);
      const mesh = new THREE.Mesh(geometry, materials);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      mesh.position.set(x, y, z);

      const outline = new THREE.LineSegments(
        new THREE.EdgesGeometry(geometry),
        new THREE.LineBasicMaterial({ color: rarity.color })
      );
      mesh.add(outline);

      scene.add(mesh);

      const body = new CANNON.Body({
        mass: 1,
        material: new CANNON.Material('die')
      });
      body.addShape(new CANNON.Box(new CANNON.Vec3(DIE_SIZE / 2, DIE_SIZE / 2, DIE_SIZE / 2)));
      body.position.set(x, y, z);

      body.angularDamping = 0.18;
      body.linearDamping = 0.08;

      world.addBody(body);

      return {
        mesh,
        body,
        value,
        rarity,
        outline
      };
    }

    function buildInitialBoard() {
      for (let c = 0; c < COLS; c++) {
        const x = (c - 1) * COLUMN_GAP * 1.7;
        for (let r = 0; r < ROWS; r++) {
          const y = 0.6 + r * STACK_GAP;
          const z = 0;
          const die = createDie(
            x + (Math.random() - 0.5) * 0.04,
            y,
            z + (Math.random() - 0.5) * 0.04
          );
          die.body.quaternion.setFromEuler(
            Math.random() * 0.15,
            Math.random() * 0.15,
            Math.random() * 0.15
          );
          diceList.push(die);
        }
      }
    }

    buildInitialBoard();

    function rerollAllDice() {
      showMessage('주사위를 다시 굴리는 중...');

      for (const die of diceList) {
        die.value = randomDieValue();
        die.rarity = weightedRandomRarity();

        const nextMaterials = createDiceMaterials(die.value, die.rarity.color);
        die.mesh.material = nextMaterials;
        die.outline.material.color.setHex(die.rarity.color);

        const upward = 5 + Math.random() * 3.5;
        const impulseX = (Math.random() - 0.5) * 2.8;
        const impulseZ = (Math.random() - 0.5) * 2.2;

        die.body.velocity.set(0, 0, 0);
        die.body.angularVelocity.set(0, 0, 0);

        die.body.applyImpulse(
          new CANNON.Vec3(impulseX, upward, impulseZ),
          die.body.position
        );

        die.body.applyImpulse(
          new CANNON.Vec3(
            (Math.random() - 0.5) * 0.6,
            0,
            (Math.random() - 0.5) * 0.6
          ),
          new CANNON.Vec3(
            (Math.random() - 0.5) * 0.4,
            (Math.random() - 0.5) * 0.4,
            (Math.random() - 0.5) * 0.4
          )
        );

        die.body.torque.set(
          (Math.random() - 0.5) * 28,
          (Math.random() - 0.5) * 28,
          (Math.random() - 0.5) * 28
        );
      }

      clearTimeout(rerollAllDice._timer);
      rerollAllDice._timer = setTimeout(() => {
        showMessage('굴리기 완료');
      }, 900);
    }

    window.addEventListener('click', rerollAllDice);

    let lastTime;

    function animate(time) {
      requestAnimationFrame(animate);

      if (lastTime === undefined) {
        lastTime = time;
      }

      let dt = (time - lastTime) / 1000;
      lastTime = time;

      dt = Math.min(dt, 1 / 30);
      world.step(1 / 60, dt, 3);

      for (const die of diceList) {
        die.mesh.position.set(
          die.body.position.x,
          die.body.position.y,
          die.body.position.z
        );
        die.mesh.quaternion.set(
          die.body.quaternion.x,
          die.body.quaternion.y,
          die.body.quaternion.z,
          die.body.quaternion.w
        );
      }

      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    });
  </script>
</body>
</html>
