<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Roulette Cartoon</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:
    radial-gradient(circle at top,#fff4b8 0%,transparent 24%),
    radial-gradient(circle at 18% 24%,rgba(255,116,88,.35) 0,transparent 18%),
    radial-gradient(circle at 82% 16%,rgba(67,187,255,.28) 0,transparent 20%),
    linear-gradient(180deg,#ffd45b 0%,#ff9559 100%);
  font-family:"Trebuchet MS","Malgun Gothic",sans-serif;
  color:#1a1412;
  overflow:hidden;
}
#wrap{
  width:min(1380px,calc(100vw - 28px));
  height:min(860px,calc(100vh - 28px));
  display:grid;
  grid-template-columns:minmax(0,1fr) 360px;
  gap:0;
  border:5px solid #1a1412;
  border-radius:34px;
  overflow:hidden;
  background:#fff5d8;
  box-shadow:0 18px 0 #452d22,0 34px 80px rgba(0,0,0,.24);
}
#cw{
  position:relative;
  overflow:hidden;
  background:
    radial-gradient(circle at center,rgba(255,255,255,.28) 0,transparent 38%),
    linear-gradient(180deg,#fff2bc 0%,#ffc58d 48%,#ff9e69 100%);
}
#cw::before{
  content:"";
  position:absolute;
  inset:-10%;
  background:
    radial-gradient(circle,rgba(26,20,18,.12) 2px,transparent 2px) 0 0/22px 22px,
    repeating-conic-gradient(from 0deg,rgba(255,255,255,.12) 0 8deg,transparent 8deg 17deg);
  opacity:.45;
  pointer-events:none;
}
#cw::after{
  content:"";
  position:absolute;
  inset:22px;
  border:4px solid rgba(26,20,18,.88);
  border-radius:30px;
  pointer-events:none;
  box-shadow:inset 0 0 0 4px rgba(255,255,255,.28);
}
#c{
  position:absolute;
  inset:22px;
  width:calc(100% - 44px);
  height:calc(100% - 44px);
  display:block;
  border-radius:26px;
}
#rb{
  position:absolute;
  top:24px;
  left:50%;
  transform:translateX(-50%) rotate(-1.2deg);
  min-width:220px;
  max-width:70%;
  background:
    linear-gradient(180deg,rgba(255,255,255,.7),transparent 100%),
    #fffdf4;
  border:4px solid #1a1412;
  border-radius:22px;
  padding:14px 24px;
  font-size:28px;
  font-weight:900;
  text-align:center;
  color:#1a1412;
  white-space:nowrap;
  opacity:0;
  transition:opacity .28s,transform .28s;
  pointer-events:none;
  box-shadow:0 10px 0 rgba(26,20,18,.15);
}
#rb.show{opacity:1;transform:translateX(-50%) rotate(-1.2deg) translateY(0)}
#stage-note{
  position:absolute;
  left:50%;
  bottom:24px;
  transform:translateX(-50%);
  font-size:13px;
  font-weight:800;
  color:#3f2a20;
  padding:8px 16px;
  border:3px solid #1a1412;
  border-radius:999px;
  background:rgba(255,248,222,.84);
  pointer-events:none;
}
#debug{
  position:absolute;
  top:24px;
  left:24px;
  min-width:260px;
  max-width:360px;
  padding:12px 14px;
  border:3px solid #1a1412;
  border-radius:18px;
  background:rgba(18,16,14,.86);
  color:#f7f0e2;
  font:12px/1.45 Consolas, monospace;
  white-space:pre-wrap;
  z-index:5;
  box-shadow:0 8px 0 rgba(26,20,18,.22);
}
#panel{
  background:
    linear-gradient(180deg,rgba(255,255,255,.4),transparent 100%),
    #fff0c5;
  border-left:5px solid #1a1412;
  padding:18px;
  display:flex;
  flex-direction:column;
  gap:12px;
  overflow-y:auto;
}
.panel-card{
  border:4px solid #1a1412;
  border-radius:24px;
  padding:14px;
  background:#fffaf0;
  box-shadow:0 8px 0 rgba(26,20,18,.12);
}
.title-card{
  background:
    linear-gradient(180deg,rgba(255,255,255,.55),transparent 100%),
    #ffe178;
}
.eyebrow{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:6px 12px;
  border:3px solid #1a1412;
  border-radius:999px;
  background:#ff7258;
  color:#fffdf2;
  font-size:11px;
  font-weight:900;
  letter-spacing:.1em;
  text-transform:uppercase;
}
.title-card h1{
  margin-top:10px;
  font-size:34px;
  line-height:1;
}
.title-card p{
  margin-top:8px;
  font-size:14px;
  line-height:1.4;
}
.section-label{
  font-size:11px;
  font-weight:900;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:#5a4032;
}
.stat-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:14px;
  font-weight:700;
}
.stat-row strong{
  font-size:18px;
}
#bal,#tbet,#profit{font-weight:900}
#chips{display:flex;gap:8px;flex-wrap:wrap}
#ng{display:grid;grid-template-columns:repeat(13,1fr);gap:4px}
#cg,#og{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.grid-btn,.action-btn,.chip-btn{
  appearance:none;
  border:3px solid #1a1412;
  cursor:pointer;
  transition:transform .12s ease,box-shadow .12s ease,background .12s ease;
  box-shadow:0 5px 0 rgba(26,20,18,.14);
}
.grid-btn:hover,.action-btn:hover,.chip-btn:hover{transform:translateY(-2px)}
.grid-btn:active,.action-btn:active,.chip-btn:active{transform:translateY(3px);box-shadow:0 2px 0 rgba(26,20,18,.12)}
.chip-btn{
  width:46px;height:46px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:12px;font-weight:900;
}
.chip-btn.selected{
  outline:4px solid #fff4b8;
  box-shadow:0 0 0 4px #1a1412,0 5px 0 rgba(26,20,18,.14);
}
.grid-btn{
  min-height:44px;
  padding:6px 4px;
  border-radius:12px;
  background:#fff8e8;
  color:#1a1412;
  font-size:11px;
  font-weight:900;
  position:relative;
}
.grid-btn.zero{background:#49c979;color:#0d170f}
.grid-btn.red{background:#ff6b57;color:#fffdf4}
.grid-btn.black{background:#1b1717;color:#fffdf4}
.grid-btn.side{background:#ffe18d}
.bet-chip{
  position:absolute;
  top:2px;right:4px;
  min-width:20px;
  padding:1px 5px;
  border-radius:999px;
  background:#1a1412;
  color:#fff7dc;
  font-size:9px;
  font-weight:900;
}
.button-row{display:flex;gap:10px}
.action-btn{
  flex:1;
  min-height:58px;
  border-radius:18px;
  font-size:16px;
  font-weight:900;
}
#sb{background:#ff7056;color:#fffdf4}
#cb{background:#46bbff;color:#fffdf4}
#msg{
  min-height:20px;
  text-align:center;
  font-size:14px;
  font-weight:900;
}
#hist{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
}
.hist-ball{
  width:28px;height:28px;border-radius:50%;
  border:3px solid #1a1412;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:900;color:#fff;
  box-shadow:0 4px 0 rgba(26,20,18,.12);
}
@media (max-width:1100px){
  #wrap{grid-template-columns:1fr;height:auto;min-height:calc(100vh - 28px)}
  #cw{min-height:520px}
  #panel{border-left:none;border-top:5px solid #1a1412}
}
</style>
</head>
<body>
<div id="wrap">
  <div id="cw">
    <canvas id="c"></canvas>
    <div id="rb"></div>
    <div id="debug"></div>

  <div id="panel"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/effects/OutlineEffect.js"></script>
<script>
window.addEventListener('load', function(){
const NUMS=[0,32,15,19,4,21,2,25,17,34,6,27,13,36,11,30,8,23,10,5,24,16,33,1,20,14,31,9,22,18,29,7,28,12,35,3,26];
const REDS=new Set([1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36]);
const C1=[1,4,7,10,13,16,19,22,25,28,31,34];
const C2=[2,5,8,11,14,17,20,23,26,29,32,35];
const C3=[3,6,9,12,15,18,21,24,27,30,33,36];
const N=NUMS.length;
const SA=(Math.PI*2)/N;
const DEBUG=true;
const POCKET_ANGLE_OFFSET = 0;

// ─── 핵심 각도 유틸 ───────────────────────────────────────────
// norm: 0 ~ 2π 로 정규화
function norm(a){a%=Math.PI*2;return a<0?a+Math.PI*2:a;}

// 포켓 i 의 "로컬(휠 기준) 중심 각도"
// 휠 텍스처는 i=0(NUMS[0]=0) 이 로컬 +X(각도 0) 에서 시작하므로:
//   mid = π/2 - SA/2 - i*SA  →  텍스처 그릴 때 쓴 공식과 동일
function pocketLocalAngle(i){
  return norm(Math.PI/2 - SA/2 - i*SA);
}

// 포켓 i 의 "월드 각도" = 로컬 각도 + 휠 회전(wAngle)
// Three.js Group.rotation.y = wAngle 이고,
// 공 bAngle 은 Three.js XZ 평면 기준 atan2(z,x) 와 동일한 방향
function pocketWorldAngle(i, wAng){
  return norm(-pocketLocalAngle(i) + wAng + POCKET_ANGLE_OFFSET);
}
function pocketWorldAngleAlt(i,wAng){
  return norm(pocketLocalAngle(i) + wAng);
}

// 현재 볼 월드 각도에서 가장 가까운 포켓 인덱스를 반환
function closestPocketIndex(ballWorldAngle, wAng){
  let best=-1, bestDiff=Infinity;
  for(let i=0;i<N;i++){
    const wa = pocketWorldAngle(i, wAng);
    let diff = Math.abs(norm(ballWorldAngle - wa));
    if(diff > Math.PI) diff = Math.PI*2 - diff;
    if(diff < bestDiff){ bestDiff=diff; best=i; }
  }
  return best;
}
function closestPocketIndexAlt(ballWorldAngle,wAng){
  let best=-1, bestDiff=Infinity;
  for(let i=0;i<N;i++){
    const wa=pocketWorldAngleAlt(i,wAng);
    let diff=Math.abs(norm(ballWorldAngle-wa));
    if(diff>Math.PI) diff=Math.PI*2-diff;
    if(diff<bestDiff){bestDiff=diff;best=i;}
  }
  return best;
}
function deg(a){return (norm(a)*180/Math.PI).toFixed(2);}
// ─────────────────────────────────────────────────────────────

let balance=10000, bets={}, chip=25, spinning=false, history=[];
let wAngle=0, bAngle=0, bRadius=3.85, bVel=0, wVel=0;
let phase='idleSpin', resultNum=0;
let settleTargetAngle = 0;
let settlePocketIdx = -1;
let settleWheelFinalAngle = 0;
const debugEl=document.getElementById('debug');
const pocketMarkers=[];
let triggeredPocketIdx=-1;
let triggeredPocketNum='-';
let lastTriggerLogKey='';

function updateDebug(){
  if(!DEBUG || !debugEl)return;
  const ballWA=norm(bAngle);
  const plusIdx=closestPocketIndex(ballWA,wAngle);
  const minusIdx=closestPocketIndexAlt(ballWA,wAngle);
  const markerIdx=closestPocketIndexByMarker(ballWA);
  const plusNum=NUMS[plusIdx];
  const minusNum=NUMS[minusIdx];
  const markerNum=NUMS[markerIdx];
  const settleNum=settlePocketIdx>=0?NUMS[settlePocketIdx]:'-';
  debugEl.textContent=
`phase        ${phase}
ball angle   ${deg(ballWA)} deg
wheel angle  ${deg(wAngle)} deg
ball radius  ${bRadius.toFixed(3)}
ball vel     ${bVel.toFixed(4)}
wheel vel    ${wVel.toFixed(4)}

+formula     idx ${String(plusIdx).padStart(2,' ')} / num ${plusNum}
-formula     idx ${String(minusIdx).padStart(2,' ')} / num ${minusNum}
marker       idx ${String(markerIdx).padStart(2,' ')} / num ${markerNum}
trigger      idx ${triggeredPocketIdx>=0?String(triggeredPocketIdx).padStart(2,' '):'-'} / num ${triggeredPocketNum}
settle idx   ${settlePocketIdx>=0?String(settlePocketIdx).padStart(2,' '):'-'}
settle num   ${settleNum}
target angle ${settlePocketIdx>=0?deg(settleTargetAngle)+' deg':'-'}`;
}

document.getElementById('panel').innerHTML=`
<div class="panel-card title-card">
  <span class="eyebrow">Cartoon Roulette</span>
  <h1>Lucky Spin Club</h1>
  <p>카툰 톤의 룰렛 테이블입니다. 휠과 공의 움직임은 유지하고, UI와 재질만 만화풍으로 재해석했습니다.</p>
</div>
<div class="panel-card">
  <div class="section-label">Bankroll</div>
  <div class="stat-row"><span>잔액</span><strong id="bal">₩10,000</strong></div>
  <div class="stat-row" style="margin-top:8px"><span>총 베팅</span><strong id="tbet">₩0</strong></div>
  <div class="stat-row" style="margin-top:8px"><span>총 수익</span><strong id="profit">₩0</strong></div>
</div>
<div class="panel-card">
  <div class="section-label">Chip Select</div>
  <div id="chips" style="margin-top:10px"></div>
</div>
<div class="panel-card">
  <div class="section-label">Number Bets</div>
  <div id="ng" style="margin-top:10px"></div>
</div>
<div class="panel-card">
  <div class="section-label">Columns</div>
  <div id="cg" style="margin-top:10px"></div>
</div>
<div class="panel-card">
  <div class="section-label">Outside Bets</div>
  <div id="og" style="margin-top:10px"></div>
</div>
<div class="panel-card">
  <div class="button-row">
    <button id="sb" class="action-btn" type="button">스핀</button>
    <button id="cb" class="action-btn" type="button">초기화</button>
  </div>
  <div id="msg" style="margin-top:12px"></div>
</div>
<div class="panel-card">
  <div class="section-label">Recent Results</div>
  <div id="hist" style="margin-top:10px"></div>
</div>
`;

const chipDefs=[
  {v:1,bg:'#2e63ff'},
  {v:5,bg:'#ff7056'},
  {v:10,bg:'#49c979'},
  {v:25,bg:'#171414'},
  {v:100,bg:'#ffbf34'}
];
const chipsEl=document.getElementById('chips');
chipDefs.forEach(({v,bg})=>{
  const d=document.createElement('button');
  d.type='button';
  d.className='chip-btn'+(v===25?' selected':'');
  d.style.background=bg;
  d.textContent=v;
  d.addEventListener('click',()=>{
    chip=v;
    chipsEl.querySelectorAll('.chip-btn').forEach(x=>x.classList.remove('selected'));
    d.classList.add('selected');
  });
  chipsEl.appendChild(d);
});

function markBetButton(btn){
  btn.style.filter='saturate(1.15) brightness(1.02)';
  btn.style.transform='translateY(-1px)';
}
function clearBetButton(btn){
  btn.style.filter='';
  btn.style.transform='';
}
function pb(btn){
  if(spinning)return;
  const cost=chip;
  if(balance<cost){setMsg('잔액 부족!','#d64545');return;}
  const k=btn.dataset.bet;
  balance-=cost;
  bets[k]=(bets[k]||0)+cost;
  markBetButton(btn);
  let sp=btn.querySelector('span.bc');
  if(!sp){
    sp=document.createElement('span');
    sp.className='bc bet-chip';
    btn.appendChild(sp);
  }
  sp.textContent=bets[k];
  updUI();
}

const ng=document.getElementById('ng');
const z0=document.createElement('button');
z0.type='button';
z0.textContent='0';
z0.dataset.bet='n0';
z0.className='grid-btn zero';
z0.style.gridColumn='span 2';
z0.addEventListener('click',function(){pb(this);});
ng.appendChild(z0);
for(let i=1;i<=36;i++){
  const b=document.createElement('button');
  b.type='button';
  b.textContent=i;
  b.dataset.bet='n'+i;
  b.className='grid-btn '+(REDS.has(i)?'red':'black');
  b.addEventListener('click',function(){pb(this);});
  ng.appendChild(b);
}

[['col1','1열','2:1'],['col2','2열','2:1'],['col3','3열','2:1']].forEach(([k,l,o])=>{
  const b=document.createElement('button');
  b.type='button';
  b.dataset.bet=k;
  b.className='grid-btn side';
  b.innerHTML=l+'<br><span style="font-size:10px">'+o+'</span>';
  b.addEventListener('click',function(){pb(this);});
  document.getElementById('cg').appendChild(b);
});

[['lo','1–18','1:1'],['hi','19–36','1:1'],['even','짝수','1:1'],['odd','홀수','1:1'],
 ['red','빨강','1:1'],['blk','검정','1:1'],
 ['d1','1–12','2:1'],['d2','13–24','2:1'],['d3','25–36','2:1']].forEach(([k,l,o])=>{
  const b=document.createElement('button');
  b.type='button';
  b.dataset.bet=k;
  b.className='grid-btn side';
  if(k==='red'){b.style.background='#ff8c79';b.style.color='#fffdf4';}
  if(k==='blk'){b.style.background='#221d1d';b.style.color='#fffdf4';}
  b.innerHTML=l+'<br><span style="font-size:10px">'+o+'</span>';
  b.addEventListener('click',function(){pb(this);});
  document.getElementById('og').appendChild(b);
});

document.getElementById('sb').addEventListener('click',doSpin);
document.getElementById('cb').addEventListener('click',()=>{
  if(spinning)return;
  Object.values(bets).forEach(v=>{balance+=v;});
  bets={};
  document.querySelectorAll('#ng button,#cg button,#og button').forEach(b=>{
    clearBetButton(b);
    const s=b.querySelector('span.bc');if(s)s.remove();
  });
  updUI();
  setMsg('');
});

function updUI(){
  document.getElementById('bal').textContent='₩'+balance.toLocaleString();
  const tb=Object.values(bets).reduce((a,v)=>a+v,0);
  document.getElementById('tbet').textContent='₩'+tb.toLocaleString();
  const p=balance-10000;
  const pe=document.getElementById('profit');
  pe.textContent=(p>=0?'+':'')+'₩'+p.toLocaleString();
  pe.style.color=p>=0?'#248a54':'#d64545';
}
function setMsg(m,c){
  const e=document.getElementById('msg');
  e.textContent=m;
  e.style.color=c||'#1a1412';
}
function showBanner(t){
  const b=document.getElementById('rb');
  b.textContent=t;
  b.classList.add('show');
  setTimeout(()=>b.classList.remove('show'),3000);
}

const cw=document.getElementById('cw');
const canvas=document.getElementById('c');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.outputEncoding=THREE.sRGBEncoding;
const outlineEffect=new THREE.OutlineEffect(renderer,{
  defaultThickness:0.007,
  defaultColor:[0,0,0],
  defaultAlpha:1,
  defaultKeepAlive:true
});

const scene=new THREE.Scene();
scene.fog=new THREE.Fog(0xffc274,11,27);
const camera=new THREE.PerspectiveCamera(42,1,0.1,100);

camera.lookAt(0,0,0);

function doResize(){
  const w=cw.clientWidth||500,h=cw.clientHeight||500;
  renderer.setSize(w,h,false);
  camera.aspect=w/h;
  camera.updateProjectionMatrix();
}

const toonGradient=createToonGradient();

dl.castShadow=true;
dl.shadow.mapSize.width=2048;
dl.shadow.mapSize.height=2048;
dl.shadow.camera.near=1;
dl.shadow.camera.far=30;
dl.shadow.camera.left=-8;
dl.shadow.camera.right=8;
dl.shadow.camera.top=8;
dl.shadow.camera.bottom=-8;
scene.add(dl);
const rimLight=new THREE.PointLight(0x43bbff,0.65,18);
rimLight.position.set(-3,3.2,-2.5);
scene.add(rimLight);
const warmLight=new THREE.PointLight(0xff7358,0.45,22);
warmLight.position.set(2.5,2,4);
scene.add(warmLight);

const floor=new THREE.Mesh(
  new THREE.CircleGeometry(7.4,80),
  new THREE.MeshToonMaterial({map:makeFloorTex(),gradientMap:toonGradient})
);
floor.rotation.x=-Math.PI/2;
floor.position.y=-0.55;
floor.receiveShadow=true;
scene.add(floor);

const tbl=new THREE.Mesh(
  new THREE.CylinderGeometry(5.35,5.15,0.32,80),
  new THREE.MeshToonMaterial({color:0x6c422d,gradientMap:toonGradient})
);
tbl.position.y=-0.44;
tbl.receiveShadow=true;
scene.add(tbl);

const outerRim=new THREE.Mesh(
  new THREE.TorusGeometry(4.2,0.16,16,120),
  new THREE.MeshToonMaterial({color:0xffd24d,gradientMap:toonGradient})
);
outerRim.rotation.x=Math.PI/2;
outerRim.position.y=0.14;
outerRim.castShadow=true;
scene.add(outerRim);

const bowl=new THREE.Mesh(
  new THREE.CylinderGeometry(4.35,3.82,0.58,80,1,true),
  new THREE.MeshToonMaterial({color:0x5c2b20,gradientMap:toonGradient,side:THREE.DoubleSide})
);
bowl.position.y=-0.12;
scene.add(bowl);

function makeWheelTex(){
  const cv=document.createElement('canvas');
  cv.width=cv.height=1024;
  const ctx=cv.getContext('2d');
  const cx=512,cy=512,r=498;
  const bgGrad=ctx.createRadialGradient(cx,cy,120,cx,cy,r);
  bgGrad.addColorStop(0,'#7ef0a3');
  bgGrad.addColorStop(0.62,'#2e9e55');
  bgGrad.addColorStop(1,'#1a5f35');
  ctx.fillStyle=bgGrad;
  ctx.fillRect(0,0,1024,1024);
  ctx.strokeStyle='rgba(26,20,18,0.9)';
  ctx.lineWidth=24;
  ctx.beginPath();
  ctx.arc(cx,cy,r-12,0,Math.PI*2);
  ctx.stroke();
  ctx.strokeStyle='rgba(255,240,180,0.96)';
  ctx.lineWidth=12;
  ctx.beginPath();
  ctx.arc(cx,cy,r-24,0,Math.PI*2);
  ctx.stroke();
  for(let i=0;i<N;i++){
    // 텍스처 그릴 때의 각도 계산 — pocketLocalAngle 과 동일한 로직
    const mid = Math.PI/2 - SA/2 - i*SA;
    const a=-(mid+SA/2);
    const a2=-(mid-SA/2);
    const n=NUMS[i];
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,r,a,a2);
    ctx.closePath();
    ctx.fillStyle=n===0?'#4cd16f':REDS.has(n)?'#ff6b57':'#1d1717';
    ctx.fill();
    ctx.strokeStyle='rgba(26,20,18,0.72)';
    ctx.lineWidth=4;
    ctx.stroke();
    const tx=cx+(r-75)*Math.cos(mid),ty=cy-(r-75)*Math.sin(mid);
    ctx.save();
    ctx.translate(tx,ty);
    ctx.rotate(-mid+Math.PI/2);
    ctx.fillStyle='#fffdf6';
    ctx.font='900 30px Trebuchet MS, sans-serif';
    ctx.strokeStyle='rgba(26,20,18,0.65)';
    ctx.lineWidth=6;
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.strokeText(n,0,0);
    ctx.fillText(n,0,0);
    ctx.restore();
  }
  ctx.strokeStyle='rgba(255,255,255,0.32)';
  ctx.lineWidth=12;
  ctx.beginPath();
  ctx.arc(cx,cy,180,0,Math.PI*2);
  ctx.stroke();
  const tx=new THREE.CanvasTexture(cv);
  tx.encoding=THREE.sRGBEncoding;
  return tx;
}

function makePocketLabelTexture(n,isRed){
  const cv=document.createElement('canvas');
  cv.width=256;
  cv.height=256;
  const ctx=cv.getContext('2d');
  ctx.clearRect(0,0,256,256);

  ctx.beginPath();
  ctx.arc(128,128,88,0,Math.PI*2);
  ctx.fillStyle='rgba(18,15,13,0.26)';
  ctx.fill();

  ctx.beginPath();
  ctx.arc(128,128,78,0,Math.PI*2);
  ctx.fillStyle=isRed?'rgba(255,247,238,0.98)':'rgba(246,239,227,0.98)';
  ctx.fill();

  ctx.fillStyle='#1c1612';
  ctx.font='900 116px Trebuchet MS, sans-serif';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.lineWidth=22;
  ctx.strokeStyle='rgba(255,250,242,0.95)';
  ctx.strokeText(String(n),128,134);
  ctx.fillText(String(n),128,134);
  const tx=new THREE.CanvasTexture(cv);
  tx.encoding=THREE.sRGBEncoding;
  tx.needsUpdate=true;
  return tx;
}

function buildWheelPockets(){
  const outerRadius=3.46;
  const innerRadius=1.78;
  for(let i=0;i<N;i++){
    const visibleLocalAngle=-pocketLocalAngle(i);
    const thetaCenter=-visibleLocalAngle;
    const thetaStart=thetaCenter-(SA/2);
    const pocketColor=NUMS[i]===0?0x5b8d72:(REDS.has(NUMS[i])?0x9b5149:0x24201d);

    const seg=new THREE.Mesh(
      new THREE.RingGeometry(innerRadius,outerRadius,3,1,thetaStart,SA),
      new THREE.MeshToonMaterial({color:pocketColor,gradientMap:toonGradient,side:THREE.DoubleSide})
    );
    seg.rotation.x=-Math.PI/2;
    seg.position.y=0.122;
    seg.userData.pocketIndex=i;
    wg.add(seg);

    const labelRadius=2.86;
    const label=new THREE.Mesh(
      new THREE.PlaneGeometry(0.5,0.5),
      new THREE.MeshBasicMaterial({
        map:makePocketLabelTexture(NUMS[i], REDS.has(NUMS[i])),
        transparent:true,
        depthWrite:false
      })
    );
    label.rotation.x=-Math.PI/2;
    label.rotation.z=visibleLocalAngle-(Math.PI/2);
    label.position.set(
      Math.cos(visibleLocalAngle)*labelRadius,
      0.138,
      Math.sin(visibleLocalAngle)*labelRadius
    );
    wg.add(label);
  }
}

function createToonGradient(){
  const data=new Uint8Array([
    24,24,24,255,
    92,92,92,255,
    176,176,176,255,
    255,255,255,255
  ]);
  const texture=new THREE.DataTexture(data,4,1,THREE.RGBAFormat);
  texture.needsUpdate=true;
  texture.minFilter=THREE.NearestFilter;
  texture.magFilter=THREE.NearestFilter;
  return texture;
}
function makeFloorTex(){
  const cv=document.createElement('canvas');
  cv.width=cv.height=1024;
  const ctx=cv.getContext('2d');
  const grad=ctx.createRadialGradient(512,512,120,512,512,500);
  grad.addColorStop(0,'#fff8db');
  grad.addColorStop(.45,'#ffd35a');
  grad.addColorStop(1,'#ff9e68');
  ctx.fillStyle=grad;
  ctx.fillRect(0,0,1024,1024);
  ctx.strokeStyle='rgba(26,20,18,.1)';
  ctx.lineWidth=12;
  for(let i=0;i<10;i++){
    ctx.beginPath();
    ctx.arc(512,512,120+i*35,0,Math.PI*2);
    ctx.stroke();
  }
  for(let i=0;i<40;i++){
    ctx.fillStyle=i%2?'rgba(255,255,255,.14)':'rgba(26,20,18,.05)';
    ctx.beginPath();
    ctx.arc(80+Math.random()*864,80+Math.random()*864,3+Math.random()*8,0,Math.PI*2);
    ctx.fill();
  }
  const tx=new THREE.CanvasTexture(cv);
  tx.encoding=THREE.sRGBEncoding;
  return tx;
}
function addOutline(mesh,color){
  const eg=new THREE.EdgesGeometry(mesh.geometry);
  const line=new THREE.LineSegments(eg,new THREE.LineBasicMaterial({color,transparent:true,opacity:.58}));
  line.position.copy(mesh.position);
  line.rotation.copy(mesh.rotation);
  line.scale.copy(mesh.scale);
  mesh.parent?mesh.parent.add(line):scene.add(line);
  mesh.userData.outline=line;
}

function worldAngleFromMarker(marker){
  const worldPos=new THREE.Vector3();
  marker.getWorldPosition(worldPos);
  return norm(Math.atan2(worldPos.z,worldPos.x));
}

function closestPocketIndexByMarker(ballWorldAngle){
  let best=-1,bestDiff=Infinity;
  for(const marker of pocketMarkers){
    const wa=worldAngleFromMarker(marker);
    let diff=Math.abs(norm(ballWorldAngle-wa));
    if(diff>Math.PI) diff=Math.PI*2-diff;
    if(diff<bestDiff){
      bestDiff=diff;
      best=marker.userData.pocketIndex;
    }
  }
  return best;
}

function closestPocketIndexByLocalTrigger(){
  const localBall=wg.worldToLocal(ballMesh.position.clone());
  const localRadius=Math.hypot(localBall.x,localBall.z);
  if(localRadius<2.72 || localRadius>3.42) return -1;

  const localAngle=norm(Math.atan2(localBall.z,localBall.x));
  let best=-1;
  let bestDiff=Infinity;

  for(let i=0;i<N;i++){
    const centerA=norm(-pocketLocalAngle(i));
    let diff=Math.abs(norm(localAngle-centerA));
    if(diff>Math.PI) diff=Math.PI*2-diff;
    if(diff<bestDiff){
      bestDiff=diff;
      best=i;
    }
  }

  if(bestDiff>SA*0.6) return -1;
  return best;
}

function updateTriggeredPocket(){
  const idx=closestPocketIndexByLocalTrigger();
  if(idx<0) return;
  triggeredPocketIdx=idx;
  triggeredPocketNum=NUMS[idx];
  const key=`${phase}:${idx}`;
  if(key!==lastTriggerLogKey){
    lastTriggerLogKey=key;
    console.log('[trigger]',{
      phase,
      idx,
      num:NUMS[idx],
      ballAngleDeg:deg(bAngle),
      wheelAngleDeg:deg(wAngle)
    });
  }
}

function updateBallMesh(){
  const h=0.12+(bRadius-2.85)*0.25;
  ballMesh.position.set(Math.cos(bAngle)*bRadius, Math.max(h,0.15), Math.sin(bAngle)*bRadius);
  ballShadow.position.x=ballMesh.position.x*0.98;
  ballShadow.position.z=ballMesh.position.z*0.98;
  const shadowScale=0.75+Math.min(0.55,(ballMesh.position.y-0.12)*1.2);
  ballShadow.scale.set(shadowScale,shadowScale,1);
  ballShadow.material.opacity=Math.max(0.08,0.22-(ballMesh.position.y-0.12)*0.18);
}

function doSpin(){
  if(spinning)return;
  const tb=Object.values(bets).reduce((a,v)=>a+v,0);
  if(tb===0){setMsg('베팅을 먼저 하세요!','#d64545');return;}
  spinning=true;
  document.getElementById('sb').disabled=true;
  document.getElementById('rb').classList.remove('show');
  setMsg('');
  wVel=0.015+Math.random()*0.005;
  bVel=-(0.12+Math.random()*0.04);
  bRadius=3.85;
  phase='spinning';
  settleTargetAngle=0;
  settlePocketIdx=-1;
  settleWheelFinalAngle=0;
  triggeredPocketIdx=-1;
  triggeredPocketNum='-';
  lastTriggerLogKey='';
  console.log('[spin:start]',{wAngle,bAngle});
}

function finish(){
  phase='resting';
  spinning=false;
  wVel=0;
  bVel=0;
  document.getElementById('sb').disabled=false;

  if(settlePocketIdx>=0){
    resultNum=NUMS[settlePocketIdx];
  }else if(triggeredPocketIdx>=0){
    resultNum=NUMS[triggeredPocketIdx];
  }
  console.log('[spin:finish]',{
    resultNum,
    settlePocketIdx,
    ballAngleDeg:deg(bAngle),
    wheelAngleDeg:deg(wAngle),
    plusIdx:closestPocketIndex(norm(bAngle),wAngle),
    minusIdx:closestPocketIndexAlt(norm(bAngle),wAngle),
    markerIdx:closestPocketIndexByMarker(norm(bAngle))
  });

  const betTotal=Object.values(bets).reduce((a,v)=>a+v,0);
  const payout=calcPayout(resultNum);
  balance+=payout;
  const net=payout-betTotal;
  const col=resultNum===0?'초록':REDS.has(resultNum)?'빨강':'검정';
  showBanner(resultNum+' ('+col+')');
  if(payout>0) setMsg('+₩'+net.toLocaleString()+' 획득!','#248a54');
  else setMsg('₩'+betTotal.toLocaleString()+' 잃었습니다.','#d64545');
  history.unshift(resultNum);
  if(history.length>18)history.pop();
  document.getElementById('hist').innerHTML=history.map(h=>{
    const c=h===0?'#49c979':REDS.has(h)?'#ff6b57':'#1b1717';
    return `<div class="hist-ball" style="background:${c}">${h}</div>`;
  }).join('');
  bets={};
  document.querySelectorAll('#ng button,#cg button,#og button').forEach(b=>{
    clearBetButton(b);
    const s=b.querySelector('span.bc');if(s)s.remove();
  });
  updUI();
  if(balance<=0){
    balance=10000;
    setTimeout(()=>setMsg('₩10,000 충전!','#1a1412'),300);
    updUI();
  }
}

function calcPayout(r){
  let w=0;
  const isR=REDS.has(r);
  Object.entries(bets).forEach(([k,a])=>{
    if(k==='n'+r)w+=a*36;
    else if(k==='red'&&isR)w+=a*2;
    else if(k==='blk'&&r>0&&!isR)w+=a*2;
    else if(k==='even'&&r>0&&r%2===0)w+=a*2;
    else if(k==='odd'&&r%2===1)w+=a*2;
    else if(k==='lo'&&r>=1&&r<=18)w+=a*2;
    else if(k==='hi'&&r>=19&&r<=36)w+=a*2;
    else if(k==='d1'&&r>=1&&r<=12)w+=a*3;
    else if(k==='d2'&&r>=13&&r<=24)w+=a*3;
    else if(k==='d3'&&r>=25&&r<=36)w+=a*3;
    else if(k==='col1'&&C1.includes(r))w+=a*3;
    else if(k==='col2'&&C2.includes(r))w+=a*3;
    else if(k==='col3'&&C3.includes(r))w+=a*3;
  });
  return w;
}

let isDrag=false,pm={x:0,y:0},theta=0,phi=0.85;
function setCam(){
  const r=16;
  camera.position.set(Math.sin(theta)*Math.cos(phi)*r,Math.sin(phi)*r,Math.cos(theta)*Math.cos(phi)*r);
  camera.lookAt(0,0,0);
}
setCam();
cw.addEventListener('mousedown',e=>{isDrag=true;pm={x:e.clientX,y:e.clientY};});
window.addEventListener('mouseup',()=>{isDrag=false;});
window.addEventListener('mousemove',e=>{
  if(!isDrag)return;
  theta-=(e.clientX-pm.x)*0.007;
  phi=Math.max(0.25,Math.min(1.45,phi-(e.clientY-pm.y)*0.007));
  pm={x:e.clientX,y:e.clientY};
  setCam();
});

function animate(){
  requestAnimationFrame(animate);

  if(phase==='spinning'){
    wAngle+=wVel;
    bAngle+=bVel;
    wVel*=0.9992;
    bVel*=0.992;
    if(Math.abs(bVel)<0.05) bRadius+=(3.15-bRadius)*0.02;

    if(Math.abs(bVel)<0.018){
      phase='settling';
      wVel=0;
      settleWheelFinalAngle=wAngle;
      const bwa=norm(bAngle);
      const plusIdx=closestPocketIndex(bwa, settleWheelFinalAngle);
      const minusIdx=closestPocketIndexAlt(bwa, settleWheelFinalAngle);
      const markerIdx=closestPocketIndexByMarker(bwa);
      const triggerIdx=triggeredPocketIdx>=0?triggeredPocketIdx:closestPocketIndexByLocalTrigger();
      settlePocketIdx=triggerIdx>=0?triggerIdx:markerIdx;
      resultNum=NUMS[settlePocketIdx];
      settleTargetAngle=worldAngleFromMarker(pocketMarkers[settlePocketIdx]);
      console.log('[spin:settle]',{
        ballAngleDeg:deg(bwa),
        wheelAngleDeg:deg(settleWheelFinalAngle),
        plusIdx,
        plusNum:NUMS[plusIdx],
        minusIdx,
        minusNum:NUMS[minusIdx],
        markerIdx,
        markerNum:NUMS[markerIdx],
        triggerIdx,
        triggerNum:triggerIdx>=0?NUMS[triggerIdx]:null,
        targetAngleDeg:deg(settleTargetAngle)
      });
    }
    wg.rotation.y = wAngle;
    updateBallMesh();

  } else if(phase==='settling'){
    wAngle=settleWheelFinalAngle;
    wg.rotation.y=wAngle;

    const curBall=norm(bAngle);
    let delta=norm(settleTargetAngle-curBall);
    if(delta > Math.PI) delta -= Math.PI*2;

    const speed=Math.min(Math.abs(delta), Math.max(0.008, Math.abs(delta)*0.15+0.002));

    if(Math.abs(delta) < 0.003){
      bAngle=norm(settleTargetAngle);
      bVel=0;
      bRadius=2.85;
      updateBallMesh();
      finish();
      return;
    }

    bVel=Math.sign(delta)*speed;
    bAngle=norm(bAngle+bVel);
    bRadius+=(2.85-bRadius)*0.07;
    updateBallMesh();

  } else if(phase==='idleSpin'){
    wAngle+=0.002;
    wg.rotation.y=wAngle;
  }

  if(wg.userData.outline) wg.userData.outline.rotation.y=wg.rotation.y;
  updateTriggeredPocket();
  updateDebug();
  outlineEffect.render(scene,camera);
}

doResize();
updUI();
updateBallMesh();
updateDebug();
animate();
window.addEventListener('resize',doResize);
});
