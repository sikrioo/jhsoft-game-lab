<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <style>
    :root {
      --tavern-green: #0a2e1f;
      --wood: #3e2723;
      --gold: #f1c40f;
      --dice-size: 60px;
      --dice-bg: #ece0d1;
      --dice-dot: #2c3e50;
    }

    body {
      background: #050505;
      color: #ecf0f1;
      font-family: 'serif';
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      overflow: hidden;
    }

    .game-board {
      width: 480px;
      background: var(--tavern-green);
      border: 12px solid var(--wood);
      padding: 30px;
      box-shadow: 0 0 80px rgba(0, 0, 0, 1);
      border-radius: 4px;
    }

    .status-header {
      display: flex;
      justify-content: space-between;
      font-size: 0.9rem;
      border-bottom: 2px solid #1a4a35;
      padding-bottom: 10px;
      color: var(--gold);
      margin-bottom: 20px;
    }

    .log-area {
      height: 90px;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid #1a4a35;
      padding: 12px;
      font-size: 0.85rem;
      line-height: 1.6;
      overflow-y: auto;
      margin-bottom: 25px;
      color: #a5b1b1;
    }

    .dice-container {
      display: flex;
      justify-content: space-around;
      align-items: center;
      margin-bottom: 20px;
      gap: 10px;
    }

    .dice-set {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      flex: 1;
    }

    /* 🎲 3D 무대 */
    .dice-scene {
      width: var(--dice-size);
      height: var(--dice-size);
      perspective: 700px;
      display: inline-block;
      filter: drop-shadow(0 8px 18px rgba(0,0,0,0.35));
      transform: translateZ(0);
    }

    /* 살짝만 내려오게 (원치 않으면 이 애니메이션도 제거 가능) */
    .dice-scene.throwing {
      animation: toss-move 0.85s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }
    @keyframes toss-move {
      0%   { transform: translateY(-30px) scale(0.96); opacity: 0; }
      20%  { transform: translateY(0px)  scale(1.02); opacity: 1; }
      100% { transform: translateY(0px)  scale(1.00); }
    }

    /* 🎲 큐브 */
    .dice {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;

      --fx: 0deg;
      --fy: 0deg;
      --fz: 0deg;

      /* 기본은 vars 기반 (정지 상태) */
      transform: rotateX(var(--fx)) rotateY(var(--fy)) rotateZ(var(--fz));
      will-change: transform;
    }

    /* ✅ 던질 때만 회전 애니메이션 */
    .dice.throwing {
      animation: spin 0.85s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }

    /* 과한 Z회전/정신없음 줄인 단일 회전 */
    @keyframes spin {
      0%   { transform: rotateX(0deg)   rotateY(0deg)   rotateZ(0deg); }
      60%  { transform: rotateX(520deg) rotateY(380deg) rotateZ(70deg); }
      100% { transform: rotateX(760deg) rotateY(560deg) rotateZ(110deg); }
    }

    /* 면 */
    .dice-face {
      position: absolute;
      width: var(--dice-size);
      height: var(--dice-size);
      background: var(--dice-bg);
      border: 2px solid #c8b9a6;
      border-radius: 6px;
      box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 2rem;
      font-weight: bold;
      color: var(--dice-dot);

      backface-visibility: hidden;
      user-select: none;
    }

    .front  { transform: rotateY(  0deg) translateZ(calc(var(--dice-size) / 2)); }
    .back   { transform: rotateY(180deg) translateZ(calc(var(--dice-size) / 2)); }
    .right  { transform: rotateY( 90deg) translateZ(calc(var(--dice-size) / 2)); }
    .left   { transform: rotateY(-90deg) translateZ(calc(var(--dice-size) / 2)); }
    .top    { transform: rotateX( 90deg) translateZ(calc(var(--dice-size) / 2)); }
    .bottom { transform: rotateX(-90deg) translateZ(calc(var(--dice-size) / 2)); }

    .btn {
      background: #2c3e50;
      border: 1px solid var(--wood);
      color: #fff;
      padding: 12px;
      cursor: pointer;
      font-weight: bold;
      font-family: inherit;
    }
    .btn-main {
      background: #7f1d1d;
      color: var(--gold);
      border: 1px solid var(--gold);
    }
    .btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .bet-info {
      text-align: center;
      margin: 15px 0;
      color: var(--gold);
      font-size: 1.1rem;
    }
  </style>
</head>

<body>
  <div class="game-board">
    <div class="status-header">
      <span>[ 선상 주점 ]</span>
      <span>금화: <span id="user-gold">1000</span> G</span>
    </div>

    <div class="log-area" id="log-window">"자, 판돈을 올리고 주사위를 던지게나."</div>

    <div class="dice-container">
      <div class="dice-set">
        <div style="display:flex; gap:12px;">
          <div class="dice-scene" id="scene-p1">
            <div id="p1" class="dice">
              <div class="dice-face front">?</div>
              <div class="dice-face back">?</div>
              <div class="dice-face right">?</div>
              <div class="dice-face left">?</div>
              <div class="dice-face top">?</div>
              <div class="dice-face bottom">?</div>
            </div>
          </div>

          <div class="dice-scene" id="scene-p2">
            <div id="p2" class="dice">
              <div class="dice-face front">?</div>
              <div class="dice-face back">?</div>
              <div class="dice-face right">?</div>
              <div class="dice-face left">?</div>
              <div class="dice-face top">?</div>
              <div class="dice-face bottom">?</div>
            </div>
          </div>
        </div>
        <div id="p-hand" style="font-size:0.75rem; color:var(--gold); font-weight:bold; height:15px;"></div>
      </div>

      <div style="color: #1a4a35; font-weight: bold; font-size: 1.2rem;">VS</div>

      <div class="dice-set">
        <div style="display:flex; gap:12px;">
          <div class="dice-scene" id="scene-m1">
            <div id="m1" class="dice">
              <div class="dice-face front">?</div>
              <div class="dice-face back">?</div>
              <div class="dice-face right">?</div>
              <div class="dice-face left">?</div>
              <div class="dice-face top">?</div>
              <div class="dice-face bottom">?</div>
            </div>
          </div>

          <div class="dice-scene" id="scene-m2">
            <div id="m2" class="dice">
              <div class="dice-face front">?</div>
              <div class="dice-face back">?</div>
              <div class="dice-face right">?</div>
              <div class="dice-face left">?</div>
              <div class="dice-face top">?</div>
              <div class="dice-face bottom">?</div>
            </div>
          </div>
        </div>
        <div id="m-hand" style="font-size:0.75rem; color:var(--gold); font-weight:bold; height:15px;"></div>
      </div>
    </div>

    <div class="bet-info">BET: <span id="bet-display">100</span> G</div>

    <div style="display: grid; grid-template-columns: 1fr 2fr 1fr; gap: 10px;">
      <button class="btn" onclick="changeBet(-50)">-</button>
      <button class="btn btn-main" id="spin-btn" onclick="rollDice()">주사위를 던진다</button>
      <button class="btn" onclick="changeBet(50)">+</button>
    </div>
  </div>

  <script>
    let gold = 1000;
    let bet = 100;

    function addLog(msg, color = "#a5b1b1") {
      const log = document.getElementById('log-window');
      log.innerHTML += `<div style="color:${color}">${msg}</div>`;
      log.scrollTop = log.scrollHeight;
    }

    function changeBet(v) {
      if (bet + v >= 50) {
        bet += v;
        document.getElementById('bet-display').innerText = bet;
      }
    }

    const wait = (ms) => new Promise(res => setTimeout(res, ms));

    function setAllFacesText(diceEl, text) {
      diceEl.querySelectorAll('.dice-face').forEach(f => f.textContent = text);
    }

    // 결과값을 정면으로 오게 만드는 회전 매핑
    function getResultRotation(value) {
      const map = {
        1: { fx: 0,   fy: 0,   fz: 0 },
        2: { fx: 0,   fy: -90, fz: 0 },
        3: { fx: -90, fy: 0,   fz: 0 },
        4: { fx: 90,  fy: 0,   fz: 0 },
        5: { fx: 0,   fy: 90,  fz: 0 },
        6: { fx: 0,   fy: 180, fz: 0 }
      };
      return map[value];
    }

    function applyRotationVars(diceEl, r) {
      diceEl.style.setProperty('--fx', r.fx + 'deg');
      diceEl.style.setProperty('--fy', r.fy + 'deg');
      diceEl.style.setProperty('--fz', r.fz + 'deg');
    }

    // ✅ 핵심: "정렬"을 transition 없이 스냅으로 (반대방향 2번 회전 제거)
    function snapToResult(diceEl, value) {
      const r = getResultRotation(value);

      // transition 끄고 vars 적용
      diceEl.style.transition = 'none';
      applyRotationVars(diceEl, r);

      // reflow로 적용 강제
      void diceEl.offsetHeight;

      // 다음엔 필요하면 부드럽게 쓸 수 있게 복구(여기선 사실 없어도 됨)
      diceEl.style.transition = '';
    }

    function resetDie(sceneEl, diceEl) {
      sceneEl.classList.remove('throwing');
      diceEl.classList.remove('throwing');
      setAllFacesText(diceEl, '?');
      // 초기 정면
      snapToResult(diceEl, 1);
    }

    async function rollDice() {
      if (gold < bet) { addLog("주인: 판돈이 부족해 보이는데?", "#e74c3c"); return; }
      const btn = document.getElementById('spin-btn');

      gold -= bet;
      document.getElementById('user-gold').innerText = gold;
      btn.disabled = true;

      const diceIds = ['p1', 'p2', 'm1', 'm2'];
      diceIds.forEach(id => {
        resetDie(
          document.getElementById('scene-' + id),
          document.getElementById(id)
        );
      });

      document.getElementById('p-hand').innerText = "";
      document.getElementById('m-hand').innerText = "";

      const results = {
        p1: Math.floor(Math.random() * 6) + 1,
        p2: Math.floor(Math.random() * 6) + 1,
        m1: Math.floor(Math.random() * 6) + 1,
        m2: Math.floor(Math.random() * 6) + 1
      };

      const sequence = ['p1', 'm1', 'p2', 'm2'];

      for (let id of sequence) {
        await wait(650);

        const dice = document.getElementById(id);
        const scene = document.getElementById('scene-' + id);

        scene.classList.add('throwing');
        dice.classList.add('throwing');

        // 중간에 숫자만 표시 (회전 정렬은 하지 않음)
        setTimeout(() => {
          setAllFacesText(dice, results[id]);
        }, 320);

        // 끝나면 애니메이션 제거 + 결과 각도로 "스냅" (추가/역방향 회전 없음)
        setTimeout(() => {
          dice.classList.remove('throwing');
          scene.classList.remove('throwing');
          snapToResult(dice, results[id]);
        }, 850);

        if (id === 'p1') addLog(`당신의 첫 번째 주사위...`);
        if (id === 'm1') addLog(`주인의 첫 번째 눈은 [${results.m1}].`);
      }

      await wait(950);

      const pSum = results.p1 + results.p2;
      const mSum = results.m1 + results.m2;
      const pIsDouble = results.p1 === results.p2;
      const mIsDouble = results.m1 === results.m2;

      document.getElementById('p-hand').innerText = pIsDouble ? "쌍룡!" : `합계 ${pSum}`;
      document.getElementById('m-hand').innerText = mIsDouble ? "쌍룡!" : `합계 ${mSum}`;

      if ((pIsDouble && !mIsDouble) || (pSum > mSum && !mIsDouble) || (pSum === mSum && pIsDouble && mIsDouble)) {
        let multi = pIsDouble ? 3 : 2;
        addLog(`승리! ${bet * multi}G를 챙깁니다.`, "var(--gold)");
        gold += bet * multi;
      } else if (pSum === mSum && pIsDouble === mIsDouble) {
        addLog("무승부군. 판돈을 돌려주지.");
        gold += bet;
      } else {
        addLog("주인: 자네 운은 여기까지인가 보군.", "#e74c3c");
      }

      document.getElementById('user-gold').innerText = gold;
      btn.disabled = false;
    }
  </script>
</body>
</html>
