<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cube Forge Compact</title>
  <link rel="stylesheet" href="main.css" />
  <style>
    body{
      overflow:auto;
      min-height:100vh;
      background:
        radial-gradient(900px 520px at 50% -8%, rgba(74,163,255,.08), transparent 58%),
        radial-gradient(820px 500px at 85% 8%, rgba(255,154,60,.06), transparent 62%),
        linear-gradient(180deg, rgba(7,10,16,.98), rgba(7,10,16,1));
      padding:18px;
    }
    .cubePage{
      max-width:1320px;
      margin:0 auto;
      display:grid;
      grid-template-columns: 320px minmax(620px,1fr);
      gap:14px;
    }
    .panel{
      border:1px solid var(--border);
      border-radius:18px;
      background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.015));
      box-shadow:0 0 0 1px rgba(0,0,0,.25) inset, 0 18px 54px rgba(0,0,0,.42);
      overflow:hidden;
    }
    .hd{
      padding:12px 14px;
      border-bottom:1px solid rgba(255,255,255,.08);
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:8px;
      background:linear-gradient(180deg, rgba(255,255,255,.04), transparent);
    }
    .hd h2,.hd h3{ margin:0; font-size:13px; letter-spacing:.08em; font-family:var(--mono); color:#edf3ff; }
    .inventoryBody{ padding:10px; display:grid; gap:8px; align-content:start; max-height:820px; overflow:auto; }
    .itemRow{
      border:1px solid rgba(255,255,255,.08);
      border-radius:12px;
      padding:10px 12px;
      background:rgba(255,255,255,.02);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      font-size:12px;
      cursor:pointer;
      transition:transform .18s ease, border-color .18s ease, background .18s ease;
    }
    .itemRow:hover{ transform:translateY(-1px); border-color:rgba(142,188,255,.24); background:rgba(255,255,255,.03); }
    .itemRow.disabled{ opacity:.42; cursor:not-allowed; }
    .itemName{ font-weight:800; }
    .itemMeta{ font:700 10px var(--mono); color:#9eb0cb; }

    .forgeMain{
      position:relative;
      min-height:820px;
      padding:14px;
      display:grid;
      grid-template-rows:auto auto minmax(420px,1fr) auto;
      gap:12px;
      isolation:isolate;
    }
    .forgeMain::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 50% 22%, rgba(74,163,255,.08), transparent 28%),
        radial-gradient(circle at 50% 58%, rgba(255,154,60,.05), transparent 24%);
      pointer-events:none;
      z-index:0;
    }
    .forgeMain > *{ position:relative; z-index:1; }
    .topbar{ display:flex; justify-content:space-between; align-items:center; gap:8px; flex-wrap:wrap; }
    .tabs{ display:flex; gap:8px; flex-wrap:wrap; }
    .modeBtn{ min-width:120px; padding:9px 12px; border-radius:999px; font:700 12px var(--mono); letter-spacing:.04em; }
    .modeBtn.active{ background:rgba(74,163,255,.16); border-color:rgba(74,163,255,.38); color:#edf3ff; box-shadow:0 0 18px rgba(74,163,255,.12); }
    .status{ display:flex; gap:8px; flex-wrap:wrap; }

    .cubeArena{
      position:relative;
      display:grid;
      grid-template-columns: repeat(5, minmax(96px, 1fr));
      grid-template-rows: 96px 120px 170px 120px 96px;
      gap:10px;
      align-items:center;
      justify-items:center;
      padding:16px;
      border:1px solid rgba(255,255,255,.08);
      border-radius:22px;
      background:
        radial-gradient(circle at center, rgba(74,163,255,.08), transparent 30%),
        linear-gradient(180deg, rgba(255,255,255,.025), rgba(255,255,255,.012));
      overflow:hidden;
    }
    .cubeArena::before{
      content:"";
      position:absolute;
      width:460px;
      height:460px;
      border-radius:50%;
      border:1px solid rgba(122,164,255,.12);
      box-shadow:0 0 0 18px rgba(255,255,255,.01), 0 0 60px rgba(74,163,255,.06) inset;
      left:50%; top:50%; transform:translate(-50%,-50%);
    }
    .slot{
      width:100%;
      max-width:118px;
      min-height:74px;
      border:1px dashed rgba(255,255,255,.14);
      border-radius:16px;
      background:linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,.008));
      display:grid;
      place-items:center;
      position:relative;
      padding:10px 8px;
      text-align:center;
      transition:transform .22s ease, border-color .22s ease, box-shadow .22s ease, background .22s ease;
      cursor:pointer;
      user-select:none;
    }
    .slot:hover{ transform:translateY(-2px); border-color:rgba(142,188,255,.24); box-shadow:0 0 18px rgba(74,163,255,.08); }
    .slot.filled{ border-style:solid; background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.015)); }
    .slot.highlight{ border-color:rgba(255,212,106,.40); box-shadow:0 0 20px rgba(255,212,106,.08); }
    .slot.anim-out{ animation: slotAbsorb .82s cubic-bezier(.16,.84,.2,1) forwards; }
    .slotText{ font-size:12px; font-weight:800; line-height:1.3; }
    .slotHint{ font-size:10px; color:#8fa2c6; font-family:var(--mono); }

    .s0{ grid-column:3; grid-row:1; }
    .s1{ grid-column:4; grid-row:2; }
    .s2{ grid-column:5; grid-row:3; }
    .s3{ grid-column:4; grid-row:4; }
    .s4{ grid-column:3; grid-row:5; }
    .s5{ grid-column:2; grid-row:4; }
    .s6{ grid-column:1; grid-row:3; }
    .s7{ grid-column:2; grid-row:2; }
    .s8{ grid-column:2; grid-row:3; }
    .s9{ grid-column:4; grid-row:3; }

    .cubeCenter{
      grid-column:2 / span 3;
      grid-row:2 / span 3;
      width:min(100%, 360px);
      aspect-ratio:1;
      position:relative;
      display:grid;
      place-items:center;
      pointer-events:none;
    }
    .forgeCore{
      position:relative;
      width:250px;
      height:250px;
      border-radius:50%;
      border:1px solid rgba(255,255,255,.08);
      background:
        radial-gradient(circle at 50% 50%, rgba(255,154,60,.12), rgba(74,163,255,.08) 30%, rgba(7,10,16,.3) 56%, rgba(7,10,16,.02) 68%, transparent 70%),
        radial-gradient(circle at 50% 50%, rgba(255,255,255,.03), transparent 70%);
      box-shadow:0 0 0 1px rgba(0,0,0,.35) inset, 0 0 30px rgba(74,163,255,.12), 0 0 60px rgba(255,154,60,.08);
      overflow:hidden;
    }
    .forgeCore::before,.forgeCore::after{
      content:""; position:absolute; inset:16px; border-radius:50%; border:1px solid rgba(255,255,255,.06); animation:runeSpin 18s linear infinite;
    }
    .forgeCore::after{ inset:40px; border-style:dashed; border-color:rgba(255,212,106,.15); animation-direction:reverse; animation-duration:12s; }
    .forgeCoreGlyph{ position:absolute; inset:0; display:grid; place-items:center; font-size:68px; color:#e9f1ff; text-shadow:0 0 24px rgba(74,163,255,.25), 0 0 36px rgba(255,154,60,.16); }
    .forgePulse,.forgeBurst,.forgeFlash,.forgeShards,.forgeResultHalo{
      position:absolute; inset:50%; transform:translate(-50%,-50%); pointer-events:none; opacity:0;
    }
    .forgePulse{ width:150px; height:150px; border-radius:50%; border:1px solid rgba(124,184,255,.3); box-shadow:0 0 30px rgba(74,163,255,.15); }
    .forgeBurst{ width:320px; height:320px; border-radius:50%; background:radial-gradient(circle, rgba(255,255,255,.18) 0%, rgba(255,212,106,.08) 22%, rgba(74,163,255,.06) 42%, transparent 70%); filter:blur(10px); }
    .forgeFlash{ width:220px; height:220px; border-radius:50%; background:radial-gradient(circle, rgba(255,255,255,.95) 0%, rgba(255,244,208,.42) 22%, rgba(255,154,60,.12) 48%, transparent 72%); filter:blur(16px); }
    .forgeResultHalo{ width:420px; height:420px; border-radius:50%; background:radial-gradient(circle, rgba(255,154,60,.13) 0%, rgba(182,140,255,.10) 28%, rgba(74,163,255,.04) 48%, transparent 72%); filter:blur(14px); }
    .forgeShards{ width:420px; height:420px; background:conic-gradient(from 0deg, transparent 0 14deg, rgba(255,255,255,.18) 14deg 18deg, transparent 18deg 45deg, rgba(255,212,106,.16) 45deg 49deg, transparent 49deg 90deg, rgba(74,163,255,.18) 90deg 94deg, transparent 94deg 144deg, rgba(255,255,255,.14) 144deg 148deg, transparent 148deg 194deg, rgba(182,140,255,.14) 194deg 198deg, transparent 198deg 248deg, rgba(255,154,60,.16) 248deg 252deg, transparent 252deg 360deg); mask:radial-gradient(circle, transparent 0 120px, #000 140px 190px, transparent 206px); -webkit-mask:radial-gradient(circle, transparent 0 120px, #000 140px 190px, transparent 206px); }

    .controls{ display:flex; gap:10px; flex-wrap:wrap; justify-content:space-between; align-items:center; }
    .leftControls,.rightControls{ display:flex; gap:10px; flex-wrap:wrap; }
    .actionBtn{ min-width:140px; padding:11px 15px; border-radius:14px; font:700 12px var(--mono); letter-spacing:.04em; }
    .actionBtn.primary{ color:#fff0cc; border-color:rgba(255,212,106,.34); background:linear-gradient(180deg, rgba(255,212,106,.10), rgba(255,154,60,.08)); box-shadow:0 0 20px rgba(255,154,60,.08); }
    .actionBtn.primary:disabled{ color:#808da3; border-color:rgba(255,255,255,.08); background:rgba(255,255,255,.03); box-shadow:none; cursor:not-allowed; }

    .bottom{ display:grid; grid-template-columns: 1fr 260px; gap:12px; }
    .resultCard,.formulaCard{ border:1px solid rgba(255,255,255,.08); border-radius:16px; padding:14px; background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.012)); }
    .resultHead,.formulaHead{ display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:10px; font-family:var(--mono); font-size:11px; color:#a7b6cb; }
    .resultState{ font-size:11px; color:#93a5bf; min-height:16px; }
    .resultItem{ display:none; grid-template-columns:1fr auto; gap:12px; align-items:center; padding:12px; border-radius:14px; border:1px solid rgba(255,255,255,.10); background:rgba(255,255,255,.025); transform:translateY(8px); opacity:0; }
    .resultItem.visible{ display:grid; animation: resultReveal .7s cubic-bezier(.16,.84,.2,1) forwards; }
    .resultName{ font-size:16px; font-weight:800; }
    .resultMeta{ margin-top:4px; font-size:11px; color:#9cadc6; line-height:1.5; }
    .resultTag{ display:inline-flex; align-items:center; justify-content:center; min-width:78px; padding:6px 10px; border-radius:999px; border:1px solid rgba(255,255,255,.12); font:700 11px var(--mono); background:rgba(255,255,255,.03); }
    .formulaList{ display:grid; gap:8px; }
    .formulaRow{ border:1px solid rgba(255,255,255,.08); border-radius:12px; padding:10px; background:rgba(255,255,255,.02); cursor:pointer; transition:border-color .18s ease, transform .18s ease; }
    .formulaRow:hover{ transform:translateY(-1px); border-color:rgba(142,188,255,.25); }
    .formulaRow.active{ border-color:rgba(255,212,106,.34); box-shadow:0 0 0 1px rgba(255,212,106,.08) inset; }
    .formulaName{ font-size:12px; font-weight:800; color:#eef3ff; }
    .formulaChance{ font:700 10px var(--mono); color:#99aac3; margin-top:4px; }

    .successGlow .forgePulse{ animation:pulseRing .9s ease-out 1; }
    .successGlow .forgeBurst{ animation:burstGlow 1.1s ease-out 1; }
    .successGlow .forgeFlash{ animation:flashPop .55s ease-out 1; }
    .successGlow .forgeShards{ animation:shardSpin 1.1s cubic-bezier(.16,.84,.2,1) 1; }
    .successGlow .forgeResultHalo{ animation:resultHalo .95s ease-out 1; }
    .forgeMain.legendaryBurst .forgeCore{ box-shadow:0 0 0 1px rgba(0,0,0,.35) inset, 0 0 44px rgba(255,154,60,.24), 0 0 90px rgba(182,140,255,.14); }
    .resultTag.r-common{ border-color:rgba(214,214,214,.18); }
    .resultTag.r-magic{ border-color:rgba(74,163,255,.28); }
    .resultTag.r-rare{ border-color:rgba(255,216,74,.28); }
    .resultTag.r-epic{ border-color:rgba(182,140,255,.28); }
    .resultTag.r-legendary{ border-color:rgba(255,154,60,.32); }

    @keyframes runeSpin{ from{ transform:rotate(0deg);} to{ transform:rotate(360deg);} }
    @keyframes slotAbsorb{ 0%{ transform:scale(1); opacity:1; filter:brightness(1);} 40%{ transform:scale(.88) translateY(-8px); opacity:.95; } 100%{ transform:scale(.18); opacity:0; filter:brightness(1.5);} }
    @keyframes pulseRing{ 0%{ opacity:.1; transform:translate(-50%,-50%) scale(.5);} 35%{ opacity:.6;} 100%{ opacity:0; transform:translate(-50%,-50%) scale(2.4);} }
    @keyframes burstGlow{ 0%{ opacity:0; transform:translate(-50%,-50%) scale(.6);} 30%{ opacity:.78;} 100%{ opacity:0; transform:translate(-50%,-50%) scale(1.45);} }
    @keyframes flashPop{ 0%{ opacity:0; transform:translate(-50%,-50%) scale(.6);} 30%{ opacity:.95;} 100%{ opacity:0; transform:translate(-50%,-50%) scale(1.4);} }
    @keyframes shardSpin{ 0%{ opacity:0; transform:translate(-50%,-50%) scale(.5) rotate(0deg);} 25%{ opacity:.9;} 100%{ opacity:0; transform:translate(-50%,-50%) scale(1.18) rotate(135deg);} }
    @keyframes resultHalo{ 0%{ opacity:0; transform:translate(-50%,-50%) scale(.7);} 35%{ opacity:.88;} 100%{ opacity:0; transform:translate(-50%,-50%) scale(1.16);} }
    @keyframes resultReveal{ from{ opacity:0; transform:translateY(10px) scale(.98);} to{ opacity:1; transform:translateY(0) scale(1);} }

    @media (max-width: 1120px){
      .cubePage{ grid-template-columns:1fr; }
      .forgeMain{ min-height:auto; }
      .inventoryBody{ max-height:none; }
    }
    @media (max-width: 760px){
      body{ padding:12px; }
      .cubeArena{ grid-template-columns: repeat(3, minmax(86px, 1fr)); grid-template-rows: repeat(7, auto); }
      .cubeCenter{ grid-column:1 / span 3; grid-row:3 / span 3; }
      .s0{ grid-column:2; grid-row:1; }
      .s1{ grid-column:3; grid-row:2; }
      .s2{ grid-column:3; grid-row:4; }
      .s3{ grid-column:3; grid-row:6; }
      .s4{ grid-column:2; grid-row:7; }
      .s5{ grid-column:1; grid-row:6; }
      .s6{ grid-column:1; grid-row:4; }
      .s7{ grid-column:1; grid-row:2; }
      .s8{ grid-column:1; grid-row:5; }
      .s9{ grid-column:3; grid-row:5; }
      .bottom{ grid-template-columns:1fr; }
      .forgeCore{ width:220px; height:220px; }
    }
  </style>
</head>
<body>
  <div class="cubePage">
    <aside class="panel">
      <div class="hd">
        <h2>재료</h2>
        <span class="pill" id="selectionCount">0 / 10</span>
      </div>
      <div id="inventoryList" class="inventoryBody"></div>
    </aside>

    <main class="panel forgeMain" id="forgeMain">
      <div class="topbar">
        <div class="tabs" id="craftModeTabs">
          <button class="modeBtn active" data-mode="upgrade">승급</button>
          <button class="modeBtn" data-mode="weapon">무기</button>
          <button class="modeBtn" data-mode="armor">방어구</button>
        </div>
        <div class="status">
          <span class="pill">슬롯 <b id="slotCount">0</b> / 10</span>
          <span class="pill"><b id="activeFormula">금속 승급식</b></span>
          <span class="pill" id="chanceLabel">예상 완성도 없음</span>
        </div>
      </div>

      <div class="cubeArena" id="cubeArena">
        <div class="slot s0" data-slot="0"></div>
        <div class="slot s1" data-slot="1"></div>
        <div class="slot s2" data-slot="2"></div>
        <div class="slot s3" data-slot="3"></div>
        <div class="slot s4" data-slot="4"></div>
        <div class="slot s5" data-slot="5"></div>
        <div class="slot s6" data-slot="6"></div>
        <div class="slot s7" data-slot="7"></div>
        <div class="slot s8" data-slot="8"></div>
        <div class="slot s9" data-slot="9"></div>

        <div class="cubeCenter">
          <div class="forgeResultHalo"></div>
          <div class="forgeBurst"></div>
          <div class="forgeFlash"></div>
          <div class="forgeShards"></div>
          <div class="forgePulse"></div>
          <div class="forgeCore"><div class="forgeCoreGlyph">✦</div></div>
        </div>
      </div>

      <div class="controls">
        <div class="leftControls">
          <button id="autoFillBtn" class="actionBtn">자동 배치</button>
          <button id="clearBtn" class="actionBtn">비우기</button>
        </div>
        <div class="rightControls">
          <button id="craftBtn" class="actionBtn primary" disabled>큐빙 시작</button>
        </div>
      </div>

      <div class="bottom">
        <div class="resultCard">
          <div class="resultHead">
            <span>결과</span>
            <span id="resultState" class="resultState">-</span>
          </div>
          <div id="resultItem" class="resultItem">
            <div>
              <div id="resultName" class="resultName r-common">미지의 결과</div>
              <div id="resultMeta" class="resultMeta"></div>
            </div>
            <div id="resultTag" class="resultTag r-common">일반</div>
          </div>
        </div>

        <div class="formulaCard">
          <div class="formulaHead">
            <span>조합</span>
            <span id="formulaModeLabel">승급</span>
          </div>
          <div id="formulaList" class="formulaList"></div>
        </div>
      </div>
    </main>
  </div>

  <script>
    const INVENTORY = [
      { id:'mat-ore-1', name:'균열 철광석', rarity:'common', type:'material', tags:['ore','metal'], qty:14 },
      { id:'mat-ore-2', name:'푸른 결정 파편', rarity:'magic', type:'material', tags:['crystal','magic'], qty:8 },
      { id:'mat-ore-3', name:'심연 강철 편린', rarity:'rare', type:'material', tags:['ore','metal','rare'], qty:5 },
      { id:'mat-ore-4', name:'별빛 가루', rarity:'magic', type:'material', tags:['dust','magic'], qty:12 },
      { id:'cat-1', name:'연성 촉매', rarity:'common', type:'catalyst', tags:['catalyst'], qty:9 },
      { id:'cat-2', name:'황혼의 심장', rarity:'rare', type:'catalyst', tags:['catalyst','boss'], qty:2 },
      { id:'cat-3', name:'용의 숨결 병', rarity:'epic', type:'catalyst', tags:['catalyst','dragon'], qty:1 },
      { id:'wep-1', name:'낡은 장검', rarity:'common', type:'weapon', tags:['sword','weapon'], qty:3 },
      { id:'wep-2', name:'마력 주입 단검', rarity:'magic', type:'weapon', tags:['dagger','weapon','magic'], qty:2 },
      { id:'wep-3', name:'흑요 도끼 머리', rarity:'rare', type:'weapon', tags:['axe','weapon'], qty:1 },

      { id:'arm-2', name:'수호의 견갑', rarity:'magic', type:'armor', tags:['armor','guard'], qty:2 },
      { id:'arm-3', name:'서리 비늘 조각', rarity:'rare', type:'armor', tags:['armor','dragon'], qty:2 },
      { id:'mat-5', name:'검은 용 비늘', rarity:'epic', type:'material', tags:['dragon','scale'], qty:1 },
      { id:'mat-6', name:'축복받은 가죽끈', rarity:'common', type:'material', tags:['cloth','binding'], qty:6 },
      { id:'mat-7', name:'침묵의 룬 조각', rarity:'rare', type:'material', tags:['rune','magic'], qty:3 }
    ];

    const FORMULAS = {
      upgrade: [
        {
          id:'upgrade-metal', name:'금속 승급식', slots:['material','material','catalyst','weapon|armor'], preferredTags:['ore','metal','catalyst'],

            { weight:26, name:'찌그러진 금속 파편', rarity:'common', type:'실패 잔재', meta:'일부 소멸' }
          ]
        },
        {
          id:'upgrade-magic', name:'마력 증폭식', slots:['material','material','catalyst','material'], preferredTags:['crystal','magic','rune'],
          outcomes:[
            { weight:52, name:'마력 각인 장비 조각', rarity:'magic', type:'마법 결과', meta:'마력 잔존' },
            { weight:16, name:'별빛 각인 무기', rarity:'epic', type:'영웅 제작', meta:'마법 옵션 부여' },
            { weight:5, name:'천공의 룬블레이드', rarity:'legendary', type:'완제품 무기', meta:'전설 무기' },
            { weight:27, name:'흐릿한 결정 조각', rarity:'common', type:'실패 잔재', meta:'잔여 마력만 남음' }
          ]
        }
      ],
      weapon: [
        {
          id:'weapon-sword', name:'장검 제작식', slots:['weapon','material','material','catalyst'], preferredTags:['sword','ore','metal','catalyst'],
          outcomes:[
            { weight:44, name:'균열 기사장검', rarity:'rare', type:'완제품 무기', meta:'희귀 장검' },
            { weight:22, name:'빛추적 장검', rarity:'epic', type:'영웅 무기', meta:'치명 옵션' },
            { weight:7, name:'여명절단자', rarity:'legendary', type:'전설 무기', meta:'특수 이펙트' },
            { weight:27, name:'휘어진 검신', rarity:'common', type:'실패', meta:'베이스 손상' }
          ]
        },
        {
          id:'weapon-axe', name:'도끼 제작식', slots:['weapon','material','catalyst','material'], preferredTags:['axe','metal','boss','dragon'],
          outcomes:[
            { weight:39, name:'흑요 전투도끼', rarity:'rare', type:'완제품 무기', meta:'강타 특화' },
            { weight:24, name:'심연의 파쇄자', rarity:'epic', type:'영웅 무기', meta:'보스 특화' },
            { weight:9, name:'용골 절단도끼', rarity:'legendary', type:'전설 무기', meta:'드문 완성품' },
            { weight:28, name:'쪼개진 도끼 날', rarity:'common', type:'실패', meta:'재료 일부만 잔존' }
          ]
        }
      ],
      armor: [
        {
          id:'armor-plate', name:'판금 방어구식', slots:['armor','material','material','catalyst'], preferredTags:['armor','plate','metal','binding'],
          outcomes:[
            { weight:46, name:'균열 수호 흉갑', rarity:'rare', type:'완제품 방어구', meta:'생존력 상승' },
            { weight:19, name:'성벽 수호 판금', rarity:'epic', type:'영웅 방어구', meta:'피격 완화' },
            { weight:6, name:'천공 성채 갑주', rarity:'legendary', type:'전설 방어구', meta:'최상급 갑주' },
            { weight:29, name:'금속 잔해 묶음', rarity:'common', type:'실패', meta:'금속 조각만 남음' }
          ]
        },
        {
          id:'armor-scale', name:'비늘 갑옷식', slots:['armor','material','catalyst','material'], preferredTags:['dragon','armor','crystal','magic'],
          outcomes:[
            { weight:38, name:'서리비늘 흉갑', rarity:'rare', type:'완제품 방어구', meta:'냉기 저항' },
            { weight:23, name:'용숨결 수호갑', rarity:'epic', type:'영웅 방어구', meta:'상태이상 저항' },
            { weight:10, name:'칠흑용 비늘갑', rarity:'legendary', type:'전설 방어구', meta:'드문 완성품' },
            { weight:29, name:'부서진 비늘 묶음', rarity:'common', type:'실패', meta:'비늘 조각만 남음' }
          ]
        }
      ]
    };

    const rarityLabel = { common:'일반', magic:'마법', rare:'희귀', epic:'영웅', legendary:'전설' };
    const state = { mode:'upgrade', formulaId:null, slots:Array(10).fill(null), inventory:structuredClone(INVENTORY) };

    const inventoryList = document.getElementById('inventoryList');
    const formulaList = document.getElementById('formulaList');
    const slotEls = [...document.querySelectorAll('.slot')];
    const resultItemEl = document.getElementById('resultItem');
    const resultStateEl = document.getElementById('resultState');
    const resultNameEl = document.getElementById('resultName');
    const resultMetaEl = document.getElementById('resultMeta');
    const resultTagEl = document.getElementById('resultTag');
    const chanceLabelEl = document.getElementById('chanceLabel');
    const slotCountEl = document.getElementById('slotCount');
    const selectionCountEl = document.getElementById('selectionCount');
    const activeFormulaEl = document.getElementById('activeFormula');
    const formulaModeLabelEl = document.getElementById('formulaModeLabel');
    const craftBtn = document.getElementById('craftBtn');
    const forgeMain = document.getElementById('forgeMain');

    function getFormulaList(){ return FORMULAS[state.mode]; }
    function ensureFormula(){ const list = getFormulaList(); if (!list.some(f => f.id === state.formulaId)) state.formulaId = list[0].id; }
    function getActiveFormula(){ ensureFormula(); return getFormulaList().find(f => f.id === state.formulaId); }
    function findItem(id){ return state.inventory.find(item => item.id === id); }
    function labelType(type){ return ({ material:'재료', weapon:'무기', armor:'방어구', catalyst:'촉매' })[type] || type; }
    function labelConstraint(constraint){ if (!constraint) return '자유'; return constraint.split('|').map(labelType).join('/'); }
    function isUsed(itemId){ return state.slots.some(item => item?.id === itemId); }
    function matchesConstraint(item, constraint){ if (!constraint) return true; return constraint.split('|').includes(item.type); }

    function getFitScore(item, formula){
      let score = 16;
      if (formula.slots.some(slot => matchesConstraint(item, slot))) score += 34;
      score += item.tags.filter(tag => formula.preferredTags.includes(tag)).length * 16;
      if (item.rarity === 'rare') score += 8;
      if (item.rarity === 'epic') score += 12;
      return Math.min(score, 98);
    }

    function renderInventory(){
      const formula = getActiveFormula();
      inventoryList.innerHTML = state.inventory.map(item => {
        const used = isUsed(item.id);
        return `
          <button class="itemRow ${used ? 'disabled' : ''}" data-item="${item.id}" ${used ? 'disabled' : ''}>
            <div>
              <div class="itemName r-${item.rarity === 'legendary' ? 'legendary' : item.rarity}">${item.name}</div>
              <div class="itemMeta">${rarityLabel[item.rarity]} · ${labelType(item.type)} · ${getFitScore(item, formula)}%</div>
            </div>
            <div class="itemMeta">x${item.qty}</div>
          </button>
        `;
      }).join('');

      inventoryList.querySelectorAll('.itemRow').forEach(btn => {
        btn.addEventListener('click', () => placeToFirstAvailable(findItem(btn.dataset.item)));
      });
    }

    function renderFormulas(){
      const active = getActiveFormula();
      activeFormulaEl.textContent = active.name;
      formulaModeLabelEl.textContent = state.mode === 'upgrade' ? '승급' : state.mode === 'weapon' ? '무기' : '방어구';
      formulaList.innerHTML = getFormulaList().map(formula => {
        const rare = formula.outcomes.filter(o => o.rarity !== 'common').reduce((a,b) => a + b.weight, 0);
        return `
          <button class="formulaRow ${formula.id === active.id ? 'active' : ''}" data-formula="${formula.id}">
            <div class="formulaName">${formula.name}</div>
            <div class="formulaChance">상위 결과 비중 ${rare}%</div>
          </button>
        `;
      }).join('');
      formulaList.querySelectorAll('.formulaRow').forEach(btn => btn.addEventListener('click', () => { state.formulaId = btn.dataset.formula; renderAll(); }));
    }

    function placeToFirstAvailable(item){
      if (!item) return;
      const formula = getActiveFormula();
      let targetIndex = state.slots.findIndex((slot, idx) => !slot && idx < formula.slots.length && matchesConstraint(item, formula.slots[idx]));
      if (targetIndex === -1) targetIndex = state.slots.findIndex(slot => !slot);
      if (targetIndex === -1) return;
      state.slots[targetIndex] = item;
      renderAll();
    }

    function clearSlot(index){ state.slots[index] = null; renderAll(); }
    function clearAll(){ state.slots = Array(10).fill(null); renderAll(); }

    function renderSlots(){
      const formula = getActiveFormula();
      slotEls.forEach((slot, idx) => {
        const item = state.slots[idx];
        const constraint = formula.slots[idx] || null;
        slot.className = `slot s${idx}`;
        if (item) {
          slot.classList.add('filled');
          if (matchesConstraint(item, constraint)) slot.classList.add('highlight');
          slot.innerHTML = `<div><div class="slotText r-${item.rarity === 'legendary' ? 'legendary' : item.rarity}">${item.name}</div><div class="slotHint">${idx < formula.slots.length ? labelConstraint(constraint) : '추가 재료'}</div></div>`;
        } else {
          slot.innerHTML = `<div><div class="slotText">${idx < formula.slots.length ? labelConstraint(constraint) : '+'}</div><div class="slotHint">${idx < formula.slots.length ? '핵심 슬롯' : '추가 재료'}</div></div>`;
        }
        slot.onclick = () => state.slots[idx] ? clearSlot(idx) : null;
      });
      const count = state.slots.filter(Boolean).length;
      slotCountEl.textContent = count;
      selectionCountEl.textContent = `${count} / 10`;
    }

    function getPreviewChance(){
      const formula = getActiveFormula();
      const filled = state.slots.filter(Boolean);
      if (!filled.length) return null;
      let score = 0;
      filled.forEach((item, idx) => {
        if (idx < formula.slots.length && matchesConstraint(item, formula.slots[idx])) score += 18;
        else if (idx >= formula.slots.length) score += 6;
        score += item.tags.filter(tag => formula.preferredTags.includes(tag)).length * 7;
        if (item.rarity === 'magic') score += 4;
        if (item.rarity === 'rare') score += 7;
        if (item.rarity === 'epic') score += 10;
      });
      const capacity = formula.slots.length * 18 + Math.max(0, filled.length - formula.slots.length) * 10 + filled.length * 17;
      return Math.max(8, Math.min(96, Math.round((score / Math.max(capacity, 1)) * 100)));
    }

    function updatePreview(){
      const chance = getPreviewChance();
      craftBtn.disabled = state.slots.filter(Boolean).length < 3;
      chanceLabelEl.textContent = chance ? `예상 완성도 ${chance}%` : '예상 완성도 없음';
    }

    function autoFill(){
      state.slots = Array(10).fill(null);
      const formula = getActiveFormula();
      const picked = new Set();
      for (let i = 0; i < 10; i++) {
        const candidates = state.inventory
          .filter(item => !picked.has(item.id))
          .filter(item => i >= formula.slots.length || matchesConstraint(item, formula.slots[i]))
          .sort((a,b) => getFitScore(b, formula) - getFitScore(a, formula));
        if (candidates[0]) {
          state.slots[i] = candidates[0];
          picked.add(candidates[0].id);
        }
      }
      renderAll();
    }

    function adjustedWeight(outcome, chance){
      const bonus = Math.max(0, chance - 40);
      if (outcome.rarity === 'legendary') return outcome.weight + bonus * 0.18;
      if (outcome.rarity === 'epic') return outcome.weight + bonus * 0.22;
      if (outcome.rarity === 'rare') return outcome.weight + bonus * 0.16;
      if (outcome.rarity === 'common') return Math.max(6, outcome.weight - bonus * 0.35);
      return outcome.weight;
    }

    function consumeMaterials(result){
      const usedIds = state.slots.filter(Boolean).map(item => item.id);
      state.inventory = state.inventory.map(item => {
        if (!usedIds.includes(item.id)) return item;
        const shouldKeep = result.rarity !== 'common' && Math.random() < 0.18;
        return { ...item, qty: Math.max(0, item.qty - (shouldKeep ? 0 : 1)) };
      }).filter(item => item.qty > 0);
    }

    function revealResult(result, formula, chance){
      resultStateEl.textContent = `${formula.name} · ${chance}%`;
      resultNameEl.className = `resultName r-${result.rarity === 'legendary' ? 'legendary' : result.rarity}`;
      resultNameEl.textContent = result.name;
      resultMetaEl.textContent = `${result.type} · ${result.meta}`;
      resultTagEl.className = `resultTag r-${result.rarity === 'legendary' ? 'legendary' : result.rarity}`;
      resultTagEl.textContent = rarityLabel[result.rarity] || result.rarity;
      resultItemEl.classList.remove('visible');
      void resultItemEl.offsetWidth;
      resultItemEl.classList.add('visible');
    }

    function playForgeAnimation(legendary = false){
      forgeMain.classList.remove('successGlow', 'legendaryBurst');
      slotEls.filter(slot => slot.classList.contains('filled')).forEach((slot, idx) => {
        setTimeout(() => slot.classList.add('anim-out'), idx * 40);
        setTimeout(() => slot.classList.remove('anim-out'), 850);
      });
      void forgeMain.offsetWidth;
      forgeMain.classList.add('successGlow');
      if (legendary) forgeMain.classList.add('legendaryBurst');
      setTimeout(() => forgeMain.classList.remove('successGlow', 'legendaryBurst'), 1200);
    }

    function wait(ms){ return new Promise(resolve => setTimeout(resolve, ms)); }

    async function craft(){
      if (craftBtn.disabled) return;
      const formula = getActiveFormula();
      const chance = getPreviewChance() || 0;
      const weighted = formula.outcomes.map(outcome => ({ ...outcome, effectiveWeight: adjustedWeight(outcome, chance) }));
      const total = weighted.reduce((sum, item) => sum + item.effectiveWeight, 0);
      let roll = Math.random() * total;
      let result = weighted[weighted.length - 1];
      for (const item of weighted) { roll -= item.effectiveWeight; if (roll <= 0) { result = item; break; } }
      playForgeAnimation(result.rarity === 'epic' || result.rarity === 'legendary');
      await wait(1050);
      consumeMaterials(result);
      revealResult(result, formula, chance);
      state.slots = Array(10).fill(null);
      renderAll();
    }

    document.getElementById('autoFillBtn').addEventListener('click', autoFill);
    document.getElementById('clearBtn').addEventListener('click', clearAll);
    document.getElementById('craftBtn').addEventListener('click', craft);
    document.querySelectorAll('.modeBtn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.modeBtn').forEach(el => el.classList.toggle('active', el === btn));
        state.mode = btn.dataset.mode;
        state.formulaId = null;
        state.slots = Array(10).fill(null);
        renderAll();
      });
    });

    function renderAll(){
      renderFormulas();
      renderInventory();
      renderSlots();
      updatePreview();
    }

    renderAll();
  </script>
</body>
</html>
