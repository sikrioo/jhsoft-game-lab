<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <style>
        :root {
            --tavern-green: #0a2e1f;
            --wood: #3e2723;
            --gold: #f1c40f;
            --dice-size: 60px;
            --dice-bg: #ece0d1; /* 상아색 */
            --dice-dot: #2c3e50;
        }

        body { background: #050505; color: #ecf0f1; font-family: 'serif'; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }

        .game-board { 
            width: 480px; background: var(--tavern-green); border: 12px solid var(--wood); 
            padding: 30px; box-shadow: 0 0 80px rgba(0,0,0,1); border-radius: 4px;
        }

        .status-header { display: flex; justify-content: space-between; font-size: 0.9rem; border-bottom: 2px solid #1a4a35; padding-bottom: 10px; color: var(--gold); margin-bottom: 20px; }

        .log-area {
            height: 90px; background: rgba(0,0,0,0.4); border: 1px solid #1a4a35;
            padding: 12px; font-size: 0.85rem; line-height: 1.6; overflow-y: auto; margin-bottom: 25px; color: #a5b1b1;
        }

        .dice-container { display: flex; justify-content: space-around; align-items: center; margin-bottom: 20px; gap: 10px; }
        .dice-set { display: flex; flex-direction: column; align-items: center; gap: 10px; flex: 1; }

        /* 🎲 3D 주사위 무대 설정 */
        .dice-scene {
            width: var(--dice-size); height: var(--dice-size);
            perspective: 600px; /* 원근감 */
        }

        /* 🎲 3D 주사위 큐브 구현 */
        .dice { 
            width: 100%; height: 100%; position: relative;
            transform-style: preserve-3d;
            transition: transform 0.1s linear; /* 흔들림용 기본 전환 */
        }

        /* 주사위 각 면 설정 */
        .dice-face {
            position: absolute;
            width: var(--dice-size); height: var(--dice-size);
            background: var(--dice-bg);
            border: 2px solid #c8b9a6;
            border-radius: 6px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
            display: flex; justify-content: center; align-items: center;
            font-size: 2rem; font-weight: bold; color: var(--dice-dot);
            backface-visibility: visible; /* 뒷면 보이게 설정 */
        }

        /* 주사위 면 3D 배치 */
        .front  { transform: rotateY(  0deg) translateZ(calc(var(--dice-size) / 2)); }
        .back   { transform: rotateY(180deg) translateZ(calc(var(--dice-size) / 2)); }
        .right  { transform: rotateY( 90deg) translateZ(calc(var(--dice-size) / 2)); }
        .left   { transform: rotateY(-90deg) translateZ(calc(var(--dice-size) / 2)); }
        .top    { transform: rotateX( 90deg) translateZ(calc(var(--dice-size) / 2)); }
        .bottom { transform: rotateX(-90deg) translateZ(calc(var(--dice-size) / 2)); }

        /* 1. 흔들림 애니메이션 (가벼운 비틀기) */
        .rolling {
            animation: shake-roll 0.15s infinite alternate ease-in-out;
        }
        @keyframes shake-roll {
            from { transform: rotateX(10deg) rotateY(-10deg); }
            to { transform: rotateX(-10deg) rotateY(10deg); }
        }

        /* 2. 투척 애니메이션 (3D 회전 + 감속) */
        .throwing {
            animation: throws-roll 1s cubic-bezier(0.1, 0.9, 0.3, 1) forwards;
        }
        @keyframes throws-roll {
            0% { transform: translateY(-120px) rotateX(0deg) rotateY(0deg) rotateZ(0deg) scale(0.6); opacity: 0; }
            30% { transform: translateY(0px) rotateX(450deg) rotateY(320deg) rotateZ(180deg) scale(1.1); opacity: 1; }
            55% { transform: translateY(-20px) rotateX(630deg) rotateY(450deg) rotateZ(270deg) scale(1.05); }
            75% { transform: translateY(0px) rotateX(710deg) rotateY(530deg) rotateZ(350deg) scale(1); }
            90% { transform: translateY(-5px) rotateX(720deg) rotateY(540deg) rotateZ(360deg); }
            100% { transform: translateY(0px) rotateX(720deg) rotateY(540deg) rotateZ(360deg); }
        }

        /* 3. 안착 충격 반동 (최종 안착 전 덜컥거림) */
        .landed { animation: land-bump 0.2s ease-out forwards; }
        @keyframes land-bump {
            0% { transform: translateY(0px) rotateX(720deg) rotateY(540deg) rotateZ(360deg); }
            50% { transform: translateY(-3px) rotateX(715deg) rotateY(535deg) rotateZ(360deg); }
            100% { transform: translateY(0px) rotateX(720deg) rotateY(540deg) rotateZ(360deg); }
        }

        .btn { background: #2c3e50; border: 1px solid var(--wood); color: #fff; padding: 12px; cursor: pointer; font-weight: bold; font-family: inherit; }
        .btn-main { background: #7f1d1d; color: var(--gold); border: 1px solid var(--gold); }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .bet-info { text-align: center; margin: 15px 0; color: var(--gold); font-size: 1.1rem; }
    </style>
</head>
<body>

<div class="game-board">
    <div class="status-header">
        <span>[ 선상 주점 ]</span>
        <span>금화: <span id="user-gold">1000</span> G</span>
    </div>

    <div class="log-area" id="log-window">"자, 판돈을 올리고 주사위를 던지게나."</div>

    <div class="dice-container">
        <div class="dice-set">
            <div style="display:flex; gap:12px;">
                <div class="dice-scene"><div id="p1" class="dice"><div class="dice-face front">?</div></div></div>
                <div class="dice-scene"><div id="p2" class="dice"><div class="dice-face front">?</div></div></div>
            </div>
            <div id="p-hand" style="font-size:0.75rem; color:var(--gold); font-weight:bold; height:15px;"></div>
        </div>
        
        <div style="color: #1a4a35; font-weight: bold; font-size: 1.2rem;">VS</div>

        <div class="dice-set">
            <div style="display:flex; gap:12px;">
                <div class="dice-scene"><div id="m1" class="dice"><div class="dice-face front">?</div></div></div>
                <div class="dice-scene"><div id="m2" class="dice"><div class="dice-face front">?</div></div></div>
            </div>
            <div id="m-hand" style="font-size:0.75rem; color:var(--gold); font-weight:bold; height:15px;"></div>
        </div>
    </div>

    <div class="bet-info">BET: <span id="bet-display">100</span> G</div>

    <div style="display: grid; grid-template-columns: 1fr 2fr 1fr; gap: 10px;">
        <button class="btn" onclick="changeBet(-50)">-</button>
        <button class="btn btn-main" id="spin-btn" onclick="rollDice()">주사위를 던진다</button>
        <button class="btn" onclick="changeBet(50)">+</button>
    </div>
</div>

<script>
    let gold = 1000;
    let bet = 100;

    function addLog(msg, color = "#a5b1b1") {
        const log = document.getElementById('log-window');
        log.innerHTML += `<div style="color:${color}">${msg}</div>`;
        log.scrollTop = log.scrollHeight;
    }

    function changeBet(v) { if(bet + v >= 50) { bet += v; document.getElementById('bet-display').innerText = bet; } }

    async function rollDice() {
        if (gold < bet) { addLog("주인: 판돈이 부족해 보이는데?", "#e74c3c"); return; }
        const btn = document.getElementById('spin-btn');
        gold -= bet; document.getElementById('user-gold').innerText = gold;
        btn.disabled = true;

        const ids = ['p1', 'm1', 'p2', 'm2'];
        ids.forEach(id => {
            const el = document.getElementById(id);
            el.className = 'dice rolling';
            el.innerHTML = '<div class="dice-face front">?</div>'; // ? 표시
        });
        document.getElementById('p-hand').innerText = "";
        document.getElementById('m-hand').innerText = "";

        const results = {
            p1: Math.floor(Math.random() * 6) + 1, p2: Math.floor(Math.random() * 6) + 1,
            m1: Math.floor(Math.random() * 6) + 1, m2: Math.floor(Math.random() * 6) + 1
        };

        const wait = (ms) => new Promise(res => setTimeout(res, ms));
        const sequence = ['p1', 'm1', 'p2', 'm2'];

        for (let id of sequence) {
            await wait(1000); 
            const el = document.getElementById(id);
            el.className = 'dice throwing'; // 투척 애니메이션 시작
            
            // 굴러가는 도중 숫자 노출 타이밍 (애니메이션 45% 지점)
            setTimeout(() => { 
                el.innerHTML = `<div class="dice-face front">${results[id]}</div>`;
            }, 450); 
            
            // 애니메이션 종료 시 안착 효과
            setTimeout(() => {
                el.classList.add('landed');
            }, 1000);

            if (id === 'p1') addLog(`당신의 첫 번째 주사위...`);
            if (id === 'm1') addLog(`주인의 첫 번째 눈은 [${results.m1}].`);
        }

        await wait(1500); // 모든 주사위 정착 대기
        
        const pSum = results.p1 + results.p2;
        const mSum = results.m1 + results.m2;
        const pIsDouble = results.p1 === results.p2;
        const mIsDouble = results.m1 === results.m2;

        document.getElementById('p-hand').innerText = pIsDouble ? "쌍룡!" : `합계 ${pSum}`;
        document.getElementById('m-hand').innerText = mIsDouble ? "쌍룡!" : `합계 ${mSum}`;

        // 판정 로직
        if ( (pIsDouble && !mIsDouble) || (pSum > mSum && !mIsDouble) || (pSum === mSum && pIsDouble && mIsDouble)) {
            let multi = pIsDouble ? 3 : 2;
            addLog(`승리! ${bet * multi}G를 챙깁니다.`, "var(--gold)"); 
            gold += bet * multi; 
        } else if (pSum === mSum && pIsDouble === mIsDouble) { 
            addLog("무승부군. 판돈을 돌려주지."); gold += bet; 
        } else { 
            addLog("주인: 자네 운은 여기까지인가 보군.", "#e74c3c"); 
        }

        document.getElementById('user-gold').innerText = gold;
        btn.disabled = false;
    }
</script>
</body>
</html>
